"A","text":"Een dominant allel is altijd het meest voorkomende allel in de populatie.","text_en":"2"},{"letter":"B","text":"Een dominant allel komt alleen tot uiting wanneer het homozygoot is.","text_en":"1"},{"letter":"C","text":"Een dominant allel is altijd het voorkeursallel of het meest gunstige allel.","text_en":"This cannot be determined from this information."},{"letter":"D","text":"Een dominant allel maskeert de expressie van een recessief allel in een heterozygoot.","text_en":"4"}],"answer":"D","answerText":"Een dominant allel maskeert de expressie van een recessief allel in een heterozygoot.","q_en":"How many different types of gametes (with respect to a given gene locus) are formed by an individual who is homozygous at that locus?","a_en":"1"},{"id":"x424","ch":"X","num":424,"question":"Welke van de volgende zou voldoen aan de wet van onafhankelijke overerving van Mendel?","options":[{"letter":"A","text":"alle allelen van verschillende genen","text_en":"A dominant allele is always the most common allele in the population."},{"letter":"B","text":"allelen op geslachtschromosomen","text_en":"A dominant allele is only expressed when it is homozygous."},{"letter":"C","text":"allelen op verschillende chromosomen","text_en":"A dominant allele is always the preferred allele or the most favorable allele."},{"letter":"D","text":"allelen op hetzelfde chromosoom","text_en":"A dominant allele masks the expression of a recessive allele in a heterozygote."}],"answer":"C","answerText":"allelen op verschillende chromosomen","q_en":"Which of the following statements correctly describes the relationship between dominant and recessive alleles?","a_en":"A dominant allele masks the expression of a recessive allele in a heterozygote."},{"id":"x425","ch":"X","num":425,"question":"Wat is de kans dat een man met sikkelcelanemie kinderen krijgt met alleen normale hemoglobinemoleculen als hij paart met een vrouw die drager is van het sikkelcelgen?","options":[{"letter":"A","text":"50%","text_en":"all alleles of different genes"},{"letter":"B","text":"25%","text_en":"alleles on sex chromosomes"},{"letter":"C","text":"0%","text_en":"alleles on different chromosomes"},{"letter":"D","text":"100%","text_en":"alleles on the same chromosome"}],"answer":"C","answerText":"0%","q_en":"Which of the following would conform to Mendel's law of independent assortment?","a_en":"alleles on different chromosomes"},{"id":"x426","ch":"X","num":426,"question":"Alle volgende menselijke eigenschappen worden bepaald door de interactie van meerdere genen en allelen (polygeen), behalve:","options":[{"letter":"A","text":"haarkleur","text_en":"50%"},{"letter":"B","text":"lengte","text_en":"25%"},{"letter":"C","text":"oogkleur","text_en":"0%"},{"letter":"D","text":"sikkelcelanemie","text_en":"100%"}],"answer":"D","answerText":"sikkelcelanemie","q_en":"What is the probability that a man with sickle cell anemia will have children with only normal hemoglobin molecules if he mates with a woman who is a carrier of the sickle cell gene?","a_en":"0%"},{"id":"x427","ch":"X","num":427,"question":"Welke van de volgende processen resulteert in de scheiding (of ontkoppeling) van gekoppelde genen?","options":[{"letter":"A","text":"segregatie tijdens meiose","text_en":"This cannot be determined without knowing the blood type of the other parent."},{"letter":"B","text":"scheiding van zusterchromatiden tijdens mitose.","text_en":"50%"},{"letter":"C","text":"onafhankelijke assortiment tijdens mitose","text_en":"0%"},{"letter":"D","text":"crossing-over tijdens meiose I","text_en":"25%"}],"answer":"D","answerText":"crossing-over tijdens meiose I","q_en":"What is the probability that a parent with blood type AB will have a child with blood type O?","a_en":"0%"},{"id":"x428","ch":"X","num":428,"question":"Welke van de volgende aandoeningen kan worden gedetecteerd door het maken van een karyotype?","options":[{"letter":"A","text":"sikkelcelanemie","text_en":"hair color"},{"letter":"B","text":"Klinefelter-syndroom","text_en":"height"},{"letter":"C","text":"cystische fibrose","text_en":"eye color"},{"letter":"D","text":"hemofilie","text_en":"sickle cell anemia"}],"answer":"B","answerText":"Klinefelter-syndroom","q_en":"All of the following human traits are determined by the interaction of multiple genes and alleles (polygenic), except:","a_en":"sickle cell anemia"},{"id":"x429","ch":"X","num":429,"question":"Welk hulpmiddel wordt gebruikt om de waarschijnlijkheid van verschillende genetische uitkomsten van kruisingen te bepalen?","options":[{"letter":"A","text":"vlokkentest","text_en":"segregation during meiosis"},{"letter":"B","text":"Punnett-vierkantanalyse","text_en":"separation of sister chromatids during mitosis."},{"letter":"C","text":"het maken van een karyotype","text_en":"independent assortment during mitosis"},{"letter":"D","text":"biochemische analyse van het vruchtwater","text_en":"crossing-over during meiosis I"}],"answer":"B","answerText":"Punnett-vierkantanalyse","q_en":"Which of the following processes results in the separation (or unlinking) of linked genes?","a_en":"crossing-over during meiosis I"},{"id":"x430","ch":"X","num":430,"question":"Het fenotype wordt bepaald door het genotype. Het kan ook worden beïnvloed door de:","options":[{"letter":"A","text":"omgeving","text_en":"sickle cell anemia"},{"letter":"B","text":"dominante allelen","text_en":"Klinefelter syndrome"},{"letter":"C","text":"mutaties","text_en":"cystic fibrosis"},{"letter":"D","text":"voeding","text_en":"hemophilia"}],"answer":"A","answerText":"omgeving","q_en":"Which of the following disorders can be detected by making a karyotype?","a_en":"Klinefelter syndrome"},{"id":"x431","ch":"X","num":431,"question":"Wat is de basis voor de enorme genetische diversiteit die voortkomt uit seksuele voortplanting?","options":[{"letter":"A","text":"willekeurige bevruchting","text_en":"chorionic villus sampling"},{"letter":"B","text":"crossing-over en herschikking van gekoppelde genen tijdens de meiose","text_en":"Punnett square analysis"},{"letter":"C","text":"al deze keuzes","text_en":"making a karyotype"},{"letter":"D","text":"onafhankelijke assortiment tijdens de productie van gameten","text_en":"biochemical analysis of the amniotic fluid"}],"answer":"C","answerText":"al deze keuzes","q_en":"Which tool is used to determine the probability of different genetic outcomes of crosses?","a_en":"Punnett square analysis"},{"id":"x432","ch":"X","num":432,"question":"Onderzoek van een karyotype onthult 23 paar chromosomen, waarbij elk homoloog paar een vergelijkbare grootte en centromeerlocatie vertoont. Wat kan uit dit karyotype worden geconcludeerd?","options":[{"letter":"A","text":"De persoon heeft geen cystische fibrose.","text_en":"environment"},{"letter":"B","text":"De persoon heeft geen sikkelcelanemie.","text_en":"dominant alleles"},{"letter":"C","text":"De persoon is een vrouw.","text_en":"mutations"},{"letter":"D","text":"De persoon heeft het syndroom van Down.","text_en":"nutrition"}],"answer":"C","answerText":"De persoon is een vrouw.","q_en":"The phenotype is determined by the genotype. It can also be influenced by the:","a_en":"environment"},{"id":"x433","ch":"X","num":433,"question":"Welke van de volgende gebeurtenissen of processen kan leiden tot het Patau-syndroom, het Turner-syndroom of het Klinefelter-syndroom?","options":[{"letter":"A","text":"non-disjunctie","text_en":"random fertilization"},{"letter":"B","text":"deletie van een deel van een chromosoom","text_en":"crossing-over and recombination of linked genes during meiosis"},{"letter":"C","text":"crossing-over","text_en":"all of these choices"},{"letter":"D","text":"onafhankelijke segregatie","text_en":"independent assortment during the production of gametes"}],"answer":"A","answerText":"non-disjunctie","q_en":"What is the basis for the enormous genetic diversity that arises from sexual reproduction?","a_en":"all of these choices"},{"id":"x434","ch":"X","num":434,"question":"Welke van de volgende rijtjes geeft de juiste volgorde van structuren weer waar een spermacel doorheen moet om bevruchting te bewerkstelligen?","options":[{"letter":"A","text":"zona pellucida, corona radiata, plasmamembraan van de secundaire oöcyt","text_en":"The person does not have cystic fibrosis."},{"letter":"B","text":"corona radiata, zona pellucida, plasmamembraan van de secundaire oöcyt","text_en":"The person does not have sickle cell anemia."},{"letter":"C","text":"zona pellucida, plasmamembraan van de secundaire oöcyt, corona radiata","text_en":"The person is a female."},{"letter":"D","text":"plasmamembraan eicel, corona radiata, zona pellucida","text_en":"The person has Down syndrome."}],"answer":"B","answerText":"corona radiata, zona pellucida, plasmamembraan van de secundaire oöcyt","q_en":"Examination of a karyotype reveals 23 pairs of chromosomes, with each homologous pair showing a similar size and centromere location. What can be concluded from this karyotype?","a_en":"The person is a female."},{"id":"x435","ch":"X","num":435,"question":"Welke van de volgende gebeurtenissen resulteert in een eeneiige tweeling?","options":[{"letter":"A","text":"deling van een zygote in twee massa's voordat celdifferentiatie is begonnen","text_en":"nondisjunction"},{"letter":"B","text":"bevruchting van één eicel door twee verschillende zaadcellen","text_en":"deletion of part of a chromosome"},{"letter":"C","text":"bevruchting van twee eicellen door twee verschillende zaadcellen","text_en":"crossing-over"},{"letter":"D","text":"bevruchting van twee eicellen door dezelfde zaadcel","text_en":"independent segregation"}],"answer":"A","answerText":"deling van een zygote in twee massa's voordat celdifferentiatie is begonnen","q_en":"Which of the following events or processes can lead to Patau syndrome, Turner syndrome, or Klinefelter syndrome?","a_en":"nondisjunction"},{"id":"x436","ch":"X","num":436,"question":"Welk van de volgende processen vindt als eerste plaats wanneer een bevruchte eicel aan zijn reis door de eileider naar de baarmoeder begint?","options":[{"letter":"A","text":"al deze keuzes","text_en":"zona pellucida, corona radiata, plasma membrane of the secondary oocyte"},{"letter":"B","text":"groei","text_en":"corona radiata, zona pellucida, plasma membrane of the secondary oocyte"},{"letter":"C","text":"klieving","text_en":"zona pellucida, plasma membrane of the secondary oocyte, corona radiata"},{"letter":"D","text":"differentiatie","text_en":"egg cell plasma membrane, corona radiata, zona pellucida"}],"answer":"C","answerText":"klieving","q_en":"Which of the following lists shows the correct sequence of structures that a sperm cell must pass through to achieve fertilization?","a_en":"corona radiata, zona pellucida, plasma membrane of the secondary oocyte"},{"id":"x437","ch":"X","num":437,"question":"Een spermacel met een defect acrosoom zou niet in staat zijn om:","options":[{"letter":"A","text":"de eicel binnen te dringen","text_en":"division of a zygote into two masses before cell differentiation has begun"},{"letter":"B","text":"te zwemmen","text_en":"fertilization of one egg cell by two different sperm cells"},{"letter":"C","text":"de energie te leveren voor de spermacel om te zwemmen","text_en":"fertilization of two egg cells by two different sperm cells"},{"letter":"D","text":"door het baarmoederhalsslijm te dringen","text_en":"fertilization of two egg cells by the same sperm cell"}],"answer":"A","answerText":"de eicel binnen te dringen","q_en":"Which of the following events results in identical twins?","a_en":"division of a zygote into two masses before cell differentiation has begun"},{"id":"x438","ch":"X","num":438,"question":"Welke van de volgende opties geeft de juiste volgorde van pre-embryonale ontwikkelingsstadia aan?","options":[{"letter":"A","text":"embryonale schijf, blastocyste, morula","text_en":"all of these choices"},{"letter":"B","text":"trofoblast, blastocyste, morula, embryonale schijf","text_en":"growth"},{"letter":"C","text":"blastocyste, morula, embryonale schijf","text_en":"cleavage"},{"letter":"D","text":"morula, blastocyste, embryonale schijf","text_en":"differentiation"}],"answer":"D","answerText":"morula, blastocyste, embryonale schijf","q_en":"Which of the following processes occurs first when a fertilized egg begins its journey through the fallopian tube to the uterus?","a_en":"cleavage"},{"id":"x439","ch":"X","num":439,"question":"Welke van de volgende beweringen is onjuist?","options":[{"letter":"A","text":"De placenta scheidt hormonen af zoals progesteron, hCG en oestrogeen.","text_en":"penetrate the egg cell"},{"letter":"B","text":"De navelstreng wordt gevormd door één slagader en twee aders.","text_en":"swim"},{"letter":"C","text":"Embryonaal weefsel en maternaal weefsel vormen samen de placenta.","text_en":"provide the energy for the sperm cell to swim"},{"letter":"D","text":"Het chorion levert voedingsstoffen aan het embryo door diffusie.","text_en":"penetrate the cervical mucus"}],"answer":"B","answerText":"De navelstreng wordt gevormd door één slagader en twee aders.","q_en":"A sperm cell with a defective acrosome would not be able to:","a_en":"penetrate the egg cell"},{"id":"x440","ch":"X","num":440,"question":"Welke van de volgende weefsels/organen is niet afgeleid van het ectoderm?","options":[{"letter":"A","text":"bijniermerg","text_en":"embryonic disc, blastocyst, morula"},{"letter":"B","text":"lever","text_en":"trophoblast, blastocyst, morula, embryonic disc"},{"letter":"C","text":"opperhuid van de huid (epidermis)","text_en":"blastocyst, morula, embryonic disc"},{"letter":"D","text":"zenuwstelsel","text_en":"morula, blastocyst, embryonic disc"}],"answer":"B","answerText":"lever","q_en":"Which of the following options indicates the correct sequence of pre-embryonic developmental stages?","a_en":"morula, blastocyst, embryonic disc"},{"id":"x441","ch":"X","num":441,"question":"Alle volgende gebeurtenissen vinden plaats tijdens maand 3 en 4 van de prenatale ontwikkeling, behalve:","options":[{"letter":"A","text":"De longen beginnen surfactant te produceren.","text_en":"The placenta secretes hormones such as progesterone, hCG, and estrogen."},{"letter":"B","text":"De nieren produceren urine.","text_en":"The umbilical cord is formed by one artery and two veins."},{"letter":"C","text":"De lever begint te functioneren.","text_en":"Embryonic tissue and maternal tissue together form the placenta."},{"letter":"D","text":"Genitaliën ontwikkelen zich goed genoeg om het geslacht te kunnen bepalen.","text_en":"The chorion supplies nutrients to the embryo by diffusion."}],"answer":"A","answerText":"De longen beginnen surfactant te produceren.","q_en":"Which of the following statements is incorrect?","a_en":"The umbilical cord is formed by one artery and two veins."},{"id":"x442","ch":"X","num":442,"question":"Wanneer 'de vliezen breken' in het eerste stadium van de bevalling, welke vloeistof komt er dan vrij?","options":[{"letter":"A","text":"bloedplasma","text_en":"adrenal medulla"},{"letter":"B","text":"vruchtwater (amniotic fluid)","text_en":"liver"},{"letter":"C","text":"H2O (puur water)","text_en":"epidermis of the skin"},{"letter":"D","text":"geen van de bovenstaande","text_en":"nervous system"}],"answer":"B","answerText":"vruchtwater (amniotic fluid)","q_en":"Which of the following tissues/organs is not derived from the ectoderm?","a_en":"liver"},{"id":"x443","ch":"X","num":443,"question":"Welke van de volgende omstandigheden zou schadelijk zijn voor de gezondheid van een pasgeborene (neonaat)?","options":[{"letter":"A","text":"het foramen ovale sluit","text_en":"The lungs begin to produce surfactant."},{"letter":"B","text":"de ductus arteriosus blijft open","text_en":"The kidneys produce urine."},{"letter":"C","text":"de ductus venosus sluit","text_en":"The liver begins to function."},{"letter":"D","text":"zowel de ductus arteriosus blijft open, als het foramen ovale sluit","text_en":"The genitalia develop well enough to determine the sex."}],"answer":"B","answerText":"de ductus arteriosus blijft open","q_en":"All of the following events occur during months 3 and 4 of prenatal development, except:","a_en":"The lungs begin to produce surfactant."},{"id":"x444","ch":"X","num":444,"question":"________ stimuleert de productie van melk, terwijl ________ zorgt voor de afgifte (toeschietreflex) van melk uit de borst.","options":[{"letter":"A","text":"Oestrogeen ... oxytocine","text_en":"blood plasma"},{"letter":"B","text":"Prolactine ... oxytocine","text_en":"amniotic fluid"},{"letter":"C","text":"Oxytocine ... prolactine","text_en":"H2O (pure water)"},{"letter":"D","text":"Oestrogeen ... prolactine","text_en":"none of the above"}],"answer":"B","answerText":"Prolactine ... oxytocine","q_en":"When the 'membranes rupture' in the first stage of labor, which fluid is released?","a_en":"amniotic fluid"},{"id":"x445","ch":"X","num":445,"question":"Mogelijke activiteiten van telomerase zouden kunnen zijn:","options":[{"letter":"A","text":"kanker blokkeren door telomeren te herstellen na celdelingen","text_en":"the foramen ovale closes"},{"letter":"B","text":"het verouderingsproces stoppen door de telomeren weer op te bouwen","text_en":"the ductus arteriosus remains open"},{"letter":"C","text":"zowel 'het verouderingsproces stoppen' als 'bijdragen aan kanker'","text_en":"the ductus venosus closes"},{"letter":"D","text":"bijdragen aan kanker door tumorcellen in staat te stellen oneindig te blijven delen","text_en":"both the ductus arteriosus remains open, and the foramen ovale closes"}],"answer":"C","answerText":"zowel 'het verouderingsproces stoppen' als 'bijdragen aan kanker'","q_en":"Which of the following conditions would be harmful to the health of a newborn (neonate)?","a_en":"the ductus arteriosus remains open"},{"id":"x446","ch":"X","num":446,"question":"De veroudering van welk orgaan of orgaansysteem is over het algemeen het minste problematisch tijdens het normale verouderingsproces?","options":[{"letter":"A","text":"immuunsysteem","text_en":"Estrogen ... oxytocin"},{"letter":"B","text":"zenuwstelsel","text_en":"Prolactin ... oxytocin"},{"letter":"C","text":"botten","text_en":"Oxytocin ... prolactin"},{"letter":"D","text":"nieren","text_en":"Estrogen ... prolactin"}],"answer":"D","answerText":"nieren","q_en":"________ stimulates the production of milk, while ________ causes the release (let-down reflex) of milk from the breast.","a_en":"Prolactin ... oxytocin"},{"id":"x447","ch":"X","num":447,"question":"Alle volgende zijn theorieën met betrekking tot de oorzaken van veroudering, behalve:","options":[{"letter":"A","text":"De productie van cortisol neemt toe, en de stressreactie draagt bij aan veroudering.","text_en":"blocking cancer by repairing telomeres after cell divisions"},{"letter":"B","text":"Een achteruitgang in één kritiek lichaamssysteem veroorzaakt parallelle achteruitgang in andere.","text_en":"stopping the aging process by rebuilding the telomeres"},{"letter":"C","text":"Cellen kunnen zichzelf niet langer goed herstellen, en schade hoopt zich op.","text_en":"both 'stopping the aging process' and 'contributing to cancer'"},{"letter":"D","text":"Cellen raken door hun telomeren heen en stoppen met delen.","text_en":"contributing to cancer by allowing tumor cells to keep dividing indefinitely"}],"answer":"A","answerText":"De productie van cortisol neemt toe, en de stressreactie draagt bij aan veroudering.","q_en":"Possible activities of telomerase could be:","a_en":"both 'stopping the aging process' and 'contributing to cancer'"},{"id":"x448","ch":"X","num":448,"question":"Welk hormoon speelt een cruciale rol bij zowel de bevalling als bij borstvoeding?","options":[{"letter":"A","text":"oxytocine","text_en":"immune system"},{"letter":"B","text":"prolactine","text_en":"nervous system"},{"letter":"C","text":"progesteron","text_en":"bones"},{"letter":"D","text":"oestrogeen","text_en":"kidneys"}],"answer":"A","answerText":"oxytocine","q_en":"The aging of which organ or organ system is generally the least problematic during the normal aging process?","a_en":"kidneys"},{"id":"x449","ch":"X","num":449,"question":"Wat is GEEN rol van prostaglandines in het menselijk lichaam?","options":[{"letter":"A","text":"Ontstekingsreacties mediëren","text_en":"The production of cortisol increases, and the stress response contributes to aging."},{"letter":"B","text":"Bloedstroom reguleren","text_en":"A decline in one critical body system causes parallel decline in others."},{"letter":"C","text":"Bloedsuikerspiegel reguleren","text_en":"Cells can no longer repair themselves properly, and damage accumulates."},{"letter":"D","text":"Bloedstolling beïnvloeden","text_en":"Cells run out of their telomeres and stop dividing."}],"answer":"C","answerText":"Bloedsuikerspiegel reguleren","q_en":"All of the following are theories regarding the causes of aging, except:","a_en":"The production of cortisol increases, and the stress response contributes to aging."},{"id":"x450","ch":"X","num":450,"question":"Hoe noemt men de longziekte waarbij zich vloeistof ophoopt in de longblaasjes (alveoli), waardoor gasuitwisseling moeilijk gaat?","options":[{"letter":"A","text":"Pneumonie (Longontsteking)","text_en":"oxytocin"},{"letter":"B","text":"Longkanker","text_en":"prolactin"},{"letter":"C","text":"Astma","text_en":"progesterone"},{"letter":"D","text":"Emfyseem","text_en":"estrogen"}],"answer":"A","answerText":"Pneumonie (Longontsteking)","q_en":"Which hormone plays a crucial role in both childbirth and breastfeeding?","a_en":"oxytocin"},{"id":"x451","ch":"X","num":451,"question":"Bij welke longziekte gaat de oppervlakte van de longblaasjes (alveoli) structureel kapot, wat leidt tot kortademigheid?","options":[{"letter":"A","text":"Pneumonie","text_en":"Mediating inflammatory responses"},{"letter":"B","text":"Astma","text_en":"Regulating blood flow"},{"letter":"C","text":"Bronchitis","text_en":"Regulating blood sugar levels"},{"letter":"D","text":"Emfyseem","text_en":"Affecting blood clotting"}],"answer":"D","answerText":"Emfyseem","q_en":"What is NOT a role of prostaglandins in the human body?","a_en":"Regulating blood sugar levels"},{"id":"x452","ch":"X","num":452,"question":"Waarom lossen veel fysiologische stoffen zo goed op in water?","options":[{"letter":"A","text":"Omdat water waterstof en zuurstof bevat","text_en":"Pneumonia"},{"letter":"B","text":"Omdat zuiver water een neutrale pH heeft","text_en":"Lung cancer"},{"letter":"C","text":"Omdat het essentieel is voor ons lichaam","text_en":"Asthma"},{"letter":"D","text":"Omdat de watermolecule polair is","text_en":"Emphysema"}],"answer":"D","answerText":"Omdat de watermolecule polair is","q_en":"What is the name of the lung disease in which fluid accumulates in the alveoli, making gas exchange difficult?","a_en":"Pneumonia"},{"id":"x453","ch":"X","num":453,"question":"Wat is de buitenste weefsellaag van de baarmoederwand?","options":[{"letter":"A","text":"Perimetrium","text_en":"Pneumonia"},{"letter":"B","text":"Parametrium","text_en":"Asthma"},{"letter":"C","text":"Endometrium","text_en":"Bronchitis"},{"letter":"D","text":"Myometrium","text_en":"Emphysema"}],"answer":"A","answerText":"Perimetrium","q_en":"In which lung disease does the surface of the alveoli structurally break down, leading to shortness of breath?","a_en":"Emphysema"},{"id":"x454","ch":"X","num":454,"question":"Welke aandoening ontstaat typisch door een chronisch tekort aan jodium in de voeding?","options":[{"letter":"A","text":"Struma (Goiter)","text_en":"Because water contains hydrogen and oxygen"},{"letter":"B","text":"Lupus","text_en":"Because pure water has a neutral pH"},{"letter":"C","text":"Ziekte van Crohn","text_en":"Because it is essential for our body"},{"letter":"D","text":"Myxoedeem","text_en":"Because the water molecule is polar"}],"answer":"A","answerText":"Struma (Goiter)","q_en":"Why do many physiological substances dissolve so well in water?","a_en":"Because the water molecule is polar"},{"id":"x455","ch":"X","num":455,"question":"Een cel heeft 2n=16 chromosomen. Hoeveel chromosomen en chromatiden zijn er aanwezig in de metafase van de mitose?","options":[{"letter":"A","text":"32 chromosomen, 32 chromatiden","text_en":"Perimetrium"},{"letter":"B","text":"32 chromosomen, 16 chromatiden","text_en":"Parametrium"},{"letter":"C","text":"16 chromosomen, 32 chromatiden","text_en":"Endometrium"},{"letter":"D","text":"16 chromosomen, 16 chromatiden","text_en":"Myometrium"}],"answer":"C","answerText":"16 chromosomen, 32 chromatiden","q_en":"What is the outermost tissue layer of the uterine wall?","a_en":"Perimetrium"},{"id":"x456","ch":"X","num":456,"question":"Wat is de primaire reden waardoor bacteriepopulaties resistent worden tegen antibiotica?","options":[{"letter":"A","text":"Het menselijk lichaam bouwt over tijd een immuniteit op tegen het antibioticum.","text_en":"Goiter (Struma)"},{"letter":"B","text":"Bacteriën die de behandeling overleven vermenigvuldigen zich en geven hun resistentiegenen door.","text_en":"Lupus"},{"letter":"C","text":"Antibiotica veroorzaken direct mutaties in het DNA van de bacteriën.","text_en":"Crohn's disease"},{"letter":"D","text":"Bacteriën veranderen in virussen om aan het antibioticum te ontkomen.","text_en":"Myxedema"}],"answer":"B","answerText":"Bacteriën die de behandeling overleven vermenigvuldigen zich en geven hun resistentiegenen door.","q_en":"Which disorder typically develops from a chronic deficiency of iodine in the diet?","a_en":"Goiter (Struma)"},{"id":"x457","ch":"X","num":457,"question":"Wat is de voornaamste functie van MHC (Major Histocompatibility Complex) moleculen?","options":[{"letter":"A","text":"Het produceren van antilichamen in het bloed","text_en":"32 chromosomes, 32 chromatids"},{"letter":"B","text":"Het direct doden van binnendringende pathogenen","text_en":"32 chromosomes, 16 chromatids"},{"letter":"C","text":"Het fagocyteren van dode cellen","text_en":"16 chromosomes, 32 chromatids"},{"letter":"D","text":"Het presenteren van eiwitfragmenten (antigenen) aan T-cellen","text_en":"16 chromosomes, 16 chromatids"}],"answer":"D","answerText":"Het presenteren van eiwitfragmenten (antigenen) aan T-cellen","q_en":"A cell has 2n=16 chromosomes. How many chromosomes and chromatids are present during metaphase of mitosis?","a_en":"16 chromosomes, 32 chromatids"},{"id":"x458","ch":"X","num":458,"question":"Waarom wordt bloed biologisch geclassificeerd als een type bindweefsel?","options":[{"letter":"A","text":"Omdat het ontstaat uit embryonaal mesoderm en een extracellulaire matrix heeft","text_en":"The human body builds up immunity to the antibiotic over time."},{"letter":"B","text":"Omdat het voedingsstoffen en energie opneemt via de darmen","text_en":"Bacteria that survive the treatment multiply and pass on their resistance genes."},{"letter":"C","text":"Omdat het specifieke fysiologische lichaamsfuncties heeft","text_en":"Antibiotics directly cause mutations in the bacteria's DNA."},{"letter":"D","text":"Omdat het delen van het lichaam fysiek bij elkaar houdt","text_en":"Bacteria turn into viruses to escape the antibiotic."}],"answer":"A","answerText":"Omdat het ontstaat uit embryonaal mesoderm en een extracellulaire matrix heeft","q_en":"What is the primary reason bacterial populations become resistant to antibiotics?","a_en":"Bacteria that survive the treatment multiply and pass on their resistance genes."},{"id":"x459","ch":"X","num":459,"question":"Wat is de primaire taak van Helper-T-cellen (CD4+ cellen) in het immuunsysteem?","options":[{"letter":"A","text":"Het coördineren en stimuleren van de reacties van het immuunsysteem","text_en":"Producing antibodies in the blood"},{"letter":"B","text":"Parasieten en bacteriën direct aanvallen en vernietigen","text_en":"Directly killing invading pathogens"},{"letter":"C","text":"Antigenen produceren tegen virussen","text_en":"Phagocytosing dead cells"},{"letter":"D","text":"Antilichamen aanmaken en afscheiden in het bloed","text_en":"Presenting protein fragments (antigens) to T cells"}],"answer":"A","answerText":"Het coördineren en stimuleren van de reacties van het immuunsysteem","q_en":"What is the main function of MHC (Major Histocompatibility Complex) molecules?","a_en":"Presenting protein fragments (antigens) to T cells"},{"id":"x460","ch":"X","num":460,"question":"Waarom is de zuurstofopname in de longen moeilijker op grote hoogte (zoals in de bergen)?","options":[{"letter":"A","text":"Er is een lager zuurstofgradiënt (lagere partiële druk)","text_en":"Because it arises from embryonic mesoderm and has an extracellular matrix"},{"letter":"B","text":"De luchtwegen vernauwen zich automatisch op grote hoogte","text_en":"Because it absorbs nutrients and energy through the intestines"},{"letter":"C","text":"Het percentage zuurstof in de lucht neemt drastisch af","text_en":"Because it has specific physiological body functions"},{"letter":"D","text":"Er is te veel koolstofdioxide in de atmosfeer op die hoogte","text_en":"Because it physically holds parts of the body together"}],"answer":"A","answerText":"Er is een lager zuurstofgradiënt (lagere partiële druk)","q_en":"Why is blood biologically classified as a type of connective tissue?","a_en":"Because it arises from embryonic mesoderm and has an extracellular matrix"},{"id":"x461","ch":"X","num":461,"question":"Welk hormoon wordt voornamelijk geproduceerd door het bijniermerg (adrenal medulla)?","options":[{"letter":"A","text":"Cortisol","text_en":"Coordinating and stimulating the responses of the immune system"},{"letter":"B","text":"Aldosteron","text_en":"Directly attacking and destroying parasites and bacteria"},{"letter":"C","text":"Noradrenaline (en adrenaline)","text_en":"Producing antigens against viruses"},{"letter":"D","text":"Thyroxine","text_en":"Producing and secreting antibodies into the blood"}],"answer":"C","answerText":"Noradrenaline (en adrenaline)","q_en":"What is the primary role of helper T cells (CD4+ cells) in the immune system?","a_en":"Coordinating and stimulating the responses of the immune system"},{"id":"x462","ch":"X","num":462,"question":"Welke structuur bevindt zich direct onder het epitheelweefsel en verankert het aan het onderliggende bindweefsel?","options":[{"letter":"A","text":"Subcutis","text_en":"There is a lower oxygen gradient (lower partial pressure)"},{"letter":"B","text":"Endotheel","text_en":"The airways automatically constrict at high altitude"},{"letter":"C","text":"Basale membraan","text_en":"The percentage of oxygen in the air drops drastically"},{"letter":"D","text":"Kraakbeen","text_en":"There is too much carbon dioxide in the atmosphere at that altitude"}],"answer":"C","answerText":"Basale membraan","q_en":"Why is oxygen uptake in the lungs more difficult at high altitude (such as in the mountains)?","a_en":"There is a lower oxygen gradient (lower partial pressure)"},{"id":"x463","ch":"X","num":463,"question":"Welke van de volgende accessoire klieren bij de man produceert het grootste volume (ongeveer 60%) van de zaadvloeistof?","options":[{"letter":"A","text":"Seminale vesikels (Zaadblaasjes)","text_en":"Cortisol"},{"letter":"B","text":"Epididymis (Bijbal)","text_en":"Aldosterone"},{"letter":"C","text":"Bulbo-urethrale klier (Klier van Cowper)","text_en":"Noradrenaline (and adrenaline)"},{"letter":"D","text":"Prostaat","text_en":"Thyroxine"}],"answer":"A","answerText":"Seminale vesikels (Zaadblaasjes)","q_en":"Which hormone is mainly produced by the adrenal medulla?","a_en":"Noradrenaline (and adrenaline)"},{"id":"x464","ch":"X","num":464,"question":"Welk van de volgende is een klassiek voorbeeld van de aangeboren (innate) immuniteit?","options":[{"letter":"A","text":"Huidbarrière","text_en":"Subcutis"},{"letter":"B","text":"Geheugencellen","text_en":"Endothelium"},{"letter":"C","text":"Antilichamen","text_en":"Basement membrane"},{"letter":"D","text":"B-lymfocyten","text_en":"Cartilage"}],"answer":"A","answerText":"Huidbarrière","q_en":"Which structure lies directly beneath the epithelial tissue and anchors it to the underlying connective tissue?","a_en":"Basement membrane"},{"id":"x465","ch":"X","num":465,"question":"Wat is een essentieel verschil tussen adaptieve immuniteit en aangeboren immuniteit?","options":[{"letter":"A","text":"Aangeboren immuniteit is specifieker dan adaptieve immuniteit.","text_en":"Seminal vesicles"},{"letter":"B","text":"Adaptieve immuniteit bouwt een immunologisch geheugen op, aangeboren immuniteit niet.","text_en":"Epididymis"},{"letter":"C","text":"Aangeboren immuniteit maakt gebruik van T-cellen en B-cellen.","text_en":"Bulbourethral gland (Cowper's gland)"},{"letter":"D","text":"Adaptieve immuniteit reageert altijd veel sneller dan aangeboren immuniteit.","text_en":"Prostate"}],"answer":"B","answerText":"Adaptieve immuniteit bouwt een immunologisch geheugen op, aangeboren immuniteit niet.","q_en":"Which of the following accessory glands in the male produces the largest volume (about 60%) of the seminal fluid?","a_en":"Seminal vesicles"},{"id":"x466","ch":"X","num":466,"question":"Welk van de volgende moleculen passeert onder normale omstandigheden NIET door de nucleaire poriën naar het cytoplasma?","options":[{"letter":"A","text":"RNA (zoals mRNA)","text_en":"Skin barrier"},{"letter":"B","text":"Ionen","text_en":"Memory cells"},{"letter":"C","text":"Genoomsch DNA","text_en":"Antibodies"},{"letter":"D","text":"Eiwitten","text_en":"B lymphocytes"}],"answer":"C","answerText":"Genoomsch DNA","q_en":"Which of the following is a classic example of innate immunity?","a_en":"Skin barrier"},{"id":"x467","ch":"X","num":467,"question":"Wat wordt er gevormd als tussenstap in het herstelproces na een botbreuk, bestaande uit vezelig weefsel en kraakbeen?","options":[{"letter":"A","text":"Een fibrocartilagineuze callus","text_en":"Innate immunity is more specific than adaptive immunity."},{"letter":"B","text":"Hyalien kraakbeen","text_en":"Adaptive immunity builds up immunological memory, whereas innate immunity does not."},{"letter":"C","text":"Een sinus","text_en":"Innate immunity makes use of T cells and B cells."},{"letter":"D","text":"Een hematoom","text_en":"Adaptive immunity always responds much faster than innate immunity."}],"answer":"A","answerText":"Een fibrocartilagineuze callus","q_en":"What is an essential difference between adaptive immunity and innate immunity?","a_en":"Adaptive immunity builds up immunological memory, whereas innate immunity does not."},{"id":"x468","ch":"X","num":468,"question":"Welk hormoon wordt direct in de bloedbaan afgescheiden als reactie op een abnormaal lage calciumconcentratie in het bloed?","options":[{"letter":"A","text":"Parathormoon (PTH)","text_en":"RNA (such as mRNA)"},{"letter":"B","text":"Antidiuretisch hormoon (ADH)","text_en":"Ions"},{"letter":"C","text":"Calcitonine","text_en":"Genomic DNA"},{"letter":"D","text":"Adrenocorticotroop hormoon (ACTH)","text_en":"Proteins"}],"answer":"A","answerText":"Parathormoon (PTH)","q_en":"Which of the following molecules does NOT pass through the nuclear pores into the cytoplasm under normal conditions?","a_en":"Genomic DNA"},{"id":"x469","ch":"X","num":469,"question":"Wat is de primaire fysiologische functie van de dunne darm?","options":[{"letter":"A","text":"Heropname van grote hoeveelheden water en indikkken van ontlasting","text_en":"A fibrocartilaginous callus"},{"letter":"B","text":"Mechanisch kneden en aanzuren van voedsel","text_en":"Hyaline cartilage"},{"letter":"C","text":"Vertering afronden en absorptie van voedingsstoffen in het bloed","text_en":"A sinus"},{"letter":"D","text":"Productie van galzouten","text_en":"A hematoma"}],"answer":"C","answerText":"Vertering afronden en absorptie van voedingsstoffen in het bloed","q_en":"What is formed as an intermediate step in the healing process after a bone fracture, consisting of fibrous tissue and cartilage?","a_en":"A fibrocartilaginous callus"},{"id":"x470","ch":"X","num":470,"question":"Welk orgaan in het spijsverteringsstelsel is verantwoordelijk voor het grootste deel van de mechanische vertering van voedsel?","options":[{"letter":"A","text":"De lever","text_en":"Parathyroid hormone (PTH)"},{"letter":"B","text":"De mond (gebit)","text_en":"Antidiuretic hormone (ADH)"},{"letter":"C","text":"De dunne darm","text_en":"Calcitonin"},{"letter":"D","text":"De maag","text_en":"Adrenocorticotropic hormone (ACTH)"}],"answer":"D","answerText":"De maag","q_en":"Which hormone is secreted directly into the bloodstream in response to an abnormally low calcium concentration in the blood?","a_en":"Parathyroid hormone (PTH)"},{"id":"x471","ch":"X","num":471,"question":"Een patiënt heeft last van transmurale ontstekingen die voornamelijk in de dikke darm zitten, maar afgewisseld worden met gezonde stukken weefsel ('skip lesions'). Er is bloed in de ontlasting. Welke ziekte past hier het best bij?","options":[{"letter":"A","text":"Ziekte van Crohn","text_en":"Reabsorbing large amounts of water and thickening the stool"},{"letter":"B","text":"Colitis ulcerosa","text_en":"Mechanically kneading and acidifying food"},{"letter":"C","text":"Prikkelbaredarmsyndroom (PDS)","text_en":"Completing digestion and absorbing nutrients into the blood"},{"letter":"D","text":"Syndroom van Sweet","text_en":"Producing bile salts"}],"answer":"A","answerText":"Ziekte van Crohn","q_en":"What is the primary physiological function of the small intestine?","a_en":"Completing digestion and absorbing nutrients into the blood"},{"id":"x472","ch":"X","num":472,"question":"Hoe noemt men in de biologische hiërarchie een groep cellen met dezelfde vorm en structuur die samenwerken om een specifieke functie uit te voeren?","options":[{"letter":"A","text":"Een orgaanstelsel","text_en":"The liver"},{"letter":"B","text":"Een orgaan","text_en":"The mouth (teeth)"},{"letter":"C","text":"Een weefsel","text_en":"The small intestine"},{"letter":"D","text":"Een klier","text_en":"The stomach"}],"answer":"C","answerText":"Een weefsel","q_en":"Which organ in the digestive system is responsible for most of the mechanical digestion of food?","a_en":"The stomach"},{"id":"x473","ch":"X","num":473,"question":"Welke kamer in het menselijk hart heeft de dikste en meest gespierde wand (myocard)?","options":[{"letter":"A","text":"Rechter atrium","text_en":"Crohn's disease"},{"letter":"B","text":"Rechter ventrikel","text_en":"Ulcerative colitis"},{"letter":"C","text":"Linker ventrikel","text_en":"Irritable bowel syndrome (IBS)"},{"letter":"D","text":"Linker atrium","text_en":"Sweet's syndrome"}],"answer":"C","answerText":"Linker ventrikel","q_en":"A patient suffers from transmural inflammation located mainly in the large intestine, alternating with healthy patches of tissue ('skip lesions'). There is blood in the stool. Which disease fits this best?","a_en":"Crohn's disease"},{"id":"x474","ch":"X","num":474,"question":"Waarom wordt er bicarbonaat aan het voedsel toegevoegd zodra het de dunne darm bereikt?","options":[{"letter":"A","text":"Om vitamine B12 op te nemen","text_en":"An organ system"},{"letter":"B","text":"Om eiwitten direct te verteren","text_en":"An organ"},{"letter":"C","text":"Om vetten te emulgeren","text_en":"A tissue"},{"letter":"D","text":"Om het zure maagsap te neutraliseren","text_en":"A gland"}],"answer":"D","answerText":"Om het zure maagsap te neutraliseren","q_en":"In the biological hierarchy, what is the name for a group of cells with the same shape and structure that work together to perform a specific function?","a_en":"A tissue"},{"id":"x475","ch":"X","num":475,"question":"Welke weefselstructuur wordt primair aangevallen en beschadigd bij reumatoïde artritis (rheumatoid arthritis)?","options":[{"letter":"A","text":"De pezen en ligamenten","text_en":"Right atrium"},{"letter":"B","text":"De botepifyse","text_en":"Right ventricle"},{"letter":"C","text":"Het hyalien kraakbeen","text_en":"Left ventricle"},{"letter":"D","text":"Het synoviaal membraan","text_en":"Left atrium"}],"answer":"D","answerText":"Het synoviaal membraan","q_en":"Which chamber of the human heart has the thickest and most muscular wall (myocardium)?","a_en":"Left ventricle"},{"id":"x476","ch":"X","num":476,"question":"Wat is typisch GEEN symptoom van mucoviscidose (taaislijmziekte) bij volwassenen?","options":[{"letter":"A","text":"Sinusitis","text_en":"To absorb vitamin B12"},{"letter":"B","text":"Meconium ileus","text_en":"To directly digest proteins"},{"letter":"C","text":"Onvruchtbaarheid","text_en":"To emulsify fats"},{"letter":"D","text":"Terugkerende luchtweginfecties","text_en":"To neutralize the acidic gastric juice"}],"answer":"B","answerText":"Meconium ileus","q_en":"Why is bicarbonate added to the food as soon as it reaches the small intestine?","a_en":"To neutralize the acidic gastric juice"},{"id":"x477","ch":"X","num":477,"question":"Wat is het directe gevolg als de centriolen in een cel worden beschadigd of aangevallen?","options":[{"letter":"A","text":"Fouten tijdens de DNA-replicatie","text_en":"The tendons and ligaments"},{"letter":"B","text":"Verlies van de celkern","text_en":"The bone epiphysis"},{"letter":"C","text":"Onmiddellijke stilstand van eiwitproductie","text_en":"The hyaline cartilage"},{"letter":"D","text":"Problemen bij het uit elkaar trekken van de chromosomen","text_en":"The synovial membrane"}],"answer":"D","answerText":"Problemen bij het uit elkaar trekken van de chromosomen","q_en":"Which tissue structure is primarily attacked and damaged in rheumatoid arthritis?","a_en":"The synovial membrane"},{"id":"x478","ch":"X","num":478,"question":"Wat is een kenmerkend en fundamenteel eigenschap van kankercellen?","options":[{"letter":"A","text":"Verhoogde apoptose","text_en":"Sinusitis"},{"letter":"B","text":"Ongecontroleerde celdeling","text_en":"Meconium ileus"},{"letter":"C","text":"Overmatige productie van specifieke enzymen","text_en":"Infertility"},{"letter":"D","text":"Gecontroleerde weefselgroei","text_en":"Recurrent respiratory infections"}],"answer":"B","answerText":"Ongecontroleerde celdeling","q_en":"Which is typically NOT a symptom of cystic fibrosis in adults?","a_en":"Meconium ileus"},{"id":"x479","ch":"X","num":479,"question":"Wat is de beste omschrijving van een goedaardige (benigne) tumor?","options":[{"letter":"A","text":"Een tumor die uiteindelijk vanzelf oplost","text_en":"Errors during DNA replication"},{"letter":"B","text":"Een massa die niet-kankerverwekkend is en niet metastaseert (uitzaait)","text_en":"Loss of the nucleus"},{"letter":"C","text":"Een weefselmassa die naburige weefsels invasief doordringt","text_en":"Immediate halt of protein production"},{"letter":"D","text":"Een weefselklomp die agressief teruggroeit na verwijdering","text_en":"Problems with pulling the chromosomes apart"}],"answer":"B","answerText":"Een massa die niet-kankerverwekkend is en niet metastaseert (uitzaait)","q_en":"What is the direct consequence if the centrioles in a cell are damaged or attacked?","a_en":"Problems with pulling the chromosomes apart"},{"id":"x480","ch":"X","num":480,"question":"Welke bewering over de symptomen van angina pectoris is correct?","options":[{"letter":"A","text":"Angina vermindert direct de bloeddruk in het hele lichaam.","text_en":"Increased apoptosis"},{"letter":"B","text":"Onstabiele angina treedt vaak en onvoorspelbaar op, zelfs in rust.","text_en":"Uncontrolled cell division"},{"letter":"C","text":"Angina zorgt per definitie voor permanente necrose van hartspiervezels.","text_en":"Excessive production of specific enzymes"},{"letter":"D","text":"Stabiele angina treedt vaak onvoorspelbaar op bij rust.","text_en":"Controlled tissue growth"}],"answer":"B","answerText":"Onstabiele angina treedt vaak en onvoorspelbaar op, zelfs in rust.","q_en":"What is a characteristic and fundamental property of cancer cells?","a_en":"Uncontrolled cell division"},{"id":"x481","ch":"X","num":481,"question":"Wat is een van de belangrijkste fysiologische rollen van maagzuur (zoutzuur / HCl)?","options":[{"letter":"A","text":"Vertering van koolhydraten","text_en":"A tumor that eventually resolves on its own"},{"letter":"B","text":"Volledige vertering van eiwitten tot losse aminozuren","text_en":"A mass that is non-cancerous and does not metastasize (spread)"},{"letter":"C","text":"Vertering van vetten","text_en":"A tissue mass that invasively penetrates neighboring tissues"},{"letter":"D","text":"Pepsinogeen activeren tot pepsine en het lichaam beschermen tegen pathogenen","text_en":"A lump of tissue that aggressively grows back after removal"}],"answer":"D","answerText":"Pepsinogeen activeren tot pepsine en het lichaam beschermen tegen pathogenen","q_en":"What is the best description of a benign tumor?","a_en":"A mass that is non-cancerous and does not metastasize (spread)"},{"id":"x482","ch":"X","num":482,"question":"Welk overkoepelend hormoon, geproduceerd door de hypothalamus, stimuleert rechtstreeks de afgifte van LH en FSH?","options":[{"letter":"A","text":"Testosteron","text_en":"Angina directly lowers the blood pressure throughout the entire body."},{"letter":"B","text":"Corticotropine","text_en":"Unstable angina occurs frequently and unpredictably, even at rest."},{"letter":"C","text":"Oestrogeen","text_en":"Angina by definition causes permanent necrosis of heart muscle fibers."},{"letter":"D","text":"Gonadotropine-releasing hormone (GnRH)","text_en":"Stable angina often occurs unpredictably at rest."}],"answer":"D","answerText":"Gonadotropine-releasing hormone (GnRH)","q_en":"Which statement about the symptoms of angina pectoris is correct?","a_en":"Unstable angina occurs frequently and unpredictably, even at rest."},{"id":"x483","ch":"X","num":483,"question":"Welke genetische factor zorgt er tijdens de embryonale ontwikkeling voor dat de ongedifferentieerde geslachtsklieren zich ontwikkelen tot testikels?","options":[{"letter":"A","text":"Androsteron","text_en":"Digestion of carbohydrates"},{"letter":"B","text":"Testis Determining Factor (TDF)","text_en":"Complete digestion of proteins into individual amino acids"},{"letter":"C","text":"Testosteron","text_en":"Digestion of fats"},{"letter":"D","text":"Anti-Mülleriaans hormoon","text_en":"Activating pepsinogen into pepsin and protecting the body against pathogens"}],"answer":"B","answerText":"Testis Determining Factor (TDF)","q_en":"What is one of the most important physiological roles of gastric acid (hydrochloric acid / HCl)?","a_en":"Activating pepsinogen into pepsin and protecting the body against pathogens"},{"id":"x484","ch":"X","num":484,"question":"Welk celtype vormt veruit de meerderheid (zo'n 90%) van de epidermis (opperhuid)?","options":[{"letter":"A","text":"Adipocyten","text_en":"Testosterone"},{"letter":"B","text":"Langerhanscellen","text_en":"Corticotropin"},{"letter":"C","text":"Melanocyten","text_en":"Estrogen"},{"letter":"D","text":"Keratinocyten","text_en":"Gonadotropin-releasing hormone (GnRH)"}],"answer":"D","answerText":"Keratinocyten","q_en":"Which overarching hormone, produced by the hypothalamus, directly stimulates the release of LH and FSH?","a_en":"Gonadotropin-releasing hormone (GnRH)"},{"id":"x485","ch":"X","num":485,"question":"Welke fysiologische structuren zorgen voor de enorme vergroting van het absorptieoppervlak in de dunne darm?","options":[{"letter":"A","text":"Epitheel","text_en":"Androsterone"},{"letter":"B","text":"Villi en microvilli","text_en":"Testis Determining Factor (TDF)"},{"letter":"C","text":"Trilharen (cilia)","text_en":"Testosterone"},{"letter":"D","text":"Rugae","text_en":"Anti-Müllerian hormone"}],"answer":"B","answerText":"Villi en microvilli","q_en":"During embryonic development, which genetic factor causes the undifferentiated gonads to develop into testes?","a_en":"Testis Determining Factor (TDF)"},{"id":"x486","ch":"X","num":486,"question":"Welke van de volgende beweringen over atherosclerose (slagaderverkalking) is FOUT?","options":[{"letter":"A","text":"Het zorgt voor een verminderde elasticiteit en vernauwing van het bloedvat.","text_en":"Adipocytes"},{"letter":"B","text":"Cholesterol en andere vetten zetten zich vast in en onder de endotheellaag van het bloedvat.","text_en":"Langerhans cells"},{"letter":"C","text":"De eerste aanzetten van het proces (fatty streaks) starten vaak al in de jongvolwassenheid.","text_en":"Melanocytes"},{"letter":"D","text":"Bestaande plaques in de coronairen kunnen met standaardbehandelingen volledig worden weggenomen.","text_en":"Keratinocytes"}],"answer":"D","answerText":"Bestaande plaques in de coronairen kunnen met standaardbehandelingen volledig worden weggenomen.","q_en":"Which cell type makes up by far the majority (about 90%) of the epidermis?","a_en":"Keratinocytes"},{"id":"x487","ch":"X","num":487,"question":"Wat is de functie van het acrosoom (het 'kapje' op de kop) van een zaadcel?","options":[{"letter":"A","text":"Het bevat lytische enzymen om door de beschermende laag van de eicel te dringen.","text_en":"Epithelium"},{"letter":"B","text":"Het bevat het mannelijke DNA dat overgedragen moet worden.","text_en":"Villi and microvilli"},{"letter":"C","text":"Het fungeert als voedingsopslag (fructose) tijdens de reis.","text_en":"Cilia"},{"letter":"D","text":"Het bevat mitochondriën voor voortbeweging.","text_en":"Rugae"}],"answer":"A","answerText":"Het bevat lytische enzymen om door de beschermende laag van de eicel te dringen.","q_en":"Which physiological structures provide the enormous increase of the absorptive surface area in the small intestine?","a_en":"Villi and microvilli"},{"id":"x488","ch":"X","num":488,"question":"Als het middenrif (diafragma) van een patiënt verlamd is en niet meer kan samentrekken, wat is dan het directe en grootste probleem?","options":[{"letter":"A","text":"Uitademen (expiratie) wordt vrijwel onmogelijk.","text_en":"It causes a reduced elasticity and narrowing of the blood vessel."},{"letter":"B","text":"Inademen (inspiratie) wordt zeer moeilijk of onmogelijk.","text_en":"Cholesterol and other fats become deposited in and beneath the endothelial layer of the blood vessel."},{"letter":"C","text":"Er vindt geen gasuitwisseling meer plaats in de alveoli, zelfs als er zuurstof aanwezig is.","text_en":"The first beginnings of the process (fatty streaks) often start as early as young adulthood."},{"letter":"D","text":"De ademhaling zal onmiddellijk sterk versnellen.","text_en":"Existing plaques in the coronary arteries can be completely removed with standard treatments."}],"answer":"B","answerText":"Inademen (inspiratie) wordt zeer moeilijk of onmogelijk.","q_en":"Which of the following statements about atherosclerosis (arteriosclerosis) is INCORRECT?","a_en":"Existing plaques in the coronary arteries can be completely removed with standard treatments."},{"id":"x489","ch":"X","num":489,"question":"Welke uitspraak over de productie van energie (ATP) in de cel is biologisch FOUT?","options":[{"letter":"A","text":"Triglyceriden (vetten) kunnen worden gesplitst en leveren uiteindelijk bouwstenen voor de ATP-productie.","text_en":"It contains lytic enzymes to penetrate the protective layer of the egg cell."},{"letter":"B","text":"De citroenzuurcyclus (Krebs-cyclus) produceert de allergrootste hoeveelheid ATP in de cel.","text_en":"It contains the male DNA that must be transferred."},{"letter":"C","text":"Eiwitten kunnen in tijden van uithongering worden gebruikt als energiebron.","text_en":"It serves as a nutrient store (fructose) during the journey."},{"letter":"D","text":"Volledig katabolisme van glucose zonder zuurstof (anaeroob) is mogelijk, maar levert veel minder ATP op.","text_en":"It contains mitochondria for movement."}],"answer":"B","answerText":"De citroenzuurcyclus (Krebs-cyclus) produceert de allergrootste hoeveelheid ATP in de cel.","q_en":"What is the function of the acrosome (the 'cap' on the head) of a sperm cell?","a_en":"It contains lytic enzymes to penetrate the protective layer of the egg cell."},{"id":"x490","ch":"X","num":490,"question":"Een mutatie in een 'proto-oncogen' verandert dit gen in een 'oncogen'. Wat is hiervan het primaire gevolg voor de cel?","options":[{"letter":"A","text":"Onmiddellijke celdood (apoptose)","text_en":"Exhalation (expiration) becomes virtually impossible."},{"letter":"B","text":"Vertraagde celdeling","text_en":"Inhalation (inspiration) becomes very difficult or impossible."},{"letter":"C","text":"Het uitschakelen van het immuunsysteem","text_en":"No gas exchange takes place in the alveoli any more, even if oxygen is present."},{"letter":"D","text":"Verhoogde en ongecontroleerde (versnelde) celdeling","text_en":"Breathing will immediately speed up sharply."}],"answer":"D","answerText":"Verhoogde en ongecontroleerde (versnelde) celdeling","q_en":"If a patient's diaphragm is paralysed and can no longer contract, what is the direct and biggest problem?","a_en":"Inhalation (inspiration) becomes very difficult or impossible."},{"id":"x491","ch":"X","num":491,"question":"Welk bloedvat is anatomisch uniek omdat het, als 'slagader', zuurstofarm bloed vanuit het hart richting de longen vervoert?","options":[{"letter":"A","text":"De longader (Vena pulmonalis)","text_en":"Triglycerides (fats) can be broken down and ultimately provide building blocks for ATP production."},{"letter":"B","text":"De aorta","text_en":"The citric acid cycle (Krebs cycle) produces by far the largest amount of ATP in the cell."},{"letter":"C","text":"De longslagader (Arteria pulmonalis)","text_en":"Proteins can be used as an energy source during periods of starvation."},{"letter":"D","text":"De kransslagader","text_en":"Complete catabolism of glucose without oxygen (anaerobic) is possible, but yields far less ATP."}],"answer":"C","answerText":"De longslagader (Arteria pulmonalis)","q_en":"Which statement about the production of energy (ATP) in the cell is biologically INCORRECT?","a_en":"The citric acid cycle (Krebs cycle) produces by far the largest amount of ATP in the cell."},{"id":"x492","ch":"X","num":492,"question":"Waarom is de wand van bloedcapillairen (haarvaten) extreem dun en bestaat deze slechts uit één endotheelcellaag?","options":[{"letter":"A","text":"Om de bloeddruk plaatselijk te verhogen","text_en":"Immediate cell death (apoptosis)"},{"letter":"B","text":"Om de diffusie van zuurstof, voedingsstoffen en afvalstoffen te maximaliseren","text_en":"Slowed cell division"},{"letter":"C","text":"Om voedingsstoffen langdurig op te slaan in de vaatwand","text_en":"Switching off the immune system"},{"letter":"D","text":"Om uitdroging te voorkomen doordat water in het vat blijft","text_en":"Increased and uncontrolled (accelerated) cell division"}],"answer":"B","answerText":"Om de diffusie van zuurstof, voedingsstoffen en afvalstoffen te maximaliseren","q_en":"A mutation in a 'proto-oncogene' changes this gene into an 'oncogene'. What is the primary consequence of this for the cell?","a_en":"Increased and uncontrolled (accelerated) cell division"},{"id":"x493","ch":"X","num":493,"question":"Hoe noemt men de kleinste zich herhalende functionele en contractiele eenheid binnen een spiervezel?","options":[{"letter":"A","text":"Fascia","text_en":"The pulmonary vein (Vena pulmonalis)"},{"letter":"B","text":"Myofibril","text_en":"The aorta"},{"letter":"C","text":"Sarcomeer","text_en":"The pulmonary artery (Arteria pulmonalis)"},{"letter":"D","text":"Fascikel","text_en":"The coronary artery"}],"answer":"C","answerText":"Sarcomeer","q_en":"Which blood vessel is anatomically unique because, as an 'artery', it carries oxygen-poor blood from the heart towards the lungs?","a_en":"The pulmonary artery (Arteria pulmonalis)"},{"id":"x494","ch":"X","num":494,"question":"Wat is een bekende, vaak voorkomende oorzaak van het syndroom van Cushing?","options":[{"letter":"A","text":"Een chronisch tekort aan schildklierhormoon.","text_en":"To locally increase blood pressure"},{"letter":"B","text":"Overmatig en langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason).","text_en":"To maximise the diffusion of oxygen, nutrients and waste products"},{"letter":"C","text":"Een overmatige productie van melatonine door de epifyse.","text_en":"To store nutrients for a long time in the vessel wall"},{"letter":"D","text":"Een auto-immuunreactie die de alvleesklier aantast.","text_en":"To prevent dehydration by keeping water inside the vessel"}],"answer":"B","answerText":"Overmatig en langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason).","q_en":"Why is the wall of blood capillaries extremely thin and made up of only a single layer of endothelial cells?","a_en":"To maximise the diffusion of oxygen, nutrients and waste products"},{"id":"x495","ch":"X","num":495,"question":"Welke bewering over de thymusklier (zwezerik) is VERKEERD?","options":[{"letter":"A","text":"Het is de locatie waar T-cellen rijpen en leren differentiëren.","text_en":"Fascia"},{"letter":"B","text":"Het is een belangrijk onderdeel van het lymfatische systeem.","text_en":"Myofibril"},{"letter":"C","text":"De verwijdering ervan bij een jong kind heeft weinig tot geen effect op het immuunsysteem.","text_en":"Sarcomere"},{"letter":"D","text":"De thymus krimpt en wordt grotendeels vervangen door vetweefsel na de puberteit.","text_en":"Fascicle"}],"answer":"C","answerText":"De verwijdering ervan bij een jong kind heeft weinig tot geen effect op het immuunsysteem.","q_en":"What is the smallest repeating functional and contractile unit within a muscle fibre called?","a_en":"Sarcomere"},{"id":"x496","ch":"X","num":496,"question":"Welke uitspraak over het hormoon melatonine is juist?","options":[{"letter":"A","text":"De afscheiding is het hoogst tijdens periodes met veel zonlicht.","text_en":"A chronic deficiency of thyroid hormone."},{"letter":"B","text":"De afscheiding ervan is gerelateerd aan de lichtintensiteit en het wordt aangemaakt door de epifyse.","text_en":"Excessive and prolonged use of cortisol-like medication (such as dexamethasone)."},{"letter":"C","text":"Het wordt afgescheiden door de schildklier en verhoogt de lichaamstemperatuur.","text_en":"An excessive production of melatonin by the pineal gland."},{"letter":"D","text":"Het reguleert de bloedsuikerspiegel samen met insuline.","text_en":"An autoimmune reaction that affects the pancreas."}],"answer":"B","answerText":"De afscheiding ervan is gerelateerd aan de lichtintensiteit en het wordt aangemaakt door de epifyse.","q_en":"What is a well-known, frequently occurring cause of Cushing's syndrome?","a_en":"Excessive and prolonged use of cortisol-like medication (such as dexamethasone)."},{"id":"x497","ch":"X","num":497,"question":"Welk proces drijft bij tubulaire reabsorptie (in de nieren) alle andere processen aan?","options":[{"letter":"A","text":"De hoge bloeddruk in de glomerulus.","text_en":"It is the site where T cells mature and learn to differentiate."},{"letter":"B","text":"Actief natriumtransport.","text_en":"It is an important part of the lymphatic system."},{"letter":"C","text":"Actieve secretie van kalium.","text_en":"Its removal in a young child has little to no effect on the immune system."},{"letter":"D","text":"Passieve osmose van water.","text_en":"The thymus shrinks and is largely replaced by fatty tissue after puberty."}],"answer":"B","answerText":"Actief natriumtransport.","q_en":"Which statement about the thymus gland is INCORRECT?","a_en":"Its removal in a young child has little to no effect on the immune system."},{"id":"x498","ch":"X","num":498,"question":"Welke cellen worden door de spermatogonia (stamcellen in de teelballen) direct aangemaakt door middel van mitose?","options":[{"letter":"A","text":"Spermatiden.","text_en":"Its secretion is highest during periods with a lot of sunlight."},{"letter":"B","text":"Spermatocyten.","text_en":"Its secretion is related to light intensity and it is produced by the pineal gland."},{"letter":"C","text":"Sertolicellen.","text_en":"It is secreted by the thyroid gland and raises body temperature."},{"letter":"D","text":"Spermatozoa (zaadcellen).","text_en":"It regulates blood sugar levels together with insulin."}],"answer":"B","answerText":"Spermatocyten.","q_en":"Which statement about the hormone melatonin is correct?","a_en":"Its secretion is related to light intensity and it is produced by the pineal gland."},{"id":"x499","ch":"X","num":499,"question":"Welke accessorische klier voegt het meeste volume vloeistof toe aan het mannelijke ejaculaat?","options":[{"letter":"A","text":"De prostaatklier.","text_en":"The high blood pressure in the glomerulus."},{"letter":"B","text":"De zaadblaasjes (vesiculae seminales).","text_en":"Active sodium transport."},{"letter":"C","text":"De klieren van Cowper (bulbo-urethrale klieren).","text_en":"Active secretion of potassium."},{"letter":"D","text":"De bijballen (epididymis).","text_en":"Passive osmosis of water."}],"answer":"B","answerText":"De zaadblaasjes (vesiculae seminales).","q_en":"In tubular reabsorption (in the kidneys), which process drives all the other processes?","a_en":"Active sodium transport."},{"id":"x500","ch":"X","num":500,"question":"Waar is het amnionvocht (vruchtwater) in het vroege stadium van de zwangerschap voornamelijk van afkomstig?","options":[{"letter":"A","text":"Uit de interstitiële vloeistof van de moeder.","text_en":"Spermatids."},{"letter":"B","text":"Uit de secretie van de baarmoederspieren.","text_en":"Spermatocytes."},{"letter":"C","text":"Uit het vruchtwater van de voorgaande menstruatiecyclus.","text_en":"Sertoli cells."},{"letter":"D","text":"Uit de foetale urine.","text_en":"Spermatozoa (sperm cells)."}],"answer":"A","answerText":"Uit de interstitiële vloeistof van de moeder.","q_en":"Which cells are directly produced by the spermatogonia (stem cells in the testes) by means of mitosis?","a_en":"Spermatocytes."},{"id":"x501","ch":"X","num":501,"question":"Welke structuur is in het beginstadium NIET aanwezig in de ongedifferentieerde foetale geslachtsorganen?","options":[{"letter":"A","text":"De gangen van Müller.","text_en":"The prostate gland."},{"letter":"B","text":"De gangen van Wolff.","text_en":"The seminal vesicles (vesiculae seminales)."},{"letter":"C","text":"De testes (teelballen).","text_en":"The Cowper's glands (bulbourethral glands)."},{"letter":"D","text":"De genitale richel (gonadale richel).","text_en":"The epididymis."}],"answer":"C","answerText":"De testes (teelballen).","q_en":"Which accessory gland adds the most fluid volume to the male ejaculate?","a_en":"The seminal vesicles (vesiculae seminales)."},{"id":"x502","ch":"X","num":502,"question":"Welk specifiek hormoon wordt uitgescheiden door de foetale testes om de ontwikkeling van vrouwelijke geslachtsorganen tegen te gaan?","options":[{"letter":"A","text":"Luteïniserend hormoon (LH).","text_en":"From the interstitial fluid of the mother."},{"letter":"B","text":"Oestrogeen.","text_en":"From the secretion of the uterine muscles."},{"letter":"C","text":"Anti-Mülleriaans hormoon (AMH).","text_en":"From the amniotic fluid of the previous menstrual cycle."},{"letter":"D","text":"Prolactine.","text_en":"From the foetal urine."}],"answer":"C","answerText":"Anti-Mülleriaans hormoon (AMH).","q_en":"In the early stage of pregnancy, where does the amniotic fluid mainly originate from?","a_en":"From the interstitial fluid of the mother."},{"id":"x503","ch":"X","num":503,"question":"Wat is peristaltiek?","options":[{"letter":"A","text":"De chemische afbraak van eiwitten door maagzuur.","text_en":"The Müllerian ducts."},{"letter":"B","text":"De opname van voedingsstoffen in het bloed via de dunne darm.","text_en":"The Wolffian ducts."},{"letter":"C","text":"Het filteren van afvalstoffen uit het bloed door de nieren.","text_en":"The testes."},{"letter":"D","text":"Het vooruit duwen van voedsel door gecoördineerde spiersamentrekkingen in het maag-darmkanaal.","text_en":"The genital ridge (gonadal ridge)."}],"answer":"D","answerText":"Het vooruit duwen van voedsel door gecoördineerde spiersamentrekkingen in het maag-darmkanaal.","q_en":"Which structure is NOT present in the initial stage of the undifferentiated foetal genital organs?","a_en":"The testes."},{"id":"x504","ch":"X","num":504,"question":"Een 18-jarige man met diabetes mellitus doet mee aan een loopwedstrijd van 20 km. Vlak voor of tijdens het lopen voelt hij zich bleek en duizelig, hoewel hij minder insuline had gespoten. Wat moet er direct gebeuren?","options":[{"letter":"A","text":"Hem direct iets te eten of drinken geven met snelle suikers.","text_en":"Luteinising hormone (LH)."},{"letter":"B","text":"Hem laten rusten en uitsluitend water geven.","text_en":"Oestrogen."},{"letter":"C","text":"Zijn hartslag meten en wachten tot deze daalt voordat hij verder loopt.","text_en":"Anti-Müllerian hormone (AMH)."},{"letter":"D","text":"Hem een extra dosis insuline geven.","text_en":"Prolactin."}],"answer":"A","answerText":"Hem direct iets te eten of drinken geven met snelle suikers.","q_en":"Which specific hormone is secreted by the foetal testes to suppress the development of female genital organs?","a_en":"Anti-Müllerian hormone (AMH)."},{"id":"x505","ch":"X","num":505,"question":"Inflammatory Bowel Disease (IBD) is een aandoening van het spijsverteringskanaal. Welk van de volgende organen of systemen wordt volgens de examenvragen normaliter NIET aangetast door de ziekte zelf?","options":[{"letter":"A","text":"De dunne darm.","text_en":"The chemical breakdown of proteins by stomach acid."},{"letter":"B","text":"De dikke darm (colon).","text_en":"The absorption of nutrients into the blood via the small intestine."},{"letter":"C","text":"De hersenen (en/of de longen).","text_en":"The filtering of waste products from the blood by the kidneys."},{"letter":"D","text":"De endeldarm (rectum).","text_en":"The forward pushing of food through coordinated muscle contractions in the gastrointestinal tract."}],"answer":"C","answerText":"De 36","ch":"X","num":536,"question":"Welk bloedvat is verantwoordelijk voor het transport van zuurstofarm bloed vanuit de rechterhelft van het hart naar de longen?","options":[{"letter":"A","text":"De longslagader (arteria pulmonalis).","text_en":"The chest becomes smaller and air is actively pushed out."},{"letter":"B","text":"De Vena cava superior (bovenste holle ader).","text_en":"The chest cavity expands, causing the pressure to drop and air to be drawn into the lungs (inhalation)."},{"letter":"C","text":"De Aorta.","text_en":"The alveoli immediately collapse due to the high pressure."},{"letter":"D","text":"De longader (vena pulmonalis).","text_en":"The stomach shrinks to make room."}],"answer":"A","answerText":"De longslagader (arteria pulmonalis).","q_en":"What physically happens in the body at the moment your diaphragm contracts?","a_en":"The chest cavity expands, causing the pressure to drop and air to be drawn into the lungs (inhalation)."},{"id":"x537","ch":"X","num":537,"question":"Wat is de allereerste stap in de hemostase (het proces van bloedstolling) wanneer een bloedvat beschadigd raakt?","options":[{"letter":"A","text":"Vasculaire spasmen (vaatkramp).","text_en":"Science is working on a vaccine that is supposed to repair defective calcium channels in the cells."},{"letter":"B","text":"Fibrinogynese (aanmaak van fibrinogeen).","text_en":"It affects the pancreas, which hinders the release of digestive enzymes."},{"letter":"C","text":"De vorming van een prop van bloedplaatjes (trombocytenplug).","text_en":"Patients may need an oxygen device (or breathing device) at night in the later stages."},{"letter":"D","text":"Klonter formatie (coagulatie met fibrine).","text_en":"Many male patients and some female patients experience severe fertility problems (infertility)."}],"answer":"A","answerText":"Vasculaire spasmen (vaatkramp).","q_en":"Which of the following statements about the genetic disease cystic fibrosis (mucoviscidosis) is absolutely NOT TRUE?","a_en":"Science is working on a vaccine that is supposed to repair defective calcium channels in the cells."},{"id":"x538","ch":"X","num":538,"question":"Een patiënt meldt zich met langdurige diarree, bloed in de ontlasting, en bij endoscopie ziet de arts een diepe, transmurale ontsteking (door alle wandlagen heen) in het colon descendens (dalende dikke darm). Het rectum blijkt echter niet aangetast. Er is ook sprake van een oogontsteking. Wat is de meest waarschijnlijke diagnose?","options":[{"letter":"A","text":"Colitis ulcerosa (CU).","text_en":"The pulmonary artery (arteria pulmonalis)."},{"letter":"B","text":"Sweet syndroom.","text_en":"The superior vena cava."},{"letter":"C","text":"Een simpele voedselvergiftiging.","text_en":"The aorta."},{"letter":"D","text":"De ziekte van Crohn.","text_en":"The pulmonary vein (vena pulmonalis)."}],"answer":"D","answerText":"De ziekte van Crohn.","q_en":"Which blood vessel is responsible for transporting oxygen-poor blood from the right side of the heart to the lungs?","a_en":"The pulmonary artery (arteria pulmonalis)."},{"id":"x539","ch":"X","num":539,"question":"Een man met diabetes is gaan hardlopen zonder ontbijt. Hij voelt zich zwak, gaat zweten en voelt zich onwel worden (hypoglykemie). Wat moet je onmiddellijk doen?","options":[{"letter":"A","text":"Zowel insuline geven als hem laten eten.","text_en":"Vascular spasms (vasoconstriction)."},{"letter":"B","text":"Hem direct iets te eten of te drinken geven met snelle suikers (bijv. dextro of frisdrank).","text_en":"Fibrinogenesis (formation of fibrinogen)."},{"letter":"C","text":"Hem enkel laten rusten totdat het vanzelf overgaat.","text_en":"The formation of a platelet plug (thrombocyte plug)."},{"letter":"D","text":"Hem een extra dosis insuline laten spuiten.","text_en":"Clot formation (coagulation with fibrin)."}],"answer":"B","answerText":"Hem direct iets te eten of te drinken geven met snelle suikers (bijv. dextro of frisdrank).","q_en":"What is the very first step in hemostasis (the process of blood clotting) when a blood vessel becomes damaged?","a_en":"Vascular spasms (vasoconstriction)."},{"id":"x540","ch":"X","num":540,"question":"Welk specifiek celbestanddeel in het bloed is verantwoordelijk voor het initiëren van de stolling bij een bloeding?","options":[{"letter":"A","text":"De rode bloedcellen (erytrocyten).","text_en":"Ulcerative colitis (UC)."},{"letter":"B","text":"De witte bloedcellen (leukocyten).","text_en":"Sweet syndrome."},{"letter":"C","text":"Hemoglobine.","text_en":"A simple case of food poisoning."},{"letter":"D","text":"De bloedplaatjes (trombocyten).","text_en":"Crohn's disease."}],"answer":"D","answerText":"De bloedplaatjes (trombocyten).","q_en":"A patient presents with prolonged diarrhea, blood in the stool, and on endoscopy the doctor sees a deep, transmural inflammation (through all layers of the wall) in the descending colon. The rectum, however, appears unaffected. There is also an eye inflammation. What is the most likely diagnosis?","a_en":"Crohn's disease."},{"id":"x541","ch":"X","num":541,"question":"Op welke manier dragen vaccinatieprogramma's over de hele wereld bij aan de strijd tégen antibioticaresistentie?","options":[{"letter":"A","text":"Vaccins voorkomen dat mensen ziek worden door infecties, waardoor artsen simpelweg minder antibiotica hoeven voor te schrijven.","text_en":"Give both insulin and let him eat."},{"letter":"B","text":"Het vaccin doodt de resistente bacteriën onmiddellijk in het bloed.","text_en":"Immediately give him something to eat or drink with fast-acting sugars (e.g., dextrose or soda)."},{"letter":"C","text":"Vaccins maken bacteriën kwetsbaarder, zodat antibiotica dubbel zo goed werken.","text_en":"Just let him rest until it passes on its own."},{"letter":"D","text":"Een vaccin is een directe, permanente chemische vervanger voor antibiotica in apotheken.","text_en":"Have him inject an extra dose of insulin."}],"answer":"A","answerText":"Vaccins voorkomen dat mensen ziek worden door infecties, waardoor artsen simpelweg minder antibiotica hoeven voor te schrijven.","q_en":"A man with diabetes went running without breakfast. He feels weak, starts sweating, and feels faint (hypoglycemia). What should you do immediately?","a_en":"Immediately give him something to eat or drink with fast-acting sugars (e.g., dextrose or soda)."},{"id":"x542","ch":"X","num":542,"question":"Wat is bij de genetische aandoening Tubereuze Sclerose Complex (TSC) in de hersenen de directe mechanische oorzaak die vaak leidt tot epileptische aanvallen?","options":[{"letter":"A","text":"Het binnendringen van het Mtor-virus in de hersenvloeistof.","text_en":"The red blood cells (erythrocytes)."},{"letter":"B","text":"Het afbreken van spierweefsel in het hoofd.","text_en":"The white blood cells (leukocytes)."},{"letter":"C","text":"Een chronisch tekort aan de neurotransmitter dopamine.","text_en":"Hemoglobin."},{"letter":"D","text":"De aanwezigheid van zogenaamde 'tubers' (goedaardige tumoren) in de hersenschors.","text_en":"The platelets (thrombocytes)."}],"answer":"D","answerText":"De aanwezigheid van zogenaamde 'tubers' (goedaardige tumoren) in de hersenschors.","q_en":"Which specific cellular component in the blood is responsible for initiating clotting during a bleed?","a_en":"The platelets (thrombocytes)."},{"id":"x543","ch":"X","num":543,"question":"Soms kan men het Tubereuze Sclerose Complex (TSC) al prenataal (voor de geboorte van de baby) ontdekken. Waar ziet de arts dan vaak opvallende tekenen op de echografie?","options":[{"letter":"A","text":"Door een postnatale genetica test (hielprik).","text_en":"Vaccines prevent people from getting sick from infections, so that doctors simply need to prescribe fewer antibiotics."},{"letter":"B","text":"Door de ontdekking van rhabdomyomen (goedaardige tumoren) in het hart.","text_en":"The vaccine immediately kills the resistant bacteria in the blood."},{"letter":"C","text":"Door afwezigheid van hersenweefsel.","text
