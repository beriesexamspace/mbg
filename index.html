 beschadigde weefsels.","text_en":"Through the discovery of rhabdomyomas (benign tumors) in the heart."},{"letter":"C","text":"De productie van geslachtscellen (gameten) zoals zaad- en eicellen.","text_en":"Through the absence of brain tissue."},{"letter":"D","text":"Het creëren van variatie in het genetische materiaal.","text_en":"Through clearly visible skin abnormalities (such as white spots) in the fetus on the ultrasound."}],"answer":"B","answerText":"De groei van het organisme en het herstellen of vervangen van beschadigde weefsels.","q_en":"Sometimes Tuberous Sclerosis Complex (TSC) can be detected prenatally (before the baby is born). What striking signs does the doctor often see on the ultrasound in that case?","a_en":"Through the discovery of rhabdomyomas (benign tumors) in the heart."},{"id":"x546","ch":"X","num":546,"question":"Inflammatory Bowel Disease (IBD, zoals Crohn of colitis ulcerosa) is een auto-immuun aandoening. Welk van de volgende weefsels wordt normaliter NIET primair aangetast door deze ziekte?","options":[{"letter":"A","text":"De beenderen en gewrichten.","text_en":"Active transport."},{"letter":"B","text":"De hersenen.","text_en":"Permease action."},{"letter":"C","text":"De ogen.","text_en":"Osmosis."},{"letter":"D","text":"De huid.","text_en":"Endocytosis."}],"answer":"B","answerText":"De hersenen.","q_en":"When water flows through a semipermeable membrane from a place with a low concentration of dissolved substances (e.g. salt) to a place with a high concentration of salt, in order to equalize the ratio, what is this process called?","a_en":"Osmosis."},{"id":"x547","ch":"X","num":547,"question":"Wat gebeurt er specifiek in de anafase van de mitotische celdeling?","options":[{"letter":"A","text":"De chromosomen gaan netjes geordend in het midden (equatoriaalvlak) van de cel op één lijn liggen.","text_en":"Halving the genetic material in the daughter cells."},{"letter":"B","text":"De zusterchromatiden (de twee helften van een chromosoom) worden uit elkaar getrokken richting de tegenovergestelde polen van de cel.","text_en":"The growth of the organism and the repair or replacement of damaged tissues."},{"letter":"C","text":"De chromosomen condenseren (rollen zich op) en worden voor het eerst zichtbaar onder de microscoop.","text_en":"The production of sex cells (gametes) such as sperm and egg cells."},{"letter":"D","text":"Er vormen zich nieuwe nucleaire membranen (kern-enveloppen) rondom de gescheiden chromosomen.","text_en":"Creating variation in the genetic material."}],"answer":"B","answerText":"De zusterchromatiden (de twee helften van een chromosoom) worden uit elkaar getrokken richting de tegenovergestelde polen van de cel.","q_en":"What is the main biological purpose of ordinary cell division, mitosis?","a_en":"The growth of the organism and the repair or replacement of damaged tissues."},{"id":"x548","ch":"X","num":548,"question":"Wat is de grootste ader van ons lichaam?","options":[{"letter":"A","text":"Femoralisader (vena femoralis).","text_en":"The bones and joints."},{"letter":"B","text":"Longader (vena pulmonalis).","text_en":"The brain."},{"letter":"C","text":"Halsader (vena jugularis).","text_en":"The eyes."},{"letter":"D","text":"Vena cava inferior (onderste holle ader).","text_en":"The skin."}],"answer":"D","answerText":"Vena cava inferior (onderste holle ader).","q_en":"Inflammatory Bowel Disease (IBD, such as Crohn's disease or ulcerative colitis) is an autoimmune disorder. Which of the following tissues is normally NOT primarily affected by this disease?","a_en":"The brain."},{"id":"x549","ch":"X","num":549,"question":"Wat is de belangrijkste functie van het immuunsysteem?","options":[{"letter":"A","text":"Het lichaam beschermen tegen ziekteverwekkers.","text_en":"The chromosomes line up neatly and orderly in the middle (equatorial plane) of the cell."},{"letter":"B","text":"Hormonen aanmaken en reguleren.","text_en":"The sister chromatids (the two halves of a chromosome) are pulled apart toward the opposite poles of the cell."},{"letter":"C","text":"Bloed en zuurstof vervoeren naar de weefsels.","text_en":"The chromosomes condense (coil up) and become visible under the microscope for the first time."},{"letter":"D","text":"Voedingsstoffen opnemen uit ons voedsel.","text_en":"New nuclear membranes (nuclear envelopes) form around the separated chromosomes."}],"answer":"A","answerText":"Het lichaam beschermen tegen ziekteverwekkers.","q_en":"What specifically happens during the anaphase of mitotic cell division?","a_en":"The sister chromatids (the two halves of a chromosome) are pulled apart toward the opposite poles of the cell."},{"id":"x550","ch":"X","num":550,"question":"Wat is de primaire taak van het maag-darmkanaal?","options":[{"letter":"A","text":"Het absorberen en verteren van voedingsstoffen.","text_en":"Femoral vein (vena femoralis)."},{"letter":"B","text":"Het uitscheiden van vloeibare cellulaire afvalstoffen.","text_en":"Pulmonary vein (vena pulmonalis)."},{"letter":"C","text":"Het transporteren van bloed door het lichaam.","text_en":"Jugular vein (vena jugularis)."},{"letter":"D","text":"Het reguleren van de lichaamstemperatuur.","text_en":"Inferior vena cava (lower vena cava)."}],"answer":"A","answerText":"Het absorberen en verteren van voedingsstoffen.","q_en":"What is the largest vein in our body?","a_en":"Inferior vena cava (lower vena cava)."},{"id":"x551","ch":"X","num":551,"question":"Welk type witte bloedcel komt het meeste voor in ons bloed?","options":[{"letter":"A","text":"Lymfocyten.","text_en":"Protecting the body against pathogens."},{"letter":"B","text":"Neutrofielen.","text_en":"Producing and regulating hormones."},{"letter":"C","text":"Monocyten.","text_en":"Transporting blood and oxygen to the tissues."},{"letter":"D","text":"Eosinofielen.","text_en":"Absorbing nutrients from our food."}],"answer":"B","answerText":"Neutrofielen.","q_en":"What is the main function of the immune system?","a_en":"Protecting the body against pathogens."},{"id":"x552","ch":"X","num":552,"question":"Waarvoor dient een vaccinatie primair?","options":[{"letter":"A","text":"Om onmiddellijk bacteriën te doden die al in het bloed zitten.","text_en":"Absorbing and digesting nutrients."},{"letter":"B","text":"Zodat het lichaam wordt voorbereid en zelf antistoffen (en geheugencellen) aanmaakt tegen een pathogeen.","text_en":"Excreting liquid cellular waste products."},{"letter":"C","text":"Om het lichaam directe voedingsstoffen en energie te geven tijdens een infectie.","text_en":"Transporting blood through the body."},{"letter":"D","text":"Om het bestaande immuunsysteem volledig te vervangen door een sterker systeem.","text_en":"Regulating body temperature."}],"answer":"B","answerText":"Zodat het lichaam wordt voorbereid en zelf antistoffen (en geheugencellen) aanmaakt tegen een pathogeen.","q_en":"What is the primary task of the gastrointestinal tract?","a_en":"Absorbing and digesting nutrients."},{"id":"x553","ch":"X","num":553,"question":"Wat is het doel van een booster-vaccin?","options":[{"letter":"A","text":"Het tegengaan van de bijwerkingen van het eerste vaccin.","text_en":"Lymphocytes."},{"letter":"B","text":"Het is alleen nodig als het eerste vaccin helemaal niet heeft gewerkt.","text_en":"Neutrophils."},{"letter":"C","text":"Het versterken en zorgen voor lange termijn immuniteit (extra immuniteit).","text_en":"Monocytes."},{"letter":"D","text":"Het direct genezen van de ziekte als je al besmet bent geraakt.","text_en":"Eosinophils."}],"answer":"C","answerText":"Het versterken en zorgen voor lange termijn immuniteit (extra immuniteit).","q_en":"Which type of white blood cell is the most common in our blood?","a_en":"Neutrophils."},{"id":"x554","ch":"X","num":554,"question":"Bij een spiercontractie komt er een specifiek ion vrij in de cel dat zich bindt aan troponine. Welk ion is dit?","options":[{"letter":"A","text":"Chloor (Cl⁻).","text_en":"To immediately kill bacteria that are already in the blood."},{"letter":"B","text":"Calcium (Ca²⁺).","text_en":"So that the body is prepared and produces its own antibodies (and memory cells) against a pathogen."},{"letter":"C","text":"Kalium (K⁺).","text_en":"To give the body direct nutrients and energy during an infection."},{"letter":"D","text":"Natrium (Na⁺).","text_en":"To completely replace the existing immune system with a stronger system."}],"answer":"B","answerText":"Calcium (Ca²⁺).","q_en":"What is the primary purpose of a vaccination?","a_en":"So that the body is prepared and produces its own antibodies (and memory cells) against a pathogen."},{"id":"x555","ch":"X","num":555,"question":"Wat is de functie van de T-tubuli (transversale tubuli) in een spiervezel?","options":[{"letter":"A","text":"Ze produceren ATP voor de spiercontractie.","text_en":"Counteracting the side effects of the first vaccine."},{"letter":"B","text":"Ze vormen de pezen die de spier aan het bot hechten.","text_en":"It is only needed if the first vaccine did not work at all."},{"letter":"C","text":"Ze geleiden de actiepotentialen (het elektrische signaal) vanaf het celoppervlak diep de spiervezel in.","text_en":"Strengthening and ensuring long-term immunity (additional immunity)."},{"letter":"D","text":"Ze slaan zuurstof op voor langdurige spierarbeid.","text_en":"Directly curing the disease if you have already become infected."}],"answer":"C","answerText":"Ze geleiden de actiepotentialen (het elektrische signaal) vanaf het celoppervlak diep de spiervezel in.","q_en":"What is the purpose of a booster vaccine?","a_en":"Strengthening and ensuring long-term immunity (additional immunity)."},{"id":"x556","ch":"X","num":556,"question":"Waar bevindt de schildklier (thyroid gland) zich in het menselijk lichaam?","options":[{"letter":"A","text":"In de hersenen, onder de thalamus.","text_en":"Chloride (Cl⁻)."},{"letter":"B","text":"Ter hoogte van de hals/keel, net onder het strottenhoofd.","text_en":"Calcium (Ca²⁺)."},{"letter":"C","text":"Bovenop de nieren.","text_en":"Potassium (K⁺)."},{"letter":"D","text":"In de borstkas, achter het borstbeen.","text_en":"Sodium (Na⁺)."}],"answer":"B","answerText":"Ter hoogte van de hals/keel, net onder het strottenhoofd.","q_en":"During a muscle contraction, a specific ion is released in the cell that binds to troponin. Which ion is this?","a_en":"Calcium (Ca²⁺)."},{"id":"x557","ch":"X","num":557,"question":"Hoe heet het proces waarbij twee moleculen worden samengevoegd tot één groter molecuul, waarbij een watermolecuul (H₂O) wordt afgesplitst?","options":[{"letter":"A","text":"Hydrogenase.","text_en":"They produce ATP for muscle contraction."},{"letter":"B","text":"Denaturatie.","text_en":"They form the tendons that attach the muscle to the bone."},{"letter":"C","text":"Hydrolyse.","text_en":"They conduct the action potentials (the electrical signal) from the cell surface deep into the muscle fiber."},{"letter":"D","text":"Dehydratatiesynthese (condensatiereactie).","text_en":"They store oxygen for prolonged muscle work."}],"answer":"D","answerText":"Dehydratatiesynthese (condensatiereactie).","q_en":"What is the function of the T-tubules (transverse tubules) in a muscle fiber?","a_en":"They conduct the action potentials (the electrical signal) from the cell surface deep into the muscle fiber."},{"id":"x558","ch":"X","num":558,"question":"Wat is de universele energiedrager van de cellen in ons lichaam?","options":[{"letter":"A","text":"Adenosinetrifosfaat (ATP).","text_en":"In the brain, beneath the thalamus."},{"letter":"B","text":"Cholesterol.","text_en":"At the level of the neck/throat, just below the larynx."},{"letter":"C","text":"Glycogeen.","text_en":"On top of the kidneys."},{"letter":"D","text":"DNA.","text_en":"In the chest, behind the sternum."}],"answer":"A","answerText":"Adenosinetrifosfaat (ATP).","q_en":"Where is the thyroid gland located in the human body?","a_en":"At the level of the neck/throat, just below the larynx."},{"id":"x559","ch":"X","num":559,"question":"Wat is een onderdeel van onze aangeboren immuniteit (eerste verdedigingslinie)?","options":[{"letter":"A","text":"Antilichamen.","text_en":"Hydrogenase."},{"letter":"B","text":"De huid.","text_en":"Denaturation."},{"letter":"C","text":"B-geheugencellen.","text_en":"Hydrolysis."},{"letter":"D","text":"T-cellen.","text_en":"Dehydration synthesis (condensation reaction)."}],"answer":"B","answerText":"De huid.","q_en":"What is the name of the process in which two molecules are joined into one larger molecule, whereby a water molecule (H₂O) is split off?","a_en":"Dehydration synthesis (condensation reaction)."},{"id":"x560","ch":"X","num":560,"question":"Hoe heet de buitenste cellaag (de rand) van de blastocyst die later betrokken zal zijn bij de vorming van de placenta?","options":[{"letter":"A","text":"Chondroblast.","text_en":"Adenosine triphosphate (ATP)."},{"letter":"B","text":"Trofoblast.","text_en":"Cholesterol."},{"letter":"C","text":"Blastocyt.","text_en":"Glycogen."},{"letter":"D","text":"Cytoblast.","text_en":"DNA."}],"answer":"B","answerText":"Trofoblast.","q_en":"What is the universal energy carrier of the cells in our body?","a_en":"Adenosine triphosphate (ATP)."},{"id":"x561","ch":"X","num":561,"question":"Wat is een essentieel verschil tussen de celdelingen mitose en meiose?","options":[{"letter":"A","text":"Mitose vindt enkel plaats in voortplantingscellen.","text_en":"Antibodies."},{"letter":"B","text":"Meiose vindt enkel plaats in somatische cellen.","text_en":"The skin."},{"letter":"C","text":"Meiose levert altijd twee genetisch identieke dochtercellen op.","text_en":"B memory cells."},{"letter":"D","text":"Mitose resulteert in diploïde cellen, terwijl meiose resulteert in haploïde cellen.","text_en":"T cells."}],"answer":"D","answerText":"Mitose resulteert in diploïde cellen, terwijl meiose resulteert in haploïde cellen.","q_en":"What is a component of our innate immunity (first line of defense)?","a_en":"The skin."},{"id":"x562","ch":"X","num":562,"question":"Welke inwendige organen zijn cruciaal voor het omzetten van onvolledige vitamine D naar de actieve vorm, nadat de eerste synthese in de huid is gestart?","options":[{"letter":"A","text":"De schildklier en de bijschildklieren.","text_en":"Chondroblast."},{"letter":"B","text":"De lever en de nieren.","text_en":"Trophoblast."},{"letter":"C","text":"De pancreas (alvleesklier) en de darmen.","text_en":"Blastocyte."},{"letter":"D","text":"Enkel het beenmerg.","text_en":"Cytoblast."}],"answer":"B","answerText":"De lever en de nieren.","q_en":"What is the name of the outermost cell layer (the edge) of the blastocyst that will later be involved in the formation of the placenta?","a_en":"Trophoblast."},{"id":"x563","ch":"X","num":563,"question":"Welke cellen worden direct aangemaakt door de spermatogonia (stamcellen van de testis)?","options":[{"letter":"A","text":"Spermatocyten.","text_en":"Mitosis only takes place in reproductive cells."},{"letter":"B","text":"Secundaire spermatogonia.","text_en":"Meiosis only takes place in somatic cells."},{"letter":"C","text":"Volwassen spermacellen (spermatozoa).","text_en":"Meiosis always produces two genetically identical daughter cells."},{"letter":"D","text":"Spermatiden.","text_en":"Mitosis results in diploid cells, whereas meiosis results in haploid cells."}],"answer":"A","answerText":"Spermatocyten.","q_en":"What is an essential difference between the cell divisions mitosis and meiosis?","a_en":"Mitosis results in diploid cells, whereas meiosis results in haploid cells."},{"id":"x564","ch":"X","num":564,"question":"Welke accessorische klier voegt het meeste volume toe aan het mannelijke ejaculaat?","options":[{"letter":"A","text":"De prostaatklier.","text_en":"The thyroid gland and the parathyroid glands."},{"letter":"B","text":"Alle drie de klieren dragen exact evenveel bij.","text_en":"The liver and the kidneys."},{"letter":"C","text":"De bulbo-urethrale klier (klier van Cowper).","text_en":"The pancreas and the intestines."},{"letter":"D","text":"De zaadblaasjes.","text_en":"Only the bone marrow."}],"answer":"D","answerText":"De zaadblaasjes.","q_en":"Which internal organs are crucial for converting incomplete vitamin D into the active form, after the initial synthesis has started in the skin?","a_en":"The liver and the kidneys."},{"id":"x565","ch":"X","num":565,"question":"Hoe heet het vloeibare, celvrije deel van het bloed?","options":[{"letter":"A","text":"Plasma.","text_en":"Spermatocytes."},{"letter":"B","text":"Serum.","text_en":"Secondary spermatogonia."},{"letter":"C","text":"Lymfe.","text_en":"Mature sperm cells (spermatozoa)."},{"letter":"D","text":"Hemoglobine.","text_en":"Spermatids."}],"answer":"A","answerText":"Plasma.","q_en":"Which cells are directly produced by the spermatogonia (stem cells of the testis)?","a_en":"Spermatocytes."},{"id":"x566","ch":"X","num":566,"question":"Welk van de volgende processen drijft bij tubulaire reabsorptie in de nier vrijwel alle andere transporten aan?","options":[{"letter":"A","text":"Chloordiffusie.","text_en":"The prostate gland."},{"letter":"B","text":"Gefaciliteerd kaliumtransport.","text_en":"All three glands contribute exactly equally."},{"letter":"C","text":"Actief natriumtransport.","text_en":"The bulbourethral gland (Cowper's gland)."},{"letter":"D","text":"Waterdiffusie.","text_en":"The seminal vesicles."}],"answer":"C","answerText":"Actief natriumtransport.","q_en":"Which accessory gland adds the most volume to the male ejaculate?","a_en":"The seminal vesicles."},{"id":"x567","ch":"X","num":567,"question":"Wat is een veelvoorkomende (iatrogene) oorzaak van het syndroom van Cushing?","options":[{"letter":"A","text":"Een chronisch tekort aan insuline.","text_en":"Plasma."},{"letter":"B","text":"Het (langdurig) gebruik van cortisol-achtige medicijnen.","text_en":"Serum."},{"letter":"C","text":"Verlaagde niveaus van het hormoon ACTH.","text_en":"Lymph."},{"letter":"D","text":"Hoge niveaus van tijdelijke stress.","text_en":"Hemoglobin."}],"answer":"B","answerText":"Het (langdurig) gebruik van cortisol-achtige medicijnen.","q_en":"What is the name of the liquid, cell-free part of the blood?","a_en":"Plasma."},{"id":"x568","ch":"X","num":568,"question":"Welk soort weefsel in de wand van de trachea (luchtpijp) zorgt ervoor dat deze buis niet dichtklapt?","options":[{"letter":"A","text":"Fibreus bindweefsel.","text_en":"Chloride diffusion."},{"letter":"B","text":"Glad spierweefsel.","text_en":"Facilitated potassium transport."},{"letter":"C","text":"Botweefsel.","text_en":"Active sodium transport."},{"letter":"D","text":"Kraakbeen.","text_en":"Water diffusion."}],"answer":"D","answerText":"Kraakbeen.","q_en":"Which of the following processes drives virtually all other transport during tubular reabsorption in the kidney?","a_en":"Active sodium transport."},{"id":"x569","ch":"X","num":569,"question":"Welke structuren worden in het lichaam voornamelijk gevormd door 'dicht bindweefsel' (zoals dat er onder een microscoop dwarsgestreept uitziet)?","options":[{"letter":"A","text":"Het gladde oppervlak in de gewrichten.","text_en":"A chronic deficiency of insulin."},{"letter":"B","text":"Het zachte, beschermende weefsel rondom de maag.","text_en":"The (long-term) use of cortisol-like medications."},{"letter":"C","text":"Pezen en ligamenten.","text_en":"Reduced levels of the hormone ACTH."},{"letter":"D","text":"Het interne raamwerk van de lever.","text_en":"High levels of temporary stress."}],"answer":"C","answerText":"Pezen en ligamenten.","q_en":"What is a common (iatrogenic) cause of Cushing's syndrome?","a_en":"The (long-term) use of cortisol-like medications."},{"id":"x570","ch":"X","num":570,"question":"Welke uitspraak is correct over los (areolair) bindweefsel?","options":[{"letter":"A","text":"Het vormt extreem sterke structuren zoals pezen.","text_en":"Fibrous connective tissue."},{"letter":"B","text":"Het vormt het interne raamwerk (stroma) van zachte organen zoals de lever.","text_en":"Smooth muscle tissue."},{"letter":"C","text":"Het bevat grote hoeveelheden harde mineralen (calcium).","text_en":"Bone tissue."},{"letter":"D","text":"Het omringt inwendige organen, spieren en bloedvaten, en houdt alles zachtjes op zijn plaats.","text_en":"Cartilage."}],"answer":"D","answerText":"Het omringt inwendige organen, spieren en bloedvaten, en houdt alles zachtjes op zijn plaats.","q_en":"Which type of tissue in the wall of the trachea (windpipe) ensures that this tube does not collapse?","a_en":"Cartilage."},{"id":"x571","ch":"X","num":571,"question":"Hoe wordt een zygote (de net bevruchte eicel) in de allereerste fase van ontwikkeling ook vaak genoemd in een bredere embryonale term?","options":[{"letter":"A","text":"Een foetus.","text_en":"The smooth surface in the joints."},{"letter":"B","text":"Een gonade.","text_en":"The soft, protective tissue around the stomach."},{"letter":"C","text":"Een blastocyst.","text_en":"Tendons and ligaments."},{"letter":"D","text":"Een conceptus.","text_en":"The internal framework of the liver."}],"answer":"D","answerText":"Een conceptus.","q_en":"Which structures in the body are mainly formed by 'dense connective tissue' (which looks striated under a microscope)?","a_en":"Tendons and ligaments."},{"id":"x572","ch":"X","num":572,"question":"Van welk van de drie primaire kiembladen in het embryo is het glazuur van onze tanden afkomstig?","options":[{"letter":"A","text":"Het endoderm.","text_en":"It forms extremely strong structures such as tendons."},{"letter":"B","text":"Het ectoderm.","text_en":"It forms the internal framework (stroma) of soft organs such as the liver."},{"letter":"C","text":"Het wordt niet gevormd vanuit een kiemblad.","text_en":"It contains large amounts of hard minerals (calcium)."},{"letter":"D","text":"Het mesoderm.","text_en":"It surrounds internal organs, muscles, and blood vessels, and gently holds everything in place."}],"answer":"B","answerText":"Het ectoderm.","q_en":"Which statement is correct about loose (areolar) connective tissue?","a_en":"It surrounds internal organs, muscles, and blood vessels, and gently holds everything in place."}]};
window.MBG_SUMMARY = [{"ch":1,"title":"De chemie van levende wezens","sections":[{"h":"Atomen & elementen","items":["Belangrijkste elementen in het lichaam: koolstof (C), waterstof (H), zuurstof (O), stikstof (N).","Koolstof = de ruggengraat van alle organische moleculen.","Sporenelementen (spoormineralen): bv. ijzer, jodium, zink — in kleine hoeveelheden nodig.","Ion = geladen atoom/molecuul. Isotoop = zelfde element, ander aantal neutronen."]},{"h":"Bindingen","items":["Covalente binding: elektronen delen — sterk; bindt atomen BINNEN een molecuul (bv. binnen water, in nucleotiden, peptidebindingen).","Ionbinding: tussen positief en negatief geladen ionen.","Waterstofbrug: zwak, TUSSEN polaire moleculen (bv. tussen watermoleculen). Breekt het makkelijkst bij verwarming."]},{"h":"Water, pH & buffers","items":["Water is polair → lost veel stoffen op (oplosmiddel = solvent; opgeloste stof = solute).","pH-schaal: hoe HOGER de pH, hoe LAGER de H⁺-concentratie. Bloed-pH = 7,4.","Belangrijkste buffer van het bloed = bicarbonaat. Buffer = houdt de pH stabiel."]},{"h":"Macromoleculen","items":["Opbouw via dehydratatiesynthese (condensatie, water afgesplitst → vormt macromoleculen). Afbraak via hydrolyse (water toegevoegd).","Koolhydraten: monosacharide (glucose, fructose, ribose) → polysacharide (zetmeel, glycogeen, cellulose). Zetmeel hydrolyseren → glucose.","Eiwitten: aminozuren → eiwit. Primaire structuur = covalente peptidebindingen. Denaturatie = vormverandering (bv. ei koken, hitte). Enzymen = eiwitten die reacties versnellen (katalysator) zonder zelf verbruikt te worden en zonder het eindproduct te veranderen.","Lipiden: vetachtig, onoplosbaar in water. Triglyceride = opslagvorm van vet. Steroïden (uit cholesterol).","Nucleïnezuren: DNA & RNA, opgebouwd uit nucleotiden (covalente bindingen). DNA = instructies voor eiwitten. Complementair: A–T, C–G (in RNA: A–U)."]},{"h":"Energie","items":["ATP = universele energiedrager. Hydrolyse ATP → ADP + Pi levert energie.","Glucose-afbraak: glycolyse → citroenzuurcyclus → elektronentransportketen. De ELEKTRONENTRANSPORTKETEN levert de meeste ATP.","Anaeroob (zonder zuurstof): glycolyse + lactaat/fermentatie → weinig ATP."]}]},{"ch":2,"title":"Structuur en functie van cellen","sections":[{"h":"Celmembraan & transport","items":["Membraan = fosfolipiden-dubbellaag + eiwitten, selectief doorlaatbaar. Microvilli vergroten het oppervlak.","Passief transport (GEEN energie): diffusie, gefaciliteerde diffusie (via kanaaleiwitten; zo komt glucose de cel in), osmose (water via aquaporine).","Actief transport (KOST energie/ATP): tegen de gradiënt in, bv. natrium-kaliumpomp. Ook endo-/exocytose kosten energie.","Rode bloedcellen in gedestilleerd water → zwellen op door osmose."]},{"h":"Organellen","items":["Kern (DNA/chromatine); ribosomen (eiwitsynthese); ER (ruw met ribosomen, glad); Golgi (verpakken & secretie).","Lysosomen (vertering; actief in witte bloedcellen/fagocyten; Tay-Sachs = lysosomale stapelziekte). Mitochondriën (cellulaire ademhaling → ATP).","Centriolen (actief bij celdeling, vormen spoelfiguur); cilia (vegen slijm/vuil weg).","Cytoskelet: microtubuli, actine- en intermediaire filamenten (stevigheid). Keratine wordt als 'hoort niet bij cytoskelet' getoetst.","Secretieweg antilichaam: ribosomen → ER → Golgi → vesikels → plasmamembraan."]},{"h":"Cellulaire ademhaling & prokaryoten","items":["Glycolyse → citroenzuurcyclus → elektronentransportketen; meeste ATP uit de ETK. NAD/NADH en ATP/ADP/Pi worden gerecycled.","Prokaryoot (bacterie): circulair chromosoom, celwand, GEEN kern/mitochondriën — maar WEL een celmembraan."]}]},{"ch":3,"title":"Van cellen tot orgaansystemen","sections":[{"h":"Weefseltypes","items":["Epitheelweefsel: bekleding & klieren. Huid = gestratificeerd plaveiselepitheel. Bekercellen scheiden slijm (mucine) af.","Bindweefsel: veel matrix. Los, dicht/vezelig, vetweefsel (slaat triglyceriden op), kraakbeen, BOT en BLOED = gespecialiseerd bindweefsel. Bevat collageen & elastine; fibroblasten zijn de meest voorkomende levende cel in de dermis.","Spierweefsel: kan samentrekken. Zenuwweefsel: neuronen, communicatie."]},{"h":"Celverbindingen & membranen","items":["Tight junctions (afdichten), desmosomen (hechten), gap junctions (kleine stoffen rechtstreeks tussen cellen — bv. coördinatie hartspier).","Basaalmembraan ligt onder het epitheel en bestaat NIET uit cellen.","Slijmvliezen (mucosa) in ademhalings-, voortplantings- en spijsverteringsstelsel."]},{"h":"Huid & homeostase","items":["Epidermis: vooral keratinocyten; melanocyten maken melanine (pigment). Dermis: vooral fibroblasten.","Homeostase: negatieve feedback (herstelt het setpoint — meest voorkomend); positieve feedback (versterkt — bv. blaascontractie, bevalling).","Thoracale holte ligt superieur (boven) t.o.v. de abdominale holte."]}]},{"ch":4,"title":"Het skeletstelsel","sections":[{"h":"Botcellen & structuur","items":["Osteoblast bouwt bot OP, osteoclast breekt bot AF, osteocyt = rijpe botcel, chondroblast/chondrocyt maakt kraakbeen.","Osteocyten communiceren/wisselen voedingsstoffen uit via canaliculi (tussen lacunae).","Compact bot (osteon/Havers) en sponsachtig bot (trabeculae). Periosteum = bindweefsel rond het bot. Rood beenmerg = bloedcelvorming (stamcellen)."]},{"h":"Groei, herstel & calcium","items":["Lengtegroei via groeischijf — stopt na de puberteit; vernieuwing (remodeling) blijft levenslang. Endochondrale ossificatie (lange botten zoals de tibia, via kraakbeenmodel).","Botbreukherstel: hematoom → fibrocartilagineuze callus → benige callus (osteoblasten) → remodeling (osteoclasten).","Calcium: PTH verhoogt het bloedcalcium (osteoclasten), calcitonine verlaagt het (doelorgaan = bot)."]},{"h":"Skelet & gewrichten","items":["Axiaal skelet: schedel, wervelkolom, ribben, borstbeen. Appendiculair: ledematen + gordels (clavicula, patella, fibula, ellepijp). 7 cervicale (hals)wervels. Phalanges = vingers/tenen; carpalia = handwortelbeentjes.","Gewrichten: vezelig (vrijwel onbeweeglijk, schedelnaden), kraakbenig (symphysis pubica), synoviaal (vrij beweeglijk).","Ligamenten verbinden bot met bot; pezen verbinden spier met bot; hyalien kraakbeen beschermt gewrichtsoppervlakken. Circumductie = cirkelbeweging (duim). Kraakbeen houdt de luchtpijp open.","Osteoporose: botverlies, vaker bij vrouwen na de menopauze; remmen van osteoclasten of stimuleren van osteoblasten helpt."]}]},{"ch":5,"title":"Het spierstelsel","sections":[{"h":"Spiertypes & opbouw","items":["Skeletspier (gestreept, willekeurig, meerkernig — alleen door een zenuwcel/motorneuron geprikkeld); hartspier (gestreept, onwillekeurig, gap junctions); gladde spier (onwillekeurig).","Opbouw van groot → klein: spier → fascikel → spiervezel (cel) → myofibril → sarcomeer (de contractiele eenheid, tussen Z-lijnen). Filamenten: actine (dun) & myosine (dik).","Spiercellen hebben meer dan 1 kern."]},{"h":"Contractie","items":["Sliding filament-mechanisme: actine en myosine schuiven langs elkaar (myosinekoppen = cross-bridges).","Motorneuron geeft acetylcholine af → contractie. Botulinetoxine remt ACh-afgifte → spier trekt NIET samen. Myasthenia gravis = auto-immuun tegen ACh-receptoren (spierziekte).","Calcium wordt opgeslagen in het sarcoplasmatisch reticulum en bindt aan troponine → contractie. ATP nodig voor cross-bridges, loskoppelen myosine én calcium terugpompen. Ontspanning als de zenuwactiviteit stopt."]},{"h":"Energie & training","items":["Eerste/directe energiebron = ATP, daarna creatinefosfaat, dan glucose/glycogeen. Anaeroob → melkzuur (spierpijn), oxygen debt.","Slow-twitch vezels: veel mitochondriën + myoglobine (slaat zuurstof op) → uithouding. Training: meer myofibrillen, mitochondriën en glycogeen (NIET meer vezels).","Hogere prikkelfrequentie → meer kracht (summatie); recruitment = meer motorunits inschakelen."]}]},{"ch":6,"title":"Bloed","sections":[{"h":"Samenstelling","items":["Plasma = grootste volume (~55%): water + plasma-eiwitten. Albumine = meest voorkomend en bepaalt de osmotische druk; ook globulinen en fibrinogeen (stolling).","Gevormde elementen: erytrocyten (rode bloedcellen, hemoglobine, O₂-transport, geen kern), leukocyten (witte bloedcellen, afweer), trombocyten (bloedplaatjes, stolling). Adipocyten horen NIET bij bloed."]},{"h":"Rode bloedcellen & bloedgroepen","items":["Erytropoëtine (uit de nieren) verhoogt RBC bij zuurstoftekort/grote hoogte. O₂-binding aan hemoglobine hangt af van pH, temperatuur en O₂-concentratie.","Bloedgroepen ABO + Rh. O-negatief = universele donor (geen A/B-antigenen, geen Rh). AB+ = universele ontvanger. Rh-probleem: Rh⁻ moeder + Rh⁺ vader → kind kan Rh⁺ zijn.","Bloedarmoede (anemie) = te weinig hemoglobine/RBC (ijzer- of B12-tekort) → vermoeidheid, duizeligheid. Geelzucht = bilirubine uit afbraak van hemoglobine."]},{"h":"Witte bloedcellen & hemostase","items":["Granulocyten: neutrofielen (talrijkst, reageren als eerste op infectie), eosinofielen, basofielen (histamine). Agranulocyten: lymfocyten, monocyten → macrofagen. Allen uit stamcellen.","Hemostase: vaatvernauwing → bloedplaatjesprop → bloedstolling (fibrine). Hemofilie = tekort aan stollingsfactoren. Aspirine remt de bloedstolling.","Antilichamen worden gemaakt door plasmacellen."]}]},{"ch":7,"title":"Hart en bloedvaten","sections":[{"h":"Bloedvaten","items":["Arteriën voeren bloed VAN het hart af (dikke spierlaag); venen voeren bloed NAAR het hart (kleppen, weinig gladde spier). Capillairen: uitwisseling van gassen/voedingsstoffen (poriën en spleten).","Volgorde vanaf het hart: arterie → arteriole → capillair → venule → vene.","Veneuze terugkeer wordt geholpen door beenspieren, ademhaling en kleppen (NIET door een hogere hartslag). Grootste ader = vena cava inferior."]},{"h":"Hart & geleiding","items":["2 atria + 2 ventrikels. Linker ventrikel = dikste wand (pompt bloed naar het hele lichaam). AV-kleppen (atrium↔ventrikel), semilunaire kleppen (naar aorta/longslagader). Kleppen voorkomen terugstroom.","Pulmonaal circuit: hart → longen → hart (longaders = zuurstofRIJK naar het linker atrium). Systemisch circuit: hart → lichaam. Aorta = grootste slagader (O₂-rijk bloed naar lichaam).","Geleiding: SA-knoop (pacemaker, start de prikkel) → AV-knoop → AV-bundel (His) → Purkinjevezels. Chordae tendineae horen NIET bij de geleiding."]},{"h":"Bloeddruk & hartziekte","items":["Bloeddruk ~120/80 (systole/diastole). Geregeld door baroreceptoren + cardiovasculair centrum (medulla oblongata). Lage bloeddruk → vasoconstrictie + hogere hartslag. Veel zout → hoge bloeddruk (hypertensie).","Hartinfarct: vernauwing/blokkade van de kransslagaders (atherosclerose) → zuurstoftekort → hartcellen sterven af (regenereren niet) → blijvende schade.","Cholesterol: LDL = 'slecht', HDL brengt cholesterol terug naar de lever. Atherosclerose begint al op jonge leeftijd; triglyceriden beschermen NIET."]}]},{"ch":8,"title":"Het immuunsysteem en infectieziekten","sections":[{"h":"Pathogenen","items":["Bacteriën (circulair chromosoom, celwand — antibiotica werken hierop); virussen (gastheercel nodig, gevoelig voor interferonen, NIET met antibiotica te behandelen); prionen (misgevouwen eiwitten, GÉÉN nucleïnezuur); wormen; schimmels.","Antibioticaresistentie: resistente bacteriën overleven en geven hun resistentiegenen door. Normale/residente flora concurreert met schadelijke bacteriën."]},{"h":"Drie verdedigingslinies","items":["1e lijn (barrières): huid, slijmvliezen, maagzuur — aangeboren.","2e lijn (niet-specifiek): fagocyten (neutrofielen, macrofagen), ontsteking, koorts, interferonen (tegen virussen), complementeiwitten. Hemostase en antilichamen horen hier NIET bij.","3e lijn (specifiek/adaptief): lymfocyten, MHC, antilichamen, immunologisch geheugen."]},{"h":"Adaptieve immuniteit","items":["B-cellen → plasmacellen → antilichamen (antilichaam-gemedieerd). Helper-T-cellen (CD4+) coördineren via cytokines; cytotoxische T-cellen (celgemedieerd). DiGeorge = geen thymus → tekort aan T-cellen.","Actieve immunisatie (vaccin → eigen antistoffen + geheugen) vs. passieve immunisatie (kant-en-klare antilichamen: borstvoeding/colostrum, via moeder/zwangerschap → directe maar kortdurende bescherming).","Secundaire immuunrespons is sneller en sterker dankzij geheugencellen. HIV vernietigt helper-T-cellen → verstoort de cellulaire immuniteit (niet te genezen). Auto-immuun: lupus, reuma, type 1 diabetes, Crohn (anafylactische shock = allergie)."]}]},{"ch":9,"title":"Het ademhalingssysteem","sections":[{"h":"Luchtweg","items":["Volgorde lucht: neus → farynx → larynx → trachea → bronchi → bronchiolen → alveoli. Epiglottis sluit de luchtpijp bij het slikken.","Trachea & bronchi: kraakbeenringen. Bronchiolen: glad spierweefsel, GEEN kraakbeen. Alveoli: gasuitwisseling + surfactant (geen spierweefsel).","Trilharen (cilia) vegen slijm en vuil naar boven. Thymus ligt in de borstholte (mediastinum/pleuraholte)."]},{"h":"Ademhaling & gastransport","items":["Inademen: diafragma + tussenribspieren trekken SAMEN → volume borstkas stijgt → druk daalt → lucht stroomt IN. Uitademen: ontspannen.","Externe respiratie (longen) vs. interne respiratie (weefsels) vs. cellulaire ademhaling (in de cel). Ventilatie = in-/uitademen.","Longcirculatie: bloed komt zuurstofARM binnen en verlaat zuurstofRIJK.","O₂ vervoerd als oxyhemoglobine; CO₂ vooral als bicarbonaat in plasma (deels carbaminohemoglobine). Hoogste Po₂ in alveolaire lucht/longader. Op grote hoogte: lagere O₂-druk en -gradiënt."]},{"h":"Aandoeningen","items":["Astma (vernauwde bronchiolen), chronische bronchitis, emfyseem (alveolaire schade + verlies elasticiteit — roken), pneumonie/longontsteking (vocht in de alveoli), longkanker.","Mucoviscidose/cystische fibrose = ERFELIJK: abnormaal dik slijm blokkeert luchtwegen (en pancreas). Roken veroorzaakt GEEN cystische fibrose."]}]},{"ch":10,"title":"Het endocriene systeem","sections":[{"h":"Hormoontypes","items":["Steroïde hormonen: vetoplosbaar (uit cholesterol), binden INTRAcellulaire receptoren (bv. cortisol, aldosteron, oestrogeen, testosteron).","Niet-steroïde/peptidehormonen: niet vetoplosbaar, binden MEMBRAANreceptoren + werken via second messenger (cAMP) — bv. insuline, glucagon, adrenaline. Cortisol is GEEN peptidehormoon.","Hypothalamus stuurt de hypofyse aan. Neurohypofyse (achterkwab) geeft ADH en oxytocine af (gemaakt in de hypothalamus)."]},{"h":"Klieren & hormonen","items":["Hypofysevoorkwab: TSH→schildklier, ACTH→bijniercortex, FSH/LH→gonaden, prolactine→melkklieren, GH (groeihormoon). Het bijniermerg wordt NIET door de hypofyse aangestuurd (wel door het sympathisch zenuwstelsel).","Schildklier: thyroxine (jodium nodig — tekort = krop/goiter; te veel = ziekte van Graves, gewichtsverlies). Calcitonine verlaagt bloedcalcium (doelorgaan = bot).","Bijschildklier: PTH (paraathormoon) verhoogt bloedcalcium. PTH ↔ calcitonine = tegenspelers; daling Ca → meer PTH.","Bijniercortex (steroïden): cortisol (te veel = Cushing, te weinig = ziekte van Addison), aldosteron, androgenen. Bijniermerg: adrenaline/noradrenaline. Renine komt NIET uit de bijnier (uit de nieren)."]},{"h":"Pancreas & overige","items":["Pancreas: insuline (β-cellen, verlaagt bloedsuiker, na de maaltijd) en glucagon (α-cellen, verhoogt bloedsuiker, glycogeen→glucose). Insuline ↔ glucagon = tegenspelers.","Diabetes type 1 = te weinig insulineproductie (auto-immuun); type 2 = insulineresistentie (meest voorkomend, gelinkt aan obesitas). Obesitas verhoogt het risico op type 2, NIET type 1.","Pijnappelklier: melatonine (slaap, gestuurd door lichtintensiteit). Prostaglandinen = lokale stoffen (regelen géén bloedsuiker)."]}]},{"ch":11,"title":"Het spijsverteringsstelsel en voeding","sections":[{"h":"Wandlagen & mond","items":["GI-wand van binnen → buiten: mucosa, submucosa (bloed- en lymfevaten), muscularis (peristaltiek & segmentatie), serosa.","Mond: tong duwt de bolus naar de slokdarm. Tanden: snijtanden snijden, hoektanden (canines) scheuren, kiezen malen (12 kiezen). Speeksel bevat amylase (zetmeel) en mucine — GEEN pepsine."]},{"h":"Maag, dunne darm, lever","items":["Maag: HCl (activeert pepsine + doodt pathogenen), pepsine (eiwitvertering), gastrin (uitgelokt door eiwit), intrinsieke factor (nodig voor B12-opname); zorgt voor de meeste mechanische vertering.","Dunne darm: meeste vertering én opname; plooien → villi → microvilli (brush border); lacteal (lymfevat in de villus, vetopname). Pancreasenzymen: trypsine/chymotrypsine/carboxypeptidase (eiwit), lipase (vet), amylase (koolhydraat). Bicarbonaat neutraliseert het maagzuur.","Lever: krijgt als eerste de opgenomen voeding (poortader); maakt gal en ureum (ammoniak onschadelijk maken), slaat glycogeen op — maakt GEEN pepsine. Galblaas slaat gal op en concentreert het (gal = galzouten, emulgeert vetten).","Dikke darm (colon): opname van water + rest; interne anale sluitspier = onwillekeurig (externe = willekeurig)."]},{"h":"Voeding","items":["Essentiële aminozuren: compleet eiwit = dierlijk; plantaardig moet je combineren. Transvetten ontstaan door hydrogenering van plantaardige oliën (ongezond). Chylomicronen = triglyceriden in een jasje van eiwit/fosfolipiden.","Coeliakie = glutenschade aan de villi. IBD/ziekte van Crohn (niet volledig te genezen). Colonkanker wordt vaak laat ontdekt. Cellulose (vezels) kan de maag niet verteren."]}]},{"ch":12,"title":"Het urinewegstelsel","sections":[{"h":"Functie & weg van urine","items":["Nieren = belangrijkst voor de homeostase van lichaamsvloeistoffen. Stikstofhoudend afval (ureum) komt uit eiwitafbraak. De bloedsomloop verbindt de excretiestelsels.","Weg van urine: nefron → nierbekken → ureter → blaas → urethra. Het nefron maakt de urine; de ureter transporteert (concentreert NIET).","Nieren + lever + huid maken samen actief vitamine D."]},{"h":"Nefron & urinevorming","items":["Nefron: glomerulus in de glomerulaire (Bowman-)capsule → proximale tubulus → lis van Henle → distale tubulus → verzamelbuis. Bloed in via de afferente arteriole, uit via de efferente arteriole.","1) Glomerulaire filtratie — drijvende kracht = bloeddruk in de glomerulus; filtraat = water + kleine opgeloste stoffen (GEEN grote eiwitten/bloedcellen → daarom normaal geen eiwit in urine).","2) Tubulaire reabsorptie — actief Na⁺-transport drijft de rest aan; glucose wordt volledig gereabsorbeerd. 3) Tubulaire secretie."]},{"h":"Hormonen & aandoeningen","items":["ADH (hypothalamus/neurohypofyse) verhoogt de waterreabsorptie in de verzamelbuis (bij uitdroging → minder urine). Aldosteron (bijniercortex) regelt Na/water. Renine (nieren) → angiotensine → bloeddruk; ACE-remmers verlagen angiotensine II. Erytropoëtine (nieren) bij zuurstoftekort.","Cystitis = blaasontsteking; pyelonefritis = nierinfectie. UTI's: meestal bacterieel en vaker bij vrouwen (kortere urethra). Hemodialyse vervangt de nierfunctie. Erytropoëtine is GEEN afvalstof."]}]},{"ch":13,"title":"Het voortplantingsstelsel","sections":[{"h":"Mannelijk stelsel","items":["Testes: testosteron (in de interstitiële/Leydig-cellen), spermavorming in de tubuli seminiferi (Sertoli-cellen). Rijping & opslag van sperma in de epididymis → ductus deferens → urethra.","Accessoire klieren: zaadblaasjes (meeste volume + fructose = energie), prostaat, bulbourethrale klier (alkalisch). Acrosoom = enzymen om de eicel binnen te dringen; middenstuk + fructose = energie voor beweging.","Anabole steroïden verlagen de eigen testosteronproductie. SRY-gen (testis-determining factor) start de testisvorming."]},{"h":"Vrouwelijk stelsel & cyclus","items":["Ovaria (eicelrijping, oestrogeen/progesteron) → oviduct/eileider (verbindt ovarium en uterus; bevruchting hier) → uterus (endometrium binnen, myometrium = spierlaag voor uitdrijving, perimetrium buiten) → cervix → vagina.","FSH & LH (hypofyse) worden gestuurd door GnRH (hypothalamus). De LH-piek lokt de ovulatie uit; daarbij komt een secundaire eicel + poollichaampje vrij. Corpus luteum maakt hormonen die de vroege zwangerschap ondersteunen. Proliferatiefase = dag 6–14."]},{"h":"Anticonceptie & SOA's","items":["Hormonale anticonceptie remt FSH/LH → voorkomt ovulatie. IVF bij afgesloten eileiders (na PID).","SOA's: chlamydia & gonorroe → PID; HPV → baarmoederhalskanker; syfilis kan de foetus infecteren; schaamluis = arthropode. Condoom beschermt niet 100% (herpes, HPV, schaamluis)."]}]},{"ch":15,"title":"Kanker: ongecontroleerde celdeling en tumoren","sections":[{"h":"Wat is kanker","items":["Kanker = ongecontroleerde, abnormale celdeling. Goedaardige tumor = begrensd, dringt niet binnen en metastaseert niet; kwaadaardig = dringt binnen + metastaseert.","Progressie: hyperplasie → dysplasie → in-situ kanker → metastase. Gemetastaseerde cellen zijn abnormaal, kunnen delen én migreren."]},{"h":"Genen & groei","items":["Proto-oncogen → (mutatie) oncogen (versnelde celdeling, deelt ondanks ongeschikte omstandigheden). Tumorsuppressorgen = rem. Apoptose = geprogrammeerde celdood (kanker ontwijkt dit). Eén oncogen alleen is NIET genoeg (meerdere mutaties nodig).","Angiogenese = nieuwe bloedvaten naar de tumor; anti-angiogenese-medicijnen blokkeren dit."]},{"h":"Oorzaken, diagnose & behandeling","items":["Carcinogenen: roken (#1 oorzaak van kankersterfte/longkanker), UV-straling (huidkanker/melanoom — ABCD-regel; ook cumulatieve blootstelling zonder verbranding), chemisch, virussen (HPV).","Beeldvorming met straling: röntgen en PET (tumorcellen nemen meer radioactief gelabelde glucose op); MRI gebruikt GEEN straling. Stadiëring kijkt o.a. naar lymfeklieren.","Behandeling: chirurgie, lokale bestraling, chemotherapie (werkt op primaire én secundaire tumoren), immunotherapie, anti-angiogenese, stamcel-/beenmergtransplantatie (leukemie, lymfoom).","Borstkanker: risico stijgt met leeftijd, vroege menstruatie/late menopauze, BRCA-genen; vroege diagnose via zelfonderzoek + mammografie. Top 3 in België: borst, long, colon. Baarmoederhalskanker is te voorkomen met het HPV-vaccin."]}]},{"ch":16,"title":"Genetica en erfelijkheid","sections":[{"h":"DNA, replicatie & celdeling","items":["DNA → RNA (transcriptie) → eiwit (translatie). DNA-replicatie gebeurt in de S-fase. Telomeren = uiteinden van chromosomen; ze worden bij elke replicatie korter (afgeknipt) → veroudering. Telomerase kan ze verlengen.","Mitose = diploïd, 2 identieke cellen (lichaamscellen). Meiose = haploïd, produceert cellen met de helft van het aantal chromosomen (gameten).","Fasen: profase, metafase, anafase (chromatiden/centromeren gaan UIT ELKAAR), telofase. Bij 2n=16 → in de metafase van de mitose: 16 chromosomen en 32 chromatiden. Het spoelfiguur grijpt aan via de centromeren.","Door de kernporiën gaan RNA, eiwitten en ionen — DNA blijft in de kern."]},{"h":"Overerving","items":["Allel = variant van een gen. Genotype bepaalt het fenotype; bij homozygoot recessief kun je vanuit het fenotype het genotype voorspellen.","Autosomaal dominant (Huntington — zowel zoon als dochter kan het krijgen; NIET polygeen). Autosomaal recessief (mucoviscidose, sikkelcelziekte — blijven bestaan omdat dragerschap soms een selectief voordeel geeft, bv. tegen malaria).","Polygeen = meerdere genen (huidskleur, diabetes, schizofrenie). Pleiotropie = 1 gen veroorzaakt meerdere effecten. Genen hebben ~50% invloed. Punnett-kruisingen voor kansberekening (bv. draagster-kans 50%)."]}]},{"ch":17,"title":"Ontwikkeling, rijping en veroudering","sections":[{"h":"Bevruchting & pre-embryo","items":["Bevruchting in de eileider: sperma passeert corona radiata → zona pellucida → eicelmembraan. Na binnendringen verhardt de zona pellucida → polyspermie wordt voorkomen (maar 1 spermacel). Acrosoom is nodig om binnen te dringen. Zygote = conceptus.","Pre-embryonale fase (1e week): klieving → morula → blastocyst → innesteling in het endometrium → embryonale schijf. Eeneiige tweeling = splitsing van één zygote vóór differentiatie; twee-eiig = 2 eicellen door 2 zaadcellen."]},{"h":"Kiembladen, placenta & geboorte","items":["Ectoderm: epidermis, zenuwstelsel, bijniermerg. Mesoderm: spieren, bot, bloed, lymfevaten, gonaden (testes & ovaria). Endoderm: bekleding spijsvertering/ademhaling, lever. (De lever komt NIET uit het ectoderm.)","Placenta = embryonaal + maternaal weefsel; scheidt hCG, progesteron en oestrogeen af. Navelstreng = 1 ader + 2 slagaders. Chorion voedt via diffusie. Amnion + amnionvocht (breken van de vliezen = vocht). Vernix caseosa beschermt de foetushuid. hCG houdt het corpus luteum in leven (zwangerschapstest).","Maand 3–4: lever functioneert, geslacht zichtbaar, nieren maken urine (surfactant komt pas later).","Geboorte: oxytocine (weeën, positieve feedback) + prolactine (melkproductie); colostrum = eerste melk, rijk aan antilichamen. Foetale structuren sluiten af (ductus arteriosus, foramen ovale); foetale vaten worden bindweefsel."]},{"h":"Veroudering","items":["Theorieën: telomeren raken op, opstapeling van celschade, cortisol versnelt veroudering, en stelsels beïnvloeden elkaar. Veroudering van het zenuwstelsel is doorgaans het minst direct levensbedreigend. Telomerase kan veroudering remmen maar ook kanker bevorderen."]}]}];
window.MBG_HACKS = {"tips":[{"h":"Actief ophalen (active recall)","t":"Lees niet passief je samenvatting — dwing jezelf het antwoord eerst zélf te bedenken vóór je kijkt. Daarom werkt deze tool met meerkeuze: eerst kiezen, dan pas de uitleg lezen."},{"h":"Gespreid herhalen","t":"Liever 4× 25 min verspreid over de week dan één keer 2 uur de avond ervoor. Doe elke dag kort de modus ‘Vragen die je nog niet kent’ om je gaten te dichten."},{"h":"Leg het uit in één zin","t":"Snap je een antwoord? Zeg de reden hardop, alsof je het aan iemand uitlegt. Lukt dat niet? Klik op ‘Waarom?’ en lees de kernpunten van dat hoofdstuk."},{"h":"Fouten zijn goud waard","t":"Elke foute vraag wijst precies aan wat je nog moet leren. Herhaal aan het einde van elke set je foute vragen — daar zitten je makkelijkste extra punten."},{"h":"Bouw rustig op","t":"Begin bij ‘Herkansing → Focus op de basis’ met hints en extra uitleg. Voel je je zeker? Schakel naar ‘Uitdagend niveau’ of ‘Examen Training’ op echt examenniveau."},{"h":"Examensimulatie als generale repetitie","t":"Doe een paar dagen vóór je examen de ‘Examen-simulatie’ (40 vragen in één keer). Zo wen je aan het tempo en weet je waar je staat."}],"chapters":[{"ch":1,"title":"De chemie van levende wezens","items":["CHON = de 4 hoofdelementen van het lichaam: Koolstof, (H)Waterstof, (O)zuurstof, (N)stikstof. Spreek het uit als ‘kahn’.","pH omgekeerd denken: hoe hóger de pH, hoe wéiniger H⁺ (zuur). ‘Hoog getal = weinig zuur.’ Bloed-pH = 7,4.","Opbouwen vs. afbreken: dehydratatie = water eruit = opbouwen; hydrolyse = water (hydro) erbij = afbreken. ‘Hydro splitst.’","Bindingen: covalent = elektronen delen (sterk, bínnen een molecuul); waterstofbrug = zwak (tússen moleculen, bv. water) en breekt het eerst bij verwarmen.","Energie: de elektronentransportketen levert de méeste ATP (de laatste stap = de grootste opbrengst)."]},{"ch":2,"title":"Structuur en functie van cellen","items":["Passief transport = gratis (geen energie): diffusie en osmose. Actief transport = kost ATP en gaat tégen de gradiënt in (bv. natrium-kaliumpomp). ‘Actief = zelf de berg op.’","Osmose = water beweegt. Een cel in zuiver water → water stroomt erin → de cel zwelt op.","Organellen onthouden: ribosoom = eiwitfabriek, mitochondrion = energiecentrale (ATP), lysosoom = de vuilnisman (afbraak)."]},{"ch":3,"title":"Van cellen tot orgaansystemen","items":["De 4 weefseltypes met ‘ESBZ’: Epitheel-, Spier-, Bind- en Zenuwweefsel.","Epitheel bekleedt en beschermt; bindweefsel verbindt en ondersteunt (let op: bloed en bot zijn óók bindweefsel).","Niveaus van klein naar groot: cel → weefsel → orgaan → orgaanstelsel → organisme."]},{"ch":4,"title":"Het skeletstelsel","items":["Axiaal = de As van het lichaam (schedel, wervelkolom, ribben/borstbeen). Appendiculair = de ‘appendages’ = armen, benen en gordels.","Botcellen: osteoBlast Bouwt bot op, osteoClast breekt bot kapot (Clast ≈ Capot). ‘B = bouwen, C = kapot.’","Bot is levend bindweefsel: het bevat bloedvaten en wordt voortdurend afgebroken en opnieuw opgebouwd."]},{"ch":5,"title":"Het spierstelsel","items":["3 spiertypes: skeletspier (gestreept, willekeurig), hartspier (gestreept, ónwillekeurig), gladde spier (ónwillekeurig).","Samentrekking = actine schuift langs myosine (‘sliding filament’). Calcium (Ca²⁺) is de startknop van de contractie.","Spieren kunnen alleen trékken, niet duwen — daarom werken ze in paren (buiger en strekker, bv. biceps/triceps)."]},{"ch":6,"title":"Bloed","items":["‘Rood rijdt zuurstof, wit waakt, plaatjes plakken’: rode bloedcellen = O₂-transport (hemoglobine + ijzer), witte = afweer, bloedplaatjes = stolling.","Bloedgroepen: O = universele donor, AB = universele ontvanger.","Bloedarmoede = te weinig hemoglobine/rode bloedcellen → minder zuurstoftransport → moe en bleek."]},{"ch":7,"title":"Hart en bloedvaten","items":["Arteriën gaan Áf van het hart, Venen brengen bloed naar het hart toe (Vena cava = binnenkomend). ‘A = Away.’","Kleine (long)circulatie: hart → longen → hart (zuurstof ophalen). Grote circulatie: hart → de rest van het lichaam.","Linkerkant van het hart pompt zuurstofríjk bloed het lichaam in (dikkere wand); rechterkant pompt zuurstofárm bloed naar de longen."]},{"ch":8,"title":"Het immuunsysteem en infectieziekten","items":["Aspecifiek = snel en altijd hetzelfde (huid, ontsteking, fagocyten). Specifiek = traag, op maat én met geheugen (lymfocyten, antistoffen).","B-cellen maken antistoffen (Bloed, op afstand); T-cellen vallen besmette cellen direct aan.","Vaccin = je traint het geheugen vooraf met een onschadelijk stukje, zodat je bij de echte ziekte meteen klaarstaat."]},{"ch":9,"title":"Het ademhalingssysteem","items":["Inademen: het middenrif spant aan en zakt → de borstkas wordt groter → lucht stroomt naar binnen. ‘Diafragma omlaag = lucht naar binnen.’","De gaswisseling gebeurt in de alveoli (longblaasjes): O₂ erin, CO₂ eruit.","Je ademhaling wordt vooral aangestuurd door het CO₂-gehalte in je bloed, niet door zuurstoftekort."]},{"ch":10,"title":"Het endocriene systeem","items":["Hormonen = trage, lángdurige boodschappers via het bloed. Het zenuwstelsel = snel en kort. ‘Hormoon = traag maar blijft.’","inSuline = Suiker naar binnen → verláágt de bloedsuiker; glucagon verhóógt de bloedsuiker. Twee tegenpolen uit de pancreas.","Hypofyse = de ‘dirigent’: stuurt veel andere klieren aan."]},{"ch":11,"title":"Het spijsverteringsstelsel en voeding","items":["Volgorde: mond → slokdarm → maag → dunne darm → dikke darm. De dúnne darm is de grote opnemer (verteren + opnemen); de díkke darm haalt vooral water terug.","Lever maakt gal (helpt vet verteren), pancreas levert verteringsenzymen + insuline.","Enzymen knippen grote voedingsstoffen klein: koolhydraten → suikers, eiwitten → aminozuren, vetten → vetzuren."]},{"ch":12,"title":"Het urinewegstelsel","items":["Het nefron is de werkeenheid van de nier. Volgorde: filtratie → reabsorptie (terugnemen wat je nodig hebt) → secretie → uitscheiden.","De nier regelt water, zouten én de pH van je bloed — niet alleen ‘afval eruit’.","ADH = Anti-Diuretisch Hormoon = houdt water vást → je plast mínder. ‘ADH = A Drop Held’ (een druppel vastgehouden)."]},{"ch":13,"title":"Het voortplantingsstelsel","items":["meiOse → minder (halveert het aantal chromosomen, maakt geslachtscellen met variatie). mitOse → identiek (gewone celdeling).","Bevruchting gebeurt in de eileider; de innesteling daarna in de baarmoeder.","Geslachtscellen zijn haploïd (n); na de bevruchting is de cel weer diploïd (2n)."]},{"ch":15,"title":"Kanker: ongecontroleerde celdeling","items":["Goedaardig blijft lokaal en netjes afgebakend; kwaadaardig groeit in omliggend weefsel én zaait uit (metastase).","De ontsporing van mild naar erg: hyperplasie → dysplasie → carcinoma in situ → invasief → metastase.","Metastase = uitzaaiing, vaak eerst via de lymfeklieren."]},{"ch":16,"title":"Genetica en erfelijkheid","items":["Dominant onderdrukt recessief. Een recessief kenmerk zie je alleen als je het twee keer hebt (homozygoot). ‘Recessief = 2 nodig.’","Genotype = de genen (de code); fenotype = wat je ziet (Feno ≈ Foto, het uiterlijk).","Kruising Aa × Aa met een Punnett-vierkant → 25% kans (1 op 4) op het recessieve kenmerk."]},{"ch":17,"title":"Ontwikkeling, rijping en veroudering","items":["De 3 kiembladen: Ectoderm (buiten: huid + zenuwstelsel), Mesoderm (midden: spieren, bot, bloed), Endoderm (binnen: organen en darmwand). ‘Ecto = buiten, Endo = binnen.’","Telomeren zijn de ‘beschermkapjes’ van je chromosomen; ze worden korter bij elke celdeling — een soort levenstimer van de cel.","Veroudering = cellen delen trager en functioneren minder goed; weefsels herstellen langzamer."]}]};
</script>

    Object.keys(recoByChEn).forEach(function(c){ var s={}; recoByChEn[c]=recoByChEn[c].filter(function(v){ var k=lc(v); if(s[k])return false; s[k]=1; return true; }); });
  })();
  function recoCorrect(q){ return (LANG==="en" && q.a_en) ? q.a_en : q.answer; }

  function recoNum(t){ return /\d/.test(t); }
  function recoOptions(q){
    var en=(LANG==="en");
    var correct=recoCorrect(q), cl=correct.length, cn=recoNum(correct), cLc=lc(correct);
    var byCh=en?recoByChEn:recoByCh, allR=en?allRecoEn:allReco;
    function near(arr){ return shuffle(arr).sort(function(a,b){return Math.abs(a.length-cl)-Math.abs(b.length-cl);}).slice(0,6); }
    var picks=[];
    // voeg afleiders toe uit een kandidatenlijst, zonder duplicaten en zonder het juiste antwoord
    function add(cands){ var f=near(shuffle(cands).filter(function(t){ var tl=lc(t); return tl!==cLc && picks.every(function(p){return lc(p)!==tl;}); })); while(picks.length<3 && f.length) picks.push(f.shift()); }
    var chPool=(byCh[q.ch]||[]);
    add(chPool.filter(function(t){return recoNum(t)===cn;}));                      // 1: eigen hoofdstuk, zelfde type (getal/woord)
    if(picks.length<3) add(allR.filter(function(t){return recoNum(t)===cn;}));     // 2: alle hoofdstukken, zelfde type
    if(picks.length<3) add(chPool.filter(function(t){return recoNum(t)!==cn;}));   // 3: eigen hoofdstuk, ander type
    if(picks.length<3) add(allR);                                                  // 4: laatste redmiddel: alles
    return shuffle([{text:correct,ok:true}].concat(picks.map(function(t){return {text:t,ok:false};})));
  }

    var s=sumByCh[ch]; if(!s) return null;

    scored.sort(function(a,b){return b.sc-a.sc;});
    var top=scored.filter(function(x){return x.sc>0;}).slice(0,4).map(function(x){return x.t;});
    if(top.length<2) top=items.slice(0,3);
    return { ch:ch, title:s.title, points:top };
  }

  function bump(ns,key){ try{ fetch("https://abacus.jasoncameron.dev/hit/"+ns+"/"+key).then(function(){},function(){}); }catch(e){} }
  function fetchCounter(){
    var e0=document.getElementById("counterVal");
    if(window._mbgCount!=null){ if(e0) e0.textContent=window._mbgCount; return; }
    if(window._mbgCountBusy) return; window._mbgCountBusy=true;

      var e=document.getElementById("counterVal"); if(e) e.textContent=d.value;
    }).catch(function(){ window._mbgCountBusy=false; var e=document.getElementById("counterVal"); if(e) e.textContent="–"; });
  }
  function modeCard(view,icn,t,s){ return '<button class="mode js-enter" data-mode="'+view+'"><span class="me">'+ic(icn)+'</span><b>'+t+'</b><small>'+s+'</small></button>'; }
  function notKnown(q){ var p=prog[q.id]; return !p || p.correct===0; }

  function chapterBars(){
    var out="";
    chapters.forEach(function(c){
      var qs=D.mcq.filter(function(q){return q.ch===c.ch;});
      var seen=0,corr=0; qs.forEach(function(q){var p=prog[q.id]; if(p){seen+=p.seen;corr+=p.correct;}});
      var p = seen?pct(corr,seen):0;
      var col=seen?(p>=70?"var(--good)":p>=40?"var(--amber)":"var(--bad)"):"var(--line)";
      out+='<div class="barrow"><span class="muted">H'+c.ch+'</span><div class="bar"><i data-w="'+(seen?p:0)+'" style="background:'+col+'"></i></div><span class="muted">'+(seen?p+"%":"–")+'</span></div>';
    });
    return out;
  }
  function ymd(d){ var m=("0"+(d.getMonth()+1)).slice(-2),day=("0"+d.getDate()).slice(-2); return d.getFullYear()+"-"+m+"-"+day; }

  function modeBanner(){

      '<button type="button" class="bnlink" id="changeModeLink">wijzig</button></div>';

  function bindBanner(){ var l=document.getElementById("changeModeLink"); if(l) l.onclick=function(){ if(state.fromHub){ location.href="https://beriesexamspace.github.io/"; return; } state.step="track"; go("home"); }; }

  // =================== QUIZ (MCQ) ===================
  function renderQuizGate(){
    if(state.quiz){ return renderQuiz(); }
    var sel = state._quizSel || {chs:{}, count:20, shuffle:true};
    state._quizSel = sel;
    var html=modeBanner()+'<div class="card pad js-enter"><h2 style="margin-top:0">Oefenexamen — meerkeuze</h2>'+
      '<p class="muted">Kies de hoofdstukken die je wil oefenen. Je krijgt na elk antwoord meteen feedback.</p>'+
      '<label class="fld">Hoofdstukken</label>'+
      '<div class="row" style="margin-bottom:8px"><button class="chip sm" id="allCh">Alle</button><button class="chip sm" id="noCh">Geen</button></div>'+
      '<div class="chips" id="chChips">'+chapters.map(function(c){
          return '<button class="chip'+(sel.chs[c.ch]?" on":"")+'" data-ch="'+c.ch+'">H'+c.ch+' · '+esc(c.title)+'</button>';
        }).join("")+'</div>'+
      '<label class="fld">Aantal vragen</label>'+
      '<div class="chips" id="cnt">'+[10,20,30,50,999].map(function(n){
          return '<button class="chip'+(sel.count===n?" on":"")+'" data-n="'+n+'">'+(n===999?"Alle":n)+'</button>';
        }).join("")+'</div>'+
      '<label class="fld"><input type="checkbox" id="shuf" '+(sel.shuffle?"checked":"")+'> Vragen in willekeurige volgorde</label>'+
      '<div class="row" style="margin-top:18px"><button class="btn" id="startQ">Start oefenexamen '+ic("arrowR")+'</button>'+
        '<span class="muted" id="poolN"></span></div>'+
    '</div>';
    setHTML(html); bindBanner();

    function pool(){ var chs=Object.keys(sel.chs).filter(function(k){return sel.chs[k];}).map(Number);
      return D.mcq.filter(function(q){ return chs.length===0?false:chs.indexOf(q.ch)>=0; }); }
    function refreshPool(){ var n=pool().length; document.getElementById("poolN").textContent=n+" vragen beschikbaar"; document.getElementById("startQ").disabled=n===0; }
    Array.prototype.slice.call(document.querySelectorAll("#chChips .chip")).forEach(function(b){
      b.onclick=function(){ var c=+b.dataset.ch; sel.chs[c]=!sel.chs[c]; b.classList.toggle("on"); refreshPool(); }; });
    document.getElementById("allCh").onclick=function(){ chapters.forEach(function(c){sel.chs[c.ch]=true;}); renderQuizGate(); };
    document.getElementById("noCh").onclick=function(){ sel.chs={}; renderQuizGate(); };
    Array.prototype.slice.call(document.querySelectorAll("#cnt .chip")).forEach(function(b){ b.onclick=function(){ sel.count=+b.dataset.n; renderQuizGate(); }; });
    document.getElementById("shuf").onchange=function(e){ sel.shuffle=e.target.checked; };
    document.getElementById("startQ").onclick=function(){ var p=pool(); if(sel.shuffle) p=shuffle(p); if(sel.count<p.length) p=p.slice(0,sel.count); startQuiz(p,"Oefenexamen"); };
    refreshPool();
  }

  function startQuiz(pool,label){
    bump("berat-mbg", modeCfg.track==="herkansing"?"herkansing":"training");
    state.quiz = { label:label, items:pool.map(prepMCQ), idx:0, answered:false, picked:null, correct:0, wrong:[], done:false };
    renderQuiz();
  }
  function prepMCQ(q){
    var dep = q.options.some(function(o){ return /bovenstaande/i.test(o.text) || /zowel\s+[a-e]\s+als\s+[a-e]/i.test(o.text); });
    return { q:q, opts: dep ? q.options.slice() : shuffle(q.options), aid:false, fiftyDone:false };
  }
  function gotoQuiz(p,label){ state.view="quiz"; tabBtns.forEach(function(b){ b.classList.toggle("on", b.dataset.view==="quiz"); }); startQuiz(p,label); window.scrollTo(0,0); }
  function startExamSim(){ gotoQuiz(shuffle(D.mcq.slice()).slice(0,40),"Examen-simulatie"); }
  function startExtra(){ gotoQuiz(shuffle(D.extra.slice()).slice(0,40),"Extra oefenvragen"); }
  function startNotKnown(){ gotoQuiz(shuffle(D.mcq.filter(notKnown)),"Nog te leren"); }

  function renderQuiz(){
    var Q=state.quiz;
    if(Q.done) return renderQuizResult();
    var cur=Q.items[Q.idx]; var q=cur.q; var F=flags();
    var aidsHTML = (F.hints) ?
      '<div class="aids" id="aids">'+
        '<button class="aidbtn" id="hintBtn">'+ic("bulb")+'Hint</button>'+
        '<button class="aidbtn" id="fiftyBtn">'+ic("scissors")+'50 / 50</button>'+
      '</div>' : '';
    var html='<button class="backlink" id="backBtn">'+ic("back")+'Terug</button>'+modeBanner()+'<div class="card pad js-enter">'+
      '<div class="runtop"><span class="pill">'+esc(Q.label)+'</span>'+
        '<div class="bar"><i data-w="'+pct(Q.idx,Q.items.length)+'"></i></div>'+
        '<span>'+(Q.idx+1)+'/'+Q.items.length+'</span></div>'+
      '<div class="muted" style="font-size:12px">'+L("Hoofdstuk","Chapter")+' '+q.ch+' · '+esc(titleOf[q.ch]||"")+'</div>'+
      '<div class="qtext">'+esc(qText(q))+'</div>'+
      aidsHTML+
      '<div id="hintHolder"></div>'+
      '<div id="opts">'+cur.opts.map(function(o,i){
          return '<button class="opt" data-i="'+i+'" style="--oi:'+(i*55)+'ms"><span class="k">'+String.fromCharCode(65+i)+'</span><span>'+esc(oText(o))+'</span></button>';
        }).join("")+'</div>'+
      '<div id="fb"></div>'+
      '<div class="row" style="justify-content:space-between;margin-top:6px">'+
        '<span class="muted" style="font-size:12px">'+L("Toets","Press")+' <span class="kbd">A–E</span> '+L("om te kiezen","to choose")+' · <span class="kbd">Enter</span> '+L("= volgende","= next")+'</span>'+
        '<button class="btn hide" id="nextBtn">Volgende '+ic("arrowR")+'</button></div>'+
    '</div>';
    setHTML(html); bindBanner();

    var optBtns=Array.prototype.slice.call(document.querySelectorAll("#opts .opt"));
    optBtns.forEach(function(b){ b.onclick=function(){ pick(+b.dataset.i); }; });
    document.getElementById("backBtn").onclick=function(){ state.quiz=null; renderQuizGate(); };
    var nb=document.getElementById("nextBtn"); nb.onclick=next;

    if(F.hints){
      var hb=document.getElementById("hintBtn"), fb2=document.getElementById("fiftyBtn");
      if(cur.aid) hb.disabled=true;
      if(cur.fiftyDone) fb2.disabled=true;
      hb.onclick=function(){
        cur.aid=true; hb.disabled=true;
        var w=whyPoints(q.ch,q.question,q.answerText);
        var tipTxt=(w&&w.points.length)? w.points[0] : "Denk aan de kern van dit hoofdstuk.";
        document.getElementById("hintHolder").innerHTML='<div class="hintbox"><b>Hint·</b> '+esc(tipTxt)+'</div>';
      };
      fb2.onclick=function(){
        cur.fiftyDone=true; fb2.disabled=true;
        // verberg 2 foute opties (50/50-hulp)
        var toHide=shuffle(cur.opts.map(function(o,i){return {o:o,i:i};}).filter(function(x){return x.o.letter!==q.answer;})).slice(0,2);
        toHide.forEach(function(x){ optBtns[x.i].classList.add("dim"); });
      };
    }

    function showAnswered(i){
      var correct = cur.opts[i].letter===q.answer;
      optBtns.forEach(function(b){ var o=cur.opts[+b.dataset.i]; b.disabled=true; b.classList.remove("dim");
        if(o.letter===q.answer) b.classList.add("correct"); else if(+b.dataset.i===i) b.classList.add("wrong"); });
      var aids=document.getElementById("aids"); if(aids) aids.classList.add("hide");
      var fb=document.getElementById("fb");
      if(correct){ fb.className="feedback ok"; fb.innerHTML="<b>"+praiseWord()+" ✓</b>"; }
      else { fb.className="feedback no"; fb.innerHTML="<b>"+wrongLead()+"</b><span class=\"sub\">"+L("Juiste antwoord:","Correct answer:")+" "+esc(aText(q))+"</span>"; }
      // Waarom-knop (niet bij extra-set: die heeft geen hoofdstuk-samenvatting)
      if(q.ch!=="X"){
        var why=document.createElement("div"); why.style.marginTop="2px";
        why.innerHTML='<button class="whybtn" id="whyBtn">'+ic("help")+'Waarom?</button><div id="whyHolder"></div>';
        fb.appendChild(why);
        var wbtn=document.getElementById("whyBtn"), wholder=document.getElementById("whyHolder");
        var openWhy=function(){ wholder.innerHTML=whyHTML(q.ch,q.question,q.answerText); wbtn.classList.add("hide"); bindWhy(wholder); };
        wbtn.onclick=openWhy;
        if(flags().autoWhy) openWhy();
      }
      nb.classList.remove("hide");
      nb.innerHTML=(Q.idx+1>=Q.items.length)?"Bekijk resultaat "+ic("arrowR"):"Volgende "+ic("arrowR");
    }
    function pick(i){
      if(Q.answered) return; Q.answered=true; Q.picked=i;
      var correct = cur.opts[i].letter===q.answer;
      if(correct){ Q.correct++; } else { Q.wrong.push(q); }
      var p=prog[q.id]||{seen:0,correct:0}; p.seen++; if(correct)p.correct++; prog[q.id]=p; save("mbg_prog",prog);
      showAnswered(i); nb.focus();
    }
    function next(){ if(!Q.answered) return; Q.idx++; Q.answered=false; Q.picked=null; if(Q.idx>=Q.items.length){ Q.done=true; } renderQuiz(); }

    state._key=function(e){
      if(!Q.answered){ var k=e.key.toLowerCase(); var idx="abcde".indexOf(k); if(idx<0 && /[1-5]/.test(k)) idx=+k-1;
        if(idx>=0 && idx<cur.opts.length && !optBtns[idx].classList.contains("dim")){ pick(idx); e.preventDefault(); } }
      else if(e.key==="Enter"||e.key===" "){ next(); e.preventDefault(); }
    };
    if(Q.answered) showAnswered(Q.picked);
  }

  function ringSVG(p){
    var r=54, c=2*Math.PI*r, off=c*(1-p/100);
    var col=p>=70?"var(--good)":p>=40?"var(--amber)":"var(--bad)";
    return '<svg class="ring" viewBox="0 0 128 128"><circle class="track-c" cx="64" cy="64" r="'+r+'" fill="none" stroke-width="11"/>'+
      '<circle class="val-c" cx="64" cy="64" r="'+r+'" fill="none" stroke-width="11" stroke="'+col+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+c+'" transform="rotate(-90 64 64)" data-off="'+off+'"/>'+
      '<text x="64" y="72" text-anchor="middle" font-family="Georgia,serif" font-size="30" fill="var(--ink)">'+p+'%</text></svg>';
  }
  function animateRing(){ var c=app.querySelector(".val-c[data-off]"); if(c){ requestAnimationFrame(function(){ c.style.strokeDashoffset=c.getAttribute("data-off"); }); } }

  function renderQuizResult(){
    var Q=state.quiz; var p=pct(Q.correct,Q.items.length);
    var msg = p>=80?"Sterk werk! 🎉": p>=60?"Goed bezig 👍":"Blijf oefenen — je komt er 💪";
    var byCh={}; Q.wrong.forEach(function(q){byCh[q.ch]=(byCh[q.ch]||0)+1;});
    var weakList=Object.keys(byCh).sort(function(a,b){return byCh[b]-byCh[a];}).slice(0,5)
      .map(function(c){return '<span class="pill amber" style="margin:3px">'+(c==='X'?'Extra':'H'+c)+': '+byCh[c]+' fout</span>';}).join(" ");
    var html='<div class="card pad results center js-enter">'+
      '<span class="pill">'+esc(Q.label)+'</span>'+
      ringSVG(p)+
      '<p style="margin:0 0 4px;font-weight:600;font-size:17px">'+msg+'</p>'+
      '<p class="muted">'+Q.correct+' '+L("van","of")+' '+Q.items.length+' '+L("juist","correct")+'</p>'+
      (weakList? '<div style="margin:14px 0">'+weakList+'</div>':'')+
      '<div class="row" style="justify-content:center;margin-top:14px">'+
        (Q.wrong.length? '<button class="btn" id="retryWrong">Herhaal '+Q.wrong.length+' foute vragen</button>':'')+
        '<button class="btn ghost" id="again">Nieuw oefenexamen</button>'+
        '<button class="btn ghost" id="homeBtn">Naar start</button>'+
      '</div></div>';
    setHTML(html); animateRing();
    var rw=document.getElementById("retryWrong"); if(rw) rw.onclick=function(){ startQuiz(shuffle(Q.wrong),"Foute vragen"); };
    document.getElementById("again").onclick=function(){ state.quiz=null; renderQuizGate(); };
    document.getElementById("homeBtn").onclick=function(){ state.quiz=null; go("home"); };
    state._key=null;
  }

  // =================== EXAMENSIMULATIE (getimd · geen tussentijdse feedback) ===================
  function examSimCount(){ return Math.min(40, D.mcq.length); }
  function renderExamSim(){
    var E=state.examsim;
    if(!E) return renderExamSimGate();
    if(E.done) return renderExamSimResult();
    return renderExamSimRun();
  }
  function stepHTML(n,t){ return '<div class="stepitem"><span class="stepn">'+n+'</span><span>'+esc(t)+'</span></div>'; }
  function fmtTime(s){ s=Math.max(0,s|0); var m=Math.floor(s/60),ss=("0"+(s%60)).slice(-2); return m+":"+ss; }
  function renderExamSimGate(){
    var qN=examSimCount(); var mins=Math.round(qN*0.75);

      '<button class="backlink" id="backBtn">'+ic("back")+L("Terug","Back")+'</button>'+

        '<div class="steps">'+
          stepHTML("1",L(qN+" meerkeuzevragen uit alle hoofdstukken, in willekeurige volgorde.",qN+" multiple-choice questions from all chapters, in random order."))+
          stepHTML("2",L("Een timer van ongeveer "+mins+" minuten loopt mee. Loopt de tijd af, dan wordt automatisch ingeleverd.","A timer of about "+mins+" minutes runs along. When time runs out, it's submitted automatically."))+
          stepHTML("3",L("Kies bij elke vraag een antwoord en ga verder. Geen feedback tussendoor &mdash; net als op het echte examen.","Pick an answer for each question and continue. No feedback in between &mdash; just like the real exam."))+
          stepHTML("4",L("Aan het einde: je score, je zwakke hoofdstukken en bij elke vraag het juiste antwoord met uitleg.","At the end: your score, your weak chapters and, for each question, the correct answer with an explanation."))+
        '</div>'+

      '</div>';
    setHTML(html);

    document.getElementById("startSim").onclick=startExamSimReal;
  }
  function startExamSimReal(){
    bump("berat-mbg","examensimulatie");
    var qN=examSimCount();
    var items=shuffle(D.mcq.slice()).slice(0,qN).map(prepMCQ);
    var dur=qN*45;
    state.examsim={ items:items, idx:0, picks:[], dur:dur, left:dur, done:false };
