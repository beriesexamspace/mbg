enteel verschillende mechanismen om cellen te beïnvloeden. Welke fysiologische stelling is CORRECT?","options":[{"letter":"A","text":"Peptidehormonen (eiwithormonen) werken doorgaans sneller dan steroïdhormonen.","text_en":"Peptide hormones (protein hormones) generally act faster than steroid hormones."},{"letter":"B","text":"Steroïdhormonen kunnen onmogelijk de hydrofobe celmembraan passeren.","text_en":"Steroid hormones cannot possibly pass through the hydrophobic cell membrane."},{"letter":"C","text":"Peptidehormonen werken doorgaans langzamer en hebben dagen nodig om effect te sorteren.","text_en":"Peptide hormones generally act more slowly and need days to take effect."},{"letter":"D","text":"Steroïdhormonen werken primair door het openzetten van ionkanalen aan de celoppervlakte.","text_en":"Steroid hormones act primarily by opening ion channels at the cell surface."}],"answer":"A","answerText":"Peptidehormonen (eiwithormonen) werken doorgaans sneller dan steroïdhormonen.","q_en":"An important principle within endocrinology states: peptide hormones and steroid hormones have fundamentally different mechanisms to influence cells. Which physiological statement is CORRECT?","a_en":"Peptide hormones (protein hormones) generally act faster than steroid hormones."},{"id":"x178","ch":"X","num":178,"question":"Op het celmembraan bevinden zich integrale eiwitten die 'aquaporines' genoemd worden. Wat is de exclusieve functie van deze eiwitkanalen?","options":[{"letter":"A","text":"Ze produceren ATP (energie) uit de passieve stroming van waterstofionen (H+).","text_en":"They produce ATP (energy) from the passive flow of hydrogen ions (H+)."},{"letter":"B","text":"Ze herkennen virale antigenen en lokken macrofagen naar de cel.","text_en":"They recognize viral antigens and attract macrophages to the cell."},{"letter":"C","text":"Ze pompen actief natrium de cel uit en kalium de cel in tegen de concentratiegradiënt.","text_en":"They actively pump sodium out of the cell and potassium into the cell against the concentration gradient."},{"letter":"D","text":"Ze faciliteren het supersnelle transport van watermoleculen door het celmembraan heen via osmose.","text_en":"They facilitate the ultra-fast transport of water molecules through the cell membrane via osmosis."}],"answer":"D","answerText":"Ze faciliteren het supersnelle transport van watermoleculen door het celmembraan heen via osmose.","q_en":"On the cell membrane there are integral proteins called 'aquaporins'. What is the exclusive function of these protein channels?","a_en":"They facilitate the ultra-fast transport of water molecules through the cell membrane via osmosis."},{"id":"x179","ch":"X","num":179,"question":"Tijdens de genetische celdeling wordt het verloop gecontroleerd. Welk celorganel in de cel organiseert de spindelvezels (microtubuli) die uiteindelijk de chromosomen uit elkaar trekken?","options":[{"letter":"A","text":"Nucleolus (kernlichaampje)","text_en":"Nucleolus"},{"letter":"B","text":"Lysosoom","text_en":"Lysosome"},{"letter":"C","text":"Centriool / Centrosoom","text_en":"Centriole / Centrosome"},{"letter":"D","text":"Glad Endoplasmatisch Reticulum","text_en":"Smooth Endoplasmic Reticulum"}],"answer":"C","answerText":"Centriool / Centrosoom","q_en":"During genetic cell division, the process is controlled. Which cell organelle organizes the spindle fibers (microtubules) that ultimately pull the chromosomes apart?","a_en":"Centriole / Centrosome"},{"id":"x180","ch":"X","num":180,"question":"Welke seksueel overdraagbare aandoening (SOA) vertoont een sterke relatie met de ontwikkeling van kanker?","options":[{"letter":"A","text":"Gonorroe","text_en":"Gonorrhea"},{"letter":"B","text":"Chlamydia","text_en":"Chlamydia"},{"letter":"C","text":"Syfilis","text_en":"Syphilis"},{"letter":"D","text":"Humaan papillomavirus (HPV)","text_en":"Human papillomavirus (HPV)"}],"answer":"D","answerText":"Humaan papillomavirus (HPV)","q_en":"Which sexually transmitted infection (STI) shows a strong relationship with the development of cancer?","a_en":"Human papillomavirus (HPV)"},{"id":"x181","ch":"X","num":181,"question":"Wat is een primair pathologisch kenmerk of symptoom van longemfyseem?","options":[{"letter":"A","text":"Een toename van het totale gaswisselingsoppervlak in de longen.","text_en":"An increase in the total gas exchange surface area in the lungs."},{"letter":"B","text":"Een verhoogde zuurstoftransportcapaciteit via hemoglobine.","text_en":"An increased oxygen transport capacity via hemoglobin."},{"letter":"C","text":"Verlies van elasticiteit van de longblaasjes wat leidt tot ernstige kortademigheid.","text_en":"Loss of elasticity of the alveoli, which leads to severe shortness of breath."},{"letter":"D","text":"Sterke verkleining en vernauwing van de centrale luchtwegen.","text_en":"Strong reduction and narrowing of the central airways."}],"answer":"C","answerText":"Verlies van elasticiteit van de longblaasjes wat leidt tot ernstige kortademigheid.","q_en":"What is a primary pathological feature or symptom of pulmonary emphysema?","a_en":"Loss of elasticity of the alveoli, which leads to severe shortness of breath."},{"id":"x182","ch":"X","num":182,"question":"Tijdens de embryonale ontwikkeling rond week 4 worden uitstulpingen zichtbaar die later zullen uitgroeien tot armen en benen. Hoe worden deze structuren genoemd?","options":[{"letter":"A","text":"Kieuwbogen","text_en":"Pharyngeal arches"},{"letter":"B","text":"Somieten","text_en":"Somites"},{"letter":"C","text":"Neurale lijst","text_en":"Neural crest"},{"letter":"D","text":"Ledemaatknoppen (Limb buds)","text_en":"Limb buds"}],"answer":"D","answerText":"Ledemaatknoppen (Limb buds)","q_en":"During embryonic development around week 4, protrusions become visible that will later grow into arms and legs. What are these structures called?","a_en":"Limb buds"},{"id":"x183","ch":"X","num":183,"question":"Welk essentieel verdedigingsmechanisme verliest een patiënt met uitgebreide derdegraads brandwonden voornamelijk?","options":[{"letter":"A","text":"De productie van specifieke antilichamen door B-lymfocyten.","text_en":"The production of specific antibodies by B lymphocytes."},{"letter":"B","text":"De aanmaak van rode bloedcellen in het beschadigde weefsel.","text_en":"The formation of red blood cells in the damaged tissue."},{"letter":"C","text":"De fysieke en chemische barrière tegen binnendringende pathogenen.","text_en":"The physical and chemical barrier against invading pathogens."},{"letter":"D","text":"De mogelijkheid om zuurstof op te nemen via de huidporiën.","text_en":"The ability to absorb oxygen through the skin pores."}],"answer":"C","answerText":"De fysieke en chemische barrière tegen binnendringende pathogenen.","q_en":"Which essential defense mechanism does a patient with extensive third-degree burns mainly lose?","a_en":"The physical and chemical barrier against invading pathogens."},{"id":"x184","ch":"X","num":184,"question":"Wat is een belangrijke wetenschappelijke beperking van de Body Mass Index (BMI) als indicator voor individuele gezondheid?","options":[{"letter":"A","text":"Het houdt geen rekening met spiermassa, botdichtheid en de verdeling van lichaamsvet.","text_en":"It does not take into account muscle mass, bone density and the distribution of body fat."},{"letter":"B","text":"Het is onmogelijk om de BMI te berekenen voor personen onder de 18 jaar.","text_en":"It is impossible to calculate the BMI for people under 18 years of age."},{"letter":"C","text":"Het gebruikt alleen het gewicht en negeert de lengte van de patiënt volledig.","text_en":"It uses only the weight and completely ignores the patient's height."},{"letter":"D","text":"Het is een verouderde maatstaf die in medisch onderzoek helemaal niet meer gebruikt mag worden.","text_en":"It is an outdated measure that may no longer be used in medical research at all."}],"answer":"A","answerText":"Het houdt geen rekening met spiermassa, botdichtheid en de verdeling van lichaamsvet.","q_en":"What is an important scientific limitation of the Body Mass Index (BMI) as an indicator of individual health?","a_en":"It does not take into account muscle mass, bone density and the distribution of body fat."},{"id":"x185","ch":"X","num":185,"question":"Wat is de primaire functie van het hormoon calcitonine in de calciumregulatie?","options":[{"letter":"A","text":"Het vermindert de uitscheiding van calcium door de nieren.","text_en":"It decreases the excretion of calcium by the kidneys."},{"letter":"B","text":"Het stimuleert osteoclasten om botweefsel af te breken en calcium vrij te geven.","text_en":"It stimulates osteoclasts to break down bone tissue and release calcium."},{"letter":"C","text":"Het verhoogt de calciumabsorptie in de dunne darm.","text_en":"It increases calcium absorption in the small intestine."},{"letter":"D","text":"Het verlaagt de calciumconcentratie in het bloed door botopbouw te stimuleren.","text_en":"It lowers the calcium concentration in the blood by stimulating bone formation."}],"answer":"D","answerText":"Het verlaagt de calciumconcentratie in het bloed door botopbouw te stimuleren.","q_en":"What is the primary function of the hormone calcitonin in calcium regulation?","a_en":"It lowers the calcium concentration in the blood by stimulating bone formation."},{"id":"x186","ch":"X","num":186,"question":"Waar in het vrouwelijke voortplantingsstelsel vindt fysiologisch gezien normaal de bevruchting van een eicel plaats?","options":[{"letter":"A","text":"In de eierstok (Ovarium)","text_en":"In the ovary (Ovarium)"},{"letter":"B","text":"In de baarmoederhals (Cervix)","text_en":"In the cervix (Cervix)"},{"letter":"C","text":"In de baarmoeder (Uterus)","text_en":"In the uterus (Uterus)"},{"letter":"D","text":"In het bovenste deel van de eileider (Tuba uterina / Oviduct)","text_en":"In the upper part of the fallopian tube (Tuba uterina / Oviduct)"}],"answer":"D","answerText":"In het bovenste deel van de eileider (Tuba uterina / Oviduct)","q_en":"Physiologically, where in the female reproductive system does fertilization of an egg cell normally take place?","a_en":"In the upper part of the fallopian tube (Tuba uterina / Oviduct)"},{"id":"x187","ch":"X","num":187,"question":"Welk onderdeel van het spijsverteringsstelsel is verantwoordelijk voor het leeuwendeel van zowel de chemische vertering als de absorptie van voedingsstoffen?","options":[{"letter":"A","text":"De dunne darm","text_en":"The small intestine"},{"letter":"B","text":"De dikke darm","text_en":"The large intestine"},{"letter":"C","text":"De lever","text_en":"The liver"},{"letter":"D","text":"De maag","text_en":"The stomach"}],"answer":"A","answerText":"De dunne darm","q_en":"Which part of the digestive system is responsible for the lion's share of both the chemical digestion and the absorption of nutrients?","a_en":"The small intestine"},{"id":"x188","ch":"X","num":188,"question":"Waar zijn de centrale chemoreceptoren in het ademhalingscentrum voornamelijk gevoelig voor om de ademhalingsfrequentie en -diepte aan te passen?","options":[{"letter":"A","text":"De concentratie zuurstof (O2) in de longblaasjes.","text_en":"The concentration of oxygen (O2) in the alveoli."},{"letter":"B","text":"De stijging van het CO2-gehalte en de H+ concentratie (pH-daling) in het bloed en hersenvocht.","text_en":"The rise in CO2 levels and the H+ concentration (drop in pH) in the blood and cerebrospinal fluid."},{"letter":"C","text":"De fysieke temperatuur van de ingeademde lucht.","text_en":"The physical temperature of the inhaled air."},{"letter":"D","text":"De bloeddrukveranderingen in de aorta en halsslagaders.","text_en":"The blood pressure changes in the aorta and carotid arteries."}],"answer":"B","answerText":"De stijging van het CO2-gehalte en de H+ concentratie (pH-daling) in het bloed en hersenvocht.","q_en":"What are the central chemoreceptors in the respiratory center primarily sensitive to in order to adjust the respiratory rate and depth?","a_en":"The rise in CO2 levels and the H+ concentration (drop in pH) in the blood and cerebrospinal fluid."},{"id":"x189","ch":"X","num":189,"question":"Hoe noemt men in de spirometrie het totale volume lucht dat maximaal kan worden uitgeademd na een maximale, diepe inademing?","options":[{"letter":"A","text":"Totale longcapaciteit","text_en":"Total lung capacity"},{"letter":"B","text":"Tidaal volume","text_en":"Tidal volume"},{"letter":"C","text":"Residueel volume","text_en":"Residual volume"},{"letter":"D","text":"Vitale capaciteit","text_en":"Vital capacity"}],"answer":"D","answerText":"Vitale capaciteit","q_en":"In spirometry, what is the term for the total volume of air that can be maximally exhaled after a maximal, deep inhalation?","a_en":"Vital capacity"},{"id":"x190","ch":"X","num":190,"question":"Wat is de correcte fysiologische volgorde van de processen die optreden bij hemostase (bloedstolling) na vaatschade?","options":[{"letter":"A","text":"Coagulatie (fibrinenetwerk) -> Vasculaire spasme -> Vorming bloedplaatjesprop","text_en":"Coagulation (fibrin network) -> Vascular spasm -> Formation of platelet plug"},{"letter":"B","text":"Vorming bloedplaatjesprop -> Vasculaire spasme -> Coagulatie (fibrinenetwerk)","text_en":"Formation of platelet plug -> Vascular spasm -> Coagulation (fibrin network)"},{"letter":"C","text":"Vasculaire spasme -> Vorming bloedplaatjesprop -> Coagulatie (fibrinenetwerk)","text_en":"Vascular spasm -> Formation of platelet plug -> Coagulation (fibrin network)"},{"letter":"D","text":"Vasculaire spasme -> Coagulatie (fibrinenetwerk) -> Vorming bloedplaatjesprop","text_en":"Vascular spasm -> Coagulation (fibrin network) -> Formation of platelet plug"}],"answer":"C","answerText":"Vasculaire spasme -> Vorming bloedplaatjesprop -> Coagulatie (fibrinenetwerk)","q_en":"What is the correct physiological sequence of the processes that occur during hemostasis (blood clotting) after vascular injury?","a_en":"Vascular spasm -> Formation of platelet plug -> Coagulation (fibrin network)"},{"id":"x191","ch":"X","num":191,"question":"Waar bevindt zich bij een volwassene de grootste opslag van vetweefsel (lipiden) binnen het skeletsysteem?","options":[{"letter":"A","text":"In het gele beenmerg","text_en":"In the yellow bone marrow"},{"letter":"B","text":"In het periosteum","text_en":"In the periosteum"},{"letter":"C","text":"In het rode beenmerg","text_en":"In the red bone marrow"},{"letter":"D","text":"In het compacte botweefsel","text_en":"In the compact bone tissue"}],"answer":"A","answerText":"In het gele beenmerg","q_en":"In an adult, where within the skeletal system is the largest store of adipose tissue (lipids) located?","a_en":"In the yellow bone marrow"},{"id":"x192","ch":"X","num":192,"question":"Onder welke genetische voorwaarden zal een kind daadwerkelijk ziek worden van een autosomaal recessieve aandoening?","options":[{"letter":"A","text":"Wanneer de aandoening gekoppeld is aan het X-chromosoom.","text_en":"When the disorder is linked to the X chromosome."},{"letter":"B","text":"Wanneer het kind van beide ouders een gemuteerd recessief allel erft.","text_en":"When the child inherits a mutated recessive allele from both parents."},{"letter":"C","text":"Enkel wanneer ten minste één ouder zelf klinisch ziek is door de aandoening.","text_en":"Only when at least one parent is themselves clinically ill from the disorder."},{"letter":"D","text":"Wanneer het kind één gemuteerd allel krijgt van de vader, onafhankelijk van het allel van de moeder.","text_en":"When the child receives one mutated allele from the father, regardless of the mother's allele."}],"answer":"B","answerText":"Wanneer het kind van beide ouders een gemuteerd recessief allel erft.","q_en":"Under which genetic conditions will a child actually become ill from an autosomal recessive disorder?","a_en":"When the child inherits a mutated recessive allele from both parents."},{"id":"x193","ch":"X","num":193,"question":"Wat gebeurt er als je bloed van bloedgroep B transfuseert naar een patiënt met bloedgroep A?","options":[{"letter":"A","text":"Het immuunsysteem van de ontvanger breekt de B-antigenen rustig af in de loop van enkele weken zonder ernstige symptomen.","text_en":"The recipient's immune system calmly breaks down the B antigens over the course of several weeks without serious symptoms."},{"letter":"B","text":"De donorcellen zullen de rode bloedcellen van de ontvanger aanvallen.","text_en":"The donor cells will attack the recipient's red blood cells."},{"letter":"C","text":"Er gebeurt niets, bloedgroep A is de universele acceptor.","text_en":"Nothing happens, blood group A is the universal acceptor."},{"letter":"D","text":"De antilichamen tegen B in het bloed van de ontvanger vallen de donorcellen acuut aan, wat leidt tot klontering en hemolyse.","text_en":"The anti-B antibodies in the recipient's blood acutely attack the donor cells, leading to clumping and hemolysis."}],"answer":"D","answerText":"De antilichamen tegen B in het bloed van de ontvanger vallen de donorcellen acuut aan, wat leidt tot klontering en hemolyse.","q_en":"What happens if you transfuse blood of blood group B into a patient with blood group A?","a_en":"The anti-B antibodies in the recipient's blood acutely attack the donor cells, leading to clumping and hemolysis."},{"id":"x194","ch":"X","num":194,"question":"Hoe is de cellulaire balans verstoord bij een patiënt die lijdt aan osteoporose?","options":[{"letter":"A","text":"De activiteit van chondrocyten is veel groter dan die van osteocyten.","text_en":"The activity of chondrocytes is much greater than that of osteocytes."},{"letter":"B","text":"De functie en activiteit van botafbrekende osteoclasten overtreft die van botopbouwende osteoblasten.","text_en":"The function and activity of bone-resorbing osteoclasts exceeds that of bone-forming osteoblasts."},{"letter":"C","text":"Het rode beenmerg vernietigt actief het omliggende compacte bot.","text_en":"The red bone marrow actively destroys the surrounding compact bone."},{"letter":"D","text":"Osteoblasten produceren te veel calcium, waardoor botten broos en glasachtig worden.","text_en":"Osteoblasts produce too much calcium, causing bones to become brittle and glassy."}],"answer":"B","answerText":"De functie en activiteit van botafbrekende osteoclasten overtreft die van botopbouwende osteoblasten.","q_en":"How is the cellular balance disturbed in a patient suffering from osteoporosis?","a_en":"The function and activity of bone-resorbing osteoclasts exceeds that of bone-forming osteoblasts."},{"id":"x195","ch":"X","num":195,"question":"Wat is een typische bevinding in het bloed bij een patiënt met de ziekte van Addison (bijnierschorsinsufficiëntie), gekenmerkt door een lage productie van het hormoon aldosteron?","options":[{"letter":"A","text":"Hyponatriëmie (verlaagd natriumgehalte)","text_en":"Hyponatremia (decreased sodium level)"},{"letter":"B","text":"Hypokaliëmie (verlaagd kaliumgehalte)","text_en":"Hypokalemia (decreased potassium level)"},{"letter":"C","text":"Verhoogde calciumspiegels","text_en":"Elevated calcium levels"},{"letter":"D","text":"Hypernatriëmie (verhoogd natriumgehalte)","text_en":"Hypernatremia (elevated sodium level)"}],"answer":"A","answerText":"Hyponatriëmie (verlaagd natriumgehalte)","q_en":"What is a typical blood finding in a patient with Addison's disease (adrenocortical insufficiency), characterized by low production of the hormone aldosterone?","a_en":"Hyponatremia (decreased sodium level)"},{"id":"x196","ch":"X","num":196,"question":"Welk celtype en epitheel vormt de binnenbekleding (mucosa) van de dunne darm, optimaal aangepast voor de absorptie van voedingsstoffen?","options":[{"letter":"A","text":"Eenlagig cilindrisch epitheel met microvilli","text_en":"Simple columnar epithelium with microvilli"},{"letter":"B","text":"Overgangsepitheel","text_en":"Transitional epithelium"},{"letter":"C","text":"Meerlagig plaveiselepitheel","text_en":"Stratified squamous epithelium"},{"letter":"D","text":"Pseudomeerlagig trilhaarepitheel","text_en":"Pseudostratified ciliated epithelium"}],"answer":"A","answerText":"Eenlagig cilindrisch epitheel met microvilli","q_en":"Which cell type and epithelium form the inner lining (mucosa) of the small intestine, optimally adapted for the absorption of nutrients?","a_en":"Simple columnar epithelium with microvilli"},{"id":"x197","ch":"X","num":197,"question":"Het HIV-virus leidt onbehandeld tot een zware immuundeficiëntie (AIDS). Welke cellen in het menselijk lichaam worden primair geïnfecteerd en vernietigd door dit virus?","options":[{"letter":"A","text":"Rode bloedcellen (Erytrocyten)","text_en":"Red blood cells (Erythrocytes)"},{"letter":"B","text":"T-helpercellen (CD4+ cellen)","text_en":"T helper cells (CD4+ cells)"},{"letter":"C","text":"Cytotoxische T-cellen (CD8+)","text_en":"Cytotoxic T cells (CD8+)"},{"letter":"D","text":"B-lymfocyten","text_en":"B lymphocytes"}],"answer":"B","answerText":"T-helpercellen (CD4+ cellen)","q_en":"Untreated, the HIV virus leads to a severe immunodeficiency (AIDS). Which cells in the human body are primarily infected and destroyed by this virus?","a_en":"T helper cells (CD4+ cells)"},{"id":"x198","ch":"X","num":198,"question":"Hoe komt het dat steroïdhormonen (zoals testosteron of oestrogeen) relatief langdurige en fundamentele veranderingen in de doelfunctie van een cel teweegbrengen?","options":[{"letter":"A","text":"Omdat ze niet door de lever kunnen worden afgebroken vanwege hun unieke ringstructuur.","text_en":"Because they cannot be broken down by the liver due to their unique ring structure."},{"letter":"B","text":"Omdat ze binden aan receptoren aan de buitenkant van het celmembraan en een razendsnelle waterval van fosforylering activeren.","text_en":"Because they bind to receptors on the outside of the cell membrane and activate a lightning-fast cascade of phosphorylation."},{"letter":"C","text":"Omdat ze direct functioneren als katalytische enzymen in het cytoplasma.","text_en":"Because they function directly as catalytic enzymes in the cytoplasm."},{"letter":"D","text":"Omdat het lipofiele (vetoplosbare) moleculen zijn die door het celmembraan diffunderen, aan het DNA binden en direct nieuwe eiwitsynthese initiëren.","text_en":"Because they are lipophilic (fat-soluble) molecules that diffuse through the cell membrane, bind to the DNA and directly initiate new protein synthesis."}],"answer":"D","answerText":"Omdat het lipofiele (vetoplosbare) moleculen zijn die door het celmembraan diffunderen, aan het DNA binden en direct nieuwe eiwitsynthese initiëren.","q_en":"How is it that steroid hormones (such as testosterone or estrogen) bring about relatively long-lasting and fundamental changes in the target function of a cell?","a_en":"Because they are lipophilic (fat-soluble) molecules that diffuse through the cell membrane, bind to the DNA and directly initiate new protein synthesis."},{"id":"x199","ch":"X","num":199,"question":"Tijdens de excitatie-contractie koppeling in een spiercel reist een actiepotentiaal over het sarcolemma. Wat is het directe gevolg hiervan binnenin de cel?","options":[{"letter":"A","text":"De sacromeren verlengen zich onmiddellijk richting de Z-lijnen.","text_en":"The sarcomeres immediately lengthen toward the Z lines."},{"letter":"B","text":"ATP wordt direct door het sarcolemma in de bloedbaan gepompt voor energievoorziening.","text_en":"ATP is directly pumped through the sarcolemma into the bloodstream for energy supply."},{"letter":"C","text":"Het sarcoplasmatisch reticulum geeft calciumionen (Ca2+) vrij, die vervolgens binden aan troponine om myosinebindingsplaatsen vrij te maken.","text_en":"The sarcoplasmic reticulum releases calcium ions (Ca2+), which then bind to troponin to expose myosin binding sites."},{"letter":"D","text":"Actinefilamenten laten direct hun fosfaatgroepen los.","text_en":"Actin filaments directly release their phosphate groups."}],"answer":"C","answerText":"Het sarcoplasmatisch reticulum geeft calciumionen (Ca2+) vrij, die vervolgens binden aan troponine om myosinebindingsplaatsen vrij te maken.","q_en":"During excitation-contraction coupling in a muscle cell, an action potential travels across the sarcolemma. What is the direct consequence of this inside the cell?","a_en":"The sarcoplasmic reticulum releases calcium ions (Ca2+), which then bind to troponin to expose myosin binding sites."},{"id":"x200","ch":"X","num":200,"question":"Wat is een bekende (medicamenteuze) oorzaak van het syndroom van Cushing?","options":[{"letter":"A","text":"Een chronisch tekort aan adrenocorticotroop hormoon (ACTH).","text_en":"A chronic deficiency of adrenocorticotropic hormone (ACTH)."},{"letter":"B","text":"Een genetische mutatie in de aanmaak van groeihormoon.","text_en":"A genetic mutation in the production of growth hormone."},{"letter":"C","text":"Een auto-immuunziekte die de bijnieren vernietigt.","text_en":"An autoimmune disease that destroys the adrenal glands."},{"letter":"D","text":"Overmatig of langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason of prednison).","text_en":"Excessive or prolonged use of cortisol-like medications (such as dexamethasone or prednisone)."}],"answer":"D","answerText":"Overmatig of langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason of prednison).","q_en":"What is a well-known (drug-induced) cause of Cushing's syndrome?","a_en":"Excessive or prolonged use of cortisol-like medications (such as dexamethasone or prednisone)."},{"id":"x201","ch":"X","num":201,"question":"Welke van de volgende beweringen over prostaglandinen is ONJUIST?","options":[{"letter":"A","text":"Ze reguleren uitsluitend de werking van de prostaatklier.","text_en":"They exclusively regulate the function of the prostate gland."},{"letter":"B","text":"Het zijn lokale hormoonachtige stoffen (paracriene signalering).","text_en":"They are local hormone-like substances (paracrine signaling)."},{"letter":"C","text":"Ze spelen een grote rol bij ontstekingsreacties en pijn.","text_en":"They play a major role in inflammatory reactions and pain."},{"letter":"D","text":"Ze kunnen krampen van de baarmoeder (menstruatiepijn) veroorzaken.","text_en":"They can cause cramps of the uterus (menstrual pain)."}],"answer":"A","answerText":"Ze reguleren uitsluitend de werking van de prostaatklier.","q_en":"Which of the following statements about prostaglandins is INCORRECT?","a_en":"They exclusively regulate the function of the prostate gland."},{"id":"x202","ch":"X","num":202,"question":"Welke stelling omtrent de functie van de thymusklier (zwezerik) is VERKEERD?","options":[{"letter":"A","text":"Het bevindt zich in de borstkas, achter het borstbeen en boven het hart.","text_en":"It is located in the chest, behind the sternum and above the heart."},{"letter":"B","text":"De verwijdering ervan bij een jong kind heeft vrijwel geen effect op het immuunsysteem.","text_en":"Its removal in a young child has virtually no effect on the immune system."},{"letter":"C","text":"De klier krimpt en vervet naarmate men volwassen wordt.","text_en":"The gland shrinks and becomes fatty as one reaches adulthood."},{"letter":"D","text":"Het produceert hormonen zoals thymosine.","text_en":"It produces hormones such as thymosin."}],"answer":"B","answerText":"De verwijdering ervan bij een jong kind heeft vrijwel geen effect op het immuunsysteem.","q_en":"Which statement regarding the function of the thymus gland is WRONG?","a_en":"Its removal in a young child has virtually no effect on the immune system."},{"id":"x203","ch":"X","num":203,"question":"Door welke klier wordt melatonine aangemaakt, en waardoor wordt de secretie ervan voornamelijk gereguleerd?","options":[{"letter":"A","text":"Aangemaakt door de hypofyse; gereguleerd door stressniveaus in het bloed.","text_en":"Produced by the pituitary gland; regulated by stress levels in the blood."},{"letter":"B","text":"Aangemaakt door de epifyse (pijnappelklier); de secretie is sterk gerelateerd aan de lichtintensiteit.","text_en":"Produced by the pineal gland (epiphysis); its secretion is strongly related to light intensity."},{"letter":"C","text":"Aangemaakt door de schildklier; gereguleerd door de lichaamstemperatuur.","text_en":"Produced by the thyroid gland; regulated by body temperature."},{"letter":"D","text":"Aangemaakt door de hypothalamus; gereguleerd door de bloedsuikerspiegel.","text_en":"Produced by the hypothalamus; regulated by blood sugar level."}],"answer":"B","answerText":"Aangemaakt door de epifyse (pijnappelklier); de secretie is sterk gerelateerd aan de lichtintensiteit.","q_en":"By which gland is melatonin produced, and what mainly regulates its secretion?","a_en":"Produced by the pineal gland (epiphysis); its secretion is strongly related to light intensity."},{"id":"x204","ch":"X","num":204,"question":"In het nefron van de nieren worden vele stoffen uit de voorurine terug opgenomen in het bloed (tubulaire reabsorptie). Welk proces vormt fysiologisch de drijvende kracht waardoor vrijwel alle andere reabsorptieprocessen (zoals voor water, glucose en aminozuren) kunnen plaatsvinden?","options":[{"letter":"A","text":"Het actieve transport van natrium (Na+).","text_en":"The active transport of sodium (Na+)."},{"letter":"B","text":"Het kloppen van trilharen in de proximale tubulus.","text_en":"The beating of cilia in the proximal tubule."},{"letter":"C","text":"De verplaatsing van ureum.","text_en":"The movement of urea."},{"letter":"D","text":"Het passieve transport van kalium (K+).","text_en":"The passive transport of potassium (K+)."}],"answer":"A","answerText":"Het actieve transport van natrium (Na+).","q_en":"In the nephron of the kidneys, many substances are reabsorbed from the primary urine back into the blood (tubular reabsorption). Which process physiologically forms the driving force that allows virtually all other reabsorption processes (such as for water, glucose and amino acids) to take place?","a_en":"The active transport of sodium (Na+)."},{"id":"x205","ch":"X","num":205,"question":"Spermatogenese is het proces waarbij zaadcellen worden gevormd. Wat is het directe celtype dat ontstaat nadat de diploïde stamcellen (spermatogonia) delen?","options":[{"letter":"A","text":"Spermatiden","text_en":"Spermatids"},{"letter":"B","text":"Spermatozoa","text_en":"Spermatozoa"},{"letter":"C","text":"Sertoli-cellen","text_en":"Sertoli cells"},{"letter":"D","text":"Spermatocyten","text_en":"Spermatocytes"}],"answer":"D","answerText":"Spermatocyten","q_en":"Spermatogenesis is the process by which sperm cells are formed. What is the direct cell type that arises after the diploid stem cells (spermatogonia) divide?","a_en":"Spermatocytes"},{"id":"x206","ch":"X","num":206,"question":"Sperma is een mengsel van zaadcellen en vloeistoffen uit verschillende klieren. Welke accessorische klier voegt procentueel gezien het meeste volume toe aan een mannelijke ejaculatie?","options":[{"letter":"A","text":"De prostaat (Prostata)","text_en":"The prostate (Prostata)"},{"letter":"B","text":"De Cowperse klieren (Glandulae bulbourethrales)","text_en":"The Cowper's glands (Glandulae bulbourethrales)"},{"letter":"C","text":"De teelballen (Testes)","text_en":"The testicles (Testes)"},{"letter":"D","text":"De zaadblaasjes (Vesiculae seminales)","text_en":"The seminal vesicles (Vesiculae seminales)"}],"answer":"D","answerText":"De zaadblaasjes (Vesiculae seminales)","q_en":"Semen is a mixture of sperm cells and fluids from various glands. Which accessory gland contributes the most volume, percentage-wise, to a male ejaculation?","a_en":"The seminal vesicles (Vesiculae seminales)"},{"id":"x207","ch":"X","num":207,"question":"Tijdens de zwangerschap bevindt de baby zich in vruchtwater (amnionvocht). Waar is dit vocht in de vroege fase van de zwangerschap voornamelijk uit afkomstig?","options":[{"letter":"A","text":"Het wordt afgescheiden door de navelstreng.","text_en":"It is secreted by the umbilical cord."},{"letter":"B","text":"Uit de interstitiële vloeistof (het bloedplasma) van de moeder.","text_en":"From the interstitial fluid (the blood plasma) of the mother."},{"letter":"C","text":"Het is pure urine geproduceerd door de dooierzak.","text_en":"It is pure urine produced by the yolk sac."},{"letter":"D","text":"Het wordt geproduceerd door de zweetklieren van de embryo.","text_en":"It is produced by the sweat glands of the embryo."}],"answer":"B","answerText":"Uit de interstitiële vloeistof (het bloedplasma) van de moeder.","q_en":"During pregnancy, the baby is located in amniotic fluid. In the early phase of pregnancy, where does this fluid mainly originate from?","a_en":"From the interstitial fluid (the blood plasma) of the mother."},{"id":"x208","ch":"X","num":208,"question":"Rond de vijfde of zesde week van de embryonale ontwikkeling bevinden de geslachtsorganen zich in een ongedifferentieerd (bipotentieel) stadium. Welke structuur is in dit stadium dus zeker nog NIET specifiek aanwezig?","options":[{"letter":"A","text":"De testes (of ovaria)","text_en":"The testes (or ovaries)"},{"letter":"B","text":"De buizen van Wolff","text_en":"The Wolffian ducts"},{"letter":"C","text":"De buizen van Müller","text_en":"The Müllerian ducts"},{"letter":"D","text":"Een primitieve cloaca","text_en":"A primitive cloaca"}],"answer":"A","answerText":"De testes (of ovaria)","q_en":"Around the fifth or sixth week of embryonic development, the genital organs are in an undifferentiated (bipotential) stage. Which structure is therefore certainly NOT yet specifically present at this stage?","a_en":"The testes (or ovaries)"},{"id":"x209","ch":"X","num":209,"question":"Wanneer de ontwikkeling bij een foetus richting het mannelijk geslacht (XY) omslaat, scheiden de zich ontwikkelende testes testosteron uit. Welk ander cruciaal hormoon wordt ook door de foetale testes afgescheiden om de vorming van vrouwelijke inwendige organen te blokkeren?","options":[{"letter":"A","text":"Oestrogeen","text_en":"Estrogen"},{"letter":"B","text":"Prolactine","text_en":"Prolactin"},{"letter":"C","text":"Anti-Mülleriaans Hormoon (AMH)","text_en":"Anti-Müllerian Hormone (AMH)"},{"letter":"D","text":"Luteïniserend hormoon (LH)","text_en":"Luteinizing hormone (LH)"}],"answer":"C","answerText":"Anti-Mülleriaans Hormoon (AMH)","q_en":"When development in a fetus shifts toward the male sex (XY), the developing testes secrete testosterone. Which other crucial hormone is also secreted by the fetal testes to block the formation of female internal organs?","a_en":"Anti-Müllerian Hormone (AMH)"},{"id":"x210","ch":"X","num":210,"question":"Wat is een medisch en statistisch JUISTE bewering aangaande de risicofactoren of het voorkomen van borstkanker?","options":[{"letter":"A","text":"Een fibroadenoom is een vergevorderd stadium van invasieve borstkanker.","text_en":"A fibroadenoma is an advanced stage of invasive breast cancer."},{"letter":"B","text":"Op relatief jonge leeftijd (voor je 30ste) een eerste kind krijgen en borstvoeding geven, biedt een gedeeltelijke bescherming tegen het ontwikkelen van borstkanker.","text_en":"Having a first child at a relatively young age (before your 30s) and breastfeeding provides partial protection against developing breast cancer."},{"letter":"C","text":"Op jonge leeftijd een kind krijgen, is juist een van de grootste veroorzakers van borstkanker.","text_en":"Having a child at a young age is actually one of the biggest causes of breast cancer."},{"letter":"D","text":"Borstkanker komt in de overgrote meerderheid van de gevallen voornamelijk voor bij vrouwen jonger dan 40 jaar.","text_en":"In the vast majority of cases, breast cancer occurs mainly in women younger than 40 years."}],"answer":"B","answerText":"Op relatief jonge leeftijd (voor je 30ste) een eerste kind krijgen en borstvoeding geven, biedt een gedeeltelijke bescherming tegen het ontwikkelen van borstkanker.","q_en":"What is a medically and statistically CORRECT statement regarding the risk factors or the occurrence of breast cancer?","a_en":"Having a first child at a relatively young age (before your 30s) and breastfeeding provides partial protection against developing breast cancer."},{"id":"x211","ch":"X","num":211,"question":"Wat wordt in het maag-darmstelsel bedoeld met de term 'peristaltiek'?","options":[{"letter":"A","text":"Het heen en weer kneden en mengen van voedselbrij in de dunne darm.","text_en":"The back-and-forth kneading and mixing of food pulp in the small intestine."},{"letter":"B","text":"Het ritmisch en golfachtig samentrekken van gladde spieren om het voedsel door het maag-darmkanaal vooruit te duwen.","text_en":"The rhythmic and wave-like contraction of smooth muscles to push food forward through the gastrointestinal tract."},{"letter":"C","text":"De willekeurige sluitspierwerking rondom de anus.","text_en":"The involuntary sphincter action around the anus."},{"letter":"D","text":"De chemische afbraak van vetten in de twaalfvingerige darm met behulp van galzouten.","text_en":"The chemical breakdown of fats in the duodenum with the help of bile salts."}],"answer":"B","answerText":"Het ritmisch en golfachtig samentrekken van gladde spieren om het voedsel door het maag-darmkanaal vooruit te duwen.","q_en":"In the gastrointestinal tract, what is meant by the term 'peristalsis'?","a_en":"The rhythmic and wave-like contraction of smooth muscles to push food forward through the gastrointestinal tract."},{"id":"x212","ch":"X","num":212,"question":"Een 18-jarige man met Diabetes Mellitus (type 1) loopt een halve marathon (20 km). Ondanks dat hij zijn ochtenddosis insuline iets had verlaagd, wordt hij plotseling extreem bleek, duizelig en verward. Wat is er aan de hand en wat moet je direct doen?","options":[{"letter":"A","text":"Hij heeft een hartaanval; begin direct met reanimeren.","text_en":"He is having a heart attack; begin CPR immediately."},{"letter":"B","text":"Hij heeft uitdroging; laat hem een uur rusten zonder iets te drinken.","text_en":"He is dehydrated; let him rest for an hour without drinking anything."},{"letter":"C","text":"Hij heeft een hyper (te hoge bloedsuiker); dien hem onmiddellijk extra insuline toe.","text_en":"He is having a hyper (too high blood sugar); administer extra insulin to him immediately."},{"letter":"D","text":"Hij heeft een hypo (te lage bloedsuiker) door de inspanning; geef hem onmiddellijk snelle suikers (zoals dextro, sportdrank of frisdrank).","text_en":"He is having a hypo (too low blood sugar) due to the exertion; give him fast-acting sugars immediately (such as dextrose, sports drink or soft drink)."}],"answer":"D","answerText":"Hij heeft een hypo (te lage bloedsuiker) door de inspanning; geef hem onmiddellijk snelle suikers (zoals dextro, sportdrank of frisdrank).","q_en":"An 18-year-old man with Diabetes Mellitus (type 1) runs a half marathon (20 km). Even though he had slightly reduced his morning dose of insulin, he suddenly becomes extremely pale, dizzy and confused. What is going on and what must you do immediately?","a_en":"He is having a hypo (too low blood sugar) due to the exertion; give him fast-acting sugars immediately (such as dextrose, sports drink or soft drink)."},{"id":"x213","ch":"X","num":213,"question":"Patiënten met Inflammatory Bowel Disease (IBD, zoals de ziekte van Crohn of Colitis Ulcerosa) kampen met ernstige darmontstekingen, maar IBD is een systemische ziekte die ook organen buiten de darm aantast (extra-intestinale manifestaties). Welk orgaan(systeem) wordt doorgaans NIET rechtstreeks door de ziekte IBD aangetast?","options":[{"letter":"A","text":"De huid","text_en":"The skin"},{"letter":"B","text":"De gewrichten (artritis)","text_en":"The joints (arthritis)"},{"letter":"C","text":"De ogen (zoals uveïtis)","text_en":"The eyes (such as uveitis)"},{"letter":"D","text":"De hersenen","text_en":"The brain"}],"answer":"D","answerText":"De hersenen","q_en":"Patients with Inflammatory Bowel Disease (IBD, such as Crohn's disease or Ulcerative Colitis) suffer from severe intestinal inflammation, but IBD is a systemic disease that also affects organs outside the intestine (extra-intestinal manifestations). Which organ (system) is usually NOT directly affected by the disease IBD?","a_en":"The brain"},{"id":"x214","ch":"X","num":214,"question":"Mensen met de genetische aandoening Tubereuze Sclerose Complex (TSC) hebben veel last van epileptische aanvallen. Wat is binnen deze ziekte de primaire fysieke/neurologische veroorzaker van deze epilepsie in het brein?","options":[{"letter":"A","text":"Het dichtslibben van de grote halsslagaders naar de hersenen.","text_en":"The clogging of the major carotid arteries to the brain."},{"letter":"B","text":"Een chronische bacteriële ontsteking (meningitis) van de hersenvliezen.","text_en":"A chronic bacterial inflammation (meningitis) of the meninges."},{"letter":"C","text":"Een massaal en acuut tekort aan de neurotransmitter dopamine.","text_en":"A massive and acute deficiency of the neurotransmitter dopamine."},{"letter":"D","text":"De vorming van structurele, goedaardige tumoren of afwijkingen in de hersenschors (zogeheten tubers en dysplasieën).","text_en":"The formation of structural, benign tumors or abnormalities in the cerebral cortex (so-called tubers and dysplasias)."}],"answer":"D","answerText":"De vorming van structurele, goedaardige tumoren of afwijkingen in de hersenschors (zogeheten tubers en dysplasieën).","q_en":"People with the genetic disorder Tuberous Sclerosis Complex (TSC) suffer a great deal from epileptic seizures. Within this disease, what is the primary physical/neurological cause of this epilepsy in the brain?","a_en":"The formation of structural, benign tumors or abnormalities in the cerebral cortex (so-called tubers and dysplasias)."},{"id":"x215","ch":"X","num":215,"question":"De zware aandoening Tubereuze Sclerose Complex (TSC) kan in sommige gevallen al prenataal (voor de geboorte van de baby) ontdekt of vermoed worden via een zwangerschapsecho. Hoe is dit mogelijk?","options":[{"letter":"A","text":"Door de zichtbare aanwezigheid van een cardiaal rhabdomyoom (een goedaardige tumor in het hartje van de foetus).","text_en":"Through the visible presence of a cardiac rhabdomyoma (a benign tumor in the fetus's heart)."},{"letter":"B","text":"Doordat de foetus meer dan vijf tenen aan één voet heeft.","text_en":"Because the fetus has more than five toes on one foot."},{"letter":"C","text":"Door het meten van overmatige haargroei op de foetushuid.","text_en":"By measuring excessive hair growth on the fetal skin."},{"letter":"D","text":"Doordat het hartritme stelselmatig te traag is door ontbrekende kleppen.","text_en":"Because the heart rhythm is systematically too slow due to missing valves."}],"answer":"A","answerText":"Door de zichtbare aanwezigheid van een cardiaal rhabdomyoom (een goedaardige tumor in het hartje van de foetus).","q_en":"The severe disorder Tuberous Sclerosis Complex (TSC) can in some cases already be detected or suspected prenatally (before the baby is born) via a prenatal ultrasound. How is this possible?","a_en":"Through the visible presence of a cardiac rhabdomyoma (a benign tumor in the fetus's heart)."},{"id":"x216","ch":"X","num":216,"question":"Binnen de cardiologie spreekt men bij patiënten op de spoedeisende hulp vaak over een 'STEMI' (ST-Elevatie Myocardinfarct). Wat houdt dit ischemische hartprobleem concreet in?","options":[{"letter":"A","text":"Een volledige en acute afsluiting van een kransslagader, wat snel leidt tot onomkeerbare necrose (afsterven) van het hartspierweefsel.","text_en":"A complete and acute occlusion of a coronary artery, which quickly leads to irreversible necrosis (death) of the heart muscle tissue."},{"letter":"B","text":"Een tijdelijke kramp in de kransslagader die enkel wat pijn geeft in rust, zonder schade (onstabiele angina).","text_en":"A temporary spasm in the coronary artery that only causes some pain at rest, without damage (unstable angina)."},{"letter":"C","text":"Het scheuren van de hartspier zelf door een te hoge bloeddruk.","text_en":"The tearing of the heart muscle itself due to excessively high blood pressure."},{"letter":"D","text":"Het langzaam dichtslibben van de aorta buiten het hart.","text_en":"The slow clogging of the aorta outside the heart."}],"answer":"A","answerText":"Een volledige en acute afsluiting van een kransslagader, wat snel leidt tot onomkeerbare necrose (afsterven) van het hartspierweefsel.","q_en":"In cardiology, patients in the emergency department are often described as having a 'STEMI' (ST-Elevation Myocardial Infarction). What does this ischemic heart problem concretely involve?","a_en":"A complete and acute occlusion of a coronary artery, which quickly leads to irreversible necrosis (death) of the heart muscle tissue."},{"id":"x217","ch":"X","num":217,"question":"Een MDL-arts (maag-darm-lever) ziet een patiënt met bloederige diarree, pijn, en tevens gewrichtsontstekingen (artritis). Een coloscopie toont ontstekingen die diep doordringen in alle lagen van de darmwand (transmuraal) en die in delen over het hele colon verspreid liggen, afgewisseld met gezonde stukken weefsel. Het rectum zelf blijkt opvallend genoeg gezond. Wat is de meest waarschijnlijke diagnose?","options":[{"letter":"A","text":"De ziekte van Crohn","text_en":"Crohn's disease"},{"letter":"B","text":"Colitis Ulcerosa","text_en":"Ulcerative colitis"},{"letter":"C","text":"Diverticulitis","text_en":"Diverticulitis"},{"letter":"D","text":"Prikkelbaredarmsyndroom (IBS)","text_en":"Irritable bowel syndrome (IBS)"}],"answer":"A","answerText":"De ziekte van Crohn","q_en":"A gastroenterologist (gastrointestinal-liver specialist) sees a patient with bloody diarrhea, pain, and also joint inflammation (arthritis). A colonoscopy shows inflammation that penetrates deeply into all layers of the bowel wall (transmural) and that is spread out in patches across the entire colon, alternating with healthy sections of tissue. The rectum itself notably appears to be healthy. What is the most likely diagnosis?","a_en":"Crohn's disease"},{"id":"x218","ch":"X","num":218,"question":"Welke van de volgende wetenschappelijke verklaringen over het proces van veroudering in onze genetica is correct?","options":[{"letter":"A","text":"Centromeren slijten sneller naarmate je veel vet eet in je leven, waardoor chromosomen loslaten.","text_en":"Centromeres wear down faster the more fat you eat during your life, causing chromosomes to come loose."},{"letter":"B","text":"Een ongezonde leefstijl versnelt weliswaar hartklachten, maar is wetenschappelijk niet gerelateerd aan vroegtijdige schade in je DNA of weefsels.","text_en":"An unhealthy lifestyle does accelerate heart problems, but is scientifically not related to premature damage in your DNA or tissues."},{"letter":"C","text":"Cellen kunnen zich een oneindig aantal keer blijven delen, maar veroudering treedt op door roken.","text_en":"Cells can keep dividing an infinite number of times, but aging occurs due to smoking."},{"letter":"D","text":"Telomeren bevinden zich aan de uiteinden van onze chromosomen en fungeren als beschermende dopjes die essentiële genen behoeden voor aftakeling bij elke celdeling.","text_en":"Telomeres are located at the ends of our chromosomes and act as protective caps that safeguard essential genes from deterioration with each cell division."}],"answer":"D","answerText":"Telomeren bevinden zich aan de uiteinden van onze chromosomen en fungeren als beschermende dopjes die essentiële genen behoeden voor aftakeling bij elke celdeling.","q_en":"Which of the following scientific explanations about the process of aging in our genetics is correct?","a_en":"Telomeres are located at the ends of our chromosomes and act as protective caps that safeguard essential genes from deterioration with each cell division."},{"id":"x219","ch":"X","num":219,"question":"Wat is een medisch feit omtrent een 'fibroadenoom' in het borstweefsel?","options":[{"letter":"A","text":"Het moet per definitie altijd direct operatief worden weggehaald met zware chemotherapie.","text_en":"By definition it must always be surgically removed immediately together with intensive chemotherapy."},{"letter":"B","text":"Het is een kleine uitzaaiing (metastase) afkomstig van een tumor in de longen.","text_en":"It is a small metastasis originating from a tumor in the lungs."},{"letter":"C","text":"Het is een zeer veelvoorkomende goedaardige bindweefselknobbel en is géén directe voorloper van invasieve borstkanker.","text_en":"It is a very common benign connective tissue lump and is not a direct precursor of invasive breast cancer."},{"letter":"D","text":"Het is de meest dodelijke en agressieve variant van kwaadaardige borsttumoren.","text_en":"It is the most deadly and aggressive variant of malignant breast tumors."}],"answer":"C","answerText":"Het is een zeer veelvoorkomende goedaardige bindweefselknobbel en is géén directe voorloper van invasieve borstkanker.","q_en":"What is a medical fact about a 'fibroadenoma' in breast tissue?","a_en":"It is a very common benign connective tissue lump and is not a direct precursor of invasive breast cancer."},{"id":"x220","ch":"X","num":220,"question":"Als iemand de diagnose leukemie (bloedkanker) krijgt, waarom is een chirurgische verwijdering (operatie) dan praktisch zinloos, en grijpt men als behandeling standaard naar chemotherapie?","options":[{"letter":"A","text":"Omdat bestraling (radiotherapie) op het bloed direct dodelijk is voor het hart.","text_en":"Because radiation therapy (radiotherapy) on the blood is directly fatal to the heart."},{"letter":"B","text":"Omdat leukemie ontstaat in de hersenen en een hersenoperatie te risicovol is.","text_en":"Because leukemia originates in the brain and brain surgery is too risky."},{"letter":"C","text":"Omdat leukemie een 'vloeibare' kanker is die systemisch overal in de bloedbaan zit; chemotherapie reist ook door het hele lichaam.","text_en":"Because leukemia is a 'liquid' cancer that is systemically present everywhere in the bloodstream; chemotherapy also travels throughout the entire body."},{"letter":"D","text":"Omdat chemotherapie de witte bloedcellen direct weer kan samenlijmen tot normale cellen.","text_en":"Because chemotherapy can directly fuse the white blood cells back together into normal cells."}],"answer":"C","answerText":"Omdat leukemie een 'vloeibare' kanker is die systemisch overal in de bloedbaan zit; chemotherapie reist ook door het hele lichaam.","q_en":"When someone is diagnosed with leukemia (blood cancer), why is surgical removal (an operation) then practically pointless, and why does treatment standardly turn to chemotherapy?","a_en":"Because leukemia is a 'liquid' cancer that is systemically present everywhere in the bloodstream; chemotherapy also travels throughout the entire body."},{"id":"x221","ch":"X","num":221,"question":"Bij de ziekte mucoviscidose (taaislijmziekte) ontstaat er door een genetisch defect veel te dik, taai slijm. Waar in de cellen ligt het kernprobleem dat medici met de nieuwste medicatie proberen te repareren?","options":[{"letter":"A","text":"In het defect van de chloridekanaaltjes (CFTR-eiwit), die zout en water niet meer goed over het celmembraan pompen.","text_en":"In the defect of the chloride channels (CFTR protein), which can no longer properly pump salt and water across the cell membrane."},{"letter":"B","text":"In het kapotgaan van de alveoli in de longen (emfyseem).","text_en":"In the breakdown of the alveoli in the lungs (emphysema)."},{"letter":"C","text":"In de defecte natriumkanaaltjes in de lever die bloed verdunnen.","text_en":"In the defective sodium channels in the liver that thin the blood."},{"letter":"D","text":"In het endocriene systeem van de alvleesklier dat plots is gestopt met werken.","text_en":"In the endocrine system of the pancreas that has suddenly stopped working."}],"answer":"A","answerText":"In het defect van de chloridekanaaltjes (CFTR-eiwit), die zout en water niet meer goed over het celmembraan pompen.","q_en":"In the disease cystic fibrosis (mucoviscidosis), a genetic defect causes far too thick, viscous mucus to form. Where in the cells lies the core problem that physicians try to repair with the newest medication?","a_en":"In the defect of the chloride channels (CFTR protein), which can no longer properly pump salt and water across the cell membrane."},{"id":"x222","ch":"X","num":222,"question":"Als we onder de microscoop een weefsel bekijken en we zien een mix van vetcellen (adipocyten), elastische en collageenvezels, bloedvaten, actieve fibroblasten en mastcellen, naar welk type basaalweefsel kijken we dan?","options":[{"letter":"A","text":"Spierweefsel","text_en":"Muscle tissue"},{"letter":"B","text":"Epitheelweefsel","text_en":"Epithelial tissue"},{"letter":"C","text":"Bindweefsel","text_en":"Connective tissue"},{"letter":"D","text":"Zenuwweefsel","text_en":"Nervous tissue"}],"answer":"C","answerText":"Bindweefsel","q_en":"If we examine a tissue under the microscope and we see a mix of fat cells (adipocytes), elastic and collagen fibers, blood vessels, active fibroblasts and mast cells, which type of basic tissue are we looking at?","a_en":"Connective tissue"},{"id":"x223","ch":"X","num":223,"question":"De huid behoort tot de 'aangeboren (innate) immuniteit' als eerste, uiterst efficiënte verdedigingslinie tegen pathogenen. Welk van de volgende eigenschappen hoort echter NIET bij de wapens van deze huidbarrière?","options":[{"letter":"A","text":"Het voortdurend afschilferen en vervellen van dode hoorncellen (desquamatie).","text_en":"The continuous shedding and exfoliation of dead horny cells (desquamation)."},{"letter":"B","text":"Een sterke, droge keratine eiwitlaag die doordringen fysiek bemoeilijkt.","text_en":"A strong, dry keratin protein layer that physically hinders penetration."},{"letter":"C","text":"Zweetklieren die een licht zuur en antimicrobieel milieu (lage pH) creëren.","text_en":"Sweat glands that create a slightly acidic and antimicrobial environment (low pH)."},{"letter":"D","text":"Het uitscheiden van circulerende antilichamen.","text_en":"The secretion of circulating antibodies."}],"answer":"D","answerText":"Het uitscheiden van circulerende antilichamen.","q_en":"The skin belongs to the 'innate immunity' as the first, extremely efficient line of defense against pathogens. However, which of the following properties does NOT belong to the weapons of this skin barrier?","a_en":"The secretion of circulating antibodies."},{"id":"x224","ch":"X","num":224,"question":"Welk celtype is bij de mens verantwoordelijk voor de productie van het pigment melanine, wat vervolgens wordt uitgesmeerd als een paraplu over de huidkernen om ze te beschermen tegen UV-straling?","options":[{"letter":"A","text":"Erytrocyten","text_en":"Erythrocytes"},{"letter":"B","text":"Melanocyten","text_en":"Melanocytes"},{"letter":"C","text":"Keratinocyten","text_en":"Keratinocytes"},{"letter":"D","text":"Fibroblasten","text_en":"Fibroblasts"}],"answer":"B","answerText":"Melanocyten","q_en":"Which cell type in humans is responsible for the production of the pigment melanin, which is then spread out like an umbrella over the skin cell nuclei to protect them against UV radiation?","a_en":"Melanocytes"},{"id":"x225","ch":"X","num":225,"question":"Wanneer je hersenen beslissen om een spier aan te spannen, moet er op het kleinste moleculaire niveau iets verschuiven om dat mogelijk te maken. Aan welk specifiek eiwit binnenin de spiervezel bindt het vrijgekomen calcium (Ca2+) zich vast om de spiercontractie te starten?","options":[{"letter":"A","text":"Actine","text_en":"Actin"},{"letter":"B","text":"Keratine","text_en":"Keratin"},{"letter":"C","text":"Myosine","text_en":"Myosin"},{"letter":"D","text":"Troponine","text_en":"Troponin"}],"answer":"D","answerText":"Troponine","q_en":"When your brain decides to contract a muscle, something has to shift at the smallest molecular level to make that possible. To which specific protein inside the muscle fiber does the released calcium (Ca2+) bind in order to initiate muscle contraction?","a_en":"Troponin"},{"id":"x226","ch":"X","num":226,"question":"Welk seksueel overdraagbare aandoening (SOA) staat erom bekend een direct oorzakelijk verband te hebben met de ontwikkeling van bepaalde vormen van kanker?","options":[{"letter":"A","text":"Humaan Papillomavirus (HPV)","text_en":"Human Papillomavirus (HPV)"},{"letter":"B","text":"Gonorroe","text_en":"Gonorrhea"},{"letter":"C","text":"Syfilis","text_en":"Syphilis"},{"letter":"D","text":"Chlamydia","text_en":"Chlamydia"}],"answer":"A","answerText":"Humaan Papillomavirus (HPV)","q_en":"Which sexually transmitted infection (STI) is known to have a direct causal link with the development of certain forms of cancer?","a_en":"Human Papillomavirus (HPV)"},{"id":"x227","ch":"X","num":227,"question":"Wat is een kenmerkend pathofysiologisch gevolg van emfyseem voor de ademhaling?","options":[{"letter":"A","text":"Een verbeterde diffusie van gassen door dunner wordende membranen.","text_en":"An improved diffusion of gases through thinning membranes."},{"letter":"B","text":"Het verkleinen van de luchtwegen door overmatige slijmproductie.","text_en":"The narrowing of the airways due to excessive mucus production."},{"letter":"C","text":"Een verhoging van de zuurstoftransportcapaciteit via hemoglobine.","text_en":"An increase in the oxygen transport capacity via hemoglobin."},{"letter":"D","text":"Ernstige kortademigheid door destructie van de alveolaire wanden.","text_en":"Severe shortness of breath due to destruction of the alveolar walls."}],"answer":"D","answerText":"Ernstige kortademigheid door destructie van de alveolaire wanden.","q_en":"What is a characteristic pathophysiological consequence of emphysema for respiration?","a_en":"Severe shortness of breath due to destruction of the alveolar walls."},{"id":"x228","ch":"X","num":228,"question":"Op welk moment in de embryonale ontwikkeling spreken we officieel van een foetus?","options":[{"letter":"A","text":"Vanaf de 9e week na de bevruchting.","text_en":"From the 9th week after fertilization."},{"letter":"B","text":"Zodra de innesteling in de uterus voltooid is.","text_en":"As soon as implantation in the uterus is complete."},{"letter":"C","text":"Vanaf de 4e week na de bevruchting.","text_en":"From the 4th week after fertilization."},{"letter":"D","text":"Vanaf de 12e week na de bevruchting.","text_en":"From the 12th week after fertilization."}],"answer":"A","answerText":"Vanaf de 9e week na de bevruchting.","q_en":"At what point in embryonic development do we officially speak of a fetus?","a_en":"From the 9th week after fertilization."},{"id":"x229","ch":"X","num":229,"question":"Wat is een vaak aangehaald nadeel van het gebruik van de Body Mass Index (BMI) in gezondheidsonderzoek?","options":[{"letter":"A","text":"BMI maakt geen onderscheid tussen vetmassa en spiermassa of vetverdeling.","text_en":"BMI does not distinguish between fat mass and muscle mass or fat distribution."},{"letter":"B","text":"De berekening is te complex voor routinematig gebruik.","text_en":"The calculation is too complex for routine use."},{"letter":"C","text":"BMI houdt geen rekening met de genetische achtergrond van een individu.","text_en":"BMI does not take into account the genetic background of an individual."},{"letter":"D","text":"BMI is volledig irrelevant voor het voorspellen van ziekten.","text_en":"BMI is completely irrelevant for predicting diseases."}],"answer":"A","answerText":"BMI maakt geen onderscheid tussen vetmassa en spiermassa of vetverdeling.","q_en":"What is a frequently cited disadvantage of using the Body Mass Index (BMI) in health research?","a_en":"BMI does not distinguish between fat mass and muscle mass or fat distribution."},{"id":"x230","ch":"X","num":230,"question":"Welk orgaan vervult de belangrijkste rol bij zowel de mechanische/chemische vertering als de absorptie van de meeste voedingsstoffen?","options":[{"letter":"A","text":"Lever","text_en":"Liver"},{"letter":"B","text":"Dikke darm","text_en":"Large intestine"},{"letter":"C","text":"Maag","text_en":"Stomach"},{"letter":"D","text":"Dunne darm","text_en":"Small intestine"}],"answer":"D","answerText":"Dunne darm","q_en":"Which organ plays the most important role in both the mechanical/chemical digestion and the absorption of most nutrients?","a_en":"Small intestine"},{"id":"x231","ch":"X","num":231,"question":"Op welke chemische veranderingen in het bloed reageert het ademhalingscentrum in de hersenstam primair om de ademhalingsfrequentie aan te passen?","options":[{"letter":"A","text":"Een stijging van de concentratie CO","text_en":"A rise in the concentration of CO"},{"letter":"B","text":"Een daling van de stikstofconcentratie in het bloed.","text_en":"A drop in the nitrogen concentration in the blood."},{"letter":"C","text":"Veranderingen in de luchttemperatuur in de longen.","text_en":"Changes in the air temperature in the lungs."},{"letter":"D","text":"De aanwezigheid van allergenen in de ingeademde lucht.","text_en":"The presence of allergens in the inhaled air."}],"answer":"A","answerText":"Een stijging van de concentratie CO","q_en":"To which chemical changes in the blood does the respiratory center in the brainstem primarily respond in order to adjust the respiratory rate?","a_en":"A rise in the concentration of CO"},{"id":"x232","ch":"X","num":232,"question":"Wat is de correcte volgorde van de processen tijdens hemostase (bloedstelping) na een vaatbeschadiging?","options":[{"letter":"A","text":"Vasculaire spasmen → vorming bloedplaatjesprop → coagulatie (stolling).","text_en":"Vascular spasms → formation of platelet plug → coagulation (clotting)."},{"letter":"B","text":"Vorming bloedplaatjesprop → stolling → vasculaire spasmen.","text_en":"Formation of platelet plug → clotting → vascular spasms."},{"letter":"C","text":"Vorming bloedplaatjesprop → fibrinolyse → coagulatie.","text_en":"Formation of platelet plug → fibrinolysis → coagulation."},{"letter":"D","text":"Coagulatie → vasculaire spasmen → vorming bloedplaatjesprop.","text_en":"Coagulation → vascular spasms → formation of platelet plug."}],"answer":"A","answerText":"Vasculaire spasmen → vorming bloedplaatjesprop → coagulatie (stolling).","q_en":"What is the correct order of the processes during hemostasis (arrest of bleeding) after a blood vessel injury?","a_en":"Vascular spasms → formation of platelet plug → coagulation (clotting)."},{"id":"x233","ch":"X","num":233,"question":"Bij een patiënt met de ziekte van Addison is er sprake van een hypofunctie van de bijnierschors, wat leidt tot een tekort aan aldosteron. Welk elektrolyten-onbalans verwacht u in het bloed?","options":[{"letter":"A","text":"Hypernatremie (te hoog natriumgehalte).","text_en":"Hypernatremia (too high sodium level)."},{"letter":"B","text":"Hypercalciëmie (te hoog calciumgehalte).","text_en":"Hypercalcemia (too high calcium level)."},{"letter":"C","text":"Hyponatremie (te laag natriumgehalte).","text_en":"Hyponatremia (too low sodium level)."},{"letter":"D","text":"Hypokaliëmie (te laag kaliumgehalte).","text_en":"Hypokalemia (too low potassium level)."}],"answer":"C","answerText":"Hyponatremie (te laag natriumgehalte).","q_en":"In a patient with Addison's disease there is hypofunction of the adrenal cortex, which leads to a deficiency of aldosterone. Which electrolyte imbalance do you expect in the blood?","a_en":"Hyponatremia (too low sodium level)."},{"id":"x234","ch":"X","num":234,"question":"Waarom oefenen steroïde hormonen vaak een langduriger en krachtiger effect uit op hun doelcellen dan peptidehormonen?","options":[{"letter":"A","text":"Ze binden uitsluitend aan receptoren op het celoppervlak die een second messenger cascade starten.","text_en":"They bind exclusively to receptors on the cell surface that start a second messenger cascade."},{"letter":"B","text":"Ze worden sneller afgebroken door leverenzymen.","text_en":"They are broken down faster by liver enzymes."},{"letter":"C","text":"Ze worden in grotere hoeveelheden geproduceerd dan andere hormonen.","text_en":"They are produced in larger quantities than other hormones."},{"letter":"D","text":"Ze zijn lipofiel en binden aan receptoren in de celkern om de gentranscriptie direct te beïnvloeden.","text_en":"They are lipophilic and bind to receptors in the cell nucleus to directly influence gene transcription."}],"answer":"D","answerText":"Ze zijn lipofiel en binden aan receptoren in de celkern om de gentranscriptie direct te beïnvloeden.","q_en":"Why do steroid hormones often exert a longer-lasting and more powerful effect on their target cells than peptide hormones?","a_en":"They are lipophilic and bind to receptors in the cell nucleus to directly influence gene transcription."},{"id":"x235","ch":"X","num":235,"question":"Wat is de functie van de precapillaire sfincters in het vaatbed?","options":[{"letter":"A","text":"Het reguleren van de bloedstroom naar de werkelijke capillaire vaten op basis van lokale behoefte.","text_en":"Regulating the blood flow to the actual capillary vessels based on local demand."},{"letter":"B","text":"De productie van bloedplaatjes bij weefselbeschadiging.","text_en":"The production of platelets upon tissue damage."},{"letter":"C","text":"Het voorkomen van het terugstromen van bloed vanuit de capillairen naar de arteriolen.","text_en":"Preventing the backflow of blood from the capillaries to the arterioles."},{"letter":"D","text":"Het verhogen van de bloeddruk in de venen om veneuze terugkeer te bevorderen.","text_en":"Increasing the blood pressure in the veins to promote venous return."}],"answer":"A","answerText":"Het reguleren van de bloedstroom naar de werkelijke capillaire vaten op basis van lokale behoefte.","q_en":"What is the function of the precapillary sphincters in the vascular bed?","a_en":"Regulating the blood flow to the actual capillary vessels based on local demand."},{"id":"x236","ch":"X","num":236,"question":"Bij osteoporose is er een verstoring in de botremodellering. Welke verandering in celactiviteit is hiervan de oorzaak?","options":[{"letter":"A","text":"Er is een overmatige productie van collageen door osteocyten.","text_en":"There is an excessive production of collagen by osteocytes."},{"letter":"B","text":"De osteoblasten transformeren in kraakbeencellen.","text_en":"The osteoblasts transform into cartilage cells."},{"letter":"C","text":"De mineralisatie van het osteoïd vindt te snel plaats.","text_en":"The mineralization of the osteoid takes place too quickly."},{"letter":"D","text":"De activiteit van osteoclasten overtreft die van de osteoblasten.","text_en":"The activity of osteoclasts exceeds that of the osteoblasts."}],"answer":"D","answerText":"De activiteit van osteoclasten overtreft die van de osteoblasten.","q_en":"In osteoporosis there is a disruption in bone remodeling. Which change in cell activity is the cause of this?","a_en":"The activity of osteoclasts exceeds that of the osteoblasts."},{"id":"x237","ch":"X","num":237,"question":"Welke cellen vormen de eerste verdedigingslinie van het niet-specifieke (aspecifieke) immuunsysteem wanneer bacteriën het lichaam binnendringen?","options":[{"letter":"A","text":"Neutrofielen en macrofagen.","text_en":"Neutrophils and macrophages."},{"letter":"B","text":"T-helpercellen (CD4+).","text_en":"T-helper cells (CD4+)."},{"letter":"C","text":"Rode bloedcellen (erytrocyten).","text_en":"Red blood cells (erythrocytes)."},{"letter":"D","text":"Plasma cellen die antilichamen produceren.","text_en":"Plasma cells that produce antibodies."}],"answer":"A","answerText":"Neutrofielen en macrofagen.","q_en":"Which cells form the first line of defense of the non-specific (aspecific) immune system when bacteria invade the body?","a_en":"Neutrophils and macrophages."},{"id":"x238","ch":"X","num":238,"question":"Wat gebeurt er op moleculair niveau in een spiercel wanneer calcium (Ca 2+ ) vrijkomt uit het sarcoplasmatisch reticulum?","options":[{"letter":"A","text":"De Z-lijnen van het sarcomeren bewegen zich verder van elkaar af.","text_en":"The Z-lines of the sarcomere move further apart from each other."},{"letter":"B","text":"Calcium bindt aan troponine, waardoor de bindingsplaatsen op actine vrijkomen voor myosine.","text_en":"Calcium binds to troponin, which exposes the binding sites on actin for myosin."},{"letter":"C","text":"Calcium blokkeert de overdracht van acetylcholine in de synaps.","text_en":"Calcium blocks the transmission of acetylcholine in the synapse."},{"letter":"D","text":"Calcium zorgt direct voor de hydrolyse van ATP naar ADP.","text_en":"Calcium directly causes the hydrolysis of ATP to ADP."}],"answer":"B","answerText":"Calcium bindt aan troponine, waardoor de bindingsplaatsen op actine vrijkomen voor myosine.","q_en":"What happens at the molecular level in a muscle cell when calcium (Ca2+) is released from the sarcoplasmic reticulum?","a_en":"Calcium binds to troponin, which exposes the binding sites on actin for myosin."},{"id":"x239","ch":"X","num":239,"question":"Welke vorm van anticonceptie heeft bij 'typisch gebruik' de hoogste faalkans?","options":[{"letter":"A","text":"De combinatiepil.","text_en":"The combination pill."},{"letter":"B","text":"Vasectomie.","text_en":"Vasectomy."},{"letter":"C","text":"Het condoom.","text_en":"The condom."},{"letter":"D","text":"Het spiraaltje (IUD).","text_en":"The intrauterine device (IUD)."}],"answer":"C","answerText":"Het condoom.","q_en":"Which form of contraception has the highest failure rate with 'typical use'?","a_en":"The condom."},{"id":"x240","ch":"X","num":240,"question":"Wat is het effect van het hormoon calcitonine op de calciumhuishouding?","options":[{"letter":"A","text":"Het stimuleert de nieren om meer calcium vast te houden.","text_en":"It stimulates the kidne "text":"Chondroblasten zijn alleen aanwezig tijdens de foetale ontwikkeling","text_en":"Chondroblasts are only present during fetal development"},{"letter":"C","text":"Beenmerg bevat stamcellen","text_en":"Bone marrow contains stem cells"},{"letter":"D","text":"Bot heeft een hoger mineraalgehalte","text_en":"Bone has a higher mineral content"}],"answer":"A","answerText":"Er is een rijkere bloedtoevoer naar bot","q_en":"Bone tissue heals faster than cartilage. What is the main reason for this?","a_en":"There is a richer blood supply to bone"},{"id":"x274","ch":"X","num":274,"question":"De epidermis (opperhuid) bestaat hoofdzakelijk uit:","options":[{"letter":"A","text":"Keratinocyten","text_en":"Keratinocytes"},{"letter":"B","text":"Fibroblasten","text_en":"Fibroblasts"},{"letter":"C","text":"Melanocyten","text_en":"Melanocytes"},{"letter":"D","text":"Adipocyten","text_en":"Adipocytes"}],"answer":"A","answerText":"Keratinocyten","q_en":"The epidermis consists mainly of:","a_en":"Keratinocytes"},{"id":"x275","ch":"X","num":275,"question":"Welke van de volgende stoffen is verantwoordelijk voor de pigmentatie van de huid?","options":[{"letter":"A","text":"Keratine","text_en":"Keratin"},{"letter":"B","text":"Talg (Sebum)","text_en":"Sebum"},{"letter":"C","text":"Collageen","text_en":"Collagen"},{"letter":"D","text":"Melanine","text_en":"Melanin"}],"answer":"D","answerText":"Melanine","q_en":"Which of the following substances is responsible for the pigmentation of the skin?","a_en":"Melanin"},{"id":"x276","ch":"X","num":276,"question":"Welke van de volgende uitspraken over bindweefsel is ONJUIST?","options":[{"letter":"A","text":"Het wordt hoofdzakelijk gevormd door dicht op elkaar aangesloten fibroblasten.","text_en":"It is primarily formed by densely packed fibroblasts."},{"letter":"B","text":"De sterkte wordt bepaald door de matrix.","text_en":"Its strength is determined by the matrix."},{"letter":"C","text":"Sommige gespecialiseerde cellen produceren histamine.","text_en":"Some specialized cells produce histamine."},{"letter":"D","text":"Kraakbeen is rijk aan collageenvezels en water.","text_en":"Cartilage is rich in collagen fibers and water."}],"answer":"A","answerText":"Het wordt hoofdzakelijk gevormd door dicht op elkaar aangesloten fibroblasten.","q_en":"Which of the following statements about connective tissue is INCORRECT?","a_en":"It is primarily formed by densely packed fibroblasts."},{"id":"x277","ch":"X","num":277,"question":"Een volle blaas triggert samentrekkingen die de blaas nog verder doen ledigen. Waarvan is dit een voorbeeld?","options":[{"letter":"A","text":"Uroregulatie","text_en":"Uroregulation"},{"letter":"B","text":"Positieve feedback","text_en":"Positive feedback"},{"letter":"C","text":"Homeostatische regulatie","text_en":"Homeostatic regulation"},{"letter":"D","text":"Negatieve feedback","text_en":"Negative feedback"}],"answer":"B","answerText":"Positieve feedback","q_en":"A full bladder triggers contractions that empty the bladder even further. This is an example of what?","a_en":"Positive feedback"},{"id":"x278","ch":"X","num":278,"question":"Welk type weefsel slaat triglyceriden (vetten) op?","options":[{"letter":"A","text":"Vetweefsel (Adipeus weefsel)","text_en":"Adipose tissue"},{"letter":"B","text":"Losmazig bindweefsel","text_en":"Loose connective tissue"},{"letter":"C","text":"Spierweefsel","text_en":"Muscle tissue"},{"letter":"D","text":"Cilindrisch epitheelweefsel","text_en":"Columnar epithelial tissue"}],"answer":"A","answerText":"Vetweefsel (Adipeus weefsel)","q_en":"Which type of tissue stores triglycerides (fats)?","a_en":"Adipose tissue"},{"id":"x279","ch":"X","num":279,"question":"Een aanzienlijke hoeveelheid niet-levend extracellulair materiaal, ook wel de matrix genoemd, is kenmerkend voor:","options":[{"letter":"A","text":"Zenuuweefsel","text_en":"Nervous tissue"},{"letter":"B","text":"Membranen","text_en":"Membranes"},{"letter":"C","text":"Epitheelweefsel","text_en":"Epithelial tissue"},{"letter":"D","text":"Bindweefsel","text_en":"Connective tissue"}],"answer":"D","answerText":"Bindweefsel","q_en":"A considerable amount of non-living extracellular material, also called the matrix, is characteristic of:","a_en":"Connective tissue"},{"id":"x280","ch":"X","num":280,"question":"Cellen halen hun voedingsstoffen uit de ______, en geven daar hun giftige afvalstoffen aan af.","options":[{"letter":"A","text":"Bloedvaten","text_en":"Blood vessels"},{"letter":"B","text":"Interstitiële vloeistof","text_en":"Interstitial fluid"},{"letter":"C","text":"Basale cellen","text_en":"Basal cells"},{"letter":"D","text":"Klierweefsel","text_en":"Glandular tissue"}],"answer":"B","answerText":"Interstitiële vloeistof","q_en":"Cells obtain their nutrients from the ______, and release their toxic waste products into it.","a_en":"Interstitial fluid"},{"id":"x281","ch":"X","num":281,"question":"Welke van de volgende gevolgen kan het resultaat zijn van een tumor die overmatige afscheiding van het hormoon calcitonine veroorzaakt?","options":[{"letter":"A","text":"Gewrichtsontsteking die leidt tot artrose","text_en":"Joint inflammation leading to osteoarthritis"},{"letter":"B","text":"Botgroei door stimulatie van osteoblasten","text_en":"Bone growth through stimulation of osteoblasts"},{"letter":"C","text":"Omzetting van kraakbeen in bot","text_en":"Conversion of cartilage into bone"},{"letter":"D","text":"Botverlies door stimulatie van osteoclasten","text_en":"Bone loss through stimulation of osteoclasts"}],"answer":"B","answerText":"Botgroei door stimulatie van osteoblasten","q_en":"Which of the following consequences could result from a tumor causing excessive secretion of the hormone calcitonin?","a_en":"Bone growth through stimulation of osteoblasts"},{"id":"x282","ch":"X","num":282,"question":"Stappen in het herstel van een botbreuk omvatten: (1) botafzetting door osteoblasten, (2) verwijdering van bot en puin door osteoclasten, (3) hematoom en (4) vorming van een fibrocartilagineuze callus. In welke volgorde vinden deze stappen plaats?","options":[{"letter":"A","text":"3-4-1-2","text_en":"3-4-1-2"},{"letter":"B","text":"1-2-3-4","text_en":"1-2-3-4"},{"letter":"C","text":"3-4-2-1","text_en":"3-4-2-1"},{"letter":"D","text":"4-3-2-1","text_en":"4-3-2-1"}],"answer":"A","answerText":"3-4-1-2","q_en":"Steps in the healing of a bone fracture include: (1) bone deposition by osteoblasts, (2) removal of bone and debris by osteoclasts, (3) hematoma, and (4) formation of a fibrocartilaginous callus. In which order do these steps occur?","a_en":"3-4-1-2"},{"id":"x283","ch":"X","num":283,"question":"Alle volgende botten maken deel uit van de oogkas (orbit), behalve de:","options":[{"letter":"A","text":"Achterhoofdsbeen (occipital bone)","text_en":"Occipital bone"},{"letter":"B","text":"Jukbeen (zygomatic)","text_en":"Zygomatic bone"},{"letter":"C","text":"Traanbeen (lacrimal)","text_en":"Lacrimal bone"},{"letter":"D","text":"Zeefbeen (ethmoid)","text_en":"Ethmoid bone"}],"answer":"A","answerText":"Achterhoofdsbeen (occipital bone)","q_en":"All of the following bones are part of the orbit (eye socket), except the:","a_en":"Occipital bone"},{"id":"x284","ch":"X","num":284,"question":"Alle volgende botten vormen de schedel, behalve de:","options":[{"letter":"A","text":"Jukbeen (zygomatic)","text_en":"Zygomatic bone"},{"letter":"B","text":"Bovenkaak (maxilla)","text_en":"Maxilla"},{"letter":"C","text":"Onderkaak (mandible)","text_en":"Mandible"},{"letter":"D","text":"Tongbeen (hyoid bone)","text_en":"Hyoid bone"}],"answer":"D","answerText":"Tongbeen (hyoid bone)","q_en":"All of the following bones form the skull, except the:","a_en":"Hyoid bone"},{"id":"x285","ch":"X","num":285,"question":"Welke van de volgende botten bevinden zich alleen in de handen?","options":[{"letter":"A","text":"Middenvoetsbeentjes (metatarsals)","text_en":"Metatarsals"},{"letter":"B","text":"Vingerkootjes (phalanges)","text_en":"Phalanges"},{"letter":"C","text":"Handwortelbeentjes (carpals)","text_en":"Carpals"},{"letter":"D","text":"Voetwortelbeentjes (tarsals)","text_en":"Tarsals"}],"answer":"C","answerText":"Handwortelbeentjes (carpals)","q_en":"Which of the following bones are found only in the hands?","a_en":"Carpals"},{"id":"x286","ch":"X","num":286,"question":"De beweging van de duim om een cirkel te tekenen kan het best worden omschreven als:","options":[{"letter":"A","text":"Pronatie","text_en":"Pronation"},{"letter":"B","text":"Abductie","text_en":"Abduction"},{"letter":"C","text":"Rotatie","text_en":"Rotation"},{"letter":"D","text":"Circumductie","text_en":"Circumduction"}],"answer":"D","answerText":"Circumductie","q_en":"The movement of the thumb to trace a circle is best described as:","a_en":"Circumduction"},{"id":"x287","ch":"X","num":287,"question":"Synoviale gewrichten bevatten verschillende structuren. Welke hiervan verbinden botten met andere botten binnen het gewricht?","options":[{"letter":"A","text":"Kraakbeen (cartilage)","text_en":"Cartilage"},{"letter":"B","text":"Ligamenten (banden)","text_en":"Ligaments"},{"letter":"C","text":"Synoviale membraan","text_en":"Synovial membrane"},{"letter":"D","text":"Pezen (tendons)","text_en":"Tendons"}],"answer":"B","answerText":"Ligamenten (banden)","q_en":"Synovial joints contain various structures. Which of these connect bones to other bones within the joint?","a_en":"Ligaments"},{"id":"x288","ch":"X","num":288,"question":"Welke van de volgende is een voorbeeld van een kraakbeengewricht?","options":[{"letter":"A","text":"Kniegewricht (knee joint)","text_en":"Knee joint"},{"letter":"B","text":"Heupgewricht (hip joint)","text_en":"Hip joint"},{"letter":"C","text":"Schedelnaden (skull sutures)","text_en":"Skull sutures"},{"letter":"D","text":"Schaambeenverbinding (pubic symphysis)","text_en":"Pubic symphysis"}],"answer":"D","answerText":"Schaambeenverbinding (pubic symphysis)","q_en":"Which of the following is an example of a cartilaginous joint?","a_en":"Pubic symphysis"}
