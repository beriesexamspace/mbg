  var TABS=[
    {v:"home",  label:"Start",             icon:"book"},
    {v:"quiz",  label:"Oefenexamen",       icon:"book"},
    {v:"flash", label:"Oude examenvragen", icon:"layers"},
    {v:"hacks", label:"Studie-hacks",      icon:"bulb"},
    {v:"summary",label:"Samenvatting",     icon:"search"},
    {v:"feedback",label:"Feedback",        icon:"msg"}
  ];
  var tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML=TABS.map(function(t){ return '<button data-view="'+t.v+'"'+(t.v==="home"?' class="on"':'')+'>'+ic(t.icon)+'<span>'+t.label+'</span></button>'; }).join("");
  var tabBtns=Array.prototype.slice.call(tabsEl.querySelectorAll("button"));
  tabBtns.forEach(function(b){ b.onclick=function(){ go(b.dataset.view); }; });
  function go(v){ state.view=v; tabBtns.forEach(function(b){ b.classList.toggle("on", b.dataset.view===v); }); render(); window.scrollTo(0,0); }

  // =================== RENDER ===================
  function render(){
    if(state.view==="home") return renderHome();
    if(state.view==="quiz") return renderQuizGate();
    if(state.view==="flash") return renderFlashGate();
    if(state.view==="hacks") return renderHacks();
    if(state.view==="summary") return renderSummary();
    if(state.view==="feedback") return renderFeedback();
  }

  // ---------- HOME ----------
  function renderHome(){
    var dl = daysLeft();
    var seen=0, corr=0;
    D.mcq.forEach(function(q){ var p=prog[q.id]; if(p){ seen+=p.seen; corr+=p.correct; } });
    var answeredQ = D.mcq.filter(function(q){return prog[q.id];}).length;
    var knownF = D.reco.filter(function(q){return flash[q.id]==="known";}).length;
    var herk = modeCfg.track==="herkansing";

    var trackHTML =
      '<div class="tracks">'+
        '<button class="track js-enter'+(!herk?" on":"")+'" data-track="training">'+
          '<span class="chk">'+ic("check")+'</span>'+
          '<span class="tile">'+ic("book")+'</span>'+
          '<b>Examen Training</b>'+
          '<small>Oefen op echt examenniveau. Vragen, directe feedback en je voortgang per hoofdstuk.</small>'+
          '<span class="go">Normaal niveau '+ic("arrowR")+'</span>'+
        '</button>'+
        '<button class="track alt js-enter'+(herk?" on":"")+'" data-track="herkansing">'+
          '<span class="chk">'+ic("check")+'</span>'+
          '<span class="tile">'+ic("sprout")+'</span>'+
          '<b>Herkansing Support</b>'+
          '<small>Rustig weer opbouwen met hints, extra uitleg en aanmoediging. Kies daarna je niveau.</small>'+
          '<span class="go">Met begeleiding '+ic("arrowR")+'</span>'+
        '</button>'+
      '</div>'+
      '<div class="reveal'+(herk?" open":"")+'" id="levelReveal"><div><div class="levels">'+
          '<button class="level'+(modeCfg.level==="basis"?" on":"")+'" data-level="basis">'+
            '<span class="lic">'+ic("sprout")+'</span><span><b>Focus op de basis</b><small>Makkelijker: hints, een 50/50-hulp en automatisch extra uitleg na elk antwoord.</small></span></button>'+
          '<button class="level'+(modeCfg.level==="uitdagend"?" on":"")+'" data-level="uitdagend">'+
            '<span class="lic">'+ic("target")+'</span><span><b>Uitdagend niveau</b><small>Geen hulpmiddelen, wel de warme feedback. Test of je het echt zelf kunt.</small></span></button>'+
        '</div></div></div>';

    var n = D.mcq.filter(notKnown).length, done=D.mcq.length-n;
    var practiceHTML =
      '<div class="seclabel" id="practiceAnchor">'+ic("rocket")+'Waarmee wil je oefenen?<span class="sub">'+modeLabel()+'</span></div>'+
      '<div class="grid g2">'+
        modeCard("quiz","book","Oefenexamen","Meerkeuzevragen met directe feedback. Kies je hoofdstukken.")+
        modeCard("flash","layers","Oude examenvragen","Echte reconstructievragen uit examens — nu als meerkeuze.")+
      '</div>'+
      '<div class="grid g2" style="margin-top:14px">'+
        '<button class="mode js-enter" id="examSimBtn"><span class="me">'+ic("timer")+'</span><b>Examen-simulatie</b><small>40 willekeurige vragen uit alle hoofdstukken, in één sessie.</small></button>'+
        '<button class="mode js-enter" id="notKnownBtn"'+(n?"":' disabled')+'><span class="me">'+ic("target")+'</span><b>Vragen die je nog niet kent</b><small>'+(n? n+' vragen nog te leren · '+done+' al beheerst.':'Top! Je hebt alle vragen al eens juist beantwoord. 🎉')+'</small></button>'+
      '</div>';

    var html =
      '<div class="hero js-enter">'+
        '<div class="count"><b>'+(dl<0?"–":dl)+'</b><span>'+(dl===1?"dag te gaan":(dl<0?"examen voorbij":"dagen te gaan"))+'</span></div>'+
        '<div class="herotext"><h1>Klaar voor je examen? 💪</h1>'+
        '<p>'+D.mcq.length+' meerkeuzevragen · '+D.reco.length+' oude-examenvragen · '+chapters.length+' hoofdstukken</p>'+
        '<p class="muted" style="margin-top:6px;font-size:13px">Examendatum: <input type="date" id="examInp" value="'+ymd(examDate())+'"></p>'+
        '</div>'+
      '</div>'+
      '<p class="visits">'+ic("sparkles")+'<span><b id="counterVal" style="color:var(--accent-ink)"><span class="skel"></span></b> mensen hebben deze tool al gebruikt</span></p>'+

      '<div class="seclabel">'+ic("sparkles")+'Kies je manier van oefenen</div>'+
      trackHTML+
      practiceHTML+

      '<div class="card pad js-enter" style="margin-top:22px">'+
        '<div class="row" style="justify-content:space-between"><b>Jouw voortgang</b>'+
          '<button class="iconbtn" id="resetBtn">'+ic("refresh")+'<span>Reset</span></button></div>'+
        '<p class="muted" style="font-size:13px;margin:9px 0 6px">Meerkeuze: '+answeredQ+'/'+D.mcq.length+' vragen geoefend · '+pct(corr,seen)+'% juist · Oude examenvragen gekend: '+knownF+'/'+D.reco.length+'</p>'+
        chapterBars()+
      '</div>';
    setHTML(html);

    document.getElementById("examInp").onchange=function(e){ save("mbg_exam", e.target.value); renderHome(); };
    document.getElementById("resetBtn").onclick=function(){ if(confirm("Alle voortgang wissen?")){ prog={}; flash={}; save("mbg_prog",prog); save("mbg_flash",flash); renderHome(); } };
    Array.prototype.slice.call(document.querySelectorAll(".track")).forEach(function(el){
      el.onclick=function(){ var t=el.dataset.track; setTrack(t); updateModeUI(t==="herkansing"?"#levelReveal":"#practiceAnchor", el); }; });
    Array.prototype.slice.call(document.querySelectorAll(".level")).forEach(function(el){
      el.onclick=function(){ setLevel(el.dataset.level); updateModeUI("#practiceAnchor", el); }; });
    Array.prototype.slice.call(document.querySelectorAll("[data-mode]")).forEach(function(el){ el.onclick=function(){ go(el.dataset.mode); }; });
    var es=document.getElementById("examSimBtn"); if(es) es.onclick=function(){ startExamSim(); };
    var wb=document.getElementById("notKnownBtn"); if(wb && !wb.disabled) wb.onclick=function(){ startNotKnown(); };
    fetchCounter();
  }
  function fetchCounter(){
    var e0=document.getElementById("counterVal");
    if(window._mbgCount!=null){ if(e0) e0.textContent=window._mbgCount; return; }
    if(window._mbgCountBusy) return; window._mbgCountBusy=true;
    var counted=load("mbg_counted",false);
    var u="https://abacus.jasoncameron.dev/"+(counted?"get":"hit")+"/berat-mbg/gebruikers";
    fetch(u).then(function(r){return r.json();}).then(function(d){
      if(!counted) save("mbg_counted",true);
      window._mbgCount=d.value; window._mbgCountBusy=false;
      var e=document.getElementById("counterVal"); if(e) e.textContent=d.value;
    }).catch(function(){ window._mbgCountBusy=false; var e=document.getElementById("counterVal"); if(e) e.textContent="–"; });
  }
  function modeCard(view,icn,t,s){ return '<button class="mode js-enter" data-mode="'+view+'"><span class="me">'+ic(icn)+'</span><b>'+t+'</b><small>'+s+'</small></button>'; }
  function notKnown(q){ var p=prog[q.id]; return !p || p.correct===0; }

  function chapterBars(){
    var out="";
    chapters.forEach(function(c){
      var qs=D.mcq.filter(function(q){return q.ch===c.ch;});
      var seen=0,corr=0; qs.forEach(function(q){var p=prog[q.id]; if(p){seen+=p.seen;corr+=p.correct;}});
      var p = seen?pct(corr,seen):0;
      var col=seen?(p>=70?"var(--good)":p>=40?"var(--amber)":"var(--bad)"):"var(--line)";
      out+='<div class="barrow"><span class="muted">H'+c.ch+'</span><div class="bar"><i data-w="'+(seen?p:0)+'" style="background:'+col+'"></i></div><span class="muted">'+(seen?p+"%":"–")+'</span></div>';
    });
    return out;
  }
  function ymd(d){ var m=("0"+(d.getMonth()+1)).slice(-2),day=("0"+d.getDate()).slice(-2); return d.getFullYear()+"-"+m+"-"+day; }

  function modeBanner(){
    var herk=modeCfg.track==="herkansing";
    return '<div class="modebanner'+(herk?" v":"")+'">'+ic(herk?"sprout":"book")+'<span>'+modeLabel()+'</span>'+
      '<a id="changeModeLink">wijzig</a></div>';
  }
  function bindBanner(){ var l=document.getElementById("changeModeLink"); if(l) l.onclick=function(){ go("home"); }; }

  // =================== QUIZ (MCQ) ===================
  function renderQuizGate(){
    if(state.quiz){ return renderQuiz(); }
    var sel = state._quizSel || {chs:{}, count:20, shuffle:true};
    state._quizSel = sel;
    var html=modeBanner()+'<div class="card pad js-enter"><h2 style="margin-top:0">Oefenexamen — meerkeuze</h2>'+
      '<p class="muted">Kies de hoofdstukken die je wil oefenen. Je krijgt na elk antwoord meteen feedback.</p>'+
      '<label class="fld">Hoofdstukken</label>'+
      '<div class="row" style="margin-bottom:8px"><button class="chip sm" id="allCh">Alle</button><button class="chip sm" id="noCh">Geen</button></div>'+
      '<div class="chips" id="chChips">'+chapters.map(function(c){
          return '<button class="chip'+(sel.chs[c.ch]?" on":"")+'" data-ch="'+c.ch+'">H'+c.ch+' · '+esc(c.title)+'</button>';
        }).join("")+'</div>'+
      '<label class="fld">Aantal vragen</label>'+
      '<div class="chips" id="cnt">'+[10,20,30,50,999].map(function(n){
          return '<button class="chip'+(sel.count===n?" on":"")+'" data-n="'+n+'">'+(n===999?"Alle":n)+'</button>';
        }).join("")+'</div>'+
      '<label class="fld"><input type="checkbox" id="shuf" '+(sel.shuffle?"checked":"")+'> Vragen in willekeurige volgorde</label>'+
      '<div class="row" style="margin-top:18px"><button class="btn" id="startQ">Start oefenexamen '+ic("arrowR")+'</button>'+
        '<span class="muted" id="poolN"></span></div>'+
    '</div>';
    setHTML(html); bindBanner();

    function pool(){ var chs=Object.keys(sel.chs).filter(function(k){return sel.chs[k];}).map(Number);
      return D.mcq.filter(function(q){ return chs.length===0?false:chs.indexOf(q.ch)>=0; }); }
    function refreshPool(){ var n=pool().length; document.getElementById("poolN").textContent=n+" vragen beschikbaar"; document.getElementById("startQ").disabled=n===0; }
    Array.prototype.slice.call(document.querySelectorAll("#chChips .chip")).forEach(function(b){
      b.onclick=function(){ var c=+b.dataset.ch; sel.chs[c]=!sel.chs[c]; b.classList.toggle("on"); refreshPool(); }; });
    document.getElementById("allCh").onclick=function(){ chapters.forEach(function(c){sel.chs[c.ch]=true;}); renderQuizGate(); };
    document.getElementById("noCh").onclick=function(){ sel.chs={}; renderQuizGate(); };
    Array.prototype.slice.call(document.querySelectorAll("#cnt .chip")).forEach(function(b){ b.onclick=function(){ sel.count=+b.dataset.n; renderQuizGate(); }; });
    document.getElementById("shuf").onchange=function(e){ sel.shuffle=e.target.checked; };
    document.getElementById("startQ").onclick=function(){ var p=pool(); if(sel.shuffle) p=shuffle(p); if(sel.count<p.length) p=p.slice(0,sel.count); startQuiz(p,"Oefenexamen"); };
    refreshPool();
  }

  function startQuiz(pool,label){
    state.quiz = { label:label, items:pool.map(prepMCQ), idx:0, answered:false, picked:null, correct:0, wrong:[], done:false };
    renderQuiz();
  }
  function prepMCQ(q){
    var dep = q.options.some(function(o){ return /bovenstaande/i.test(o.text) || /zowel\s+[a-e]\s+als\s+[a-e]/i.test(o.text); });
    return { q:q, opts: dep ? q.options.slice() : shuffle(q.options), aid:false, fiftyDone:false };
  }
  function startExamSim(){ var p=shuffle(D.mcq.slice()).slice(0,40); startQuiz(p,"Examen-simulatie"); go("quiz"); }
  function startNotKnown(){ var p=shuffle(D.mcq.filter(notKnown)); startQuiz(p,"Nog te leren"); go("quiz"); }

  function renderQuiz(){
    var Q=state.quiz;
    if(Q.done) return renderQuizResult();
    var cur=Q.items[Q.idx]; var q=cur.q; var F=flags();
    var aidsHTML = (F.hints) ?
      '<div class="aids" id="aids">'+
        '<button class="aidbtn" id="hintBtn">'+ic("bulb")+'Hint</button>'+
        '<button class="aidbtn" id="fiftyBtn">'+ic("scissors")+'50 / 50</button>'+
      '</div>' : '';
    var html=modeBanner()+'<div class="card pad js-enter">'+
      '<div class="runtop"><span class="pill">'+esc(Q.label)+'</span>'+
        '<div class="bar"><i data-w="'+pct(Q.idx,Q.items.length)+'"></i></div>'+
        '<span>'+(Q.idx+1)+'/'+Q.items.length+'</span></div>'+
      '<div class="muted" style="font-size:12px">Hoofdstuk '+q.ch+' · '+esc(titleOf[q.ch]||"")+'</div>'+
      '<div class="qtext">'+esc(q.question)+'</div>'+
      aidsHTML+
      '<div id="hintHolder"></div>'+
      '<div id="opts">'+cur.opts.map(function(o,i){
          return '<button class="opt" data-i="'+i+'"><span class="k">'+String.fromCharCode(65+i)+'</span><span>'+esc(o.text)+'</span></button>';
        }).join("")+'</div>'+
      '<div id="fb"></div>'+
      '<div class="row" style="justify-content:space-between;margin-top:6px">'+
        '<span class="muted" style="font-size:12px">Toets <span class="kbd">A–E</span> om te kiezen · <span class="kbd">Enter</span> = volgende</span>'+
        '<button class="btn hide" id="nextBtn">Volgende '+ic("arrowR")+'</button></div>'+
    '</div>';
    setHTML(html); bindBanner();

    var optBtns=Array.prototype.slice.call(document.querySelectorAll("#opts .opt"));
    optBtns.forEach(function(b){ b.onclick=function(){ pick(+b.dataset.i); }; });
    var nb=document.getElementById("nextBtn"); nb.onclick=next;

    if(F.hints){
      var hb=document.getElementById("hintBtn"), fb2=document.getElementById("fiftyBtn");
      if(cur.aid) hb.disabled=true;
      if(cur.fiftyDone) fb2.disabled=true;
      hb.onclick=function(){
        cur.aid=true; hb.disabled=true;
        var w=whyPoints(q.ch,q.question,q.answerText);
        var tipTxt=(w&&w.points.length)? w.points[0] : "Denk aan de kern van dit hoofdstuk.";
        document.getElementById("hintHolder").innerHTML='<div class="hintbox"><b>Hint·</b> '+esc(tipTxt)+'</div>';
      };
      fb2.onclick=function(){
        cur.fiftyDone=true; fb2.disabled=true;
        // verberg 2 foute opties (50/50-hulp)
        var toHide=shuffle(cur.opts.map(function(o,i){return {o:o,i:i};}).filter(function(x){return x.o.letter!==q.answer;})).slice(0,2);
        toHide.forEach(function(x){ optBtns[x.i].classList.add("dim"); });
      };
    }

    function showAnswered(i){
      var correct = cur.opts[i].letter===q.answer;
      optBtns.forEach(function(b){ var o=cur.opts[+b.dataset.i]; b.disabled=true; b.classList.remove("dim");
        if(o.letter===q.answer) b.classList.add("correct"); else if(+b.dataset.i===i) b.classList.add("wrong"); });
      var aids=document.getElementById("aids"); if(aids) aids.classList.add("hide");
      var fb=document.getElementById("fb");
      if(correct){ fb.className="feedback ok"; fb.innerHTML="<b>"+rnd(PRAISE)+" ✓</b>"; }
      else { fb.className="feedback no"; fb.innerHTML="<b>"+rnd(WARM)+"</b><span class=\"sub\">Juiste antwoord: "+esc(q.answerText)+"</span>"; }
      // Waarom-knop
      var why=document.createElement("div"); why.style.marginTop="2px";
      why.innerHTML='<button class="whybtn" id="whyBtn">'+ic("help")+'Waarom?</button><div id="whyHolder"></div>';
      fb.appendChild(why);
      var wbtn=document.getElementById("whyBtn"), wholder=document.getElementById("whyHolder");
      function openWhy(){ wholder.innerHTML=whyHTML(q.ch,q.question,q.answerText); wbtn.classList.add("hide"); bindWhy(wholder); }
      wbtn.onclick=openWhy;
      if(flags().autoWhy) openWhy();
      nb.classList.remove("hide");
      nb.innerHTML=(Q.idx+1>=Q.items.length)?"Bekijk resultaat "+ic("arrowR"):"Volgende "+ic("arrowR");
    }
    function pick(i){
      if(Q.answered) return; Q.answered=true; Q.picked=i;
      var correct = cur.opts[i].letter===q.answer;
      if(correct){ Q.correct++; } else { Q.wrong.push(q); }
      var p=prog[q.id]||{seen:0,correct:0}; p.seen++; if(correct)p.correct++; prog[q.id]=p; save("mbg_prog",prog);
      showAnswered(i); nb.focus();
    }
    function next(){ if(!Q.answered) return; Q.idx++; Q.answered=false; Q.picked=null; if(Q.idx>=Q.items.length){ Q.done=true; } renderQuiz(); }

    state._key=function(e){
      if(!Q.answered){ var k=e.key.toLowerCase(); var idx="abcde".indexOf(k); if(idx<0 && /[1-5]/.test(k)) idx=+k-1;
        if(idx>=0 && idx<cur.opts.length && !optBtns[idx].classList.contains("dim")){ pick(idx); e.preventDefault(); } }
      else if(e.key==="Enter"||e.key===" "){ next(); e.preventDefault(); }
    };
    if(Q.answered) showAnswered(Q.picked);
  }

  function ringSVG(p){
    var r=54, c=2*Math.PI*r, off=c*(1-p/100);
    var col=p>=70?"var(--good)":p>=40?"var(--amber)":"var(--bad)";
    return '<svg class="ring" viewBox="0 0 128 128"><circle class="track-c" cx="64" cy="64" r="'+r+'" fill="none" stroke-width="11"/>'+
      '<circle class="val-c" cx="64" cy="64" r="'+r+'" fill="none" stroke-width="11" stroke="'+col+'" stroke-dasharray="'+c+'" stroke-dashoffset="'+c+'" transform="rotate(-90 64 64)" data-off="'+off+'"/>'+
      '<text x="64" y="72" text-anchor="middle" font-family="Georgia,serif" font-size="30" fill="var(--ink)">'+p+'%</text></svg>';
  }
  function animateRing(){ var c=app.querySelector(".val-c[data-off]"); if(c){ requestAnimationFrame(function(){ c.style.strokeDashoffset=c.getAttribute("data-off"); }); } }

  function renderQuizResult(){
    var Q=state.quiz; var p=pct(Q.correct,Q.items.length);
    var msg = p>=80?"Sterk werk! 🎉": p>=60?"Goed bezig 👍":"Blijf oefenen — je komt er 💪";
    var byCh={}; Q.wrong.forEach(function(q){byCh[q.ch]=(byCh[q.ch]||0)+1;});
    var weakList=Object.keys(byCh).sort(function(a,b){return byCh[b]-byCh[a];}).slice(0,5)
      .map(function(c){return '<span class="pill amber" style="margin:3px">H'+c+': '+byCh[c]+' fout</span>';}).join(" ");
    var html='<div class="card pad results center js-enter">'+
      '<span class="pill">'+esc(Q.label)+'</span>'+
      ringSVG(p)+
      '<p style="margin:0 0 4px;font-weight:600;font-size:17px">'+msg+'</p>'+
      '<p class="muted">'+Q.correct+' van '+Q.items.length+' juist</p>'+
      (weakList? '<div style="margin:14px 0">'+weakList+'</div>':'')+
      '<div class="row" style="justify-content:center;margin-top:14px">'+
        (Q.wrong.length? '<button class="btn" id="retryWrong">Herhaal '+Q.wrong.length+' foute vragen</button>':'')+
        '<button class="btn ghost" id="again">Nieuw oefenexamen</button>'+
        '<button class="btn ghost" id="homeBtn">Naar start</button>'+
      '</div></div>';
    setHTML(html); animateRing();
    var rw=document.getElementById("retryWrong"); if(rw) rw.onclick=function(){ startQuiz(shuffle(Q.wrong),"Foute vragen"); };
    document.getElementById("again").onclick=function(){ state.quiz=null; renderQuizGate(); };
    document.getElementById("homeBtn").onclick=function(){ state.quiz=null; go("home"); };
    state._key=null;
  }

  // =================== OUDE EXAMENVRAGEN (reco) ===================
  function renderFlashGate(){
    if(state.flash) return renderFlash();
    var sel = state._flashSel || {chs:{}, shuffle:true, onlyUnknown:false};
    state._flashSel=sel;
    var html=modeBanner()+'<div class="card pad js-enter"><h2 style="margin-top:0">Oude examenvragen</h2>'+
      '<p class="muted">Echte reconstructievragen uit oude examens — nu als meerkeuze. Kies het juiste antwoord; je krijgt meteen feedback.</p>'+
      '<label class="fld">Hoofdstukken</label>'+
      '<div class="row" style="margin-bottom:8px"><button class="chip sm" id="allCh">Alle</button><button class="chip sm" id="noCh">Geen</button></div>'+
      '<div class="chips" id="chChips">'+chapters.map(function(c){
        var n=D.reco.filter(function(q){return q.ch===c.ch;}).length;
        return '<button class="chip'+(sel.chs[c.ch]?" on":"")+'" data-ch="'+c.ch+'">H'+c.ch+' · '+esc(c.title)+' ('+n+')</button>';
      }).join("")+'</div>'+
      '<label class="fld"><input type="checkbox" id="shuf" '+(sel.shuffle?"checked":"")+'> Willekeurige volgorde</label>'+
      '<label class="fld"><input type="checkbox" id="onlyU" '+(sel.onlyUnknown?"checked":"")+'> Alleen vragen die ik nog niet ken</label>'+
      '<div class="row" style="margin-top:18px"><button class="btn" id="startF">Start '+ic("arrowR")+'</button><span class="muted" id="poolN"></span></div>'+
    '</div>';
    setHTML(html); bindBanner();
    function pool(){ var chs=Object.keys(sel.chs).filter(function(k){return sel.chs[k];}).map(Number);
      return D.reco.filter(function(q){ if(chs.length===0)return false; if(chs.indexOf(q.ch)<0)return false; if(sel.onlyUnknown && flash[q.id]==="known") return false; return true; }); }
    function refresh(){ var n=pool().length; document.getElementById("poolN").textContent=n+" vragen"; document.getElementById("startF").disabled=n===0; }
    Array.prototype.slice.call(document.querySelectorAll("#chChips .chip")).forEach(function(b){
      b.onclick=function(){ var c=+b.dataset.ch; sel.chs[c]=!sel.chs[c]; b.classList.toggle("on"); refresh(); }; });
    document.getElementById("allCh").onclick=function(){ chapters.forEach(function(c){sel.chs[c.ch]=true;}); renderFlashGate(); };
    document.getElementById("noCh").onclick=function(){ sel.chs={}; renderFlashGate(); };
    document.getElementById("shuf").onchange=function(e){ sel.shuffle=e.target.checked; };
    document.getElementById("onlyU").onchange=function(e){ sel.onlyUnknown=e.target.checked; refresh(); };
    document.getElementById("startF").onclick=function(){ var p=pool(); if(sel.shuffle)p=shuffle(p); startFlash(p); };
    refresh();
  }

  function startFlash(pool){ state.flash={items:pool.map(function(q){return {q:q,opts:recoOptions(q),fiftyDone:false,aid:false};}),idx:0,answered:false,picked:-1,correct:0,wrong:0,done:false}; renderFlash(); }

  function renderFlash(){
    var F=state.flash;
    if(F.done) return renderFlashResult();
    var cur=F.items[F.idx], q=cur.q; var FL=flags();
    var aidsHTML = (FL.hints) ?
      '<div class="aids" id="aids"><button class="aidbtn" id="fiftyBtn">'+ic("scissors")+'50 / 50</button></div>' : '';
    var html=modeBanner()+'<div class="card pad js-enter">'+
      '<div class="runtop"><span class="pill">H'+q.ch+' · '+esc(titleOf[q.ch]||"")+'</span>'+
        '<div class="bar"><i data-w="'+pct(F.idx,F.items.length)+'"></i></div>'+
        '<span>'+(F.idx+1)+'/'+F.items.length+'</span></div>'+
      '<div class="muted" style="font-size:12px">Oude examenvraag</div>'+
      '<div class="qtext">'+esc(q.question)+'</div>'+
      aidsHTML+
      '<div id="opts">'+cur.opts.map(function(o,i){return '<button class="opt" data-i="'+i+'"><span class="k">'+String.fromCharCode(65+i)+'</span><span>'+esc(o.text)+'</span></button>';}).join("")+'</div>'+
      '<div id="fb"></div>'+
      '<div class="row" style="justify-content:flex-end;margin-top:4px"><button class="btn hide" id="nextBtn">Volgende '+ic("arrowR")+'</button></div>'+
    '</div>';
    setHTML(html); bindBanner();
    var optBtns=Array.prototype.slice.call(document.querySelectorAll("#opts .opt"));
    if(FL.hints){ var fb2=document.getElementById("fiftyBtn"); if(cur.fiftyDone) fb2.disabled=true;
      fb2.onclick=function(){ cur.fiftyDone=true; fb2.disabled=true;
        var toHide=shuffle(cur.opts.map(function(o,i){return {o:o,i:i};}).filter(function(x){return !x.o.ok;})).slice(0,2);
        toHide.forEach(function(x){ optBtns[x.i].classList.add("dim"); }); }; }
    function showAnswered(i){
      optBtns.forEach(function(b){ var bi=+b.dataset.i; b.disabled=true; b.classList.remove("dim"); if(cur.opts[bi].ok)b.classList.add("correct"); else if(bi===i)b.classList.add("wrong"); });
      var aids=document.getElementById("aids"); if(aids) aids.classList.add("hide");
      var ok=cur.opts[i].ok; var fb=document.getElementById("fb"); fb.className="feedback "+(ok?"ok":"no");
      fb.innerHTML=ok?"<b>"+rnd(PRAISE)+" ✓</b>":"<b>"+rnd(WARM)+"</b><span class=\"sub\">Juiste antwoord: "+esc(q.answer)+"</span>";
      var why=document.createElement("div"); why.innerHTML='<button class="whybtn" id="whyBtn">'+ic("help")+'Waarom?</button><div id="whyHolder"></div>'; fb.appendChild(why);
      var wbtn=document.getElementById("whyBtn"), wholder=document.getElementById("whyHolder");
      function openWhy(){ wholder.innerHTML=whyHTML(q.ch,q.question,q.answer); wbtn.classList.add("hide"); bindWhy(wholder); }
      wbtn.onclick=openWhy; if(flags().autoWhy) openWhy();
      var nb=document.getElementById("nextBtn"); nb.classList.remove("hide"); nb.innerHTML=(F.idx+1>=F.items.length)?"Bekijk resultaat "+ic("arrowR"):"Volgende "+ic("arrowR");
    }
    function pick(i){ if(F.answered) return; F.answered=true; F.picked=i; var ok=cur.opts[i].ok;
      if(ok){ F.correct++; flash[q.id]="known"; } else { F.wrong++; flash[q.id]="unknown"; } save("mbg_flash",flash);
      showAnswered(i); document.getElementById("nextBtn").focus(); }
    optBtns.forEach(function(b){ b.onclick=function(){ pick(+b.dataset.i); }; });
    document.getElementById("nextBtn").onclick=function(){ if(!F.answered)return; F.idx++; F.answered=false; F.picked=-1; if(F.idx>=F.items.length)F.done=true; renderFlash(); };
    if(F.answered) showAnswered(F.picked);
    state._key=function(e){
      if(!F.answered){ var k=e.key.toLowerCase(); var idx="abcde".indexOf(k); if(idx<0 && /[1-5]/.test(k)) idx=+k-1; if(idx>=0 && idx<cur.opts.length && !optBtns[idx].classList.contains("dim")){ pick(idx); e.preventDefault(); } }
      else if(e.key==="Enter"||e.key===" "){ document.getElementById("nextBtn").click(); e.preventDefault(); }
    };
  }
  function renderFlashResult(){
    var F=state.flash; var p=pct(F.correct,F.items.length);
    var msg=p>=80?"Sterk! 🎉":p>=60?"Goed bezig 👍":"Blijf oefenen 💪";
    var html='<div class="card pad results center js-enter"><span class="pill">Oude examenvragen</span>'+
      ringSVG(p)+'<p style="font-weight:600;margin:0 0 4px;font-size:17px">'+msg+'</p><p class="muted">'+F.correct+' juist · '+F.wrong+' fout</p>'+
      '<div class="row" style="justify-content:center;margin-top:14px">'+
        '<button class="btn ghost" id="again">Nieuwe set</button><button class="btn ghost" id="home">Naar start</button></div></div>';
    setHTML(html); animateRing();
    document.getElementById("again").onclick=function(){ state.flash=null; renderFlashGate(); };
    document.getElementById("home").onclick=function(){ state.flash=null; go("home"); };
    state._key=null;
  }

  // =================== STUDIE-HACKS ===================
  function renderHacks(){
    var tips=HACKS.tips.map(function(t){ return '<div class="tip js-enter"><h4>'+ic("bulb")+esc(t.h)+'</h4><p>'+esc(t.t)+'</p></div>'; }).join("");
    var accs=HACKS.chapters.map(function(c){
      return '<details class="acc hack"><summary><span class="n">'+c.ch+'</span>'+esc(c.title)+ic("chevR","caret")+'</summary>'+
        '<div class="body"><ul>'+c.items.map(function(it){return '<li>'+esc(it)+'</li>';}).join("")+'</ul></div></details>';
    }).join("");
    var html='<div class="card pad js-enter" style="margin-bottom:16px"><h2 style="margin:0 0 6px">Studie-hacks</h2>'+
      '<p class="muted" style="margin:0">Slimme manieren om te leren + ezelsbruggetjes per hoofdstuk. Lees ze door vóór je oefent, en kom terug als iets niet blijft plakken.</p></div>'+
      '<div class="seclabel">'+ic("rocket")+'Zo leer je het slimst</div>'+
      '<div class="tipgrid">'+tips+'</div>'+
      '<div class="seclabel">'+ic("bulb")+'Ezelsbruggetjes per hoofdstuk</div>'+
      accs;
    setHTML(html);
  }

  // =================== SAMENVATTING ===================
  function renderSummary(){
    var q = state._sumq||"";
    var html='<div class="card pad js-enter" style="margin-bottom:14px"><h2 style="margin:0 0 8px">Samenvatting per hoofdstuk</h2>'+
      '<input type="search" id="sumSearch" placeholder="Zoek een begrip… (bv. osmose, insuline, telomeren)" value="'+esc(q)+'" style="width:100%">'+
      '<div class="row" style="margin-top:10px"><button class="chip sm" id="openAll">Alles openen</button><button class="chip sm" id="closeAll">Alles sluiten</button></div></div>'+
      '<div id="sumList">'+sumList(q)+'</div>';
    setHTML(html);
    var si=document.getElementById("sumSearch");
    si.oninput=function(){ state._sumq=si.value; document.getElementById("sumList").innerHTML=sumList(si.value); si.focus(); };
    document.getElementById("openAll").onclick=function(){ Array.prototype.slice.call(document.querySelectorAll(".acc")).forEach(function(d){d.open=true;}); };
    document.getElementById("closeAll").onclick=function(){ Array.prototype.slice.call(document.querySelectorAll(".acc")).forEach(function(d){d.open=false;}); };
    // scroll naar hoofdstuk indien geopend via "Waarom?"
    if(state._sumOpen){ var tgt=document.querySelector('.acc[data-ch="'+state._sumOpen+'"]'); if(tgt){ tgt.open=true; tgt.scrollIntoView({behavior:"smooth",block:"start"}); } state._sumOpen=null; }
  }
  function sumList(query){
    var Q=query.trim().toLowerCase(); var out="";
    SUM.forEach(function(ch){
      var secHtml="", hit=false;
      ch.sections.forEach(function(s){
        var items=s.items.filter(function(it){ return !Q || it.toLowerCase().indexOf(Q)>=0 || s.h.toLowerCase().indexOf(Q)>=0 || ch.title.toLowerCase().indexOf(Q)>=0; });
        if(items.length){ hit=true; secHtml+='<h4>'+esc(s.h)+'</h4><ul>'+items.map(function(it){return '<li>'+hl(esc(it),Q)+'</li>';}).join("")+'</ul>'; }
      });
      if(!hit) return;
      var open = Q? " open":"";
      out+='<details class="acc" data-ch="'+ch.ch+'"'+open+'><summary><span class="n">'+ch.ch+'</span>'+esc(ch.title)+ic("chevR","caret")+'</summary><div class="body">'+secHtml+'</div></details>';
    });
    return out || '<p class="muted center">Geen resultaten voor "'+esc(query)+'".</p>';
  }
  function hl(text,q){ if(!q) return text; try{ var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"); return text.replace(re,"<mark>$1</mark>"); }catch(e){ return text; } }

  // ---------- FEEDBACK ----------
  function renderFeedback(){
    var sel = "Fout in een vraag";
    var ta = 'width:100%;margin-top:2px';
    var html='<div class="card pad js-enter"><h2 style="margin-top:0">Feedback &amp; klachten</h2>'+
      '<p class="muted">Zie je een fout in een vraag, heb je een idee, of werkt iets niet? Laat het hier weten — het komt rechtstreeks bij de maker terecht en wordt gefixt.</p>'+
      '<label class="fld">Soort melding</label>'+
      '<div class="chips" id="fbType">'+["Fout in een vraag","Idee / verbetering","Werkt niet","Andere"].map(function(t,i){return '<button type="button" class="chip'+(i===0?" on":"")+'" data-t="'+esc(t)+'">'+t+'</button>';}).join("")+'</div>'+
      '<label class="fld" for="fbWaar">Over welk hoofdstuk / welke vraag? <span class="muted">(optioneel)</span></label>'+
      '<input type="text" id="fbWaar" placeholder="bv. Hoofdstuk 6, vraag over bloedarmoede" style="'+ta+'">'+
      '<label class="fld" for="fbMsg">Je bericht</label>'+
      '<textarea id="fbMsg" rows="5" placeholder="Beschrijf de fout of je idee…" style="'+ta+'"></textarea>'+
      '<label class="fld" for="fbNaam">Je naam <span class="muted">(optioneel)</span></label>'+
      '<input type="text" id="fbNaam" placeholder="zodat we je kunnen bedanken" style="'+ta+'">'+
      '<label class="fld" for="fbEmail">Je e-mail <span class="muted">(optioneel — als je een antwoord wilt)</span></label>'+
      '<input type="email" id="fbEmail" placeholder="naam@voorbeeld.be" style="'+ta+'">'+
      '<input type="text" id="fbBot" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;opacity:0">'+
      '<div class="row" style="margin-top:16px;align-items:center"><button class="btn" id="fbSend">'+ic("send")+'Versturen</button><span id="fbStatus" style="font-size:13px"></span></div>'+
      '</div>';
    setHTML(html);
    [].slice.call(document.querySelectorAll("#fbType .chip")).forEach(function(b){ b.onclick=function(){ sel=b.dataset.t; [].slice.call(document.querySelectorAll("#fbType .chip")).forEach(function(x){x.classList.toggle("on",x===b);}); }; });
    document.getElementById("fbSend").onclick=function(){
      var status=document.getElementById("fbStatus");
      if(document.getElementById("fbBot").value){ return; }
      var msg=document.getElementById("fbMsg").value.trim();
      if(!msg){ status.style.color="var(--bad)"; status.textContent="Schrijf eerst een bericht."; return; }
      var btn=document.getElementById("fbSend"); btn.disabled=true; status.style.color="var(--muted)"; status.textContent="Versturen…";
      var em=document.getElementById("fbEmail").value.trim();
      var payload={ access_key:"cbaac6dd-7382-4c16-9463-97d63d712fcf", subject:"MBG-tool: "+sel, from_name:"MBG oefentool",
        soort:sel, hoofdstuk_of_vraag:document.getElementById("fbWaar").value||"-", naam:document.getElementById("fbNaam").value||"-", email:em||"-", bericht:msg };
      if(em) payload.replyto=em;
      fetch("https://api.web3forms.com/submit",{method:"POST",headers:{"Content-Type":"application/json",Accept:"application/json"},body:JSON.stringify(payload)})
        .then(function(r){return r.json();}).then(function(d){
          if(d && d.success){ setHTML('<div class="card pad results center js-enter"><div style="font-size:42px">✅</div><h2 style="margin:6px 0">Bedankt!</h2><p class="muted">Je melding is verstuurd. We bekijken het en fixen het.</p><button class="btn" id="fbBack" style="margin-top:8px">Terug naar start</button></div>'); document.getElementById("fbBack").onclick=function(){ go("home"); }; }
          else { btn.disabled=false; status.style.color="var(--bad)"; status.textContent="Versturen mislukt — probeer het later opnieuw."; }
        }).catch(function(){ btn.disabled=false; status.style.color="var(--bad)"; status.textContent="Geen verbinding — probeer het later opnieuw."; });
    };
  }

  // global key listener
  document.addEventListener("keydown",function(e){ if(state._key) state._key(e); });

  render();
})();
</script>
<footer class="wrap" style="padding-top:0">Gemaakt om te oefenen voor het MBG-examen · alle vragen komen uit het lesmateriaal · veel succes!</footer>
