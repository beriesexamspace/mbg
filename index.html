<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f6e6a" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>MBG — Berie’s exam space</title>
<style>
  :root{
    --bg:#f4f2ee; --bg2:#ebe8e2; --card:#ffffff; --ink:#1b232c; --muted:#5d6873;
    --line:#e2ddd4; --accent:#0f6e6a; --accent-ink:#0b4f4c; --accent-soft:#dcefed;
    --amber:#c9821f; --amber-soft:#f7ecd9;
    --good:#1f8a4c; --good-soft:#e2f3e8; --bad:#c23b54; --bad-soft:#fbe5ea;
    --violet:#6d5bd0; --violet-soft:#e9e6fa;
    --shadow:0 1px 2px rgba(20,30,40,.05),0 6px 18px rgba(20,30,40,.05);
    --shadow-lg:0 2px 6px rgba(20,30,40,.06),0 18px 40px rgba(20,30,40,.10);
    --r:14px; --r-lg:20px;
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  html[data-theme="dark"]{
    --bg:#11151a; --bg2:#161b22; --card:#1b222b; --ink:#e7ecf1; --muted:#9aa6b2;
    --line:#2a323c; --accent:#3fb9b2; --accent-ink:#7fd6d0; --accent-soft:#163230;
    --amber:#e0a64a; --amber-soft:#2e2515;
    --good:#46c178; --good-soft:#16301f; --bad:#ef6b82; --bad-soft:#331620;
    --violet:#a99cf0; --violet-soft:#221d3a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 22px 48px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  h1,h2,h3,.serif{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:880px;margin:0 auto;padding:0 18px 96px}
  a{color:var(--accent-ink)}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:10px;box-shadow:0 0 0 4px var(--accent-soft)}

  /* inline icons */
  .ic{width:1.25em;height:1.25em;flex:none;vertical-align:-.18em;
    stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none}
  .ic-lg{width:24px;height:24px}

  /* top bar */
  header.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);
    border-bottom:1px solid var(--line);box-shadow:inset 0 -1px 0 0 rgba(0,0,0,.04)}
  .topin{max-width:880px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:.1px}
  .logo{width:32px;height:32px;border-radius:10px;
    background:linear-gradient(145deg,var(--accent),var(--accent-ink));color:#fff;
    display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;font-size:16px;flex:none;
    box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.2px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:10px;min-height:38px;padding:7px 11px;font-size:13.5px;display:inline-flex;gap:7px;
    align-items:center;transition:border-color .2s var(--ease),background .2s var(--ease),transform .12s var(--ease)}
  .iconbtn:hover{border-color:var(--accent)}
  .iconbtn:active{transform:scale(.96)}

  /* nav tabs */
  nav.tabs{display:flex;gap:2px;overflow:auto;max-width:880px;margin:0 auto;padding:6px 12px 0;
    scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{border:none;background:none;color:var(--muted);padding:10px 13px;border-radius:9px 9px 0 0;
    font-size:14px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;
    display:inline-flex;align-items:center;gap:6px;transition:color .2s var(--ease)}
  nav.tabs button .ic{width:16px;height:16px}
  nav.tabs button.on{color:var(--accent-ink);border-bottom-color:var(--accent)}
  nav.tabs button:hover{color:var(--ink)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .pad{padding:20px}
  .grid{display:grid;gap:14px}
  @media(min-width:620px){.g2{grid-template-columns:1fr 1fr}}

  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent-ink)}
  .pill .ic{width:14px;height:14px}
  .pill.amber{background:var(--amber-soft);color:var(--amber)}
  .pill.violet{background:var(--violet-soft);color:var(--violet)}

  /* home hero */
  .hero{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin:20px 0 8px}
  .count{flex:none;background:linear-gradient(150deg,var(--accent),var(--accent-ink));color:#fff;
    border-radius:var(--r);padding:14px 20px;text-align:center;min-width:118px;box-shadow:0 8px 20px rgba(15,110,106,.28)}
  .count b{font-family:Georgia,serif;font-size:32px;display:block;line-height:1}
  .count span{font-size:12px;opacity:.92}
  .herotext h1{margin:0 0 4px;font-size:25px}
  .herotext p{margin:0;color:var(--muted)}
  .visits{margin:14px 0 4px;font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .visits .ic{width:16px;height:16px;color:var(--accent-ink)}

  /* section label */
  .seclabel{display:flex;align-items:center;gap:8px;margin:26px 0 12px;font-weight:700;font-size:15px}
  .backlink{display:inline-flex;align-items:center;gap:5px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:6px 0;margin-bottom:4px;transition:color .2s var(--ease)}
  .backlink:hover{color:var(--accent-ink)} .backlink .ic{width:16px;height:16px}
  .toggle{width:48px;height:28px;border-radius:999px;border:none;background:var(--line);position:relative;cursor:pointer;flex:none;transition:background .2s var(--ease)}
  .toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s var(--ease)}
  .toggle.on{background:var(--violet)} .toggle.on .knob{left:23px}
  .warmcard{border-color:var(--violet)!important;background:var(--violet-soft)}
  .warmcard .ic{width:22px;height:22px;color:var(--violet);flex:none}
  html.snappy .js-enter{animation-duration:.12s!important;animation-delay:0ms!important}
  .seclabel .ic{width:18px;height:18px;color:var(--accent-ink)}
  .seclabel .sub{font-weight:500;color:var(--muted);font-size:13px;margin-left:auto}

  /* track cards (two big start buttons) */
  .tracks{display:grid;gap:14px}
  @media(min-width:620px){.tracks{grid-template-columns:1fr 1fr}}
  .track{position:relative;display:flex;flex-direction:column;gap:8px;text-align:left;width:100%;
    border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:20px;
    box-shadow:var(--shadow);transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease);
    overflow:hidden}
  .track:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
  .track:active{transform:translateY(-1px) scale(.995)}
  .track .tile{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;margin-bottom:4px;
    background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 6px 16px rgba(15,110,106,.3)}
  .track.alt .tile{background:linear-gradient(150deg,var(--violet),#4f40a8);box-shadow:0 6px 16px rgba(109,91,208,.32)}
  .track .tile .ic{width:24px;height:24px;stroke-width:1.9}
  .track b{font-size:18px}
  .track small{color:var(--muted);font-size:13.5px;line-height:1.5}
  .track .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);
    font-weight:600;font-size:13.5px}
  .track.alt .go{color:var(--violet)}
  .track .go .ic{width:16px;height:16px;transition:transform .2s var(--ease)}
  .track:hover .go .ic{transform:translateX(3px)}
  .track.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow)}
  .track.alt.on{border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft),var(--shadow)}
  .track .chk{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;
    background:var(--accent);color:#fff;display:grid;place-items:center;opacity:0;transform:scale(.6);
    transition:opacity .2s var(--ease),transform .2s var(--ease)}
  .track.alt .chk{background:var(--violet)}
  .track.on .chk{opacity:1;transform:scale(1)}
  .track .chk .ic{width:15px;height:15px;stroke-width:2.5}

  /* level reveal */
  .reveal{display:none;margin-top:12px}
  .reveal.open{display:block}
  .levels{display:grid;gap:12px}
  @media(min-width:560px){.levels{grid-template-columns:1fr 1fr}}
  .level{display:flex;gap:13px;align-items:flex-start;text-align:left;width:100%;border:1.5px solid var(--line);
    background:var(--card);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);
    transition:transform .18s var(--ease),border-color .18s var(--ease)}
  .level:hover{transform:translateY(-2px);border-color:var(--violet)}
  .level .lic{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
    background:var(--violet-soft);color:var(--violet)}
  .level .lic .ic{width:20px;height:20px}
  .level b{font-size:15px;display:block}
  .level small{color:var(--muted);font-size:13px}
  .level.on{border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft),var(--shadow)}

  /* merk-/vakwissel-strook */
  .brandstrip{display:flex;align-items:center;gap:13px;width:100%;text-decoration:none;color:inherit;
    border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:12px 16px;margin:8px 0 2px;
    box-shadow:var(--shadow);transition:border-color .2s var(--ease),transform .15s var(--ease),box-shadow .2s var(--ease)}
  .brandstrip:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .brandstrip .bs-logo{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;color:#fff;
    font-family:Georgia,serif;font-weight:700;font-size:17px;background:linear-gradient(145deg,var(--accent),var(--accent-ink));
    box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brandstrip .bs-txt{flex:1;min-width:0}
  .brandstrip .bs-txt b{display:block;font-size:14.5px;letter-spacing:.1px}
  .brandstrip .bs-txt small{color:var(--muted);font-size:12.5px}
  .brandstrip .bs-go{color:var(--accent-ink);flex:none;display:inline-flex}
  .brandstrip .bs-go .ic{width:18px;height:18px;transition:transform .2s var(--ease)}
  .brandstrip:hover .bs-go .ic{transform:translateX(3px)}

  /* practice mode cards */
  .mode{display:flex;flex-direction:column;text-align:left;width:100%;border:1px solid var(--line);
    background:var(--card);border-radius:var(--r);padding:17px;gap:7px;box-shadow:var(--shadow);
    transition:transform .2s var(--ease),border-color .2s var(--ease),box-shadow .2s var(--ease)}
  .mode:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .mode:active{transform:translateY(-1px)}
  .mode .me{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
    background:var(--accent-soft);color:var(--accent-ink)}
  .mode .me .ic{width:22px;height:22px}
  .mode b{font-size:16px}
  .mode small{color:var(--muted);font-size:13px}
  .mode:disabled{opacity:.5;filter:grayscale(.3);cursor:default}
  .mode:disabled:hover{transform:none;border-color:var(--line);box-shadow:var(--shadow)}

  /* progress bars */
  .bar{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:var(--accent);border-radius:6px;
    transition:width .8s var(--ease)}
  .barrow{display:grid;grid-template-columns:54px 1fr 46px;gap:10px;align-items:center;margin:7px 0;font-size:13px}

  /* setup controls */
  label.fld{display:block;font-size:13px;font-weight:600;margin:16px 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;
    min-height:38px;padding:7px 13px;font-size:13.5px;transition:all .18s var(--ease)}
  .chip:hover{border-color:var(--accent)}
  .chip:active{transform:scale(.96)}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip.sm{min-height:32px;padding:5px 11px;font-size:12.5px}
  select,input[type=number],input[type=date],input[type=search],input[type=text],input[type=email],textarea{
    font-family:inherit;font-size:15px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);color:var(--ink);transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:11px;min-height:46px;padding:12px 20px;
    font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:8px;justify-content:center;
    box-shadow:0 4px 12px rgba(15,110,106,.25);transition:background .2s var(--ease),transform .12s var(--ease),box-shadow .2s var(--ease)}
  .btn:hover{background:var(--accent-ink)}
  .btn:active{transform:scale(.97)}
  .btn .ic{width:18px;height:18px}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.ghost:hover{border-color:var(--accent)}
  .btn.violet{background:var(--violet);box-shadow:0 4px 12px rgba(109,91,208,.28)}
  .btn.violet:hover{filter:brightness(.95)}
  .btn:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;box-shadow:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* mode banner inside runner */
  .modebanner{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:11px 14px;border-radius:var(--r);
    background:var(--accent-soft);color:var(--accent-ink);font-size:13.5px;font-weight:600}
  .modebanner.v{background:var(--violet-soft);color:var(--violet)}
  .modebanner .ic{width:18px;height:18px}
  .modebanner a,.modebanner .bnlink{margin-left:auto;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;color:inherit;border:none;background:none;font-family:inherit;padding:0}

  /* question runner */
  .runtop{display:flex;align-items:center;gap:12px;margin:2px 0 14px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .runtop .bar{flex:1}
  .qtext{font-size:20px;font-weight:600;margin:8px 0 16px;font-family:Georgia,serif;line-height:1.4}
  .opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--line);
    background:var(--card);color:var(--ink);border-radius:12px;padding:14px 15px;margin-bottom:10px;font-size:15px;
    transition:border-color .15s var(--ease),background .15s var(--ease),transform .12s var(--ease),opacity .25s var(--ease)}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)}
  .opt:active:not(:disabled){transform:scale(.99)}
  .opt .k{flex:none;width:27px;height:27px;border-radius:8px;background:var(--bg2);color:var(--muted);
    display:grid;place-items:center;font-weight:700;font-size:13px;transition:all .15s var(--ease)}
  .opt.correct{border-color:var(--good);background:var(--good-soft)}
  .opt.correct .k{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
  .opt.wrong .k{background:var(--bad);color:#fff}
  .opt.dim{opacity:.4;pointer-events:none}
  .opt.sel{border-color:var(--accent);background:var(--accent-soft)}
  .opt.sel .k{background:var(--accent);color:#fff}
  /* examensimulatie */
  .simtimer{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink);min-width:54px;text-align:right}
  .simtimer.low{color:var(--bad)}
  .tipbox{display:flex;gap:11px;align-items:flex-start;background:var(--amber-soft,color-mix(in srgb,var(--amber) 14%,transparent));border:1px solid color-mix(in srgb,var(--amber) 35%,transparent);border-radius:12px;padding:12px 14px;margin:14px 0;font-size:14px;color:var(--ink)}
  .tipbox .ic{width:20px;height:20px;flex:none;color:var(--amber);margin-top:1px}
  .steps{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .stepitem{display:flex;gap:12px;align-items:flex-start;font-size:14.5px;color:var(--ink)}
  .stepn{flex:none;width:26px;height:26px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-weight:700;font-size:13px}
  .rev{border-left:3px solid var(--line);padding:8px 0 8px 12px;margin:10px 0;font-size:14px}
  .rev.ok{border-color:var(--good)}
  .rev.no{border-color:var(--bad)}
  .rev .revq{margin-bottom:5px}
  .rev .reva,.rev .revc{display:flex;gap:6px;align-items:center;font-size:13.5px;color:var(--muted)}
  .rev.ok .reva{color:var(--good)} .rev.no .reva{color:var(--bad)}
  .rev .revc{color:var(--good);font-weight:600}
  .rev .reva .ic,.rev .revc .ic{width:16px;height:16px;flex:none}
  .opt:disabled{cursor:default}

  /* aids (hints / 50-50) */
  .aids{display:flex;gap:9px;flex-wrap:wrap;margin:2px 0 14px}
  .aidbtn{border:1px dashed var(--violet);background:var(--violet-soft);color:var(--violet);border-radius:10px;
    min-height:38px;padding:7px 13px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;
    transition:transform .12s var(--ease),filter .2s var(--ease)}
  .aidbtn:hover{filter:brightness(.97)}
  .aidbtn:active{transform:scale(.96)}
  .aidbtn:disabled{opacity:.45;filter:grayscale(.4);cursor:default}
  .aidbtn .ic{width:16px;height:16px}
  .hintbox{border-left:3px solid var(--violet);background:var(--violet-soft);color:var(--ink);
    border-radius:0 10px 10px 0;padding:11px 14px;margin:0 0 14px;font-size:14px}
  .hintbox b{color:var(--violet)}

  .feedback{border-radius:12px;padding:13px 15px;margin:4px 0 12px;font-size:14.5px}
  .feedback.ok{background:var(--good-soft);color:var(--good)}
  .feedback.no{background:var(--bad-soft);color:var(--bad)}
  .feedback b{font-weight:700}
  .feedback .sub{display:block;margin-top:3px;color:var(--ink);font-weight:500;opacity:.92}

  /* why panel */
  .whybtn{border:1px solid var(--line);background:var(--card);color:var(--accent-ink);border-radius:10px;
    min-height:40px;padding:9px 14px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;
    transition:border-color .2s var(--ease),background .2s var(--ease)}
  .whybtn:hover{border-color:var(--accent);background:var(--accent-soft)}
  .whybtn .ic{width:16px;height:16px}
  .whybox{border:1px solid var(--accent);background:var(--accent-soft);border-radius:12px;padding:14px 16px;margin:12px 0 4px}
  .whybox h4{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-ink);
    font-family:system-ui;display:flex;align-items:center;gap:7px}
  .whybox ul{margin:0;padding-left:20px}
  .whybox li{margin:6px 0;font-size:14px;line-height:1.5}
  .whybox .more{margin-top:11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--accent-ink);
    display:inline-flex;align-items:center;gap:5px;background:none;border:none;padding:0}
  .whybox .more .ic{width:14px;height:14px}

  /* summary & hacks accordion */
  .acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;background:var(--card);overflow:hidden;
    box-shadow:var(--shadow)}
  .acc>summary{padding:15px 16px;font-weight:700;cursor:pointer;list-style:none;display:flex;align-items:center;gap:11px}
  .acc>summary::-webkit-details-marker{display:none}

ed by ___ bonds.","a_en":"ionic"},{"ch":1,"num":10,"question":"DNA bevat uiteindelijk de instructies voor de opbouw van:","options":[{"letter":"a","text":"eiwitten","text_en":"proteins"},{"letter":"b","text":"polysachariden","text_en":"polysaccharides"},{"letter":"c","text":"triglyceriden","text_en":"triglycerides"},{"letter":"d","text":"nucleotiden","text_en":"nucleotides"},{"letter":"e","text":"steroïden","text_en":"steroids"}],"answer":"a","answerText":"eiwitten","q_en":"DNA ultimately contains the instructions for building:","a_en":"proteins"},{"ch":1,"num":11,"question":"Als één streng van DNA de sequentie A-A-C-T-G-T-G heeft, wat is dan de complementaire streng?","options":[{"letter":"a","text":"A-A-C-T-G-T-G","text_en":"A-A-C-T-G-T-G"},{"letter":"b","text":"T-T-G-U-C-U-C","text_en":"T-T-G-U-C-U-C"},{"letter":"c","text":"T-T-G-A-C-A-C","text_en":"T-T-G-A-C-A-C"},{"letter":"d","text":"G-G-C-A-T-A-T","text_en":"G-G-C-A-T-A-T"}],"answer":"c","answerText":"T-T-G-A-C-A-C","q_en":"If one strand of DNA has the sequence A-A-C-T-G-T-G, what is the complementary strand?","a_en":"T-T-G-A-C-A-C"},{"ch":1,"num":12,"question":"Welke uitspraak over eiwitten is onjuist?","options":[{"letter":"a","text":"Ze zijn opgebouwd uit aminozuren.","text_en":"They are built from amino acids."},{"letter":"b","text":"Ze bevatten waterstof- en disulfidebindingen.","text_en":"They contain hydrogen and disulfide bonds."},{"letter":"c","text":"Ze kunnen hun vorm niet veranderen.","text_en":"They cannot change their shape."},{"letter":"d","text":"Ze functioneren als biologische katalysatoren.","text_en":"They function as biological catalysts."},{"letter":"e","text":"De meeste eiwitten zijn oplosbaar in water.","text_en":"Most proteins are soluble in water."}],"answer":"c","answerText":"Ze kunnen hun vorm niet veranderen.","q_en":"Which statement about proteins is incorrect?","a_en":"They cannot change their shape."},{"ch":1,"num":13,"question":"De moleculen in een nucleotide zijn verbonden doo n de volgende structuren behoort tot het nefron en speelt een cruciale rol bij het concentreren van urine?","options":[{"letter":"A","text":"Verzamelbuis (collecting duct)","text_en":"Collecting duct"},{"letter":"B","text":"Ureter","text_en":"Ureter"},{"letter":"C","text":"Lus van Henle","text_en":"Loop of Henle"},{"letter":"D","text":"Lus van Vesalius","text_en":"Loop of Vesalius"}],"answer":"C","answerText":"Lus van Henle","q_en":"Which of the following structures belongs to the nephron and plays a crucial role in concentrating urine?","a_en":"Loop of Henle"},{"id":"x27","ch":"X","num":27,"question":"In welk specifiek deel van de longen vindt de gasuitwisseling (diffusie van zuurstof en koolstofdioxide) tussen lucht en bloed plaats?","options":[{"letter":"A","text":"Arterie","text_en":"Artery"},{"letter":"B","text":"Bronchioli","text_en":"Bronchioles"},{"letter":"C","text":"Bronchus","text_en":"Bronchus"},{"letter":"D","text":"Alveoli (longblaasjes)","text_en":"Alveoli (air sacs)"}],"answer":"D","answerText":"Alveoli (longblaasjes)","q_en":"In which specific part of the lungs does gas exchange (diffusion of oxygen and carbon dioxide) between air and blood take place?","a_en":"Alveoli (air sacs)"},{"id":"x28","ch":"X","num":28,"question":"Welk van de volgende foetale vliezen vormt de binnenste vruchtzak waarin het embryo direct is omgeven door vruchtwater?","options":[{"letter":"A","text":"Endometrium","text_en":"Endometrium"},{"letter":"B","text":"Amnion","text_en":"Amnion"},{"letter":"C","text":"Allantoïs","text_en":"Allantois"},{"letter":"D","text":"Chorion","text_en":"Chorion"}],"answer":"B","answerText":"Amnion","q_en":"Which of the following fetal membranes forms the innermost amniotic sac in which the embryo is directly surrounded by amniotic fluid?","a_en":"Amnion"},{"id":"x29","ch":"X","num":29,"question":"Welk extra-embryonaal vlies groeit uit en vormt chorionvlokken die de foetale kant van de placenta zullen vormen?","options":[{"letter":"A","text":"Amnion","text_en":"Amnion"},{"letter":"B","text":"Dooierzak (Yolk sac)","text_en":"Yolk sac"},{"letter":"C","text":"Allantoïs","text_en":"Allantois"},{"letter":"D","text":"Chorion","text_en":"Chorion"}],"answer":"D","answerText":"Chorion","q_en":"Which extra-embryonic membrane grows out and forms chorionic villi that will form the fetal side of the placenta?","a_en":"Chorion"},{"id":"x30","ch":"X","num":30,"question":"De ziekte van Huntington is een autosomaal dominante aandoening. Welke uitspraak over de overerving hiervan is juist als één ouder drager is en de ziekte heeft (heterozygoot), en de andere niet?","options":[{"letter":"A","text":"Beide ouders moeten dragers zijn om het kind de ziekte te kunnen doorgeven.","text_en":"Both parents must be carriers in order to pass the disease on to the child."},{"letter":"B","text":"Dochters zullen de ziekte niet krijgen, maar zijn wel dragers.","text_en":"Daughters will not develop the disease, but are carriers."},{"letter":"C","text":"Alleen zonen kunnen de ziekte erven.","text_en":"Only sons can inherit the disease."},{"letter":"D","text":"Zowel een zoon als een dochter heeft 50% kans om het defecte allel te erven.","text_en":"Both a son and a daughter have a 50% chance of inheriting the defective allele."}],"answer":"D","answerText":"Zowel een zoon als een dochter heeft 50% kans om het defecte allel te erven.","q_en":"Huntington's disease is an autosomal dominant disorder. Which statement about its inheritance is correct if one parent is a carrier and has the disease (heterozygous), and the other does not?","a_en":"Both a son and a daughter have a 50% chance of inheriting the defective allele."},{"id":"x31","ch":"X","num":31,"question":"Welke van de onderstaande aandoeningen of fysieke eigenschappen wordt NIET polygeen overgeërfd, maar kent een monogene oorzaak?","options":[{"letter":"A","text":"Schizofrenie","text_en":"Schizophrenia"},{"letter":"B","text":"Huidskleur","text_en":"Skin color"},{"letter":"C","text":"Diabetes mellitus","text_en":"Diabetes mellitus"},{"letter":"D","text":"Ziekte van Huntington","text_en":"Huntington's disease"}],"answer":"D","answerText":"Ziekte van Huntington","q_en":"Which of the conditions or physical traits below is NOT inherited polygenically, but has a monogenic cause?","a_en":"Huntington's disease"},{"id":"x32","ch":"X","num":32,"question":"Wat is de primaire fysiologische oorzaak van de ziekte van Addison?","options":[{"letter":"A","text":"Een overproductie van glycogeen","text_en":"An overproduction of glycogen"},{"letter":"B","text":"Een tekort aan glucocorticoïden (en mineralocorticoïden)","text_en":"A deficiency of glucocorticoids (and mineralocorticoids)"},{"letter":"C","text":"Een te lage concentratie adrenocorticotroop hormoon (ACTH)","text_en":"A concentration of adrenocorticotropic hormone (ACTH) that is too low"},{"letter":"D","text":"Een te hoge concentratie aan cortisol","text_en":"A concentration of cortisol that is too high"}],"answer":"B","answerText":"Een tekort aan glucocorticoïden (en mineralocorticoïden)","q_en":"What is the primary physiological cause of Addison's disease?","a_en":"A deficiency of glucocorticoids (and mineralocorticoids)"},{"id":"x33","ch":"X","num":33,"question":"Bij patiënten met het syndroom van Marfan treden problemen op zoals een afwijkende lichaamsbouw en cardiovasculaire complicaties. Welk type weefsel is bij deze ziekte primair genetisch aangetast?","options":[{"letter":"A","text":"Bindweefsel","text_en":"Connective tissue"},{"letter":"B","text":"Epitheelweefsel","text_en":"Epithelial tissue"},{"letter":"C","text":"Spierweefsel","text_en":"Muscle tissue"},{"letter":"D","text":"Zenuwweefsel","text_en":"Nervous tissue"}],"answer":"A","answerText":"Bindweefsel","q_en":"In patients with Marfan syndrome, problems arise such as an abnormal body structure and cardiovascular complications. Which type of tissue is primarily genetically affected in this disease?","a_en":"Connective tissue"},{"id":"x34","ch":"X","num":34,"question":"Sikkelcelanemie is een dodelijke aandoening voor homozygoten, toch blijft het allel hiervoor met een relatief hoge frequentie bestaan in bepaalde populaties. Wat is de evolutionaire verklaring hiervoor?","options":[{"letter":"A","text":"Het sikkelcel-allel is dominant over het gezonde allel in tijden van stress.","text_en":"The sickle cell allele is dominant over the healthy allele in times of stress."},{"letter":"B","text":"De symptomen treden pas op na de reproductieve leeftijd, waardoor het allel al is doorgegeven.","text_en":"The symptoms only appear after reproductive age, so the allele has already been passed on."},{"letter":"C","text":"Mensen met één sikkelcel-allel (heterozygoot) hebben een voordeel in gebieden waar malaria veel voorkomt.","text_en":"People with one sickle cell allele (heterozygous) have an advantage in areas where malaria is common."},{"letter":"D","text":"Het ziektebeeld veroorzaakt immuniteit tegen bacteriële bloedinfecties door een verhoogd aantal witte bloedcellen.","text_en":"The disease causes immunity against bacterial blood infections through an increased number of white blood cells."}],"answer":"C","answerText":"Mensen met één sikkelcel-allel (heterozygoot) hebben een voordeel in gebieden waar malaria veel voorkomt.","q_en":"Sickle cell anemia is a lethal disorder for homozygotes, yet the allele for it persists with a relatively high frequency in certain populations. What is the evolutionary explanation for this?","a_en":"People with one sickle cell allele (heterozygous) have an advantage in areas where malaria is common."},{"id":"x35","ch":"X","num":35,"question":"Welke weefselstructuren worden primair aangetast door auto-antilichamen bij een patiënt met Myasthenia Gravis?","options":[{"letter":"A","text":"Myeline-omhulsels van motorische neuronen","text_en":"Myelin sheaths of motor neurons"},{"letter":"B","text":"Dopaminereceptoren","text_en":"Dopamine receptors"},{"letter":"C","text":"Actine- en myosinefilamenten","text_en":"Actin and myosin filaments"},{"letter":"D","text":"Acetylcholinereceptoren","text_en":"Acetylcholine receptors"}],"answer":"D","answerText":"Acetylcholinereceptoren","q_en":"Which tissue structures are primarily attacked by auto-antibodies in a patient with Myasthenia Gravis?","a_en":"Acetylcholine receptors"},{"id":"x36","ch":"X","num":36,"question":"Wat is de correcte wetenschappelijke/medische naam voor een blaasontsteking?","options":[{"letter":"A","text":"Urethritis","text_en":"Urethritis"},{"letter":"B","text":"Pyelonefritis","text_en":"Pyelonephritis"},{"letter":"C","text":"Cystitis","text_en":"Cystitis"},{"letter":"D","text":"Rhinitis","text_en":"Rhinitis"}],"answer":"C","answerText":"Cystitis","q_en":"What is the correct scientific/medical name for an inflammation of the bladder?","a_en":"Cystitis"},{"id":"x37","ch":"X","num":37,"question":"Welk specifiek type epitheelweefsel vormt de menselijke opperhuid (epidermis), waar slijtage en mechanische bescherming belangrijk zijn?","options":[{"letter":"A","text":"Meerlagig plaveiselepitheel (squamous stratified)","text_en":"Stratified squamous epithelium"},{"letter":"B","text":"Overgangsepitheel (transitional)","text_en":"Transitional epithelium"},{"letter":"C","text":"Meerlagig cilindrisch epitheel (columnar)","text_en":"Stratified columnar epithelium"},{"letter":"D","text":"Eenlagig kubisch epitheel (cuboidal)","text_en":"Simple cuboidal epithelium"}],"answer":"A","answerText":"Meerlagig plaveiselepitheel (squamous stratified)","q_en":"Which specific type of epithelial tissue forms the human epidermis, where wear and mechanical protection are important?","a_en":"Stratified squamous epithelium"},{"id":"x38","ch":"X","num":38,"question":"Gal wordt geproduceerd in de lever en bevat belangrijke stoffen voor de spijsvertering. Wat is het belangrijkste spijsverteringsbestanddeel van gal en wat is de functie ervan?","options":[{"letter":"A","text":"Galzouten, die vetten in de darm emulgeren","text_en":"Bile salts, which emulsify fats in the intestine"},{"letter":"B","text":"Lipase, dat direct de triglyceriden in kleinere moleculen splitst","text_en":"Lipase, which directly splits triglycerides into smaller molecules"},{"letter":"C","text":"Cholesterol, dat de darmwand smeert voor een vlotte passage","text_en":"Cholesterol, which lubricates the intestinal wall for smooth passage"},{"letter":"D","text":"Bilirubine, dat complexe eiwitten afbreekt","text_en":"Bilirubin, which breaks down complex proteins"}],"answer":"A","answerText":"Galzouten, die vetten in de darm emulgeren","q_en":"Bile is produced in the liver and contains important substances for digestion. What is the main digestive component of bile and what is its function?","a_en":"Bile salts, which emulsify fats in the intestine"},{"id":"x39","ch":"X","num":39,"question":"Groeihormoon (GH) heeft diverse fysiologische effecten op het lichaam om groei en weefselherstel te stimuleren. Welke van onderstaande acties is GEEN functie van groeihormoon?","options":[{"letter":"A","text":"Het stimuleren van de opslag en aanmaak van vetten in vetweefsel","text_en":"Stimulating the storage and production of fats in adipose tissue"},{"letter":"B","text":"Het bevorderen van calciumretentie in botweefsel","text_en":"Promoting calcium retention in bone tissue"},{"letter":"C","text":"Het stimuleren van de lever tot de productie van IGF-1","text_en":"Stimulating the liver to produce IGF-1"},{"letter":"D","text":"Het verhogen van de eiwitsynthese in cellen","text_en":"Increasing protein synthesis in cells"}],"answer":"A","answerText":"Het stimuleren van de opslag en aanmaak van vetten in vetweefsel","q_en":"Growth hormone (GH) has various physiological effects on the body to stimulate growth and tissue repair. Which of the following actions is NOT a function of growth hormone?","a_en":"Stimulating the storage and production of fats in adipose tissue"},{"id":"x40","ch":"X","num":40,"question":"Welk type huidkanker is statistisch gezien de gevaarlijkste, met de hoogste neiging om te metastaseren (uitzaaien) naar andere organen?","options":[{"letter":"A","text":"Basaalcelcarcinoom","text_en":"Basal cell carcinoma"},{"letter":"B","text":"Melanoom","text_en":"Melanoma"},{"letter":"C","text":"Plaveiselcelcarcinoom","text_en":"Squamous cell carcinoma"},{"letter":"D","text":"Kaposisarcoom","text_en":"Kaposi's sarcoma"}],"answer":"B","answerText":"Melanoom","q_en":"Which type of skin cancer is statistically the most dangerous, with the highest tendency to metastasize (spread) to other organs?","a_en":"Melanoma"},{"id":"x41","ch":"X","num":41,"question":"Tijdens het bestuderen van de externe controle op het hart: Welke structuur fungeert in normale gezonde omstandigheden als de primaire 'pacemaker' die het hartritme initieert?","options":[{"letter":"A","text":"SA-knoop (Sinoatriale knoop)","text_en":"SA node (Sinoatrial node)"},{"letter":"B","text":"Purkinjevezels","text_en":"Purkinje fibers"},{"letter":"C","text":"AV-knoop (Atrioventriculaire knoop)","text_en":"AV node (Atrioventricular node)"},{"letter":"D","text":"Bundel van His","text_en":"Bundle of His"}],"answer":"A","answerText":"SA-knoop (Sinoatriale knoop)","q_en":"While studying the external control of the heart: which structure acts under normal healthy conditions as the primary 'pacemaker' that initiates the heart rhythm?","a_en":"SA node (Sinoatrial node)"},{"id":"x42","ch":"X","num":42,"question":"Weefsels kunnen aangevallen worden door het immuunsysteem. Welke witte bloedcellen zijn primair verantwoordelijk voor het direct vernietigen van lichaamscellen die geïnfecteerd zijn door virussen?","options":[{"letter":"A","text":"B-lymfocyten","text_en":"B lymphocytes"},{"letter":"B","text":"Cytotoxische T-cellen (CD8+)","text_en":"Cytotoxic T cells (CD8+)"},{"letter":"C","text":"Neutrofiele granulocyten","text_en":"Neutrophilic granulocytes"},{"letter":"D","text":"T-helpercellen (CD4+)","text_en":"Helper T cells (CD4+)"}],"answer":"B","answerText":"Cytotoxische T-cellen (CD8+)","q_en":"Tissues can be attacked by the immune system. Which white blood cells are primarily responsible for directly destroying body cells that are infected by viruses?","a_en":"Cytotoxic T cells (CD8+)"},{"id":"x43","ch":"X","num":43,"question":"Een specifieke vraag over virussen: Welk enzym gebruikt het HIV-virus om zijn eigen RNA-genoom na infectie om te schrijven naar DNA, zodat het geïntegreerd kan worden in de gastheercel?","options":[{"letter":"A","text":"Helicase","text_en":"Helicase"},{"letter":"B","text":"RNA-polymerase","text_en":"RNA polymerase"},{"letter":"C","text":"Reverse transcriptase","text_en":"Reverse transcriptase"},{"letter":"D","text":"DNA-ligase","text_en":"DNA ligase"}],"answer":"C","answerText":"Reverse transcriptase","q_en":"A specific question about viruses: which enzyme does the HIV virus use to transcribe its own RNA genome into DNA after infection, so that it can be integrated into the host cell?","a_en":"Reverse transcriptase"},{"id":"x44","ch":"X","num":44,"question":"In welk onderdeel van de nieren vindt het passieve proces van ultrafiltratie plaats, waarbij water en kleine opgeloste stoffen vanuit de bloedbaan de voorurine vormen?","options":[{"letter":"A","text":"Kapsel van Bowman","text_en":"Bowman's capsule"},{"letter":"B","text":"Kluwen van haarvaten (Glomerulus)","text_en":"Tuft of capillaries (Glomerulus)"},{"letter":"C","text":"Distale tubulus","text_en":"Distal tubule"},{"letter":"D","text":"Proximale tubulus","text_en":"Proximal tubule"}],"answer":"B","answerText":"Kluwen van haarvaten (Glomerulus)","q_en":"In which part of the kidneys does the passive process of ultrafiltration take place, in which water and small dissolved substances from the bloodstream form the primary urine?","a_en":"Tuft of capillaries (Glomerulus)"},{"id":"x45","ch":"X","num":45,"question":"Op moleculair niveau in de biochemie: Welk type verbindingen tussen moleculen is primair verantwoordelijk voor de unieke eigenschappen van water, zoals een ongewoon hoge kooktemperatuur en hoge oppervlaktespanning?","options":[{"letter":"A","text":"Van der Waalskrachten","text_en":"Van der Waals forces"},{"letter":"B","text":"Waterstofbruggen (Hydrogen bonds)","text_en":"Hydrogen bonds"},{"letter":"C","text":"Ionbindingen","text_en":"Ionic bonds"},{"letter":"D","text":"Covalente bindingen","text_en":"Covalent bonds"}],"answer":"B","answerText":"Waterstofbruggen (Hydrogen bonds)","q_en":"At the molecular level in biochemistry: which type of bond between molecules is primarily responsible for the unique properties of water, such as an unusually high boiling point and high surface tension?","a_en":"Hydrogen bonds"},{"id":"x46","ch":"X","num":46,"question":"Welke van de volgende lichaamsvloeistoffen heeft doorgaans een pH-waarde die zich bevindt tussen de 6 en 7?","options":[{"letter":"A","text":"Tranen","text_en":"Tears"},{"letter":"B","text":"Maagsap","text_en":"Gastric juice"},{"letter":"C","text":"Urine","text_en":"Urine"},{"letter":"D","text":"Bloed","text_en":"Blood"}],"answer":"C","answerText":"Urine","q_en":"Which of the following body fluids typically has a pH value between 6 and 7?","a_en":"Urine"},{"id":"x47","ch":"X","num":47,"question":"Welk proces in de cellulaire ademhaling levert veruit de meeste ATP (energie) op?","options":[{"letter":"A","text":"Elektronentransportketen","text_en":"Electron transport chain"},{"letter":"B","text":"Fermentatie","text_en":"Fermentation"},{"letter":"C","text":"Citroenzuurcyclus (Krebs cyclus)","text_en":"Citric acid cycle (Krebs cycle)"},{"letter":"D","text":"Glycolyse","text_en":"Glycolysis"}],"answer":"A","answerText":"Elektronentransportketen","q_en":"Which process in cellular respiration produces by far the most ATP (energy)?","a_en":"Electron transport chain"},{"id":"x48","ch":"X","num":48,"question":"Wat is de gevaarlijkste en meest agressieve vorm van huidkanker?","options":[{"letter":"A","text":"Plaveiselcelcarcinoom","text_en":"Squamous cell carcinoma"},{"letter":"B","text":"Basaalcelcarcinoom","text_en":"Basal cell carcinoma"},{"letter":"C","text":"Melanoom","text_en":"Melanoma"},{"letter":"D","text":"Sarcoom","text_en":"Sarcoma"}],"answer":"C","answerText":"Melanoom","q_en":"What is the most dangerous and most aggressive form of skin cancer?","a_en":"Melanoma"},{"id":"x49","ch":"X","num":49,"question":"In welke specifieke structuur in de teelballen (testes) worden spermacellen daadwerkelijk geproduceerd?","options":[{"letter":"A","text":"Interstitiële cellen (van Leydig)","text_en":"Interstitial cells (of Leydig)"},{"letter":"B","text":"Sertolicellen","text_en":"Sertoli cells"},{"letter":"C","text":"Vas deferens","text_en":"Vas deferens"},{"letter":"D","text":"Tubuli seminiferi (Zaadbuisjes)","text_en":"Seminiferous tubules"}],"answer":"D","answerText":"Tubuli seminiferi (Zaadbuisjes)","q_en":"In which specific structure in the testes are sperm cells actually produced?","a_en":"Seminiferous tubules"},{"id":"x50","ch":"X","num":50,"question":"Welk van de volgende weefseltypes wordt geclassificeerd als 'ondersteunend bindweefsel' (supporting connective tissue)?","options":[{"letter":"A","text":"Vetweefsel (Adipose tissue)","text_en":"Adipose tissue"},{"letter":"B","text":"Gestratificeerd epitheel","text_en":"Stratified epithelium"},{"letter":"C","text":"Bloed","text_en":"Blood"},{"letter":"D","text":"Vezelkraakbeen (Fibrocartilage)","text_en":"Fibrocartilage"}],"answer":"D","answerText":"Vezelkraakbeen (Fibrocartilage)","q_en":"Which of the following tissue types is classified as 'supporting connective tissue'?","a_en":"Fibrocartilage"},{"id":"x51","ch":"X","num":51,"question":"Uit welk type weefsel bestaat de opperhuid (epidermis) voornamelijk?","options":[{"letter":"A","text":"Bindweefsel","text_en":"Connective tissue"},{"letter":"B","text":"Gestratificeerd plaveiselepitheel","text_en":"Stratified squamous epithelium"},{"letter":"C","text":"Kubisch epitheel","text_en":"Cuboidal epithelium"},{"letter":"D","text":"Eenlagig (simple) plaveiselepitheel","text_en":"Simple squamous epithelium"}],"answer":"B","answerText":"Gestratificeerd plaveiselepitheel","q_en":"Which type of tissue does the epidermis mainly consist of?","a_en":"Stratified squamous epithelium"},{"id":"x52","ch":"X","num":52,"question":"Welk van de volgende lichaamscellen/weefsels kenmerkt zich doordat individuele cellen meerdere kernen (multinucleair) kunnen bevatten?","options":[{"letter":"A","text":"Botweefsel (Osteocyten)","text_en":"Bone tissue (Osteocytes)"},{"letter":"B","text":"Hartspierweefsel","text_en":"Cardiac muscle tissue"},{"letter":"C","text":"Skeletspierweefsel","text_en":"Skeletal muscle tissue"},{"letter":"D","text":"Zenuwweefsel","text_en":"Nervous tissue"}],"answer":"C","answerText":"Skeletspierweefsel","q_en":"Which of the following body cells/tissues is characterized by the fact that individual cells can contain multiple nuclei (multinucleated)?","a_en":"Skeletal muscle tissue"},{"id":"x53","ch":"X","num":53,"question":"Welke signaalstoffen produceren en scheiden T-helpercellen (CD4+ cellen) uit om andere cellen van het immuunsysteem te activeren?","options":[{"letter":"A","text":"Antilichamen","text_en":"Antibodies"},{"letter":"B","text":"Perforinen","text_en":"Perforins"},{"letter":"C","text":"Cytokinen","text_en":"Cytokines"},{"letter":"D","text":"Histamine","text_en":"Histamine"}],"answer":"C","answerText":"Cytokinen","q_en":"Which signaling substances do helper T cells (CD4+ cells) produce and secrete to activate other cells of the immune system?","a_en":"Cytokines"},{"id":"x54","ch":"X","num":54,"question":"Wanneer iemand, ter bestrijding van een ziekte of gif (zoals een slangenbeet), direct afgewerkte antilichamen ingespoten krijgt, van welk type immuniteit spreken we dan?","options":[{"letter":"A","text":"Secundaire immuniteit","text_en":"Secondary immunity"},{"letter":"B","text":"Aangeboren (innate) immuniteit","text_en":"Innate immunity"},{"letter":"C","text":"Passieve immuniteit","text_en":"Passive immunity"},{"letter":"D","text":"Actieve immuniteit","text_en":"Active immunity"}],"answer":"C","answerText":"Passieve immuniteit","q_en":"When someone, to combat a disease or poison (such as a snake bite), is directly injected with ready-made antibodies, which type of immunity are we referring to?","a_en":"Passive immunity"},{"id":"x55","ch":"X","num":55,"question":"Tot welk orgaanstelsel behoort de thymus (zwezerik)?","options":[{"letter":"A","text":"Het cardiovasculair systeem","text_en":"The cardiovascular system"},{"letter":"B","text":"Het endocrien systeem","text_en":"The endocrine system"},{"letter":"C","text":"Het immuunsysteem (Lymfatisch systeem)","text_en":"The immune system (Lymphatic system)"},{"letter":"D","text":"Het reproductieve systeem","text_en":"The reproductive system"}],"answer":"C","answerText":"Het immuunsysteem (Lymfatisch systeem)","q_en":"To which organ system does the thymus belong?","a_en":"The immune system (Lymphatic system)"},{"id":"x56","ch":"X","num":56,"question":"Sommige eiwitten in het bloedplasma kunnen samenklitten om ringvormige poriën in de celmembranen van binnendringende bacteriën te vormen (het Membrane Attack Complex). Welk eiwitsysteem is dit?","options":[{"letter":"A","text":"Antilichamen","text_en":"Antibodies"},{"letter":"B","text":"Complement eiwitten","text_en":"Complement proteins"},{"letter":"C","text":"Interferonen","text_en":"Interferons"},{"letter":"D","text":"Fibrinogeen","text_en":"Fibrinogen"}],"answer":"B","answerText":"Complement eiwitten","q_en":"Some proteins in the blood plasma can clump together to form ring-shaped pores in the cell membranes of invading bacteria (the Membrane Attack Complex). Which protein system is this?","a_en":"Complement proteins"},{"id":"x57","ch":"X","num":57,"question":"Door welk onwillekeurig fysiologisch proces wordt een doorgeslikte voedselbrok (bolus) door de slokdarm naar de maag geduwd?","options":[{"letter":"A","text":"Segmentatie","text_en":"Segmentation"},{"letter":"B","text":"Peristaltiek","text_en":"Peristalsis"},{"letter":"C","text":"Zwaartekracht","text_en":"Gravity"},{"letter":"D","text":"Slikreflex","text_en":"Swallowing reflex"}],"answer":"B","answerText":"Peristaltiek","q_en":"By which involuntary physiological process is a swallowed bolus of food pushed through the esophagus to the stomach?","a_en":"Peristalsis"},{"id":"x58","ch":"X","num":58,"question":"Welk verteringsenzym, geproduceerd door de alvleesklier, is verantwoordelijk voor de eerste stappen van de afbraak van eiwitten (proteïnen) tot kleinere peptiden in de twaalfvingerige darm?","options":[{"letter":"A","text":"Maltase","text_en":"Maltase"},{"letter":"B","text":"Lactase","text_en":"Lactase"},{"letter":"C","text":"Amylase","text_en":"Amylase"},{"letter":"D","text":"Trypsine","text_en":"Trypsin"}],"answer":"D","answerText":"Trypsine","q_en":"Which digestive enzyme, produced by the pancreas, is responsible for the first steps of breaking down proteins into smaller peptides in the duodenum?","a_en":"Trypsin"},{"id":"x59","ch":"X","num":59,"question":"Wanneer de calciumspiegel in het bloed te laag is, welk hormoon wordt er dan vrijgegeven om calcium vanuit de botten vrij te maken en zo het bloedcalcium te verhogen?","options":[{"letter":"A","text":"Calcitonine","text_en":"Calcitonin"},{"letter":"B","text":"Groeihormoon","text_en":"Growth hormone"},{"letter":"C","text":"Trypsine","text_en":"Trypsin"},{"letter":"D","text":"Parathyroïdhormoon (PTH)","text_en":"Parathyroid hormone (PTH)"}],"answer":"D","answerText":"Parathyroïdhormoon (PTH)","q_en":"When the calcium level in the blood is too low, which hormone is released to free calcium from the bones and thereby raise the blood calcium?","a_en":"Parathyroid hormone (PTH)"},{"id":"x60","ch":"X","num":60,"question":"Wat is de correcte wetenschappelijke/medische term voor een bacteriële infectie of ontsteking van het nierbekken en het weefsel van de nier zelf?","options":[{"letter":"A","text":"Pyelonefritis","text_en":"Pyelonephritis"},{"letter":"B","text":"Urethritis","text_en":"Urethritis"},{"letter":"C","text":"Glomerulonefritis","text_en":"Glomerulonephritis"},{"letter":"D","text":"Cystitis","text_en":"Cystitis"}],"answer":"A","answerText":"Pyelonefritis","q_en":"What is the correct scientific/medical term for a bacterial infection or inflammation of the renal pelvis and the tissue of the kidney itself?","a_en":"Pyelonephritis"},{"id":"x61","ch":"X","num":61,"question":"Via welk proces vindt de botvorming (ossificatie) plaats in een lang bot zoals het scheenbeen (tibia) tijdens de embryonale ontwikkeling en groei?","options":[{"letter":"A","text":"Vorming van een fibrocartilagineuze callus","text_en":"Formation of a fibrocartilaginous callus"},{"letter":"B","text":"Endochondrale ossificatie","text_en":"Endochondral ossification"},{"letter":"C","text":"Intramembraneuze ossificatie","text_en":"Intramembranous ossification"},{"letter":"D","text":"Osteolyse","text_en":"Osteolysis"}],"answer":"B","answerText":"Endochondrale ossificatie","q_en":"By which process does bone formation (ossification) take place in a long bone such as the shin bone (tibia) during embryonic development and growth?","a_en":"Endochondral ossification"},{"id":"x62","ch":"X","num":62,"question":"De botbalkjes en het open netwerk van platen en buisjes die de structuur vormen van sponsachtig bot (spongy bone/cancellous bone), worden hoe genoemd?","options":[{"letter":"A","text":"Lacunae","text_en":"Lacunae"},{"letter":"B","text":"Canaliculi","text_en":"Canaliculi"},{"letter":"C","text":"Trabeculae","text_en":"Trabeculae"},{"letter":"D","text":"Osteon (Systeem van Havers)","text_en":"Osteon (Haversian system)"}],"answer":"C","answerText":"Trabeculae","q_en":"The bone struts and the open network of plates and tubes that form the structure of spongy bone (cancellous bone) are called what?","a_en":"Trabeculae"},{"id":"x63","ch":"X","num":63,"question":"Welke van de onderstaande eigenschappen of ziekten is GEEN polygenetisch kenmerk (bepaald door meerdere genen), maar kent een monogene basis (één enkel gen)?","options":[{"letter":"A","text":"Huidskleur","text_en":"Skin color"},{"letter":"B","text":"Schizofrenie","text_en":"Schizophrenia"},{"letter":"C","text":"Ziekte van Huntington","text_en":"Huntington's disease"},{"letter":"D","text":"Diabetes","text_en":"Diabetes"}],"answer":"C","answerText":"Ziekte van Huntington","q_en":"Which of the following traits or diseases is NOT a polygenic trait (determined by multiple genes), but has a monogenic basis (a single gene)?","a_en":"Huntington's disease"},{"id":"x64","ch":"X","num":64,"question":"Vanuit een biologisch standpunt: wat is een van de belangrijkste hormonale verklaringen waarom vrouwen over het algemeen een hogere levensverwachting hebben dan mannen?","options":[{"letter":"A","text":"Mannen produceren meer testosteron, wat direct leidt tot een snellere celveroudering op DNA-niveau.","text_en":"Men produce more testosterone, which directly leads to faster cellular aging at the DNA level."},{"letter":"B","text":"Mannelijke bijnieren produceren significant hogere spiegels cortisol, het stresshormoon.","text_en":"Male adrenal glands produce significantly higher levels of cortisol, the stress hormone."},{"letter":"C","text":"Vrouwen produceren meer oestrogeen, wat een beschermende werking heeft tegen hart- en vaatziekten.","text_en":"Women produce more estrogen, which has a protective effect against cardiovascular disease."},{"letter":"D","text":"Vrouwen hebben twee X-chromosomen, waardoor genetische hartafwijkingen nooit tot uiting komen.","text_en":"Women have two X chromosomes, so genetic heart defects are never expressed."}],"answer":"C","answerText":"Vrouwen produceren meer oestrogeen, wat een beschermende werking heeft tegen hart- en vaatziekten.","q_en":"From a biological standpoint: what is one of the most important hormonal explanations why women generally have a higher life expectancy than men?","a_en":"Women produce more estrogen, which has a protective effect against cardiovascular disease."},{"id":"x65","ch":"X","num":65,"question":"In de oncologie: wanneer spreekt men van een tumor (kanker) in de 'in situ' fase?","options":[{"letter":"A","text":"Wanneer de kankercellen zich nog uitsluitend op hun oorspronkelijke plaats bevinden en het omliggende weefsel of de keldermembraan nog niet zijn binnengedrongen.","text_en":"When the cancer cells are still located exclusively at their original site and have not yet invaded the surrounding tissue or the basement membrane."},{"letter":"B","text":"Wanneer een goedaardige (benigne) poliep plotseling ongecontroleerd begint te groeien.","text_en":"When a benign polyp suddenly starts to grow in an uncontrolled manner."},{"letter":"C","text":"Wanneer de eerste kankercellen via de bloedbaan of lymfe beginnen te reizen naar andere weefsels.","text_en":"When the first cancer cells begin to travel through the bloodstream or lymph to other tissues."},{"letter":"D","text":"Wanneer een tumor te groot wordt voor zijn eigen bloedtoevoer en vanbinnen afsterft (necrose).","text_en":"When a tumour becomes too large for its own blood supply and dies from the inside (necrosis)."}],"answer":"A","answerText":"Wanneer de kankercellen zich nog uitsluitend op hun oorspronkelijke plaats bevinden en het omliggende weefsel of de keldermembraan nog niet zijn binnengedrongen.","q_en":"In oncology: when do we speak of a tumour (cancer) in the 'in situ' phase?","a_en":"When the cancer cells are still located exclusively at their original site and have not yet invaded the surrounding tissue or the basement membrane."},{"id":"x66","ch":"X","num":66,"question":"Tijdens de bevruchting is het cruciaal dat er slechts één spermacel binnendringt in de eicel. Wat zorgt ervoor dat de eicel onmiddellijk ondoordringbaar wordt voor andere spermacellen na de eerste penetratie?","options":[{"letter":"A","text":"Het sluiten van specifieke eiwitkanalen in de baarmoederwand.","text_en":"The closing of specific protein channels in the uterine wall."},{"letter":"B","text":"Het afstoten van de corona radiata.","text_en":"The shedding of the corona radiata."},{"letter":"C","text":"Een fysieke en chemische verharding van de zona pellucida.","text_en":"A physical and chemical hardening of the zona pellucida."},{"letter":"D","text":"Het onmiddellijk krimpen van het eicel cytoplasma.","text_en":"The immediate shrinking of the egg cell cytoplasm."}],"answer":"C","answerText":"Een fysieke en chemische verharding van de zona pellucida.","q_en":"During fertilisation it is crucial that only one sperm cell penetrates the egg cell. What ensures that the egg cell immediately becomes impenetrable to other sperm cells after the first penetration?","a_en":"A physical and chemical hardening of the zona pellucida."},{"id":"x67","ch":"X","num":67,"question":"Een stukje overerving (genetica): Moeder is heterozygoot (FfSs) voor sproetjes (F) en korte vingers (S). Vader is homozygoot recessief (ffss) en heeft geen sproetjes en lange vingers (s). Wat is de kans dat hun kind sproetjes én lange vingers heeft?","options":[{"letter":"A","text":"100 procent","text_en":"100 percent"},{"letter":"B","text":"50 procent","text_en":"50 percent"},{"letter":"C","text":"0 procent","text_en":"0 percent"},{"letter":"D","text":"25 procent","text_en":"25 percent"}],"answer":"D","answerText":"25 procent","q_en":"A bit of inheritance (genetics): The mother is heterozygous (FfSs) for freckles (F) and short fingers (S). The father is homozygous recessive (ffss) and has no freckles and long fingers (s). What is the probability that their child has freckles AND long fingers?","a_en":"25 percent"},{"id":"x68","ch":"X","num":68,"question":"Wat is de correcte fysiologische definitie van het proces 'osmose'?","options":[{"letter":"A","text":"De verplaatsing van opgeloste stoffen van een hoge naar een lage concentratie, zolang het membraan dit toelaat.","text_en":"The movement of dissolved substances from a high to a low concentration, as long as the membrane allows it."},{"letter":"B","text":"De verplaatsing van eiwitten van binnen naar buiten de cel.","text_en":"The movement of proteins from the inside to the outside of the cell."},{"letter":"C","text":"De verplaatsing van water (het oplosmiddel) door een semipermeabel membraan, van een omgeving met een lage naar een hoge concentratie opgeloste stoffen.","text_en":"The movement of water (the solvent) through a semipermeable membrane, from an environment with a low to a high concentration of dissolved substances."},{"letter":"D","text":"Actief, energieverslindend transport van watermoleculen over het celmembraan.","text_en":"Active, energy-consuming transport of water molecules across the cell membrane."}],"answer":"C","answerText":"De verplaatsing van water (het oplosmiddel) door een semipermeabel membraan, van een omgeving met een lage naar een hoge concentratie opgeloste stoffen.","q_en":"What is the correct physiological definition of the process of 'osmosis'?","a_en":"The movement of water (the solvent) through a semipermeable membrane, from an environment with a low to a high concentration of dissolved substances."},{"id":"x69","ch":"X","num":69,"question":"Hoe heten de in het medullaire weefsel (de binnenkant) van de nieren gelegen driehoekige structuren die bestaan uit grote groepen verzamelbuizen?","options":[{"letter":"A","text":"Nierpiramiden (Pyramides)","text_en":"Renal pyramids (Pyramides)"},{"letter":"B","text":"Nierbekken (Pelvis)","text_en":"Renal pelvis (Pelvis)"},{"letter":"C","text":"Kapsel van Bowman","text_en":"Bowman's capsule"},{"letter":"D","text":"Renale massa","text_en":"Renal mass"}],"answer":"A","answerText":"Nierpiramiden (Pyramides)","q_en":"What are the triangular structures located in the medullary tissue (the inner part) of the kidneys, consisting of large groups of collecting ducts, called?","a_en":"Renal pyramids (Pyramides)"},{"id":"x70","ch":"X","num":70,"question":"De alvleesklier (pancreas) heeft veel functies. Welk van de onderstaande processen is ECHTER GEEN functie of locatie behorend bij de alvleesklier?","options":[{"letter":"A","text":"Eilandjes van Langerhans huisvesten.","text_en":"Housing the islets of Langerhans."},{"letter":"B","text":"Een sleutelrol spelen bij diabetes (suikerziekte).","text_en":"Playing a key role in diabetes (diabetes mellitus)."},{"letter":"C","text":"Een endocriene functie vervullen.","text_en":"Performing an endocrine function."},{"letter":"D","text":"De opslag van grote reserves aan glycogeen.","text_en":"Storing large reserves of glycogen."}],"answer":"D","answerText":"De opslag van grote reserves aan glycogeen.","q_en":"The pancreas has many functions. However, which of the following processes is NOT a function or location belonging to the pancreas?","a_en":"Storing large reserves of glycogen."},{"id":"x71","ch":"X","num":71,"question":"Via welke anatomische buisvormige structuur is een ovarium (eierstok) verbonden met de baarmoeder (uterus)?","options":[{"letter":"A","text":"Oviduct (Eileider / Tuba uterina)","text_en":"Oviduct (Fallopian tube / Tuba uterina)"},{"letter":"B","text":"Urethra (Urinebuis)","text_en":"Urethra"},{"letter":"C","text":"Cervix (Baarmoederhals)","text_en":"Cervix"},{"letter":"D","text":"Vagina","text_en":"Vagina"}],"answer":"A","answerText":"Oviduct (Eileider / Tuba uterina)","q_en":"Through which anatomical tube-shaped structure is an ovary connected to the uterus?","a_en":"Oviduct (Fallopian tube / Tuba uterina)"},{"id":"x72","ch":"X","num":72,"question":"Wat is de primaire functie van de glomerulus en het omliggende kapsel van Bowman in de nieren?","options":[{"letter":"A","text":"Productie van witte bloedcellen","text_en":"Production of white blood cells"},{"letter":"B","text":"Filtratie van het bloed (Ultrafiltratie)","text_en":"Filtration of the blood (Ultrafiltration)"},{"letter":"C","text":"Actieve terugresorptie van voedingsstoffen","text_en":"Active reabsorption of nutrients"},{"letter":"D","text":"Concentreren van de urine","text_en":"Concentrating the urine"}],"answer":"B","answerText":"Filtratie van het bloed (Ultrafiltratie)","q_en":"What is the primary function of the glomerulus and the surrounding Bowman's capsule in the kidneys?","a_en":"Filtration of the blood (Ultrafiltration)"},{"id":"x73","ch":"X","num":73,"question":"Welk type celverbinding sluit de ruimte tussen naburige epitheelcellen vrijwel waterdicht af, zodat moleculen niet ongecontroleerd tussen de cellen door kunnen lekken?","options":[{"letter":"A","text":"Desmosoom (Macula adherens)","text_en":"Desmosome (Macula adherens)"},{"letter":"B","text":"Adhesion junction","text_en":"Adhesion junction"},{"letter":"C","text":"Tight junction (Zonula occludens)","text_en":"Tight junction (Zonula occludens)"},{"letter":"D","text":"Gap junction","text_en":"Gap junction"}],"answer":"C","answerText":"Tight junction (Zonula occludens)","q_en":"Which type of cell junction seals the space between neighbouring epithelial cells almost watertight, so that molecules cannot leak uncontrollably between the cells?","a_en":"Tight junction (Zonula occludens)"},{"id":"x74","ch":"X","num":74,"question":"Welk celtransportproces wordt specifiek gebruikt wanneer een cel grote moleculen opneemt nadat deze eerst aan membraaneiwitten binden, waarna het membraan instulpt en een blaasje (coated vesicle) vormt?","options":[{"letter":"A","text":"Fagocytose","text_en":"Phagocytosis"},{"letter":"B","text":"Pinocytose","text_en":"Pinocytosis"},{"letter":"C","text":"Receptor-gemedieerde endocytose","text_en":"Receptor-mediated endocytosis"},{"letter":"D","text":"Exocytose","text_en":"Exocytosis"}],"answer":"C","answerText":"Receptor-gemedieerde endocytose","q_en":"Which cellular transport process is specifically used when a cell takes up large molecules after they first bind to membrane proteins, after which the membrane invaginates and forms a vesicle (coated vesicle)?","a_en":"Receptor-mediated endocytosis"},{"id":"x75","ch":"X","num":75,"question":"Welke van de volgende stellingen over Diabetes Mellitus is ONJUIST?","options":[{"letter":"A","text":"Diabetes type 2 komt vaker voor binnen bepaalde families (heeft een sterke genetische component).","text_en":"Type 2 diabetes occurs more frequently within certain families (it has a strong genetic component)."},{"letter":"B","text":"Obesitas en levensstijl zijn de belangrijkste risicofactoren voor het ontwikkelen van diabetes type 1.","text_en":"Obesity and lifestyle are the most important risk factors for developing type 1 diabetes."},{"letter":"C","text":"Bij diabetes type 1 kan de alvleesklier zelfstandig onvoldoende of geen insuline meer produceren.","text_en":"In type 1 diabetes, the pancreas can no longer produce sufficient or any insulin on its own."},{"letter":"D","text":"Mensen met ernstige en oncontroleerbare diabetes type 1 ondergaan soms een transplantatie van (delen van) de alvleesklier.","text_en":"People with severe and uncontrollable type 1 diabetes sometimes undergo a transplant of (parts of) the pancreas."}],"answer":"B","answerText":"Obesitas en levensstijl zijn de belangrijkste risicofactoren voor het ontwikkelen van diabetes type 1.","q_en":"Which of the following statements about Diabetes Mellitus is INCORRECT?","a_en":"Obesity and lifestyle are the most important risk factors for developing type 1 diabetes."},{"id":"x76","ch":"X","num":76,"question":"Welk type eiwitvezel is veruit de dikste, meest voorkomende vezel in bindweefsel en is verantwoordelijk voor grote treksterkte in pezen, huid en ligamenten?","options":[{"letter":"A","text":"Elastische vezels","text_en":"Elastic fibres"},{"letter":"B","text":"Reticulaire vezels","text_en":"Reticular fibres"},{"letter":"C","text":"Keratine","text_en":"Keratin"},{"letter":"D","text":"Collageenvezels","text_en":"Collagen fibres"}],"answer":"D","answerText":"Collageenvezels","q_en":"Which type of protein fibre is by far the thickest, most common fibre in connective tissue and is responsible for great tensile strength in tendons, skin and ligaments?","a_en":"Collagen fibres"},{"id":"x77","ch":"X","num":77,"question":"Welke van de onderstaande cardiovasculaire structuren is NIET uniek voor het foetale embryo, maar blijft ook na de geboorte normaal functioneren?","options":[{"letter":"A","text":"Ductus venosus","text_en":"Ductus venosus"},{"letter":"B","text":"Truncus pulmonalis (Pulmonaire stam / Longslagader)","text_en":"Pulmonary trunk (Truncus pulmonalis / Pulmonary artery)"},{"letter":"C","text":"Ductus arteriosus (van Botalli)","text_en":"Ductus arteriosus (of Botallo)"},{"letter":"D","text":"Foramen ovale","text_en":"Foramen ovale"}],"answer":"B","answerText":"Truncus pulmonalis (Pulmonaire stam / Longslagader)","q_en":"Which of the following cardiovascular structures is NOT unique to the foetal embryo, but continues to function normally after birth as well?","a_en":"Pulmonary trunk (Truncus pulmonalis / Pulmonary artery)"},{"id":"x78","ch":"X","num":78,"question":"Wat is een fysiologisch correct feit met betrekking tot de normale veroudering van het menselijk lichaam (van ca. 20 tot 90 jaar)?","options":[{"letter":"A","text":"Ruim de helft van de mensen boven de tachtig sterft primair als direct gevolg van anosmia.","text_en":"Well over half of people above eighty die primarily as a direct result of anosmia."},{"letter":"B","text":"De totale hersenmassa en het hersenvolume verminderen geleidelijk in de loop van de decennia.","text_en":"The total brain mass and brain volume gradually decrease over the course of the decades."},{"letter":"C","text":"De endocriene functie van de schildklier verbetert doorgaans na het tachtigste levensjaar.","text_en":"The endocrine function of the thyroid gland generally improves after the age of eighty."},{"letter":"D","text":"Mannen hebben in de twintig gemiddeld genomen minder testosteron dan in de zestig.","text_en":"Men in their twenties have on average less testosterone than in their sixties."}],"answer":"B","answerText":"De totale hersenmassa en het hersenvolume verminderen geleidelijk in de loop van de decennia.","q_en":"What is a physiologically correct fact regarding the normal ageing of the human body (from about 20 to 90 years)?","a_en":"The total brain mass and brain volume gradually decrease over the course of the decades."},{"id":"x79","ch":"X","num":79,"question":"Welk type weefsel is primair aangedaan door de verstoorde chloridekanalen bij een patiënt met mucoviscidose (taaislijmziekte)?","options":[{"letter":"A","text":"Skeletspierweefsel","text_en":"Skeletal muscle tissue"},{"letter":"B","text":"Zenuwweefsel","text_en":"Nervous tissue"},{"letter":"C","text":"Mucosa (Epitheelweefsel/Slijmvlies)","text_en":"Mucosa (Epithelial tissue/Mucous membrane)"},{"letter":"D","text":"Botweefsel","text_en":"Bone tissue"}],"answer":"C","answerText":"Mucosa (Epitheelweefsel/Slijmvlies)","q_en":"Which type of tissue is primarily affected by the disrupted chloride channels in a patient with cystic fibrosis (mucoviscidosis)?","a_en":"Mucosa (Epithelial tissue/Mucous membrane)"},{"id":"x80","ch":"X","num":80,"question":"Mucoviscidose is ernstig en homozygoot vaak dodelijk zonder moderne zorg, toch is het recessieve gen wereldwijd in omloop gebleven. Wat is hiervan een belangrijke evolutionaire theorie?","options":[{"letter":"A","text":"Het gen muteert continu vanzelf op een extreem hoog tempo binnen elke nieuwe generatie.","text_en":"The gene continuously mutates spontaneously at an extremely high rate within each new generation."},{"letter":"B","text":"De symptomen komen meestal pas tot uiting na het veertigste levensjaar, als de patiënt al kinderen heeft gekregen.","text_en":"The symptoms usually only manifest after the age of forty, when the patient has already had children."},{"letter":"C","text":"Het gemuteerde allel is feitelijk dominant op latere leeftijd.","text_en":"The mutated allele is in fact dominant at a later age."},{"letter":"D","text":"Dragerschap van één mucoviscidose-allel geeft vermoedelijk gedeeltelijke bescherming tegen bepaalde ziekten, zoals buiktyfus of uitdroging door cholera.","text_en":"Being a carrier of one cystic fibrosis allele presumably provides partial protection against certain diseases, such as typhoid fever or dehydration from cholera."}],"answer":"D","answerText":"Dragerschap van één mucoviscidose-allel geeft vermoedelijk gedeeltelijke bescherming tegen bepaalde ziekten, zoals buiktyfus of uitdroging door cholera.","q_en":"Cystic fibrosis is severe and, when homozygous, often fatal without modern care, yet the recessive gene has remained in circulation worldwide. What is an important evolutionary theory for this?","a_en":"Being a carrier of one cystic fibrosis allele presumably provides partial protection against certain diseases, such as typhoid fever or dehydration from cholera."},{"id":"x81","ch":"X","num":81,"question":"Welk van de onderstaande botten maakt anatomisch deel uit van de onderste ledematen (het been)?","options":[{"letter":"A","text":"Clavicula (Sleutelbeen)","text_en":"Clavicle (Collarbone)"},{"letter":"B","text":"Ulna (Ellepijp)","text_en":"Ulna"},{"letter":"C","text":"Fibula (Kuitbeen)","text_en":"Fibula (Calf bone)"},{"letter":"D","text":"Scapula (Schouderblad)","text_en":"Scapula (Shoulder blade)"}],"answer":"C","answerText":"Fibula (Kuitbeen)","q_en":"Which of the following bones anatomically forms part of the lower limbs (the leg)?","a_en":"Fibula (Calf bone)"},{"id":"x82","ch":"X","num":82,"question":"Volgens wetenschappelijk onderzoek naar levensverwachting (o.a. met tweelingen): Voor hoeveel procent worden de verschillen in levensduur tussen individuen over het algemeen verklaard door genetische (erfelijke) factoren?","options":[{"letter":"A","text":"0%","text_en":"0%"},{"letter":"B","text":"100%","text_en":"100%"},{"letter":"C","text":"Ongeveer 25%","text_en":"About 25%"},{"letter":"D","text":"Ongeveer 50%","text_en":"About 50%"}],"answer":"C","answerText":"Ongeveer 25%","q_en":"According to scientific research into life expectancy (among others with twins): what percentage of the differences in lifespan between individuals is generally explained by genetic (hereditary) factors?","a_en":"About 25%"},{"id":"x83","ch":"X","num":83,"question":"In welk specifiek deel van het mannelijk voortplantingsstelsel vindt de spermatogenese (de aanmaak en rijping van nieuwe spermacellen) plaats?","options":[{"letter":"A","text":"Tubuli seminiferi (Zaadbuisjes)","text_en":"Seminiferous tubules (Tubuli seminiferi)"},{"letter":"B","text":"Epididymis (Bijbal)","text_en":"Epididymis"},{"letter":"C","text":"Prostaat","text_en":"Prostate"},{"letter":"D","text":"Vas deferens (Zaadleider)","text_en":"Vas deferens (Ductus deferens)"}],"answer":"A","answerText":"Tubuli seminiferi (Zaadbuisjes)","q_en":"In which specific part of the male reproductive system does spermatogenesis (the production and maturation of new sperm cells) take place?","a_en":"Seminiferous tubules (Tubuli seminiferi)"},{"id":"x84","ch":"X","num":84,"question":"Wat is de biologische definitie van een antigeen?","options":[{"letter":"A","text":"Een cel die niet-eigen organismen direct aanvalt en vernietigt.","text_en":"A cell that directly attacks and destroys non-self organisms."},{"letter":"B","text":"Een onderdeel van het major histocompatibility complex (MHC).","text_en":"A component of the major histocompatibility complex (MHC)."},{"letter":"C","text":"Elke substantie die als 'lichaamsvreemd' wordt herkend en een immuunrespons kan opwekken.","text_en":"Any substance that is recognised as 'foreign to the body' and can elicit an immune response."},{"letter":"D","text":"Een afweerstof geproduceerd door het eigen lichaam.","text_en":"An antibody produced by the body itself."}],"answer":"C","answerText":"Elke substantie die als 'lichaamsvreemd' wordt herkend en een immuunrespons kan opwekken.","q_en":"What is the biological definition of an antigen?","a_en":"Any substance that is recognised as 'foreign to the body' and can elicit an immune response."},{"id":"x85","ch":"X","num":85,"question":"Wanneer we de vrouwelijke anatomie in het bekken van voor (anterieur) naar achter (posterieur) bekijken, in welke volgorde liggen de belangrijkste organen dan?","options":[{"letter":"A","text":"Urineblaas – Rectum – Baarmoeder","text_en":"Urinary bladder – Rectum – Uterus"},{"letter":"B","text":"Urineblaas – Baarmoeder/Vagina – Rectum","text_en":"Urinary bladder – Uterus/Vagina – Rectum"},{"letter":"C","text":"Baarmoeder – Urineblaas – Rectum","text_en":"Uterus – Urinary bladder – Rectum"},{"letter":"D","text":"Rectum – Vagina – Urineblaas","text_en":"Rectum – Vagina – Urinary bladder"}],"answer":"B","answerText":"Urineblaas – Baarmoeder/Vagina – Rectum","q_en":"When we view the female anatomy in the pelvis from front (anterior) to back (posterior), in which order do the main organs lie?","a_en":"Urinary bladder – Uterus/Vagina – Rectum"},{"id":"x86","ch":"X","num":86,"question":"Welk van de onderstaande structuren maakt GEEN deel uit van de extracellulaire matrix (ECM) van een weefsel?","options":[{"letter":"A","text":"Actinefilamenten","text_en":"Actin filaments"},{"letter":"B","text":"Glycoproteïnen","text_en":"Glycoproteins"},{"letter":"C","text":"Collageen","text_en":"Collagen"},{"letter":"D","text":"Fibronectine","text_en":"Fibronectin"}],"answer":"A","answerText":"Actinefilamenten","q_en":"Which of the following structures is NOT part of the extracellular matrix (ECM) of a tissue?","a_en":"Actin filaments"},{"id":"x87","ch":"X","num":87,"question":"Welk type spierweefsel bestaat uit spoelvormige cellen met slechts één kern per cel en vertoont geen dwarstreping onder de microscoop?","options":[{"letter":"A","text":"Glad spierweefsel (Smooth muscle)","text_en":"Smooth muscle tissue (Smooth muscle)"},{"letter":"B","text":"Gestreept spierweefsel","text_en":"Striated muscle tissue"},{"letter":"C","text":"Hartspierweefsel (Cardiac muscle)","text_en":"Cardiac muscle tissue (Cardiac muscle)"},{"letter":"D","text":"Skeletspierweefsel","text_en":"Skeletal muscle tissue"}],"answer":"A","answerText":"Glad spierweefsel (Smooth muscle)","q_en":"Which type of muscle tissue consists of spindle-shaped cells with only one nucleus per cell and shows no striations under the microscope?","a_en":"Smooth muscle tissue (Smooth muscle)"},{"id":"x88","ch":"X","num":88,"question":"Welke drie chemische elementen (ionen) spelen de meest cruciale rol bij zenuwgeleiding en neurotransmitter-afgifte?","options":[{"letter":"A","text":"Fosfor (P), Natrium (Na+) en Calcium (Ca2+)","text_en":"Phosphorus (P), Sodium (Na+) and Calcium (Ca2+)"},{"letter":"B","text":"Kalium (K+), Natrium (Na+) en Jodium (I-)","text_en":"Potassium (K+), Sodium (Na+) and Iodine (I-)"},{"letter":"C","text":"Calcium (Ca2+), Jodium (I-) en Kalium (K+)","text_en":"Calcium (Ca2+), Iodine (I-) and Potassium (K+)"},{"letter":"D","text":"Kalium (K+), Natrium (Na+) en Calcium (Ca2+)","text_en":"Potassium (K+), Sodium (Na+) and Calcium (Ca2+)"}],"answer":"D","answerText":"Kalium (K+), Natrium (Na+) en Calcium (Ca2+)","q_en":"Which three chemical elements (ions) play the most crucial role in nerve conduction and neurotransmitter release?","a_en":"Potassium (K+), Sodium (Na+) and Calcium (Ca2+)"},{"id":"x89","ch":"X","num":89,"question":"Uit welk specifiek type kraakbeen bestaat het pre-skelet van een foetus voordat de endochondrale ossificatie (botvorming) plaatsvindt?","options":[{"letter":"A","text":"Hyalien kraakbeen (Hyaline cartilage)","text_en":"Hyaline cartilage (Hyaline cartilage)"},{"letter":"B","text":"Vezelkraakbeen (Fibrocartilage)","text_en":"Fibrocartilage"},{"letter":"C","text":"Elastisch kraakbeen","text_en":"Elastic cartilage"},{"letter":"D","text":"Protocartilage","text_en":"Protocartilage"}],"answer":"A","answerText":"Hyalien kraakbeen (Hyaline cartilage)","q_en":"From which specific type of cartilage does the pre-skeleton of a foetus consist before endochondral ossification (bone formation) takes place?","a_en":"Hyaline cartilage (Hyaline cartilage)"},{"id":"x90","ch":"X","num":90,"question":"Wat is het meest voorkomende, actieve en levende celtype in de dermis (lederhuid)?","options":[{"letter":"A","text":"Osteocyten","text_en":"Osteocytes"},{"letter":"B","text":"Keratinocyten","text_en":"Keratinocytes"},{"letter":"C","text":"Fibroblasten","text_en":"Fibroblasts"},{"letter":"D","text":"Melanocyten","text_en":"Melanocytes"}],"answer":"C","answerText":"Fibroblasten","q_en":"What is the most common, active and living cell type in the dermis (corium)?","a_en":"Fibroblasts"},{"id":"x91","ch":"X","num":91,"question":"Beenderen genezen na een breuk aanzienlijk sneller en beter dan kraakbeen na een scheur. Wat is hiervan de fysiologische oorzaak?","options":[{"letter":"A","text":"Chondrocyten verdwijnen volledig na de kindertijd.","text_en":"Chondrocytes disappear completely after childhood."},{"letter":"B","text":"Beenderen bevatten stamcellen, terwijl kraakbeen dat niet heeft.","text_en":"Bones contain stem cells, whereas cartilage does not."},{"letter":"C","text":"Kraakbeen wordt enkel aangemaakt bij de geboorte en vernieuwt zich daarna nooit meer.","text_en":"Cartilage is only produced at birth and never renews itself afterwards."},{"letter":"D","text":"Botweefsel heeft een uitstekende bloedtoevoer, terwijl kraakbeen avasculair is.","text_en":"Bone tissue has an excellent blood supply, whereas cartilage is avascular."}],"answer":"D","answerText":"Botweefsel heeft een uitstekende bloedtoevoer, terwijl kraakbeen avasculair is.","q_en":"Bones heal considerably faster and better after a fracture than cartilage does after a tear. What is the physiological cause of this?","a_en":"Bone tissue has an excellent blood supply, whereas cartilage is avascular."},{"id":"x92","ch":"X","num":92,"question":"Welk type epitheelweefsel bekleedt het grootste deel van de luchtwegen en lijkt uit meerdere lagen te bestaan omdat de celkernen op verschillende hoogtes liggen, hoewel elke cel contact maakt met de basale membraan?","options":[{"letter":"A","text":"Eénlagig plaveiselepitheel (Simple squamous)","text_en":"Simple squamous epithelium (Simple squamous)"},{"letter":"B","text":"Eénlagig kubisch epitheel","text_en":"Simple cuboidal epithelium"},{"letter":"C","text":"Pseudostratified ciliated columnar epitheel (Meerrijig trilhaarepitheel)","text_en":"Pseudostratified ciliated columnar epithelium (Pseudostratified ciliated epithelium)"},{"letter":"D","text":"Meerlagig cilindrisch epitheel (Stratified columnar)","text_en":"Stratified columnar epithelium (Stratified columnar)"}],"answer":"C","answerText":"Pseudostratified ciliated columnar epitheel (Meerrijig trilhaarepitheel)","q_en":"Which type of epithelial tissue lines the greater part of the airways and appears to consist of multiple layers because the nuclei lie at different heights, although every cell makes contact with the basement membrane?","a_en":"Pseudostratified ciliated columnar epithelium (Pseudostratified ciliated epithelium)"},{"id":"x93","ch":"X","num":93,"question":"In het epitheel van de luchtwegen bevinden zich speciale cellen die vorm hebben van een wijnglas of bokaal. Hoe heten deze cellen en wat is hun functie?","options":[{"letter":"A","text":"Vetcellen (Adipocyten); ze isoleren de luchtwegen.","text_en":"Fat cells (Adipocytes); they insulate the airways."},{"letter":"B","text":"Slijmbekercellen (Goblet cells); ze scheiden mucus (slijm) af.","text_en":"Goblet cells (Goblet cells); they secrete mucus (slime)."},{"letter":"C","text":"Receptorcellen; ze registreren temperatuurverschillen in de ingeademde lucht.","text_en":"Receptor cells; they register temperature differences in the inhaled air."},{"letter":"D","text":"Basale cellen; ze slaan energie op in de vorm van glycogeen.","text_en":"Basal cells; they store energy in the form of glycogen
