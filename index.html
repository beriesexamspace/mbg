twikkeling van botten in de foetus?","options":[{"letter":"A","text":"Chondroblasten","text_en":"Chondroblasts"},{"letter":"B","text":"Osteoblasten","text_en":"Osteoblasts"},{"letter":"C","text":"Osteoclasten","text_en":"Osteoclasts"},{"letter":"D","text":"Osteocyt","text_en":"Osteocyte"}],"answer":"A","answerText":"Chondroblasten","q_en":"Which of these cell types functions earliest in the formation and development of bones in the fetus?","a_en":"Chondroblasts"},{"id":"x293","ch":"X","num":293,"question":"Welke van de volgende helpt het best om het skelet van een man te onderscheiden van dat van een vrouw?","options":[{"letter":"A","text":"Het meten van de lengte van het dijbeen en de bovenarm","text_en":"Measuring the length of the femur and the upper arm"},{"letter":"B","text":"Het onderzoeken van de bekkenopening","text_en":"Examining the pelvic opening"},{"letter":"C","text":"Het onderzoeken van de vorm van de schedel","text_en":"Examining the shape of the skull"},{"letter":"D","text":"Het onderzoeken van de botdichtheid","text_en":"Examining the bone density"}],"answer":"B","answerText":"Het onderzoeken van de bekkenopening","q_en":"Which of the following best helps to distinguish a male skeleton from a female one?","a_en":"Examining the pelvic opening"},{"id":"x294","ch":"X","num":294,"question":"Alle volgende processen gaan door in het skeletsysteem gedurende de hele levensduur, behalve:","options":[{"letter":"A","text":"Stamcellen blijven nieuwe bloedcellen vormen","text_en":"Stem cells continue to form new blood cells"},{"letter":"B","text":"Botten blijven langer worden","text_en":"Bones continue to grow longer"},{"letter":"C","text":"Botten blijven worden verbouwd (remodeling)","text_en":"Bones continue to be remodeled"},{"letter":"D","text":"Botten blijven mineralen opslaan","text_en":"Bones continue to store minerals"}],"answer":"B","answerText":"Botten blijven langer worden","q_en":"All of the following processes continue in the skeletal system throughout life, except:","a_en":"Bones continue to grow longer"},{"id":"x295","ch":"X","num":295,"question":"Welk soort gewricht is in wezen onbeweeglijk?","options":[{"letter":"A","text":"Kogelgewricht (ball-and-socket joint)","text_en":"Ball-and-socket joint"},{"letter":"B","text":"Scharniergewricht (hinge joint)","text_en":"Hinge joint"},{"letter":"C","text":"Kraakbeengewricht (cartilaginous joint)","text_en":"Cartilaginous joint"},{"letter":"D","text":"Vezelgewricht (fibrous joint)","text_en":"Fibrous joint"}],"answer":"D","answerText":"Vezelgewricht (fibrous joint)","q_en":"Which type of joint is essentially immovable?","a_en":"Fibrous joint"},{"id":"x296","ch":"X","num":296,"question":"Spieren die elkaar tegenwerken en tegengestelde bewegingen veroorzaken, worden omschreven als:","options":[{"letter":"A","text":"Oppositioneel","text_en":"Oppositional"},{"letter":"B","text":"Synergistisch","text_en":"Synergistic"},{"letter":"C","text":"Antagonistisch","text_en":"Antagonistic"},{"letter":"D","text":"Coöperatief","text_en":"Cooperative"}],"answer":"C","answerText":"Antagonistisch","q_en":"Muscles that oppose each other and cause opposite movements are described as:","a_en":"Antagonistic"},{"id":"x297","ch":"X","num":297,"question":"Welke van de volgende keuzes rangschikt de structuren van grootst (meest omvattend) naar kleinst? (1) spiervezel, (2) fascikel/spierbundel, (3) myofibril, en (4) spier","options":[{"letter":"A","text":"4-2-3-1","text_en":"4-2-3-1"},{"letter":"B","text":"4-2-1-3","text_en":"4-2-1-3"},{"letter":"C","text":"2-3-1-4","text_en":"2-3-1-4"},{"letter":"D","text":"1-2-3-4","text_en":"1-2-3-4"}],"answer":"B","answerText":"4-2-1-3","q_en":"Which of the following choices ranks the structures from largest (most encompassing) to smallest? (1) muscle fiber, (2) fascicle/muscle bundle, (3) myofibril, and (4) muscle","a_en":"4-2-1-3"},{"id":"x298","ch":"X","num":298,"question":"Skeletspieren zijn met de botten verbonden via de ______, van ______ naar ______.","options":[{"letter":"A","text":"gladde spieren … aanhechting (insertie) … oorsprong","text_en":"smooth muscles … insertion … origin"},{"letter":"B","text":"pezen … oorsprong … aanhechting (insertie)","text_en":"tendons … origin … insertion"},{"letter":"C","text":"fascie … oorsprong … aanhechting (insertie)","text_en":"fascia … origin … insertion"},{"letter":"D","text":"myofibrillen … oorsprong … pezen","text_en":"myofibrils … origin … tendons"}],"answer":"B","answerText":"pezen … oorsprong … aanhechting (insertie)","q_en":"Skeletal muscles are connected to the bones via the ______, from ______ to ______.","a_en":"tendons … origin … insertion"},{"id":"x299","ch":"X","num":299,"question":"Botulinetoxine remt de afgifte van acetylcholine bij de neuromusculaire overgangen. Welk effect heeft dit op de spieractiviteit?","options":[{"letter":"A","text":"Spieren zullen voortdurend samentrekken.","text_en":"Muscles will contract continuously."},{"letter":"B","text":"Spieren zullen niet samentrekken omdat ze geen zenuwstimulatie ontvangen.","text_en":"Muscles will not contract because they receive no nerve stimulation."},{"letter":"C","text":"Er zal geen effect zijn op de spieractiviteit.","text_en":"There will be no effect on muscle activity."},{"letter":"D","text":"Spieren zullen sporadisch samentrekken, zonder bewuste controle.","text_en":"Muscles will contract sporadically, without conscious control."}],"answer":"B","answerText":"Spieren zullen niet samentrekken omdat ze geen zenuwstimulatie ontvangen.","q_en":"Botulinum toxin inhibits the release of acetylcholine at the neuromuscular junctions. What effect does this have on muscle activity?","a_en":"Muscles will not contract because they receive no nerve stimulation."},{"id":"x300","ch":"X","num":300,"question":"Het glijdende filamentmechanisme (sliding filament mechanism) beschrijft het proces waarbij:","options":[{"letter":"A","text":"spiervezels langs elkaar schuiven","text_en":"muscle fibers slide past each other"},{"letter":"B","text":"troponine en tropomyosine ten opzichte van elkaar schuiven","text_en":"troponin and tropomyosin slide relative to each other"},{"letter":"C","text":"sarcomeren ten opzichte van elkaar schuiven","text_en":"sarcomeres slide relative to each other"},{"letter":"D","text":"actine en myosine ten opzichte van elkaar schuiven","text_en":"actin and myosin slide relative to each other"}],"answer":"D","answerText":"actine en myosine ten opzichte van elkaar schuiven","q_en":"The sliding filament mechanism describes the process in which:","a_en":"actin and myosin slide relative to each other"},{"id":"x301","ch":"X","num":301,"question":"Welke van de volgende spieren kan alleen door een zenuwcel worden gestimuleerd?","options":[{"letter":"A","text":"gladde spier","text_en":"smooth muscle"},{"letter":"B","text":"dwarsgestreepte spier","text_en":"striated muscle"},{"letter":"C","text":"hartspier","text_en":"cardiac muscle"},{"letter":"D","text":"skeletspier","text_en":"skeletal muscle"}],"answer":"D","answerText":"skeletspier","q_en":"Which of the following muscles can only be stimulated by a nerve cell?","a_en":"skeletal muscle"},{"id":"x302","ch":"X","num":302,"question":"Al het volgende kan gebeuren als reactie op training behalve:","options":[{"letter":"A","text":"toename van het aantal mitochondriën","text_en":"an increase in the number of mitochondria"},{"letter":"B","text":"toename van het aantal spiervezels","text_en":"an increase in the number of muscle fibers"},{"letter":"C","text":"toename van de opslag van glycogeen en creatinefosfaat","text_en":"an increase in the storage of glycogen and creatine phosphate"},{"letter":"D","text":"toename van het aantal myofibrillen","text_en":"an increase in the number of myofibrils"}],"answer":"B","answerText":"toename van het aantal spiervezels","q_en":"All of the following can happen in response to training except:","a_en":"an increase in the number of muscle fibers"},{"id":"x303","ch":"X","num":303,"question":"Welke van de volgende kenmerken zijn typerend voor langzame (slow-twitch) spiervezels?","options":[{"letter":"A","text":"myoglobinegehalte maakt zuurstofopslag mogelijk","text_en":"myoglobin content allows oxygen storage"},{"letter":"B","text":"talrijke mitochondriën","text_en":"numerous mitochondria"},{"letter":"C","text":"zowel (b) als (c)","text_en":"both (b) and (c)"},{"letter":"D","text":"grote hoeveelheden glycogeenopslag","text_en":"large amounts of glycogen storage"}],"answer":"C","answerText":"zowel (b) als (c)","q_en":"Which of the following characteristics are typical of slow-twitch muscle fibers?","a_en":"both (b) and (c)"},{"id":"x304","ch":"X","num":304,"question":"Waar worden calciumionen (Ca 2+ ) opgeslagen in spiercellen?","options":[{"letter":"A","text":"sarcoplasmatisch reticulum","text_en":"sarcoplasmic reticulum"},{"letter":"B","text":"actinefilamenten","text_en":"actin filaments"},{"letter":"C","text":"myosinefilamenten","text_en":"myosin filaments"},{"letter":"D","text":"T-tubuli","text_en":"T-tubules"}],"answer":"A","answerText":"sarcoplasmatisch reticulum","q_en":"Where are calcium ions (Ca 2+ ) stored in muscle cells?","a_en":"sarcoplasmic reticulum"},{"id":"x305","ch":"X","num":305,"question":"Wat is de rol van ATP in de spierfunctie?","options":[{"letter":"A","text":"ATP levert energie waardoor myosine kruisbruggen met actine kan vormen.","text_en":"ATP provides energy that allows myosin to form cross-bridges with actin."},{"letter":"B","text":"ATP levert energie om calcium terug te transporteren naar de opslag.","text_en":"ATP provides energy to transport calcium back to storage."},{"letter":"C","text":"alle bovenstaande","text_en":"all of the above"},{"letter":"D","text":"ATP zorgt ervoor dat myosine loskomt van actine.","text_en":"ATP causes myosin to detach from actin."}],"answer":"C","answerText":"alle bovenstaande","q_en":"What is the role of ATP in muscle function?","a_en":"all of the above"},{"id":"x306","ch":"X","num":306,"que taande","q_en":"Which of the following is/are involved in the regulation of blood pressure?","a_en":"all of the above"},{"id":"x334","ch":"X","num":334,"question":"Welke van de volgende zou een geschikte homeostatische reactie zijn op een daling van de bloeddruk onder de normale waarde?","options":[{"letter":"A","text":"kracht van de hartcontractie neemt af","text_en":"force of the heart contraction decreases"},{"letter":"B","text":"zowel (a) als (b)","text_en":"both (a) and (b)"},{"letter":"C","text":"vasoconstrictie van arteriolen","text_en":"vasoconstriction of arterioles"},{"letter":"D","text":"hartslag daalt","text_en":"heart rate decreases"}],"answer":"C","answerText":"vasoconstrictie van arteriolen","q_en":"Which of the following would be an appropriate homeostatic response to a drop in blood pressure below the normal value?","a_en":"vasoconstriction of arterioles"},{"id":"x335","ch":"X","num":335,"question":"Waarom veroorzaken hartaanvallen permanente weefselschade?","options":[{"letter":"A","text":"Myocardcellen kunnen niet ontspannen","text_en":"Myocardial cells cannot relax"},{"letter":"B","text":"De sinoatriale knopen kunnen de hartcyclus niet herstellen.","text_en":"The sinoatrial nodes cannot restore the cardiac cycle."},{"letter":"C","text":"Hartcellen sterven door gebrek aan bloedtoevoer.","text_en":"Heart cells die due to a lack of blood supply."},{"letter":"D","text":"Purkinjevezels geven zenuwimpulsen niet goed door.","text_en":"Purkinje fibers do not properly transmit nerve impulses."}],"answer":"C","answerText":"Hartcellen sterven door gebrek aan bloedtoevoer.","q_en":"Why do heart attacks cause permanent tissue damage?","a_en":"Heart cells die due to a lack of blood supply."},{"id":"x336","ch":"X","num":336,"question":"Cholesterol wordt vanuit de bloedvaten naar de lever getransporteerd door:","options":[{"letter":"A","text":"rode bloedcellen","text_en":"red blood cells"},{"letter":"B","text":"LDL","text_en":"LDL"},{"letter":"C","text":"HDL","text_en":"HDL"},{"letter":"D","text":"de lymfe","text_en":"the lymph"}],"answer":"C","answerText":"HDL","q_en":"Cholesterol is transported from the blood vessels to the liver by:","a_en":"HDL"},{"id":"x337","ch":"X","num":337,"question":"Een hartaanval treedt op als gevolg van:","options":[{"letter":"A","text":"langdurige hypotensie","text_en":"prolonged hypotension"},{"letter":"B","text":"vernauwing of blokkering van de kransslagaders","text_en":"narrowing or blockage of the coronary arteries"},{"letter":"C","text":"verstoring van het hartgeleidingssysteem","text_en":"disruption of the cardiac conduction system"},{"letter":"D","text":"onjuiste sluiting van de halvemaanvormige kleppen","text_en":"improper closure of the semilunar valves"}],"answer":"B","answerText":"vernauwing of blokkering van de kransslagaders","q_en":"A heart attack occurs as a result of:","a_en":"narrowing or blockage of the coronary arteries"},{"id":"x338","ch":"X","num":338,"question":"Welke van de volgende beweringen over virussen is onjuist?","options":[{"letter":"A","text":"Virale infecties kunnen over het algemeen worden bestreden met antibiotica.","text_en":"Viral infections can generally be treated with antibiotics."},{"letter":"B","text":"Virussen coderen hun eigen genoom.","text_en":"Viruses encode their own genome."},{"letter":"C","text":"Virussen hebben een gastcel nodig om zich voort te planten.","text_en":"Viruses require a host cell to reproduce."},{"letter":"D","text":"Virussen zijn gevoelig voor interferonen.","text_en":"Viruses are sensitive to interferons."}],"answer":"A","answerText":"Virale infecties kunnen over het algemeen worden bestreden met antibiotica.","q_en":"Which of the following statements about viruses is incorrect?","a_en":"Viral infections can generally be treated with antibiotics."},{"id":"x339","ch":"X","num":339,"question":"Welke van de volgende pathogene agentia missen nucleïnezuren?","options":[{"letter":"A","text":"virussen","text_en":"viruses"},{"letter":"B","text":"bacteriën","text_en":"bacteria"},{"letter":"C","text":"helminten (wormen)","text_en":"helminths (worms)"},{"letter":"D","text":"prionen","text_en":"prions"}],"answer":"D","answerText":"prionen","q_en":"Which of the following pathogenic agents lack nucleic acids?","a_en":"prions"},{"id":"x340","ch":"X","num":340,"question":"Beschouw de volgende groep ziekten: difterie, tuberculose, longontsteking en cholera. Wat hebben deze ziekten gemeen?","options":[{"letter":"A","text":"Ze komen veel voor bij HIV-positieve patiënten.","text_en":"They are common in HIV-positive patients."},{"letter":"B","text":"Ze kunnen niet met antibiotica worden behandeld.","text_en":"They cannot be treated with antibiotics."},{"letter":"C","text":"Ze worden veroorzaakt door virussen.","text_en":"They are caused by viruses."},{"letter":"D","text":"Ze worden veroorzaakt door bacteriën","text_en":"They are caused by bacteria"}],"answer":"D","answerText":"Ze worden veroorzaakt door bacteriën","q_en":"Consider the following group of diseases: diphtheria, tuberculosis, pneumonia and cholera. What do these diseases have in common?","a_en":"They are caused by bacteria"},{"id":"x341","ch":"X","num":341,"question":"Welke van de volgende beweringen is waar met betrekking tot prionziekten?","options":[{"letter":"A","text":"Ze worden veroorzaakt door een dodelijk type virus.","text_en":"They are caused by a lethal type of virus."},{"letter":"B","text":"Ze kunnen gemakkelijk met antibiotica worden behandeld.","text_en":"They can easily be treated with antibiotics."},{"letter":"C","text":"Ze veroorzaken ophoping van verkeerd gevouwen eiwitten in hersencellen.","text_en":"They cause an accumulation of misfolded proteins in brain cells."},{"letter":"D","text":"Ze kunnen worden voorkomen door vaccinaties.","text_en":"They can be prevented by vaccinations."}],"answer":"C","answerText":"Ze veroorzaken ophoping van verkeerd gevouwen eiwitten in hersencellen.","q_en":"Which of the following statements is true regarding prion diseases?","a_en":"They cause an accumulation of misfolded proteins in brain cells."},{"id":"x342","ch":"X","num":342,"question":"Welke van de volgende is een voordeel van residente bacteriën?","options":[{"letter":"A","text":"Residente bacteriën zorgen ervoor dat de maag zuur is.","text_en":"Resident bacteria keep the stomach acidic."},{"letter":"B","text":"Residente bacteriën kunnen concurreren met schadelijke bacteriën en de incidentie van infecties verlagen.","text_en":"Resident bacteria can compete with harmful bacteria and reduce the incidence of infections."},{"letter":"C","text":"Residente bacteriën produceren antivirale stoffen die virale infecties voorkomen.","text_en":"Resident bacteria produce antiviral substances that prevent viral infections."},{"letter":"D","text":"Residente bacteriën verteren cellulose in het menselijke spijsverteringskanaal","text_en":"Resident bacteria digest cellulose in the human digestive tract"}],"answer":"B","answerText":"Residente bacteriën kunnen concurreren met schadelijke bacteriën en de incidentie van infecties verlagen.","q_en":"Which of the following is a benefit of resident bacteria?","a_en":"Resident bacteria can compete with harmful bacteria and reduce the incidence of infections."},{"id":"x343","ch":"X","num":343,"question":"Het DiGeorge-syndroom is een aangeboren ziekte die resulteert in een slecht ontwikkelde, niet-functionerende thymusklier. Welk van de volgende problemen zou waarschijnlijk voorkomen bij een baby met het DiGeorge-syndroom?","options":[{"letter":"A","text":"een tekort aan B-cellen","text_en":"a deficiency of B cells"},{"letter":"B","text":"een tekort aan antilichamen","text_en":"a deficiency of antibodies"},{"letter":"C","text":"een tekort aan macrofagen","text_en":"a deficiency of macrophages"},{"letter":"D","text":"een tekort aan T-cellen","text_en":"a deficiency of T cells"}],"answer":"D","answerText":"een tekort aan T-cellen","q_en":"DiGeorge syndrome is a congenital disease that results in a poorly developed, non-functioning thymus gland. Which of the following problems would most likely occur in a baby with DiGeorge syndrome?","a_en":"a deficiency of T cells"},{"id":"x344","ch":"X","num":344,"question":"De volgende stappen vinden plaats in de fagocytose: (1) de bacterie wordt verteerd door lysosomale enzymen, (2) de fagocyt nadert de bacterie, (3) de fagocytische blaas versmelt met het lysosoom en (4) de fagocyt slokt de bacterie op en vormt een fagocytische blaas. In welke volgorde vinden deze stappen plaats?","options":[{"letter":"A","text":"4-2-3-1","text_en":"4-2-3-1"},{"letter":"B","text":"4-1-3-2","text_en":"4-1-3-2"},{"letter":"C","text":"2-4-3-1","text_en":"2-4-3-1"},{"letter":"D","text":"2-3-4-1","text_en":"2-3-4-1"}],"answer":"C","answerText":"2-4-3-1","q_en":"The following steps occur in phagocytosis: (1) the bacterium is digested by lysosomal enzymes, (2) the phagocyte approaches the bacterium, (3) the phagocytic vesicle fuses with the lysosome and (4) the phagocyte engulfs the bacterium and forms a phagocytic vesicle. In what order do these steps occur?","a_en":"2-4-3-1"},{"id":"x345","ch":"X","num":345,"question":"In welke van de volgende keuzes is de cel correct gekoppeld aan zijn functie?","options":[{"letter":"A","text":"eosinofiel: produceert antilichamen","text_en":"eosinophil: produces antibodies"},{"letter":"B","text":"B-lymfocyt, direct valt vreemde cellen aan","text_en":"B lymphocyte: directly attacks foreign cells"},{"letter":"C","text":"basofiel: scheidt histamine af","text_en":"basophil: secretes histamine"},{"letter":"D","text":"T-lymfocyt: fagocyteert bacteriën","text_en":"T lymphocyte: phagocytoses bacteria"}],"answer":"C","answerText":"basofiel: scheidt histamine af","q_en":"In which of the following choices is the cell correctly matched to its function?","a_en":"basophil: secretes histamine"},{"id":"x346","ch":"X","num":346,"question":"De derde verdedigingslinie omvat","options":[{"letter":"A","text":"fagocyten","text_en":"phagocytes"},{"letter":"B","text":"MHC-eiwitten","text_en":"MHC proteins"},{"letter":"C","text":"ontsteking","text_en":"inflammation"},{"letter":"D","text":"maagzuur","text_en":"stomach acid"}],"answer":"B","answerText":"MHC-eiwitten","q_en":"The third line of defense includes","a_en":"MHC proteins"},{"id":"x347","ch":"X","num":347,"question":"Welke van de volgende factoren verhoogt de kans op succesvolle orgaantransplantatie?","options":[{"letter":"A","text":"toediening van immunosuppressiva","text_en":"administration of immunosuppressants"},{"letter":"B","text":"het matchen van de ABO-bloedgroepantigenen","text_en":"matching the ABO blood group antigens"},{"letter":"C","text":"het matchen van de MHC-weefselantigenen","text_en":"matching the MHC tissue antigens"},{"letter":"D","text":"al deze opties","text_en":"all of these options"}],"answer":"D","answerText":"al deze opties","q_en":"Which of the following factors increases the chance of a successful organ transplant?","a_en":"all of these options"},{"id":"x348","ch":"X","num":348,"question":"Welke van de volgende hoort niet bij de andere?","options":[{"letter":"A","text":"theumatoïde artritis","text_en":"rheumatoid arthritis"},{"letter":"B","text":"anafylactische shock","text_en":"anaphylactic shock"},{"letter":"C","text":"lupus erythematosus","text_en":"lupus erythematosus"},{"letter":"D","text":"diabetes mellitus type 1","text_en":"type 1 diabetes mellitus"}],"answer":"B","answerText":"anafylactische shock","q_en":"Which of the following does not belong with the others?","a_en":"anaphylactic shock"},{"id":"x349","ch":"X","num":349,"question":"Welke van de volgende beweringen over hiv is waar?","options":[{"letter":"A","text":"Latexcondooms zijn 100% effectief in het blokkeren van overdracht van hiv","text_en":"Latex condoms are 100% effective in blocking the transmission of HIV"},{"letter":"B","text":"Hiv verstoort specifiek de celgemedieerde immuunrespons.","text_en":"HIV specifically disrupts the cell-mediated immune response."},{"letter":"C","text":"Anti-hiv-medicijnen zoals AZT en metaviroc kunnen een hiv-infectie genezen","text_en":"Anti-HIV drugs such as AZT and maraviroc can cure an HIV infection"},{"letter":"D","text":"De meeste personen die fase II van een hiv-infectie bereiken, blijven in fase II en bereiken nooit fase III (aids)","text_en":"Most people who reach stage II of an HIV infection remain in stage II and never reach stage III (AIDS)"}],"answer":"B","answerText":"Hiv verstoort specifiek de celgemedieerde immuunrespons.","q_en":"Which of the following statements about HIV is true?","a_en":"HIV specifically disrupts the cell-mediated immune response."},{"id":"x350","ch":"X","num":350,"question":"Welke van de volgende lijsten geeft de volgorde weer van de structuren waar lucht doorheen gaat tijdens de inspiratie?","options":[{"letter":"A","text":"neus, keelholte, luchtpijp, strottenhoofd, bronchiolen, bronchiën, longblaasjes","text_en":"nose, pharynx, trachea, larynx, bronchioles, bronchi, alveoli"},{"letter":"B","text":"longblaasjes, bronchiolen, bronchiën, luchtpijp, strottenhoofd, keelholte, neus","text_en":"alveoli, bronchioles, bronchi, trachea, larynx, pharynx, nose"},{"letter":"C","text":"neus, keelholte, strottenhoofd, bronchiën, bronchiolen, luchtpijp, longblaasjes","text_en":"nose, pharynx, larynx, bronchi, bronchioles, trachea, alveoli"},{"letter":"D","text":"neus, keelholte, strottenhoofd, luchtpijp, bronchiën, bronchiolen, longblaasjes","text_en":"nose, pharynx, larynx, trachea, bronchi, bronchioles, alveoli"}],"answer":"D","answerText":"neus, keelholte, strottenhoofd, luchtpijp, bronchiën, bronchiolen, longblaasjes","q_en":"Which of the following lists represents the order of the structures through which air passes during inspiration?","a_en":"nose, pharynx, larynx, trachea, bronchi, bronchioles, alveoli"},{"id":"x351","ch":"X","num":351,"question":"Tijdens acute epiglottitis zwelt de epiglottis op tot meerdere malen de normale grootte. Dit zou direct interfereren met:","options":[{"letter":"A","text":"gasuitwisseling in de longblaasjes","text_en":"gas exchange in the alveoli"},{"letter":"B","text":"externe ademhaling","text_en":"external respiration"},{"letter":"C","text":"interne ademhaling","text_en":"internal respiration"},{"letter":"D","text":"ademhaling","text_en":"breathing"}],"answer":"D","answerText":"ademhaling","q_en":"During acute epiglottitis, the epiglottis swells to several times its normal size. This would directly interfere with:","a_en":"breathing"},{"id":"x352","ch":"X","num":352,"question":"Welke van de volgende acties volgt op de inademing (of resulteert in inademing)?","options":[{"letter":"A","text":"Het middenrif ontspant.","text_en":"The diaphragm relaxes."},{"letter":"B","text":"De epiglottis sluit.","text_en":"The epiglottis closes."},{"letter":"C","text":"Surfactanten worden in de alveoli afgegeven.","text_en":"Surfactants are released into the alveoli."},{"letter":"D","text":"Het middenrif en de intercostale spieren trekken samen.","text_en":"The diaphragm and the intercostal muscles contract."}],"answer":"D","answerText":"Het middenrif en de intercostale spieren trekken samen.","q_en":"Which of the following actions follows inhalation (or results in inhalation)?","a_en":"The diaphragm and the intercostal muscles contract."},{"id":"x353","ch":"X","num":353,"question":"De bronchiolen zijn:","options":[{"letter":"A","text":"groter dan de bronchiën","text_en":"larger than the bronchi"},{"letter":"B","text":"gelegen tussen de bronchiën en de alveoli","text_en":"located between the bronchi and the alveoli"},{"letter":"C","text":"opengehouden door kraakbeenringen","text_en":"held open by rings of cartilage"},{"letter":"D","text":"een belangrijke plaats voor gasuitwisseling in de longen","text_en":"a major site of gas exchange in the lungs"}],"answer":"B","answerText":"gelegen tussen de bronchiën en de alveoli","q_en":"The bronchioles are:","a_en":"located between the bronchi and the alveoli"},{"id":"x354","ch":"X","num":354,"question":"Welk van de volgende onderdelen van de luchtwegen bevat geen spierweefsel?","options":[{"letter":"A","text":"bronchiën","text_en":"bronchi"},{"letter":"B","text":"alveoli","text_en":"alveoli"},{"letter":"C","text":"trachea","text_en":"trachea"},{"letter":"D","text":"bronchiolen","text_en":"bronchioles"}],"answer":"B","answerText":"alveoli","q_en":"Which of the following parts of the airways contains no muscle tissue?","a_en":"alveoli"},{"id":"x355","ch":"X","num":355,"question":"In tegenstelling tot de capillairen in de systemische circulatie, komt in de longencirculatie, ………………….. bloed binnen bij de capillairen vanuit de arteriolen en ………………………………. Bloed verlaat de capillairen voor de venulen.","options":[{"letter":"A","text":"zuurstofrijk, zuurstofarm","text_en":"oxygen-rich, oxygen-poor"},{"letter":"B","text":"zuurstofarm, zuurstofrijk","text_en":"oxygen-poor, oxygen-rich"},{"letter":"C","text":"zuurstofarm, zuurstofarm","text_en":"oxygen-poor, oxygen-poor"},{"letter":"D","text":"zuurstofrijk, zuurstofrijk","text_en":"oxygen-rich, oxygen-rich"}],"answer":"B","answerText":"zuurstofarm, zuurstofrijk","q_en":"Unlike the capillaries in the systemic circulation, in the pulmonary circulation, ………………….. blood enters the capillaries from the arterioles and ………………………………. blood leaves the capillaries toward the venules.","a_en":"oxygen-poor, oxygen-rich"},{"id":"x356","ch":"X","num":356,"question":"Botulinetoxine verstoort de overdracht van zenuwimpulsen (actiepotentialen) naar de skeletspieren. Dit verstoort direct:","options":[{"letter":"A","text":"ademhaling","text_en":"breathing"},{"letter":"B","text":"cellulaire ademhaling","text_en":"cellular respiration"},{"letter":"C","text":"gasuitwisseling","text_en":"gas exchange"},{"letter":"D","text":"externe ademhaling","text_en":"external respiration"}],"answer":"A","answerText":"ademhaling","q_en":"Botulinum toxin disrupts the transmission of nerve impulses (action potentials) to the skeletal muscles. This directly disrupts:","a_en":"breathing"},{"id":"x357","ch":"X","num":357,"question":"Tijdens een ademhalingscyclus, wanneer het middenrif en de intercostale spieren ……………, het volume van de pleurale holte …………………………… en de lucht beweegt …………………………. de longen.","options":[{"letter":"A","text":"samentrekken… toenemen ……… in","text_en":"contract… increases ……… into"},{"letter":"B","text":"samentrekken ………. afnemen ………… in","text_en":"contract ………. decreases ………… into"},{"letter":"C","text":"ontspannen……….. toenemen……..uit","text_en":"relax……….. increases……..out of"},{"letter":"D","text":"ontspannen... afnemen... in","text_en":"relax... decreases... into"}],"answer":"A","answerText":"samentrekken… toenemen ……… in","q_en":"During a respiratory cycle, when the diaphragm and the intercostal muscles ……………, the volume of the pleural cavity …………………………… and air moves …………………………. the lungs.","a_en":"contract… increases ……… into"},{"id":"x358","ch":"X","num":358,"question":"Welke van de volgende heeft de hoogste Po₂ (partiële zuurstofdruk)?","options":[{"letter":"A","text":"interstitiële vloeistof","text_en":"interstitial fluid"},{"letter":"B","text":"alveolaire lucht","text_en":"alveolar air"},{"letter":"C","text":"longslagader","text_en":"pulmonary artery"},{"letter":"D","text":"longader","text_en":"pulmonary vein"}],"answer":"B","answerText":"alveolaire lucht","q_en":"Which of the following has the highest Po₂ (partial pressure of oxygen)?","a_en":"alveolar air"},{"id":"x359","ch":"X","num":359,"question":"Roken veroorzaakt geen:","options":[{"letter":"A","text":"astma","text_en":"asthma"},{"letter":"B","text":"emfyseem","text_en":"emphysema"},{"letter":"C","text":"cystische fibrose","text_en":"cystic fibrosis"},{"letter":"D","text":"chronische bronchitis","text_en":"chronic bronchitis"}],"answer":"C","answerText":"cystische fibrose","q_en":"Smoking does not cause:","a_en":"cystic fibrosis"},{"id":"x360","ch":"X","num":360,"question":"In het bloed wordt O₂ voornamelijk getransporteerd ……………………., terwijl CO₂ voornamelijk wordt getransporteerd …………………….","options":[{"letter":"A","text":"opgelost in plasma... als carbaminohemoglobine","text_en":"dissolved in plasma... as carbaminohemoglobin"},{"letter":"B","text":"als oxyhemoglobine... als bicarbonaat in plasma","text_en":"as oxyhemoglobin... as bicarbonate in plasma"},{"letter":"C","text":"als oxyhemoglobine.... als carbaminohemoglobine","text_en":"as oxyhemoglobin.... as carbaminohemoglobin"},{"letter":"D","text":"als oxyhemoglobine.... opgelost in plasma","text_en":"as oxyhemoglobin.... dissolved in plasma"}],"answer":"B","answerText":"als oxyhemoglobine... als bicarbonaat in plasma","q_en":"In the blood, O₂ is mainly transported ……………………., while CO₂ is mainly transported …………………….","a_en":"as oxyhemoglobin... as bicarbonate in plasma"},{"id":"x361","ch":"X","num":361,"question":"Welke van de volgende aandoeningen wordt gekenmerkt door verlies van elasticiteit in de bronchiolen en permanent beschadigde alveoli?","options":[{"letter":"A","text":"emfyseem","text_en":"emphysema"},{"letter":"B","text":"astma","text_en":"asthma"},{"letter":"C","text":"longontsteking","text_en":"pneumonia"},{"letter":"D","text":"bronchitis","text_en":"bronchitis"}],"answer":"A","answerText":"emfyseem","q_en":"Which of the following conditions is characterized by a loss of elasticity in the bronchioles and permanently damaged alveoli?","a_en":"emphysema"},{"id":"x362","ch":"X","num":362,"question":"Welke van de volgende is een erfelijke aandoening die wordt gekenmerkt door de productie van abnormaal dik slijm dat de luchtstroom in de longen kan belemmeren?","options":[{"letter":"A","text":"astma","text_en":"asthma"},{"letter":"B","text":"emfyseem","text_en":"emphysema"},{"letter":"C","text":"cystische fibrose","text_en":"cystic fibrosis"},{"letter":"D","text":"congestief hartfalen","text_en":"congestive heart failure"}],"answer":"C","answerText":"cystische fibrose","q_en":"Which of the following is a hereditary disorder characterized by the production of abnormally thick mucus that can obstruct airflow in the lungs?","a_en":"cystic fibrosis"},{"id":"x363","ch":"X","num":363,"question":"Welke van de volgende beweringen over verstikking is waar?","options":[{"letter":"A","text":"De hoestreflex zorgt ervoor dat iemand stikt.","text_en":"The cough reflex causes a person to choke."},{"letter":"B","text":"Het treedt op wanneer een vreemd deeltje de alveoli blokkeert.","text_en":"It occurs when a foreign particle blocks the alveoli."},{"letter":"C","text":"Het activeert de hoestreflex.","text_en":"It triggers the cough reflex."},{"letter":"D","text":"Gedeeltelijke blokkering van de luchtwegen veroorzaakt altijd de dood.","text_en":"Partial obstruction of the airways always causes death."}],"answer":"C","answerText":"Het activeert de hoestreflex.","q_en":"Which of the following statements about choking is true?","a_en":"It triggers the cough reflex."},{"id":"x364","ch":"X","num":364,"question":"………………… hormonen dringen doelcellen binnen en binden zich aan intracellulaire receptoren, terwijl ……………. hormonen zich binden aan celmembraan receptoren en nooit binnendringen de doelcellen.","options":[{"letter":"A","text":"Niet-steroïde... steroïde","text_en":"Non-steroid... steroid"},{"letter":"B","text":"Steroïde….niet-steroïde","text_en":"Steroid….non-steroid"},{"letter":"C","text":"Steroïde…carbohydrate (koolhydraat)","text_en":"Steroid…carbohydrate"},{"letter":"D","text":"Eiwit... peptide","text_en":"Protein... peptide"}],"answer":"B","answerText":"Steroïde….niet-steroïde","q_en":"………………… hormones enter target cells and bind to intracellular receptors, while ……………. hormones bind to cell membrane receptors and never enter the target cells.","a_en":"Steroid….non-steroid"},{"id":"x365","ch":"X","num":365,"question":"Welke van de volgende beweringen over steroïde hormonen is onjuist?","options":[{"letter":"A","text":"Niet-steroïde hormonen werken meestal via second messengers zoals cAMP.","text_en":"Non-steroid hormones usually act via second messengers such as cAMP."},{"letter":"B","text":"Steroïde hormonen werken meestal langzamer dan niet-steroïde hormonen.","text_en":"Steroid hormones usually act more slowly than non-steroid hormones."},{"letter":"C","text":"Cortisol en aldosteron zijn niet-steroïde hormonen die worden geproduceerd door de cortex van de bijnier.","text_en":"Cortisol and aldosterone are non-steroid hormones produced by the adrenal cortex."},{"letter":"D","text":"Niet-steroïde hormonen zijn niet lipide-oplosbaar en kunnen de doelcel niet binnendringen.","text_en":"Non-steroid hormones are not lipid-soluble and cannot enter the target cell."}],"answer":"C","answerText":"Cortisol en aldosteron zijn niet-steroïde hormonen die worden geproduceerd door de cortex van de bijnier.","q_en":"Which of the following statements about steroid hormones is incorrect?","a_en":"Cortisol and aldosterone are non-steroid hormones produced by the adrenal cortex."},{"id":"x366","ch":"X","num":366,"question":"De secretie van hormonen door de hypofysevoorkwab wordt nauw gereguleerd door de:","options":[{"letter":"A","text":"hypofyseachterkwab","text_en":"posterior pituitary lobe"},{"letter":"B","text":"hypothalamus","text_en":"hypothalamus"},{"letter":"C","text":"cerebellum","text_en":"cerebellum"},{"letter":"D","text":"bijnierschors","text_en":"adrenal cortex"}],"answer":"B","answerText":"hypothalamus","q_en":"The secretion of hormones by the anterior pituitary lobe is closely regulated by the:","a_en":"hypothalamus"},{"id":"x367","ch":"X","num":367,"question":"Welke van de volgende paren is onjuist?","options":[{"letter":"A","text":"ADH... eierstokken","text_en":"ADH... ovaries"},{"letter":"B","text":"oxytocine melkklieren","text_en":"oxytocin... mammary glands"},{"letter":"C","text":"ACTH... bijnierschors","text_en":"ACTH... adrenal cortex"},{"letter":"D","text":"prolactine melkklieren","text_en":"prolactin... mammary glands"}],"answer":"A","answerText":"ADH... eierstokken","q_en":"Which of the following pairs is incorrect?","a_en":"ADH... ovaries"},{"id":"x368","ch":"X","num":368,"question":"Alle volgende paren hormonen hebben antagonistische (tegengestelde) activiteiten, behalve:","options":[{"letter":"A","text":"aldosteron... ANH","text_en":"aldosterone... ANH"},{"letter":"B","text":"oestrogeen... progesteron","text_en":"estrogen... progesterone"},{"letter":"C","text":"parathormoon…..calcitonine","text_en":"parathyroid hormone... calcitonin"},{"letter":"D","text":"insuline... glucagon","text_en":"insulin... glucagon"}],"answer":"B","answerText":"oestrogeen... progesteron","q_en":"All of the following pairs of hormones have antagonistic (opposing) activities, except:","a_en":"estrogen... progesterone"},{"id":"x369","ch":"X","num":369,"question":"Welk van de volgende hormonen komt alleen voor bij vrouwen?","options":[{"letter":"A","text":"geen van deze opties","text_en":"none of these options"},{"letter":"B","text":"prolactine","text_en":"prolactin"},{"letter":"C","text":"oxytocine","text_en":"oxytocin"},{"letter":"D","text":"luteïniserend hormoon","text_en":"luteinizing hormone"}],"answer":"A","answerText":"geen van deze opties","q_en":"Which of the following hormones occurs only in women?","a_en":"none of these options"},{"id":"x370","ch":"X","num":370,"question":"Hormonen afgescheiden door de hypofysevoorkwab reguleren de activiteit van alle volgende klieren, behalve:","options":[{"letter":"A","text":"schildklier","text_en":"thyroid gland"},{"letter":"B","text":"testikels","text_en":"testes"},{"letter":"C","text":"eierstokken","text_en":"ovaries"},{"letter":"D","text":"bijniermedulla","text_en":"adrenal medulla"}],"answer":"D","answerText":"bijniermedulla","q_en":"Hormones secreted by the anterior pituitary lobe regulate the activity of all of the following glands, except:","a_en":"adrenal medulla"},{"id":"x371","ch":"X","num":371,"question":"Welk(e) van de volgende hormonen is/zijn betrokken bij de normale werking van het mannelijk voortplantingssysteem?","options":[{"letter":"A","text":"FSH","text_en":"FSH"},{"letter":"B","text":"testosteron","text_en":"testosterone"},{"letter":"C","text":"LH","text_en":"LH"},{"letter":"D","text":"al deze opties","text_en":"all of these options"}],"answer":"D","answerText":"al deze opties","q_en":"Which of the following hormones is/are involved in the normal functioning of the male reproductive system?","a_en":"all of these options"},{"id":"x372","ch":"X","num":372,"question":"Welke van deze endocriene aandoeningen wordt geassocieerd met het onvermogen van de alvleesklier om insuline te produceren?","options":[{"letter":"A","text":"de ziekte van Addison","text_en":"Addison's disease"},{"letter":"B","text":"diabetes type 2","text_en":"type 2 diabetes"},{"letter":"C","text":"diabetes insipidus","text_en":"diabetes insipidus"},{"letter":"D","text":"diabetes mellitus type 1","text_en":"type 1 diabetes mellitus"}],"answer":"D","answerText":"diabetes mellitus type 1","q_en":"Which of these endocrine disorders is associated with the inability of the pancreas to produce insulin?","a_en":"type 1 diabetes mellitus"},{"id":"x373","ch":"X","num":373,"question":"Welke van de volgende beweringen die het endocriene systeem en het zenuwstelsel vergelijken, is onjuist?","options":[{"letter":"A","text":"Het endocriene systeem kan bijna alle levende cellen bereiken.","text_en":"The endocrine system can reach almost all living cells."},{"letter":"B","text":"Beide systemen kunnen worden beschouwd als communicatiesystemen.","text_en":"Both systems can be regarded as communication systems."},{"letter":"C","text":"De controle door het zenuwstelsel is sneller dan de controle door het endocriene systeem.","text_en":"Control by the nervous system is faster than control by the endocrine system."},{"letter":"D","text":"Het endocriene systeem en het zenuwstelsel werken nooit met elkaar samen.","text_en":"The endocrine system and the nervous system never work together."}],"answer":"D","answerText":"Het endocriene systeem en het zenuwstelsel werken nooit met elkaar samen.","q_en":"Which of the following statements comparing the endocrine system and the nervous system is incorrect?","a_en":"The endocrine system and the nervous system never work together."},{"id":"x374","ch":"X","num":374,"question":"Welke van de volgende beweringen over de bijnierschors of de hormonen ervan is waar?","options":[{"letter":"A","text":"De bijnierschors scheidt hormonen af ​​die de ontstekingsreactie kunnen verminderen en immuunreacties kunnen onderdrukken.","text_en":"The adrenal cortex secretes hormones that can reduce the inflammatory response and suppress immune responses."},{"letter":"B","text":"De bijnierschors scheidt een mengsel van steroïde en niet-steroïde hormonen af.","text_en":"The adrenal cortex secretes a mixture of steroid and non-steroid hormones."},{"letter":"C","text":"Hypersecretie van cortisol en aldosteron wordt gezien bij de ziekte van Addison.","text_en":"Hypersecretion of cortisol and aldosterone is seen in Addison's disease."},{"letter":"D","text":"De afscheiding van hormonen door de bijnierschors wordt gecontroleerd door het sympathische deel van het zenuwstelsel.","text_en":"The secretion of hormones by the adrenal cortex is controlled by the sympathetic part of the nervous system."}],"answer":"A","answerText":"De bijnierschors scheidt hormonen af ​​die de ontstekingsreactie kunnen verminderen en immuunreacties kunnen onderdrukken.","q_en":"Which of the following statements about the adrenal cortex or its hormones is true?","a_en":"The adrenal cortex secretes hormones that can reduce the inflammatory response and suppress immune responses."},{"id":"x375","ch":"X","num":375,"question":"Welke van de volgende beweringen over glucagon is waar?","options":[{"letter":"A","text":"Glucagon bevordert de opname van glucose door lever- en spiercellen.","text_en":"Glucagon promotes the uptake of glucose by liver and muscle cells."},{"letter":"B","text":"De glucagonsecretie is het hoogst na een zware maaltijd.","text_en":"Glucagon secretion is highest after a heavy meal."},{"letter":"C","text":"Glucagon zorgt ervoor dat glycogeen wordt afgebroken tot glucose.","text_en":"Glucagon causes glycogen to be broken down into glucose."},{"letter":"D","text":"Glucagon werkt samen met cortisol om de bloedglucosespiegel te verlagen.","text_en":"Glucagon works together with cortisol to lower the blood glucose level."}],"answer":"C","answerText":"Glucagon zorgt ervoor dat glycogeen wordt afgebroken tot glucose.","q_en":"Which of the following statements about glucagon is true?","a_en":"Glucagon causes glycogen to be broken down into glucose."},{"id":"x376","ch":"X","num":376,"question":"Welke van de volgende zaken zou het minst waarschijnlijk worden beïnvloed door een tumor van de hypofyse?","options":[{"letter":"A","text":"secretie van adrenaline door het bijniermedulla","text_en":"secretion of adrenaline by the adrenal medulla"},{"letter":"B","text":"lactatie","text_en":"lactation"},{"letter":"C","text":"schildklierhormoonsecretie","text_en":"thyroid hormone secretion"},{"letter":"D","text":"cortisolsecretie","text_en":"cortisol secretion"}],"answer":"A","answerText":"secretie van adrenaline door het bijniermedulla","q_en":"Which of the following would be least likely to be affected by a tumor of the pituitary gland?","a_en":"secretion of adrenaline by the adrenal medulla"},{"id":"x377","ch":"X","num":377,"question":"Welke van de volgende aandoeningen wordt veroorzaakt door een overactieve schildklier?","options":[{"letter":"A","text":"hypothyreoïdie","text_en":"hypothyroidism"},{"letter":"B","text":"hypogonadisme","text_en":"hypogonadism"},{"letter":"C","text":"ziekte van Graves","text_en":"Graves' disease"},{"letter":"D","text":"ziekte van Addison","text_en":"Addison's disease"}],"answer":"C","answerText":"ziekte van Graves","q_en":"Which of the following conditions is caused by an overactive thyroid gland?","a_en":"Graves' disease"},{"id":"x378","ch":"X","num":378,"question":"Welke van de volgende zou worden getriggerd door een daling van de Ca2+-spiegel in het bloed?","options":[{"letter":"A","text":"zowel (a) als (b)","text_en":"both (a) and (b)"},{"letter":"B","text":"afname van de calcitoninesecretie","text_en":"decrease in calcitonin secretion"},{"letter":"C","text":"toename van de ADH-secretie","text_en":"increase in ADH secretion"},{"letter":"D","text":"toename van de PTH-secretie","text_en":"increase in PTH secretion"}],"answer":"A","answerText":"zowel (a) als (b)","q_en":"Which of the following would be triggered by a drop in the Ca2+ level in the blood?","a_en":"both (a) and (b)"},{"id":"x379","ch":"X","num":379,"question":"Welke van de volgende lagen van het gastro-intestinale stelsel staat in direct contact met het lumen en is als eerste verantwoordelijk voor de opname van voedingsstoffen?","options":[{"letter":"A","text":"Serosa","text_en":"Serosa"},{"letter":"B","text":"Muscularis","text_en":"Muscularis"},{"letter":"C","text":"Submucosa","text_en":"Submucosa"},{"letter":"D","text":"Mucosa","text_en":"Mucosa"}],"answer":"D","answerText":"Mucosa","q_en":"Which of the following layers of the gastrointestinal tract is in direct contact with the lumen and is primarily responsible for the absorption of nutrients?","a_en":"Mucosa"},{"id":"x380","ch":"X","num":380,"question":"Wat is het belangrijkste functionele verschil tussen peristaltiek en segmentatie?","options":[{"letter":"A","text":"Beide processen hebben uitsluitend als doel het voedsel mechanisch te verkleinen.","text_en":"Both processes serve solely to mechanically break down food."},{"letter":"B","text":"Peristaltiek mengt voedsel, segmentatie transporteert voedsel.","text_en":"Peristalsis mixes food, segmentation transports food."},{"letter":"C","text":"Peristaltiek vindt alleen plaats in de dikke darm, segmentatie alleen in de maag.","text_en":"Peristalsis occurs only in the large intestine, segmentation only in the stomach."},{"letter":"D","text":"Peristaltiek is voor transport, segmentatie is voor het mengen.","text_en":"Peristalsis is for transport, segmentation is for mixing."}],"answer":"D","answerText":"Peristaltiek is voor transport, segmentatie is voor het mengen.","q_en":"What is the main functional difference between peristalsis and segmentation?","a_en":"Peristalsis is for transport, segmentation is for mixing."},{"id":"x381","ch":"X","num":381,"question":"Welk bestanddeel van speeksel zorgt voor de eerste stap in de afbraak van zetmeel (complexe koolhydraten)?","options":[{"letter":"A","text":"Lysozyme","text_en":"Lysozyme"},{"letter":"B","text":"Mucine","text_en":"Mucin"},{"letter":"C","text":"Speekselamylase","text_en":"Salivary amylase"},{"letter":"D","text":"Bicarbonaat","text_en":"Bicarbonate"}],"answer":"C","answerText":"Speekselamylase","q_en":"Which component of saliva carries out the first step in the breakdown of starch (complex carbohydrates)?","a_en":"Salivary amylase"},{"id":"x382","ch":"X","num":382,"question":"Welke structuur voorkomt dat voedsel tijdens het slikken in de luchtpijp (trachea) terechtkomt?","options":[{"letter":"A","text":"Farynx","text_en":"Pharynx"},{"letter":"B","text":"Zachte gehemelte","text_en":"Soft palate"},{"letter":"C","text":"Onderste slokdarmsfincter","text_en":"Lower esophageal sphincter"},{"letter":"D","text":"Epiglottis","text_en":"Epiglottis"}],"answer":"D","answerText":"Epiglottis","q_en":"Which structure prevents food from entering the windpipe (trachea) during swallowing?","a_en":"Epiglottis"},{"id":"x383","ch":"X","num":383,"question":"De maag produceert sterk zuur (HCl) met een pH van ongeveer 2. Waarom verteert de maag zichzelf normaal gesproken niet?","options":[{"letter":"A","text":"De continue aanmaak van natriumbicarbonaat neutraliseert het zuur op de wand.","text_en":"The continuous production of sodium bicarbonate neutralizes the acid on the wall."},{"letter":"B","text":"Pepsinogeen inactiveert het zoutzuur vlakbij de maagwand.","text_en":"Pepsinogen inactivates the hydrochloric acid near the stomach wall."},{"letter":"C","text":"De maagwand bestaat uit ondoordringbaar spierweefsel.","text_en":"The stomach wall consists of impermeable muscle tissue."},{"letter":"D","text":"Het maagslijmvlies wordt voortdurend beschermd door een dikke laag mucus.","text_en":"The gastric mucosa is continuously protected by a thick layer of mucus."}],"answer":"D","answerText":"Het maagslijmvlies wordt voortdurend beschermd door een dikke laag mucus.","q_en":"The stomach produces strong acid (HCl) with a pH of about 2. Why does the stomach normally not digest itself?","a_en":"The gastric mucosa is continuously protected by a thick layer of mucus."},{"id":"x384","ch":"X","num":384,"question":"Wat is de functie van natriumbicarbonaat (NaHCO₃) dat door de pancreas wordt afgescheiden?","options":[{"letter":"A","text":"Het neutraliseert de zure chyme (maaginhoud) die in de dunne darm aankomt.","text_en":"It neutralizes the acidic chyme (stomach contents) arriving in the small intestine."},{"letter":"B","text":"Het bevordert de opname van vitamine B12.","text_en":"It promotes the absorption of vitamin B12."},{"letter":"C","text":"Het breekt eiwitten af tot aminozuren.","text_en":"It breaks down proteins into amino acids."},{"letter":"D","text":"Het emulgeert vetten tot kleinere vetdruppeltjes.","text_en":"It emulsifies fats into smaller fat droplets."}],"answer":"A","answerText":"Het neutraliseert de zure chyme (maaginhoud) die in de dunne darm aankomt.","q_en":"What is the function of sodium bicarbonate (NaHCO₃) secreted by the pancreas?","a_en":"It neutralizes the acidic chyme (stomach contents) arriving in the small intestine."},{"id":"x385","ch":"X","num":385,"question":"Op welke manier worden vetten (lipiden) primair opgenomen en getransporteerd net na de afbraak in de dunne darm?","options":[{"letter":"A","text":"Ze worden als triglyceriden via de dikke darm geëlimineerd.","text_en":"They are eliminated as triglycerides via the large intestine."},{"letter":"B","text":"Ze worden door galzouten direct via osmose de darmcel ingezogen.","text_en":"They are drawn directly into the intestinal cell by bile salts via osmosis."},{"letter":"C","text":"Ze worden verpakt in chylomicronen en opgenomen in de lymfevaten (lactealen).","text_en":"They are packaged into chylomicrons and absorbed into the lymphatic vessels (lacteals)."},{"letter":"D","text":"Ze worden als vetzuren direct in de hepatische poortader opgenomen.","text_en":"They are absorbed as fatty acids directly into the hepatic portal vein."}],"answer":"C","answerText":"Ze worden verpakt in chylomicronen en opgenomen in de lymfevaten (lactealen).","q_en":"In what way are fats (lipids) primarily absorbed and transported just after their breakdown in the small intestine?","a_en":"They are packaged into chylomicrons and absorbed into the lymphatic vessels (lacteals)."},{"id":"x386","ch":"X","num":386,"question":"Welk hormoon wordt afgegeven wanneer zuur voedsel (chyme) het duodenum binnenkomt, en stimuleert de afgifte van bicarbonaat?","options":[{"letter":"A","text":"Gastrine","text_en":"Gastrin"},{"letter":"B","text":"Secretine","text_en":"Secretin"},{"letter":"C","text":"Pepsine","text_en":"Pepsin"},{"letter":"D","text":"Cholecystokinine (CCK)","text_en":"Cholecystokinin (CCK)"}],"answer":"B","answerText":"Secretine","q_en":"Which hormone is released when acidic food (chyme) enters the duodenum, and stimulates the release of bicarbonate?","a_en":"Secretin"},{"id":"x387","ch":"X","num":387,"question":"Wat is een belangrijke functie van de darmbacteriën die zich in de dikke darm (colon) bevinden?","options":[{"letter":"A","text":"De afbraak van eiwitten tot aminozuren voor bloedopname.","text_en":"The breakdown of proteins into amino acids for blood absorption."},{"letter":"B","text":"De absorptie van het merendeel van de wateroplosbare vitamines.","text_en":"The absorption of most of the water-soluble vitamins."},{"letter":"C","text":"De productie van galzouten.","text_en":"The production of bile salts."},{"letter":"D","text":"De productie van vitamine K.","text_en":"The production of vitamin K."}],"answer":"D","answerText":"De productie van vitamine K.","q_en":"What is an important function of the intestinal bacteria located in the large intestine (colon)?","a_en":"The production of vitamin K."},{"id":"x388","ch":"X","num":388,"question":"Hoe dragen de plooien, villi en microvilli bij aan de spijsvertering in de dunne darm?","options":[{"letter":"A","text":"Ze breken enzymatisch direct rode bloedcellen af.","text_en":"They enzymatically break down red blood cells directly."},{"letter":"B","text":"Ze produceren grote hoeveelheden maagzuur.","text_en":"They produce large amounts of gastric acid."},{"letter":"C","text":"Ze versnellen de doorgang van onverteerbare vezels.","text_en":"They speed up the passage of indigestible fiber."},{"letter":"D","text":"Ze vergroten het opname-oppervlak met meer dan 500 keer voor maximale absorptie.","text_en":"They increase the absorptive surface area by more than 500 times for maximum absorption."}],"answer":"D","answerText":"Ze vergroten het opname-oppervlak met meer dan 500 keer voor maximale absorptie.","q_en":"How do the folds, villi and microvilli contribute to digestion in the small intestine?","a_en":"They increase the absorptive surface area by more than 500 times for maximum absorption."},{"id":"x389","ch":"X","num":389,"question":"Uit hoeveel essentiële aminozuren die je vià de voeding moet innemen, moet je dieet minimaal bestaan (omdat je lichaam deze niet zelf kan maken)?","options":[{"letter":"A","text":"8","text_en":"8"},{"letter":"B","text":"20","text_en":"20"},{"letter":"C","text":"12","text_en":"12"},{"letter":"D","text":"15","text_en":"15"}],"answer":"A","answerText":"8","q_en":"How many essential amino acids that you must obtain through your diet must your diet contain at a minimum (because your body cannot make them itself)?","a_en":"8"},{"id":"x390","ch":"X","num":390,"question":"Welke van de volgende orgaansystemen ontvangt direct het voedingsstofrijke bloed afkomstig uit de dunne darm voor verdere verwerking en detoxificatie?","options":[{"letter":"A","text":"Het hart","text_en":"The heart"},{"letter":"B","text":"De nieren","text_en":"The kidneys"},{"letter":"C","text":"De lever (via het hepatisch poortsysteem)","text_en":"The liver (via the hepatic portal system)"},{"letter":"D","text":"De longen","text_en":"The lungs"}],"answer":"C","answerText":"De lever (via het hepatisch poortsysteem)","q_en":"Which of the following organ systems directly receives the nutrient-rich blood coming from the small intestine for further processing and detoxification?","a_en":"The liver (via the hepatic portal system)"},{"id":"x391","ch":"X","num":391,"question":"Verzadigde vetten worden in een gezond voedingspatroon vaak beperkt. Wat is een typisch kenmerk van deze vetten?","options":[{"letter":"A","text":"Ze verlagen LDL-cholesterol en komen vooral voor in vette vis.","text_en":"They lower LDL cholesterol and occur mainly in oily fish."},{"letter":"B","text":"Ze zijn wateroplosbaar en worden via actief transport opgenomen in het ileum.","text_en":"They are water-soluble and are absorbed via active transport in the ileum."},{"letter":"C","text":"Ze ontstaan uitsluitend bij de gedeeltelijke hydrogenatie van oliën in fabrieken.","text_en":"They arise exclusively from the partial hydrogenation of oils in factories."},{"letter":"D","text":"Ze zijn meestal vast bij kamertemperatuur en verhogen vaak LDL-cholesterol.","text_en":"They are usually solid at room temperature and often raise LDL cholesterol."}],"answer":"D","answerText":"Ze zijn meestal vast bij kamertemperatuur en verhogen vaak LDL-cholesterol.","q_en":"Saturated fats are often limited in a healthy diet. What is a typical characteristic of these fats?","a_en":"They are usually solid at room temperature and often raise LDL cholesterol."},{"id":"x392","ch":"X","num":392,"question":"Als chyme (maaginhoud) zeer vet- en zuurrijk is, wat is dan de invloed op de lediging van de maag?","options":[{"letter":"A","text":"Het vertraagt de maaglediging.","text_en":"It slows down gastric emptying."},{"letter":"B","text":"Het versnelt de maaglediging aanzienlijk.","text_en":"It speeds up gastric emptying considerably."},{"letter":"C","text":"Het heeft geen enkele invloed op de snelheid van de maaglediging.","text_en":"It has no effect at all on the rate of gastric emptying."},{"letter":"D","text":"Het zorgt ervoor dat de maag de inhoud direct via de slokdarm terugstuurt.","text_en":"It causes the stomach to send the contents back directly via the esophagus."}],"answer":"A","answerText":"Het vertraagt de maaglediging.","q_en":"If chyme (stomach contents) is very rich in fat and acid, what is the effect on the emptying of the stomach?","a_en":"It slows down gastric emptying."},{"id":"x393","ch":"X","num":393,"question":"Welke vitamine kan bij een ernstig tekort de ziekte scheurbuik veroorzaken en is belangrijk voor wondheling en collageenvorming?","options":[{"letter":"A","text":"Vitamine K","text_en":"Vitamin K"},{"letter":"B","text":"Vitamine C","text_en":"Vitamin C"},{"letter":"C","text":"Vitamine B12","text_en":"Vitamin B12"},{"letter":"D","text":"Vitamine A","text_en":"Vitamin A"}],"answer":"B","answerText":"Vitamine C","q_en":"Which vitamin can cause the disease scurvy in case of a severe deficiency and is important for wound healing and collagen formation?","a_en":"Vitamin C"},{"id":"x394","ch":"X","num":394,"question":"De homeostase van lichaamsvloeistoffen wordt voornamelijk gehandhaafd door de:","options":[{"letter":"A","text":"nieren","text_en":"kidneys"},{"letter":"B","text":"lever","text_en":"liver"},{"letter":"C","text":"longen","text_en":"lungs"},{"letter":"D","text":"blaas","text_en":"bladder"}],"answer":"A","answerText":"nieren","q_en":"The homeostasis of body fluids is mainly maintained by the:","a_en":"kidneys"},{"id":"x395","ch":"X","num":395,"question":"Drie van de onderstaande opties zijn orgaansystemen die direct betrokken zijn bij de uitscheiding van afvalstoffen. Welk systeem is niet direct betrokken bij de uitscheiding, maar verbindt de andere drie?","options":[{"letter":"A","text":"bloedsomloop","text_en":"circulatory system"},{"letter":"B","text":"ademhalingsstelsel","text_en":"respiratory system"},{"letter":"C","text":"urinewegstelsel","text_en":"urinary system"},{"letter":"D","text":"spijsverteringsstelsel","text_en":"digestive system"}],"answer":"A","answerText":"bloedsomloop","q_en":"Three of the options below are organ systems directly involved in the excretion of waste products. Which system is not directly involved in excretion, but connects the other three?","a_en":"circulatory system"},{"id":"x396","ch":"X","num":396,"question":"Welke van de volgende organen zijn betrokken bij de synthese van actieve vitamine D?","options":[{"letter":"A","text":"lever en alvleesklier","text_en":"liver and pancreas"},{"letter":"B","text":"alvleesklier en nieren","text_en":"pancreas and kidneys"},{"letter":"C","text":"hart en hersenen","text_en":"heart and brain"},{"letter":"D","text":"huid, lever en nieren","text_en":"skin, liver and kidneys"}],"answer":"D","answerText":"huid, lever en nieren","q_en":"Which of the following organs are involved in the synthesis of active vitamin D?","a_en":"skin, liver and kidneys"},{"id":"x397","ch":"X","num":397,"question":"De stikstofhoudende afvalstoffen die door de nieren worden uitgescheiden, worden geproduceerd door de stofwisseling van:","options":[{"letter":"A","text":"cholesterol","text_en":"cholesterol"},{"letter":"B","text":"koolhydraten","text_en":"carbohydrates"},{"letter":"C","text":"triglyceriden","text_en":"triglycerides"},{"letter":"D","text":"eiwitten","text_en":"proteins"}],"answer":"D","answerText":"eiwitten","q_en":"The nitrogenous waste products excreted by the kidneys are produced by the metabolism of:","a_en":"proteins"},{"id":"x398","ch":"X","num":398,"question":"Welke van de volgende opties geeft de juiste volgorde aan van de structuren waar urine doorheen gaat tijdens de vorming en uitscheiding?","options":[{"letter":"A","text":"nierbekken, urineleider, nefron, urinebuis, blaas","text_en":"renal pelvis, ureter, nephron, urethra, bladder"},{"letter":"B","text":"nefron, nierbekken, urinebuis, blaas, urineleider","text_en":"nephron, renal pelvis, urethra, bladder, ureter"},{"letter":"C","text":"nierbekken, nefron, urineleider, blaas, urinebuis","text_en":"renal pelvis, nephron, ureter, bladder, urethra"},{"letter":"D","text":"nefron, nierbekken, urineleider, blaas, urinebuis","text_en":"nephron, renal pelvis, ureter, bladder, urethra"}],"answer":"D","answerText":"nefron, nierbekken, urineleider, blaas, urinebuis","q_en":"Which of the following options gives the correct order of the structures that urine passes through during its formation and excretion?","a_en":"nephron, renal pelvis, ureter, bladder, urethra"},{"id":"x399","ch":"X","num":399,"question":"Eiwit wordt over het algemeen niet in de urine aangetroffen omdat:","options":[{"letter":"A","text":"Het wordt geresorbeerd in de verzamelbuis.","text_en":"It is reabsorbed in the collecting duct."},{"letter":"B","text":"Het niet door het glomerulaire filter in de ruimte binnen het glomerulaire kapsel gaat.","text_en":"It does not pass through the glomerular filter into the space within the glomerular capsule."},{"letter":"C","text":"Het wordt geresorbeerd in het stijgende deel van de lus van Henle.","text_en":"It is reabsorbed in the ascending limb of the loop of Henle."},{"letter":"D","text":"Het wordt gemetaboliseerd door de cellen die de nefron bekleden.","text_en":"It is metabolized by the cells lining the nephron."}],"answer":"B","answerText":"Het niet door het glomerulaire filter in de ruimte binnen het glomerulaire kapsel gaat.","q_en":"Protein is generally not found in urine because:","a_en":"It does not pass through the glomerular filter into the space within the glomerular capsule."},{"id":"x400","ch":"X","num":400,"question":"Bloed komt de glomerulus binnen via de……………… en verlaat de glomerulus via de ………………….","options":[{"letter":"A","text":"efferente arteriole ... afferente arteriole","text_en":"efferent arteriole ... afferent arteriole"},{"letter":"B","text":"efferente arteriole…distale tubulus","text_en":"efferent arteriole…distal tubule"},{"letter":"C","text":"proximale tubulus……efferente arteriole","text_en":"proximal tubule……efferent arteriole"},{"letter":"D","text":"afferente arteriole…efferente arteriole","text_en":"afferent arteriole…efferent arteriole"}],"answer":"D","answerText":"afferente arteriole…efferente arteriole","q_en":"Blood enters the glomerulus via the ……………… and leaves the glomerulus via the ………………….","a_en":"afferent arteriole…efferent arteriole"},{"id":"x401","ch":"X","num":401,"question":"Het glomerulaire filtraat van een gezond persoon bevat:","options":[{"letter":"A","text":"H₂O + grote eiwitten","text_en":"H₂O + large proteins"},{"letter":"B","text":"H₂O + hemoglobine","text_en":"H₂O + hemoglobin"},{"letter":"C","text":"H₂O + kleine opgeloste stoffen","text_en":"H₂O + small solutes"},{"letter":"D","text":"H₂O + bloedcellen","text_en":"H₂O + blood cells"}],"answer":"C","answerText":"H₂O + kleine opgeloste stoffen","q_en":"The glomerular filtrate of a healthy person contains:","a_en":"H₂O + small solutes"},{"id":"x402","ch":"X","num":402,"question":"Welke van de volgende is het meest verantwoordelijk voor de productie van het glomerulaire filtraat?","options":[{"letter":"A","text":"gefaciliteerde diffusie","text_en":"facilitated diffusion"},{"letter":"B","text":"diffusie","text_en":"diffusion"},{"letter":"C","text":"glomerulaire capillaire bloeddruk","text_en":"glomerular capillary blood pressure"},{"letter":"D","text":"actief transport","text_en":"active transport"}],"answer":"C","answerText":"glomerulaire capillaire bloeddruk","q_en":"Which of the following is most responsible for the production of the glomerular filtrate?","a_en":"glomerular capillary blood pressure"},{"id":"x403","ch":"X","num":403,"question":"Welk van de volgende processen drijft bij tubulaire absorptie in wezen alle andere aan?","options":[{"letter":"A","text":"diffusie van water vanuit de proximale tubulaire cel naar een capillair","text_en":"diffusion of water from the proximal tubular cell into a capillary"},{"letter":"B","text":"gefaciliteerd transport van Na vanuit het tubulaire lumen naar de proximale tubulaire cel","text_en":"facilitated transport of Na from the tubular lumen into the proximal tubular cell"},{"letter":"C","text":"diffusie van Cl vanuit het tubulaire lumen naar de proximale tubulaire cel","text_en":"diffusion of Cl from the tubular lumen into the proximal tubular cell"},{"letter":"D","text":"actief transport van Na* vanuit de proximale tubulaire cel naar een capillair","text_en":"active transport of Na* from the proximal tubular cell into a capillary"}],"answer":"D","answerText":"actief transport van Na* vanuit de proximale tubulaire cel naar een capillair","q_en":"Which of the following processes essentially drives all the others during tubular absorption?","a_en":"active transport of Na* from the proximal tubular cell into a capillary"},{"id":"x404","ch":"X","num":404,"question":"Al het volgende zou gebeuren als een persoon hevig transpireert en uitdroogt, behalve:","options":[{"letter":"A","text":"Er zou minder urine worden geproduceerd.","text_en":"Less urine would be produced."},{"letter":"B","text":"De nieren zouden meer water reabsorberen","text_en":"The kidneys would reabsorb more water"},{"letter":"C","text":"De verzamelbuizen zouden minder doorlaatbaar worden voor water.","text_en":"The collecting ducts would become less permeable to water."},{"letter":"D","text":"Het hormoon ADH zou worden afgescheiden.","text_en":"The hormone ADH would be secreted."}],"answer":"C","answerText":"De verzamelbuizen zouden minder doorlaatbaar worden voor water.","q_en":"All of the following would happen if a person sweats heavily and becomes dehydrated, except:","a_en":"The collecting ducts would become less permeable to water."},{"id":"x405","ch":"X","num":405,"question":"Hoe vermindert ADH het waterverlies via de nieren?","options":[{"letter":"A","text":"ADH verhoogt de waterreabsorptie in de proximale tubulus.","text_en":"ADH increases water reabsorption in the proximal tubule."},{"letter":"B","text":"ADH vermindert de hoeveelheid bloed die door de nieren stroomt.","text_en":"ADH reduces the amount of blood flowing through the kidneys."},{"letter":"C","text":"ADH vermindert de wateruitscheiding in de lis van Henle.","text_en":"ADH reduces water excretion in the loop of Henle."},{"letter":"D","text":"ADH verhoogt de waterreabsorptie in de verzamelbuizen.","text_en":"ADH increases water reabsorption in the collecting ducts."}],"answer":"D","answerText":"ADH verhoogt de waterreabsorptie in de verzamelbuizen.","q_en":"How does ADH reduce water loss through the kidneys?","a_en":"ADH increases water reabsorption in the collecting ducts."},{"id":"x406","ch":"X","num":406,"question":"Urineweginfecties, meestal veroorzaakt door…………………. komen vaker voor bij………………… omdat hun ………………….kort zijn.","options":[{"letter":"A","text":"bacteriën…mannen …urethra","text_en":"bacteria…men …urethra"},{"letter":"B","text":"bacteriën... vrouwen... uretersonometer","text_en":"bacteria... women... ureterosonometer"},{"letter":"C","text":"bacteriën… vrouwen …urethra","text_en":"bacteria… women …urethra"},{"letter":"D","text":"virussen... mannen... blaas","text_en":"viruses... men... bladder"}],"answer":"C","answerText":"bacteriën… vrouwen …urethra","q_en":"Urinary tract infections, usually caused by …………………. are more common in ………………… because their ………………….are short.","a_en":"bacteria… women …urethra"},{"id":"x407","ch":"X","num":407,"question":"Welke van de volgende stappen geeft de juiste volgorde weer van de stappen die leiden tot de ontwikkeling van kwaadaardige kanker?","options":[{"letter":"A","text":"dysplasie en/of invasie... hyperplasie…kanker in situ…metastase","text_en":"dysplasia and/or invasion... hyperplasia…cancer in situ…metastasis"},{"letter":"B","text":"hyperplasie ... dysplasie…kanker in situ…metastase en of invasie","text_en":"hyperplasia ... dysplasia…cancer in situ…metastasis and/or invasion"},{"letter":"C","text":"hyperplasie ... dysplasie…metastase en/of invasie…in situ kanker","text_en":"hyperplasia ... dysplasia…metastasis and/or invasion…in situ cancer"},{"letter":"D","text":"dysplasie ... in situ kanker en/of invasie…hyperplasie…metastase","text_en":"dysplasia ... in situ cancer and/or invasion…hyperplasia…metastasis"}],"answer":"B","answerText":"hyperplasie ... dysplasie…kanker in situ…metastase en of invasie","q_en":"Which of the following gives the correct order of the steps leading to the development of malignant cancer?","a_en":"hyperplasia ... dysplasia…cancer in situ…metastasis and/or invasion"},{"id":"x408","ch":"X","num":408,"question":"Uitgezaaide (gemetastaseerde) cellen:","options":[{"letter":"A","text":"zijn abnormaal gestructureerd","text_en":"are abnormally structured"},{"letter":"B","text":"kunnen zich vermenigvuldigen","text_en":"can multiply"},{"letter":"C","text":"al het bovenstaande","text_en":"all of the above"},{"letter":"D","text":"kunnen migreren","text_en":"can migrate"}],"answer":"C","answerText":"al het bovenstaande","q_en":"Metastasized (spread) cells:","a_en":"all of the above"},{"id":"x409","ch":"X","num":409,"question":"Een mutatie in welk van de volgende typen genen zou waarschijnlijk celdeling mogelijk maken, zelfs als de omstandigheden niet geschikt zijn of als de cellen al kankerneigingen vertonen?","options":[{"letter":"A","text":"proto-oncogenen","text_en":"proto-oncogenes"},{"letter":"B","text":"mutatorgenen","text_en":"mutator genes"},{"letter":"C","text":"tumorsuppressorgenen","text_en":"tumor suppressor genes"},{"letter":"D","text":"oncogenen","text_en":"oncogenes"}],"answer":"C","answerText":"tumorsuppressorgenen","q_en":"A mutation in which of the following types of genes would most likely allow cell division to occur even when conditions are not suitable or when the cells already show cancerous tendencies?","a_en":"tumor suppressor genes"},{"id":"x410","ch":"X","num":410,"question":"Welke van de volgende beweringen over huidkanker is waar?","options":[{"letter":"A","text":"Huidkanker kan ontstaan door cumulatieve blootstelling aan de zon, zelfs zonder zonnebrand.","text_en":"Skin cancer can develop from cumulative sun exposure, even without sunburn."},{"letter":"B","text":"Blootstelling aan de zon tijdens de kindertijd heeft geen invloed op de ontwikkeling van huidkanker later in het leven.","text_en":"Sun exposure during childhood has no effect on the development of skin cancer later in life."},{"letter":"C","text":"Zonnebanken maken veiliger bruinen mogelijk omdat de UV-blootstelling van lampen waarschijnlijk niet bijdraagt aan de ontwikkeling van huidkanker.","text_en":"Tanning beds allow safer tanning because the UV exposure from lamps is unlikely to contribute to the development of skin cancer."},{"letter":"D","text":"Chemische carcinogenen dragen meer bij aan de ontwikkeling van huidkanker dan UV-straling.","text_en":"Chemical carcinogens contribute more to the development of skin cancer than UV radiation."}],"answer":"A","answerText":"Huidkanker kan ontstaan door cumulatieve blootstelling aan de zon, zelfs zonder zonnebrand.","q_en":"Which of the following statements about skin cancer is true?","a_en":"Skin cancer can develop from cumulative sun exposure, even without sunburn."},{"id":"x411","ch":"X","num":411,"question":"De meeste kankers worden geclassificeerd op basis van hun grootte, verspreiding en betrokkenheid van de:","options":[{"letter":"A","text":"bloed","text_en":"blood"},{"letter":"B","text":"hersenen","text_en":"brain"},{"letter":"C","text":"lymfeklieren","text_en":"lymph nodes"},{"letter":"D","text":"beenmerg","text_en":"bone marrow"}],"answer":"C","answerText":"lymfeklieren","q_en":"Most cancers are classified based on their size, spread, and involvement of the:","a_en":"lymph nodes"},{"id":"x412","ch":"X","num":412,"question":"Welke van de volgende beeldvormingstechnieken stelt het lichaam bloot aan straling?","options":[{"letter":"A","text":"PET-scans","text_en":"PET scans"},{"letter":"B","text":"zowel (a) als (c)","text_en":"both (a) and (c)"},{"letter":"C","text":"MRI","text_en":"MRI"},{"letter":"D","text":"Röntgenfoto's","text_en":"X-rays"}],"answer":"B","answerText":"zowel (a) als (c)","q_en":"Which of the following imaging techniques exposes the body to radiation?","a_en":"both (a) and (c)"},{"id":"x413","ch":"X","num":413,"question":"Welke van de volgende kankerbehandelingen zou het meest effectief zijn om zowel de oorspronkelijke tumor als alle secundaire tumoren aan te pakken?","options":[{"letter":"A","text":"chemotherapie","text_en":"chemotherapy"},{"letter":"B","text":"chirurgie","text_en":"surgery"},{"letter":"C","text":"gerichte stralingsbronnen","text_en":"targeted radiation sources"},{"letter":"D","text":"fotodynamische therapie","text_en":"photodynamic therapy"}],"answer":"A","answerText":"chemotherapie","q_en":"Which of the following cancer treatments would be most effective at addressing both the original tumor and any secondary tumors?","a_en":"chemotherapy"},{"id":"x414","ch":"X","num":414,"question":"Welke aandoening(en) vereisen vaak stamcel- of beenmergtransplantaties?","options":[{"letter":"A","text":"Leukemie","text_en":"Leukemia"},{"letter":"B","text":"Zowel (b) als (c)","text_en":"Both (b) and (c)"},{"letter":"C","text":"Alvleesklierkanker","text_en":"Pancreatic cancer"},{"letter":"D","text":"Lymfoom","text_en":"Lymphoma"}],"answer":"B","answerText":"Zowel (b) als (c)","q_en":"Which condition(s) often require stem cell or bone marrow transplants?","a_en":"Both (b) and (c)"},{"id":"x415","ch":"X","num":415,"question":"Welke van de volgende kankerbehandelingen voorkomt de groei van bloedvaten die groeiende tumoren ondersteunen?","options":[{"letter":"A","text":"anti-angiogene geneesmiddelen","text_en":"anti-angiogenic drugs"},{"letter":"B","text":"immunotherapie","text_en":"immunotherapy"},{"letter":"C","text":"gentherapie","text_en":"gene therapy"},{"letter":"D","text":"bestralingstherapie","text_en":"radiation therapy"}],"answer":"A","answerText":"anti-angiogene geneesmiddelen","q_en":"Which of the following cancer treatments prevents the growth of blood vessels that support growing tumors?","a_en":"anti-angiogenic drugs"},{"id":"x416","ch":"X","num":416,"question":"De ABCD-regel verwijst naar de evaluatie van:","options":[{"letter":"A","text":"alle soorten huidkanker","text_en":"all types of skin cancer"},{"letter":"B","text":"melanoom","text_en":"melanoma"},{"letter":"C","text":"plaveiselcelcarcinoom","text_en":"squamous cell carcinoma"},{"letter":"D","text":"basaalcelcarcinoom","text_en":"basal cell carcinoma"}],"answer":"B","answerText":"melanoom","q_en":"The ABCD rule refers to the evaluation of:","a_en":"melanoma"},{"id":"x417","ch":"X","num":417,"question":"De meest voorkomende oorzaak/oorzaken van kankersterfte in de Verenigde Staten is/zijn:","options":[{"letter":"A","text":"virussen","text_en":"viruses"},{"letter":"B","text":"roken","text_en":"smoking"},{"letter":"C","text":"straling","text_en":"radiation"},{"letter":"D","text":"slechte voeding en gebrek aan lichaamsbeweging","text_en":"poor diet and lack of physical activity"}],"answer":"B","answerText":"roken","q_en":"The most common cause(s) of cancer mortality in the United States is/are:","a_en":"smoking"},{"id":"x418","ch":"X","num":418,"question":"Welke van de volgende beweringen over borstkanker is waar?","options":[{"letter":"A","text":"Het risico op borstkanker neemt af met toenemende leeftijd","text_en":"The risk of breast cancer decreases with increasing age"},{"letter":"B","text":"De meeste vrouwen hebben een gemuteerde vorm van het BRCA1- of het BRCA2-gen.","text_en":"Most women have a mutated form of the BRCA1 or the BRCA2 gene."},{"letter":"C","text":"Hormoonvervangende therapie na de menopauze kan het risico op het ontwikkelen van borstkanker verminderen.","text_en":"Hormone replacement therapy after menopause can reduce the risk of developing breast cancer."},{"letter":"D","text":"Vroegtijdige menstruatie en/of late menopauze is een risicofactor voor de ontwikkeling van borstkanker.","text_en":"Early menstruation and/or late menopause is a risk factor for the development of breast cancer."}],"answer":"D","answerText":"Vroegtijdige menstruatie en/of late menopauze is een risicofactor voor de ontwikkeling van borstkanker.","q_en":"Which of the following statements about breast cancer is true?","a_en":"Early menstruation and/or late menopause is a risk factor for the development of breast cancer."},{"id":"x419","ch":"X","num":419,"question":"Welke methode is cruciaal voor de vroege diagnose van borstkanker?","options":[{"letter":"A","text":"Zelfonderzoek","text_en":"Self-examination"},{"letter":"B","text":"Zowel (a) als (c)","text_en":"Both (a) and (c)"},{"letter":"C","text":"PET-scan","text_en":"PET scan"},{"letter":"D","text":"Röntgenfoto","text_en":"X-ray"}],"answer":"B","answerText":"Zowel (a) als (c)","q_en":"Which method is crucial for the early diagnosis of breast cancer?","a_en":"Both (a) and (c)"},{"id":"x420","ch":"X","num":420,"question":"Welke van de volgende beweringen is onjuist met betrekking tot risicofactoren voor kanker?","options":[{"letter":"A","text":"Alleen genetische en omgevingsfactoren veroorzaken kanker.","text_en":"Only genetic and environmental factors cause cancer."},{"letter":"B","text":"Een onevenwichtig dieet is een belangrijke risicofactor.","text_en":"An unbalanced diet is a major risk factor."},{"letter":"C","text":"Roken is de belangrijkste oorzaak van longkanker.","text_en":"Smoking is the leading cause of lung cancer."},{"letter":"D","text":"De aanwezigheid van één oncogeen zal kanker veroorzaken.","text_en":"The presence of a single oncogene will cause cancer."}],"answer":"D","answerText":"De aanwezigheid van één oncogeen zal kanker veroorzaken.","q_en":"Which of the following statements is incorrect regarding risk factors for cancer?","a_en":"The presence of a single oncogene will cause cancer."},{"id":"x421","ch":"X","num":421,"question":"Welke kanker lijkt te worden voorkomen door een vaccin?","options":[{"letter":"A","text":"al deze kankers","text_en":"all of these cancers"},{"letter":"B","text":"baarmoederkanker","text_en":"uterine cancer"},{"letter":"C","text":"eierstokkanker","text_en":"ovarian cancer"},{"letter":"D","text":"baarmoederhalskanker","text_en":"cervical cancer"}],"answer":"D","answerText":"baarmoederhalskanker","q_en":"Which cancer appears to be preventable by a vaccine?","a_en":"cervical cancer"},{"id":"x422","ch":"X","num":422,"question":"Hoeveel verschillende soorten gameten (met betrekking tot een bepaalde genlocus) worden gevormd door een individu dat homozygoot is op die locus?","options":[{"letter":"A","text":"2","text_en":"All of these statements are correct."},{"letter":"B","text":"1","text_en":"In each pair, one chromosome comes from each parent."},{"letter":"C","text":"Dit kan niet worden bepaald op basis van deze informatie.","text_en":"Autosomes have genes for the same traits at the same loci."},{"letter":"D","text":"4","text_en":"Male sex chromosomes do not resemble each other."}],"answer":"B","answerText":"1","q_en":"Which of the following statements about chromosomes is correct?","a_en":"All of these statements are correct."},{"id":"x423","ch":"X","num":423,"question":"Welke van de volgende beweringen geeft de relatie tussen dominante en recessieve allelen correct weer?","options":[{"letter":
