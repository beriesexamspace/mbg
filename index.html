<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f6e6a" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>MBG — Berie’s exam space</title>
<style>
  :root{
    --bg:#f4f2ee; --bg2:#ebe8e2; --card:#ffffff; --ink:#1b232c; --muted:#5d6873;
    --line:#e2ddd4; --accent:#0f6e6a; --accent-ink:#0b4f4c; --accent-soft:#dcefed;
    --amber:#c9821f; --amber-soft:#f7ecd9;
    --good:#1f8a4c; --good-soft:#e2f3e8; --bad:#c23b54; --bad-soft:#fbe5ea;
    --violet:#6d5bd0; --violet-soft:#e9e6fa;
    --shadow:0 1px 2px rgba(20,30,40,.05),0 6px 18px rgba(20,30,40,.05);
    --shadow-lg:0 2px 6px rgba(20,30,40,.06),0 18px 40px rgba(20,30,40,.10);
    --r:14px; --r-lg:20px;
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  html[data-theme="dark"]{
    --bg:#11151a; --bg2:#161b22; --card:#1b222b; --ink:#e7ecf1; --muted:#9aa6b2;
    --line:#2a323c; --accent:#3fb9b2; --accent-ink:#7fd6d0; --accent-soft:#163230;
    --amber:#e0a64a; --amber-soft:#2e2515;
    --good:#46c178; --good-soft:#16301f; --bad:#ef6b82; --bad-soft:#331620;
    --violet:#a99cf0; --violet-soft:#221d3a;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 22px 48px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  h1,h2,h3,.serif{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:880px;margin:0 auto;padding:0 18px 96px}
  a{color:var(--accent-ink)}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:3px;border-radius:10px;box-shadow:0 0 0 4px var(--accent-soft)}

  /* inline icons */
  .ic{width:1.25em;height:1.25em;flex:none;vertical-align:-.18em;
    stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;fill:none}
  .ic-lg{width:24px;height:24px}

  /* top bar */
  header.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);
    border-bottom:1px solid var(--line);box-shadow:inset 0 -1px 0 0 rgba(0,0,0,.04)}
  .topin{max-width:880px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:.1px}
  .logo{width:32px;height:32px;border-radius:10px;
    background:linear-gradient(145deg,var(--accent),var(--accent-ink));color:#fff;
    display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;font-size:16px;flex:none;
    box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.2px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:10px;min-height:38px;padding:7px 11px;font-size:13.5px;display:inline-flex;gap:7px;
    align-items:center;transition:border-color .2s var(--ease),background .2s var(--ease),transform .12s var(--ease)}
  .iconbtn:hover{border-color:var(--accent)}
  .iconbtn:active{transform:scale(.96)}

  /* nav tabs */
  nav.tabs{display:flex;gap:2px;overflow:auto;max-width:880px;margin:0 auto;padding:6px 12px 0;
    scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{border:none;background:none;color:var(--muted);padding:10px 13px;border-radius:9px 9px 0 0;
    font-size:14px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;
    display:inline-flex;align-items:center;gap:6px;transition:color .2s var(--ease)}
  nav.tabs button .ic{width:16px;height:16px}
  nav.tabs button.on{color:var(--accent-ink);border-bottom-color:var(--accent)}
  nav.tabs button:hover{color:var(--ink)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .pad{padding:20px}
  .grid{display:grid;gap:14px}
  @media(min-width:620px){.g2{grid-template-columns:1fr 1fr}}

  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;
    background:var(--accent-soft);color:var(--accent-ink)}
  .pill .ic{width:14px;height:14px}
  .pill.amber{background:var(--amber-soft);color:var(--amber)}
  .pill.violet{background:var(--violet-soft);color:var(--violet)}

  /* home hero */
  .hero{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin:20px 0 8px}
  .count{flex:none;background:linear-gradient(150deg,var(--accent),var(--accent-ink));color:#fff;
    border-radius:var(--r);padding:14px 20px;text-align:center;min-width:118px;box-shadow:0 8px 20px rgba(15,110,106,.28)}
  .count b{font-family:Georgia,serif;font-size:32px;display:block;line-height:1}
  .count span{font-size:12px;opacity:.92}
  .herotext h1{margin:0 0 4px;font-size:25px}
  .herotext p{margin:0;color:var(--muted)}
  .visits{margin:14px 0 4px;font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .visits .ic{width:16px;height:16px;color:var(--accent-ink)}

  /* section label */
  .seclabel{display:flex;align-items:center;gap:8px;margin:26px 0 12px;font-weight:700;font-size:15px}
  .backlink{display:inline-flex;align-items:center;gap:5px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:6px 0;margin-bottom:4px;transition:color .2s var(--ease)}
  .backlink:hover{color:var(--accent-ink)} .backlink .ic{width:16px;height:16px}
  .toggle{width:48px;height:28px;border-radius:999px;border:none;background:var(--line);position:relative;cursor:pointer;flex:none;transition:background .2s var(--ease)}
  .toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s var(--ease)}
  .toggle.on{background:var(--violet)} .toggle.on .knob{left:23px}
  .warmcard{border-color:var(--violet)!important;background:var(--violet-soft)}
  .warmcard .ic{width:22px;height:22px;color:var(--violet);flex:none}
  html.snappy .js-enter{animation-duration:.12s!important;animation-delay:0ms!important}
  .seclabel .ic{width:18px;height:18px;color:var(--accent-ink)}
  .seclabel .sub{font-weight:500;color:var(--muted);font-size:13px;margin-left:auto}

  /* track cards (two big start buttons) */
  .tracks{display:grid;gap:14px}
  @media(min-width:620px){.tracks{grid-template-columns:1fr 1fr}}
  .track{position:relative;display:flex;flex-direction:column;gap:8px;text-align:left;width:100%;
    border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:20px;
    box-shadow:var(--shadow);transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease);
    overflow:hidden}
  .track:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
  .track:active{transform:translateY(-1px) scale(.995)}
  .track .tile{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;margin-bottom:4px;
    background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 6px 16px rgba(15,110,106,.3)}
  .track.alt .tile{background:linear-gradient(150deg,var(--violet),#4f40a8);box-shadow:0 6px 16px rgba(109,91,208,.32)}
  .track .tile .ic{width:24px;height:24px;stroke-width:1.9}
  .track b{font-size:18px}
  .track small{color:var(--muted);font-size:13.5px;line-height:1.5}
  .track .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);
    font-weight:600;font-size:13.5px}
  .track.alt .go{color:var(--violet)}
  .track .go .ic{width:16px;height:16px;transition:transform .2s var(--ease)}
  .track:hover .go .ic{transform:translateX(3px)}
  .track.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow)}
  .track.alt.on{border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft),var(--shadow)}
  .track .chk{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;
    background:var(--accent);color:#fff;display:grid;place-items:center;opacity:0;transform:scale(.6);
    transition:opacity .2s var(--ease),transform .2s var(--ease)}
  .track.alt .chk{background:var(--violet)}
  .track.on .chk{opacity:1;transform:scale(1)}
  .track .chk .ic{width:15px;height:15px;stroke-width:2.5}

  /* level reveal */
  .reveal{display:none;margin-top:12px}
  .reveal.open{display:block}
  .levels{display:grid;gap:12px}
  @media(min-width:560px){.levels{grid-template-columns:1fr 1fr}}
  .level{display:flex;gap:13px;align-items:flex-start;text-align:left;width:100%;border:1.5px solid var(--line);
    background:var(--card);border-radius:var(--r);padding:15px;box-shadow:var(--shadow);
    transition:transform .18s var(--ease),border-color .18s var(--ease)}
  .level:hover{transform:translateY(-2px);border-color:var(--violet)}
  .level .lic{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
    background:var(--violet-soft);color:var(--violet)}
  .level .lic .ic{width:20px;height:20px}
  .level b{font-size:15px;display:block}
  .level small{color:var(--muted);font-size:13px}
  .level.on{border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft),var(--shadow)}

  /* merk-/vakwissel-strook */
  .brandstrip{display:flex;align-items:center;gap:13px;width:100%;text-decoration:none;color:inherit;
    border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:12px 16px;margin:8px 0 2px;
    box-shadow:var(--shadow);transition:border-color .2s var(--ease),transform .15s var(--ease),box-shadow .2s var(--ease)}
  .brandstrip:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .brandstrip .bs-logo{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;color:#fff;
    font-family:Georgia,serif;font-weight:700;font-size:17px;background:linear-gradient(145deg,var(--accent),var(--accent-ink));
    box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brandstrip .bs-txt{flex:1;min-width:0}
  .brandstrip .bs-txt b{display:block;font-size:14.5px;letter-spacing:.1px}
  .brandstrip .bs-txt small{color:var(--muted);font-size:12.5px}
  .brandstrip .bs-go{color:var(--accent-ink);flex:none;display:inline-flex}
  .brandstrip .bs-go .ic{width:18px;height:18px;transition:transform .2s var(--ease)}
  .brandstrip:hover .bs-go .ic{transform:translateX(3px)}

  /* practice mode cards */
  .mode{display:flex;flex-direction:column;text-align:left;width:100%;border:1px solid var(--line);
    background:var(--card);border-radius:var(--r);padding:17px;gap:7px;box-shadow:var(--shadow);
    transition:transform .2s var(--ease),border-color .2s var(--ease),box-shadow .2s var(--ease)}
  .mode:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .mode:active{transform:translateY(-1px)}
  .mode .me{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
    background:var(--accent-soft);color:var(--accent-ink)}
  .mode .me .ic{width:22px;height:22px}
  .mode b{font-size:16px}
  .mode small{color:var(--muted);font-size:13px}
  .mode:disabled{opacity:.5;filter:grayscale(.3);cursor:default}
  .mode:disabled:hover{transform:none;border-color:var(--line);box-shadow:var(--shadow)}

  /* progress bars */
  .bar{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:var(--accent);border-radius:6px;
    transition:width .8s var(--ease)}
  .barrow{display:grid;grid-template-columns:54px 1fr 46px;gap:10px;align-items:center;margin:7px 0;font-size:13px}

  /* setup controls */
  label.fld{display:block;font-size:13px;font-weight:600;margin:16px 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;
    min-height:38px;padding:7px 13px;font-size:13.5px;transition:all .18s var(--ease)}
  .chip:hover{border-color:var(--accent)}
  .chip:active{transform:scale(.96)}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip.sm{min-height:32px;padding:5px 11px;font-size:12.5px}
  select,input[type=number],input[type=date],input[type=search],input[type=text],input[type=email],textarea{
    font-family:inherit;font-size:15px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);color:var(--ink);transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:11px;min-height:46px;padding:12px 20px;
    font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:8px;justify-content:center;
    box-shadow:0 4px 12px rgba(15,110,106,.25);transition:background .2s var(--ease),transform .12s var(--ease),box-shadow .2s var(--ease)}
  .btn:hover{background:var(--accent-ink)}
  .btn:active{transform:scale(.97)}
  .btn .ic{width:18px;height:18px}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.ghost:hover{border-color:var(--accent)}
  .btn.violet{background:var(--violet);box-shadow:0 4px 12px rgba(109,91,208,.28)}
  .btn.violet:hover{filter:brightness(.95)}
  .btn:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed;box-shadow:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* mode banner inside runner */
  .modebanner{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:11px 14px;border-radius:var(--r);
    background:var(--accent-soft);color:var(--accent-ink);font-size:13.5px;font-weight:600}
  .modebanner.v{background:var(--violet-soft);color:var(--violet)}
  .modebanner .ic{width:18px;height:18px}
  .modebanner a,.modebanner .bnlink{margin-left:auto;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;color:inherit;border:none;background:none;font-family:inherit;padding:0}

  /* question runner */
  .runtop{display:flex;align-items:center;gap:12px;margin:2px 0 14px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .runtop .bar{flex:1}
  .qtext{font-size:20px;font-weight:600;margin:8px 0 16px;font-family:Georgia,serif;line-height:1.4}
  .opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--line);
    background:var(--card);color:var(--ink);border-radius:12px;padding:14px 15px;margin-bottom:10px;font-size:15px;
    transition:border-color .15s var(--ease),background .15s var(--ease),transform .12s var(--ease),opacity .25s var(--ease)}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)}
  .opt:active:not(:disabled){transform:scale(.99)}
  .opt .k{flex:none;width:27px;height:27px;border-radius:8px;background:var(--bg2);color:var(--muted);
    display:grid;place-items:center;font-weight:700;font-size:13px;transition:all .15s var(--ease)}
  .opt.correct{border-color:var(--good);background:var(--good-soft)}
  .opt.correct .k{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
  .opt.wrong .k{background:var(--bad);color:#fff}
  .opt.dim{opacity:.4;pointer-events:none}
  .opt:disabled{cursor:default}

  /* aids (hints / 50-50) */
  .aids{display:flex;gap:9px;flex-wrap:wrap;margin:2px 0 14px}
  .aidbtn{border:1px dashed var(--violet);background:var(--violet-soft);color:var(--violet);border-radius:10px;
    min-height:38px;padding:7px 13px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;
    transition:transform .12s var(--ease),filter .2s var(--ease)}
  .aidbtn:hover{filter:brightness(.97)}
  .aidbtn:active{transform:scale(.96)}
  .aidbtn:disabled{opacity:.45;filter:grayscale(.4);cursor:default}
  .aidbtn .ic{width:16px;height:16px}
  .hintbox{border-left:3px solid var(--violet);background:var(--violet-soft);color:var(--ink);
    border-radius:0 10px 10px 0;padding:11px 14px;margin:0 0 14px;font-size:14px}
  .hintbox b{color:var(--violet)}

  .feedback{border-radius:12px;padding:13px 15px;margin:4px 0 12px;font-size:14.5px}
  .feedback.ok{background:var(--good-soft);color:var(--good)}
  .feedback.no{background:var(--bad-soft);color:var(--bad)}
  .feedback b{font-weight:700}
  .feedback .sub{display:block;margin-top:3px;color:var(--ink);font-weight:500;opacity:.92}

  /* why panel */
  .whybtn{border:1px solid var(--line);background:var(--card);color:var(--accent-ink);border-radius:10px;
    min-height:40px;padding:9px 14px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;
    transition:border-color .2s var(--ease),background .2s var(--ease)}
  .whybtn:hover{border-color:var(--accent);background:var(--accent-soft)}
  .whybtn .ic{width:16px;height:16px}
  .whybox{border:1px solid var(--accent);background:var(--accent-soft);border-radius:12px;padding:14px 16px;margin:12px 0 4px}
  .whybox h4{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-ink);
    font-family:system-ui;display:flex;align-items:center;gap:7px}
  .whybox ul{margin:0;padding-left:20px}
  .whybox li{margin:6px 0;font-size:14px;line-height:1.5}
  .whybox .more{margin-top:11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--accent-ink);
    display:inline-flex;align-items:center;gap:5px;background:none;border:none;padding:0}
  .whybox .more .ic{width:14px;height:14px}

  /* summary & hacks accordion */
  .acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;background:var(--card);overflow:hidden;
    box-shadow:var(--shadow)}
  .acc>summary{padding:15px 16px;font-weight:700;cursor:pointer;list-style:none;display:flex;align-items:center;gap:11px}
  .acc>summary::-webkit-details-marker{display:none}
  .acc>summary .n{flex:none;width:28px;height:28px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);
    display:grid;place-items:center;font-size:13px;font-weight:700}
  .acc>summary .caret{margin-left:auto;color:var(--muted);transition:transform .25s var(--ease)}
  .acc[open]>summary .caret{transform:rotate(90deg)}
  .acc[open]>summary{border-bottom:1px solid var(--line)}
  .acc .body{padding:6px 18px 16px}
  .acc h4{margin:15px 0 6px;font-size:13px;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.5px;font-family:system-ui}
  .acc ul{margin:0;padding-left:20px}
  .acc li{margin:6px 0;font-size:14.5px;line-height:1.5}
  .acc.hack>summary .n{background:var(--violet-soft);color:var(--violet)}
  .acc.hack h4{color:var(--violet)}
  .acc.hack li::marker{content:"💡  "}
  mark{background:var(--amber-soft);color:inherit;padding:0 2px;border-radius:3px}

  .results .big{font-family:Georgia,serif;font-size:54px;text-align:center;margin:8px 0;line-height:1}
  .ring{width:128px;height:128px;margin:6px auto}
  .ring .track-c{stroke:var(--bg2)}
  .ring .val-c{stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease)}
  .center{text-align:center}
  .hide{display:none!important}
  footer{margin-top:34px;text-align:center;color:var(--muted);font-size:13px}
  .kbd{font-size:11px;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--muted)}

  /* tips grid (study hacks intro) */
  .tipgrid{display:grid;gap:12px}

":[{"letter":"A","text":"Mannen produceren meer testosteron, wat direct leidt tot een snellere celveroudering op DNA-niveau."},{"letter":"B","text":"Mannelijke bijnieren produceren significant hogere spiegels cortisol, het stresshormoon."},{"letter":"C","text":"Vrouwen produceren meer oestrogeen, wat een beschermende werking heeft tegen hart- en vaatziekten."},{"letter":"D","text":"Vrouwen hebben twee X-chromosomen, waardoor genetische hartafwijkingen nooit tot uiting komen."}],"answer":"C","answerText":"Vrouwen produceren meer oestrogeen, wat een beschermende werking heeft tegen hart- en vaatziekten."},{"id":"x65","ch":"X","num":65,"question":"In de oncologie: wanneer spreekt men van een tumor (kanker) in de 'in situ' fase?","options":[{"letter":"A","text":"Wanneer de kankercellen zich nog uitsluitend op hun oorspronkelijke plaats bevinden en het omliggende weefsel of de keldermembraan nog niet zijn binnengedrongen."},{"letter":"B","text":"Wanneer een goedaardige (benigne) poliep plotseling ongecontroleerd begint te groeien."},{"letter":"C","text":"Wanneer de eerste kankercellen via de bloedbaan of lymfe beginnen te reizen naar andere weefsels."},{"letter":"D","text":"Wanneer een tumor te groot wordt voor zijn eigen bloedtoevoer en vanbinnen afsterft (necrose)."}],"answer":"A","answerText":"Wanneer de kankercellen zich nog uitsluitend op hun oorspronkelijke plaats bevinden en het omliggende weefsel of de keldermembraan nog niet zijn binnengedrongen."},{"id":"x66","ch":"X","num":66,"question":"Tijdens de bevruchting is het cruciaal dat er slechts één spermacel binnendringt in de eicel. Wat zorgt ervoor dat de eicel onmiddellijk ondoordringbaar wordt voor andere spermacellen na de eerste penetratie?","options":[{"letter":"A","text":"Het sluiten van specifieke eiwitkanalen in de baarmoederwand."},{"letter":"B","text":"Het afstoten van de corona radiata."},{"letter":"C","text":"Een fysieke en chemische verharding van de zona pellucida."},{"letter":"D","text":"Het onmiddellijk krimpen van het eicel cytoplasma."}],"answer":"C","answerText":"Een fysieke en chemische verharding van de zona pellucida."},{"id":"x67","ch":"X","num":67,"question":"Een stukje overerving (genetica): Moeder is heterozygoot (FfSs) voor sproetjes (F) en korte vingers (S). Vader is homozygoot recessief (ffss) en heeft geen sproetjes en lange vingers (s). Wat is de kans dat hun kind sproetjes én lange vingers heeft?","options":[{"letter":"A","text":"100 procent"},{"letter":"B","text":"50 procent"},{"letter":"C","text":"0 procent"},{"letter":"D","text":"25 procent"}],"answer":"D","answerText":"25 procent"},{"id":"x68","ch":"X","num":68,"question":"Wat is de correcte fysiologische definitie van het proces 'osmose'?","options":[{"letter":"A","text":"De verplaatsing van opgeloste stoffen van een hoge naar een lage concentratie, zolang het membraan dit toelaat."},{"letter":"B","text":"De verplaatsing van eiwitten van binnen naar buiten de cel."},{"letter":"C","text":"De verplaatsing van water (het oplosmiddel) door een semipermeabel membraan, van een omgeving met een lage naar een hoge concentratie opgeloste stoffen."},{"letter":"D","text":"Actief, energieverslindend transport van watermoleculen over het celmembraan."}],"answer":"C","answerText":"De verplaatsing van water (het oplosmiddel) door een semipermeabel membraan, van een omgeving met een lage naar een hoge concentratie opgeloste stoffen."},{"id":"x69","ch":"X","num":69,"question":"Hoe heten de in het medullaire weefsel (de binnenkant) van de nieren gelegen driehoekige structuren die bestaan uit grote groepen verzamelbuizen?","options":[{"letter":"A","text":"Nierpiramiden (Pyramides)"},{"letter":"B","text":"Nierbekken (Pelvis)"},{"letter":"C","text":"Kapsel van Bowman"},{"letter":"D","text":"Renale massa"}],"answer":"A","answerText":"Nierpiramiden (Pyramides)"},{"id":"x70","ch":"X","num":70,"question":"De alvleesklier (pancreas) heeft veel functies. Welk van de onderstaande processen is ECHTER GEEN functie of locatie behorend bij de alvleesklier?","options":[{"letter":"A","text":"Eilandjes van Langerhans huisvesten."},{"letter":"B","text":"Een sleutelrol spelen bij diabetes (suikerziekte)."},{"letter":"C","text":"Een endocriene functie vervullen."},{"letter":"D","text":"De opslag van grote reserves aan glycogeen."}],"answer":"D","answerText":"De opslag van grote reserves aan glycogeen."},{"id":"x71","ch":"X","num":71,"question":"Via welke anatomische buisvormige structuur is een ovarium (eierstok) verbonden met de baarmoeder (uterus)?","options":[{"letter":"A","text":"Oviduct (Eileider / Tuba uterina)"},{"letter":"B","text":"Urethra (Urinebuis)"},{"letter":"C","text":"Cervix (Baarmoederhals)"},{"letter":"D","text":"Vagina"}],"answer":"A","answerText":"Oviduct (Eileider / Tuba uterina)"},{"id":"x72","ch":"X","num":72,"question":"Wat is de primaire functie van de glomerulus en het omliggende kapsel van Bowman in de nieren?","options":[{"letter":"A","text":"Productie van witte bloedcellen"},{"letter":"B","text":"Filtratie van het bloed (Ultrafiltratie)"},{"letter":"C","text":"Actieve terugresorptie van voedingsstoffen"},{"letter":"D","text":"Concentreren van de urine"}],"answer":"B","answerText":"Filtratie van het bloed (Ultrafiltratie)"},{"id":"x73","ch":"X","num":73,"question":"Welk type celverbinding sluit de ruimte tussen naburige epitheelcellen vrijwel waterdicht af, zodat moleculen niet ongecontroleerd tussen de cellen door kunnen lekken?","options":[{"letter":"A","text":"Desmosoom (Macula adherens)"},{"letter":"B","text":"Adhesion junction"},{"letter":"C","text":"Tight junction (Zonula occludens)"},{"letter":"D","text":"Gap junction"}],"answer":"C","answerText":"Tight junction (Zonula occludens)"},{"id":"x74","ch":"X","num":74,"question":"Welk celtransportproces wordt specifiek gebruikt wanneer een cel grote moleculen opneemt nadat deze eerst aan membraaneiwitten binden, waarna het membraan instulpt en een blaasje (coated vesicle) vormt?","options":[{"letter":"A","text":"Fagocytose"},{"letter":"B","text":"Pinocytose"},{"letter":"C","text":"Receptor-gemedieerde endocytose"},{"letter":"D","text":"Exocytose"}],"answer":"C","answerText":"Receptor-gemedieerde endocytose"},{"id":"x75","ch":"X","num":75,"question":"Welke van de volgende stellingen over Diabetes Mellitus is ONJUIST?","options":[{"letter":"A","text":"Diabetes type 2 komt vaker voor binnen bepaalde families (heeft een sterke genetische component)."},{"letter":"B","text":"Obesitas en levensstijl zijn de belangrijkste risicofactoren voor het ontwikkelen van diabetes type 1."},{"letter":"C","text":"Bij diabetes type 1 kan de alvleesklier zelfstandig onvoldoende of geen insuline meer produceren."},{"letter":"D","text":"Mensen met ernstige en oncontroleerbare diabetes type 1 ondergaan soms een transplantatie van (delen van) de alvleesklier."}],"answer":"B","answerText":"Obesitas en levensstijl zijn de belangrijkste risicofactoren voor het ontwikkelen van diabetes type 1."},{"id":"x76","ch":"X","num":76,"question":"Welk type eiwitvezel is veruit de dikste, meest voorkomende vezel in bindweefsel en is verantwoordelijk voor grote treksterkte in pezen, huid en ligamenten?","options":[{"letter":"A","text":"Elastische vezels"},{"letter":"B","text":"Reticulaire vezels"},{"letter":"C","text":"Keratine"},{"letter":"D","text":"Collageenvezels"}],"answer":"D","answerText":"Collageenvezels"},{"id":"x77","ch":"X","num":77,"question":"Welke van de onderstaande cardiovasculaire structuren is NIET uniek voor het foetale embryo, maar blijft ook na de geboorte normaal functioneren?","options":[{"letter":"A","text":"Ductus venosus"},{"letter":"B","text":"Truncus pulmonalis (Pulmonaire stam / Longslagader)"},{"letter":"C","text":"Ductus arteriosus (van Botalli)"},{"letter":"D","text":"Foramen ovale"}],"answer":"B","answerText":"Truncus pulmonalis (Pulmonaire stam / Longslagader)"},{"id":"x78","ch":"X","num":78,"question":"Wat is een fysiologisch correct feit met betrekking tot de normale veroudering van het menselijk lichaam (van ca. 20 tot 90 jaar)?","options":[{"letter":"A","text":"Ruim de helft van de mensen boven de tachtig sterft primair als direct gevolg van anosmia."},{"letter":"B","text":"De totale hersenmassa en het hersenvolume verminderen geleidelijk in de loop van de decennia."},{"letter":"C","text":"De endocriene functie van de schildklier verbetert doorgaans na het tachtigste levensjaar."},{"letter":"D","text":"Mannen hebben in de twintig gemiddeld genomen minder testosteron dan in de zestig."}],"answer":"B","answerText":"De totale hersenmassa en het hersenvolume verminderen geleidelijk in de loop van de decennia."},{"id":"x79","ch":"X","num":79,"question":"Welk type weefsel is primair aangedaan door de verstoorde chloridekanalen bij een patiënt met mucoviscidose (taaislijmziekte)?","options":[{"letter":"A","text":"Skeletspierweefsel"},{"letter":"B","text":"Zenuwweefsel"},{"letter":"C","text":"Mucosa (Epitheelweefsel/Slijmvlies)"},{"letter":"D","text":"Botweefsel"}],"answer":"C","answerText":"Mucosa (Epitheelweefsel/Slijmvlies)"},{"id":"x80","ch":"X","num":80,"question":"Mucoviscidose is ernstig en homozygoot vaak dodelijk zonder moderne zorg, toch is het recessieve gen wereldwijd in omloop gebleven. Wat is hiervan een belangrijke evolutionaire theorie?","options":[{"letter":"A","text":"Het gen muteert continu vanzelf op een extreem hoog tempo binnen elke nieuwe generatie."},{"letter":"B","text":"De symptomen komen meestal pas tot uiting na het veertigste levensjaar, als de patiënt al kinderen heeft gekregen."},{"letter":"C","text":"Het gemuteerde allel is feitelijk dominant op latere leeftijd."},{"letter":"D","text":"Dragerschap van één mucoviscidose-allel geeft vermoedelijk gedeeltelijke bescherming tegen bepaalde ziekten, zoals buiktyfus of uitdroging door cholera."}],"answer":"D","answerText":"Dragerschap van één mucoviscidose-allel geeft vermoedelijk gedeeltelijke bescherming tegen bepaalde ziekten, zoals buiktyfus of uitdroging door cholera."},{"id":"x81","ch":"X","num":81,"question":"Welk van de onderstaande botten maakt anatomisch deel uit van de onderste ledematen (het been)?","options":[{"letter":"A","text":"Clavicula (Sleutelbeen)"},{"letter":"B","text":"Ulna (Ellepijp)"},{"letter":"C","text":"Fibula (Kuitbeen)"},{"letter":"D","text":"Scapula (Schouderblad)"}],"answer":"C","answerText":"Fibula (Kuitbeen)"},{"id":"x82","ch":"X","num":82,"question":"Volgens wetenschappelijk onderzoek naar levensverwachting (o.a. met tweelingen): Voor hoeveel procent worden de verschillen in levensduur tussen individuen over het algemeen verklaard door genetische (erfelijke) factoren?","options":[{"letter":"A","text":"0%"},{"letter":"B","text":"100%"},{"letter":"C","text":"Ongeveer 25%"},{"letter":"D","text":"Ongeveer 50%"}],"answer":"C","answerText":"Ongeveer 25%"},{"id":"x83","ch":"X","num":83,"question":"In welk specifiek deel van het mannelijk voortplantingsstelsel vindt de spermatogenese (de aanmaak en rijping van nieuwe spermacellen) plaats?","options":[{"letter":"A","text":"Tubuli seminiferi (Zaadbuisjes)"},{"letter":"B","text":"Epididymis (Bijbal)"},{"letter":"C","text":"Prostaat"},{"letter":"D","text":"Vas deferens (Zaadleider)"}],"answer":"A","answerText":"Tubuli seminiferi (Zaadbuisjes)"},{"id":"x84","ch":"X","num":84,"question":"Wat is de biologische definitie van een antigeen?","options":[{"letter":"A","text":"Een cel die niet-eigen organismen direct aanvalt en vernietigt."},{"letter":"B","text":"Een onderdeel van het major histocompatibility complex (MHC)."},{"letter":"C","text":"Elke substantie die als 'lichaamsvreemd' wordt herkend en een immuunrespons kan opwekken."},{"letter":"D","text":"Een afweerstof geproduceerd door het eigen lichaam."}],"answer":"C","answerText":"Elke substantie die als 'lichaamsvreemd' wordt herkend en een immuunrespons kan opwekken."},{"id":"x85","ch":"X","num":85,"question":"Wanneer we de vrouwelijke anatomie in het bekken van voor (anterieur) naar achter (posterieur) bekijken, in welke volgorde liggen de belangrijkste organen dan?","options":[{"letter":"A","text":"Urineblaas – Rectum – Baarmoeder"},{"letter":"B","text":"Urineblaas – Baarmoeder/Vagina – Rectum"},{"letter":"C","text":"Baarmoeder – Urineblaas – Rectum"},{"letter":"D","text":"Rectum – Vagina – Urineblaas"}],"answer":"B","answerText":"Urineblaas – Baarmoeder/Vagina – Rectum"},{"id":"x86","ch":"X","num":86,"question":"Welk van de onderstaande structuren maakt GEEN deel uit van de extracellulaire matrix (ECM) van een weefsel?","options":[{"letter":"A","text":"Actinefilamenten"},{"letter":"B","text":"Glycoproteïnen"},{"letter":"C","text":"Collageen"},{"letter":"D","text":"Fibronectine"}],"answer":"A","answerText":"Actinefilamenten"},{"id":"x87","ch":"X","num":87,"question":"Welk type spierweefsel bestaat uit spoelvormige cellen met slechts één kern per cel en vertoont geen dwarstreping onder de microscoop?","options":[{"letter":"A","text":"Glad spierweefsel (Smooth muscle)"},{"letter":"B","text":"Gestreept spierweefsel"},{"letter":"C","text":"Hartspierweefsel (Cardiac muscle)"},{"letter":"D","text":"Skeletspierweefsel"}],"answer":"A","answerText":"Glad spierweefsel (Smooth muscle)"},{"id":"x88","ch":"X","num":88,"question":"Welke drie chemische elementen (ionen) spelen de meest cruciale rol bij zenuwgeleiding en neurotransmitter-afgifte?","options":[{"letter":"A","text":"Fosfor (P), Natrium (Na+) en Calcium (Ca2+)"},{"letter":"B","text":"Kalium (K+), Natrium (Na+) en Jodium (I-)"},{"letter":"C","text":"Calcium (Ca2+), Jodium (I-) en Kalium (K+)"},{"letter":"D","text":"Kalium (K+), Natrium (Na+) en Calcium (Ca2+)"}],"answer":"D","answerText":"Kalium (K+), Natrium (Na+) en Calcium (Ca2+)"},{"id":"x89","ch":"X","num":89,"question":"Uit welk specifiek type kraakbeen bestaat het pre-skelet van een foetus voordat de endochondrale ossificatie (botvorming) plaatsvindt?","options":[{"letter":"A","text":"Hyalien kraakbeen (Hyaline cartilage)"},{"letter":"B","text":"Vezelkraakbeen (Fibrocartilage)"},{"letter":"C","text":"Elastisch kraakbeen"},{"letter":"D","text":"Protocartilage"}],"answer":"A","answerText":"Hyalien kraakbeen (Hyaline cartilage)"},{"id":"x90","ch":"X","num":90,"question":"Wat is het meest voorkomende, actieve en levende celtype in de dermis (lederhuid)?","options":[{"letter":"A","text":"Osteocyten"},{"letter":"B","text":"Keratinocyten"},{"letter":"C","text":"Fibroblasten"},{"letter":"D","text":"Melanocyten"}],"answer":"C","answerText":"Fibroblasten"},{"id":"x91","ch":"X","num":91,"question":"Beenderen genezen na een breuk aanzienlijk sneller en beter dan kraakbeen na een scheur. Wat is hiervan de fysiologische oorzaak?","options":[{"letter":"A","text":"Chondrocyten verdwijnen volledig na de kindertijd."},{"letter":"B","text":"Beenderen bevatten stamcellen, terwijl kraakbeen dat niet heeft."},{"letter":"C","text":"Kraakbeen wordt enkel aangemaakt bij de geboorte en vernieuwt zich daarna nooit meer."},{"letter":"D","text":"Botweefsel heeft een uitstekende bloedtoevoer, terwijl kraakbeen avasculair is."}],"answer":"D","answerText":"Botweefsel heeft een uitstekende bloedtoevoer, terwijl kraakbeen avasculair is."},{"id":"x92","ch":"X","num":92,"question":"Welk type epitheelweefsel bekleedt het grootste deel van de luchtwegen en lijkt uit meerdere lagen te bestaan omdat de celkernen op verschillende hoogtes liggen, hoewel elke cel contact maakt met de basale membraan?","options":[{"letter":"A","text":"Eénlagig plaveiselepitheel (Simple squamous)"},{"letter":"B","text":"Eénlagig kubisch epitheel"},{"letter":"C","text":"Pseudostratified ciliated columnar epitheel (Meerrijig trilhaarepitheel)"},{"letter":"D","text":"Meerlagig cilindrisch epitheel (Stratified columnar)"}],"answer":"C","answerText":"Pseudostratified ciliated columnar epitheel (Meerrijig trilhaarepitheel)"},{"id":"x93","ch":"X","num":93,"question":"In het epitheel van de luchtwegen bevinden zich speciale cellen die vorm hebben van een wijnglas of bokaal. Hoe heten deze cellen en wat is hun functie?","options":[{"letter":"A","text":"Vetcellen (Adipocyten); ze isoleren de luchtwegen."},{"letter":"B","text":"Slijmbekercellen (Goblet cells); ze scheiden mucus (slijm) af."},{"letter":"C","text":"Receptorcellen; ze registreren temperatuurverschillen in de ingeademde lucht."},{"letter":"D","text":"Basale cellen; ze slaan energie op in de vorm van glycogeen."}],"answer":"B","answerText":"Slijmbekercellen (Goblet cells); ze scheiden mucus (slijm) af."},{"id":"x94","ch":"X","num":94,"question":"John staat in een museum al lange tijd stil om naar een gids te luisteren. Hij voelt zich ineens verward, duizelig, en ziet sterretjes. Wat is er waarschijnlijk aan de hand en wat is fysiologisch de beste actie?","options":[{"letter":"A","text":"Hij krijgt een (pre)syncope (flauwte) doordat bloed in zijn benen zakt; hij moet gaan zitten/liggen."},{"letter":"B","text":"Hij heeft een paniekaanval en hyperventileert; hij moet in een zakje ademen."},{"letter":"C","text":"Hij heeft een acute daling van zuurstof in de museumzaal; hij moet naar buiten."},{"letter":"D","text":"Hij heeft een te lage hartslag door ontspanning; hij moet intensief gaan rennen."}],"answer":"A","answerText":"Hij krijgt een (pre)syncope (flauwte) doordat bloed in zijn benen zakt; hij moet gaan zitten/liggen."},{"id":"x95","ch":"X","num":95,"question":"Tijdens de embryonale ontwikkeling ontstaan weefsels uit drie kiembladen. Uit welk kiemblad ontstaan onder andere de spieren, botten, bloed en bindweefsel?","options":[{"letter":"A","text":"Endoderm (binnenste kiemblad)"},{"letter":"B","text":"Mesoderm (middelste kiemblad)"},{"letter":"C","text":"Ectoderm (buitenste kiemblad)"},{"letter":"D","text":"Periderm"}],"answer":"B","answerText":"Mesoderm (middelste kiemblad)"},{"id":"x96","ch":"X","num":96,"question":"Hartspiercellen (myocardium) moeten als één eenheid krachtig kunnen samentrekken zonder van elkaar te scheuren. Welke celverbinding in de intercalairschijven houdt de cellen mechanisch sterk bij elkaar tijdens contractie?","options":[{"letter":"A","text":"Desmosomen"},{"letter":"B","text":"Tight junctions"},{"letter":"C","text":"Myosinefilamenten"},{"letter":"D","text":"Gap junctions"}],"answer":"A","answerText":"Desmosomen"},{"id":"x97","ch":"X","num":97,"question":"Welk van de volgende hormonen heeft fysiologisch GEEN directe of indirecte werking in of op de nieren om de vocht- of elektrolytenbalans te regelen?","options":[{"letter":"A","text":"Aldosteron"},{"letter":"B","text":"Prolactine"},{"letter":"C","text":"Parathyroïdhormoon (PTH)"},{"letter":"D","text":"ADH (Antidiuretisch Hormoon)"}],"answer":"B","answerText":"Prolactine"},{"id":"x98","ch":"X","num":98,"question":"Welke van de volgende reeksen botten behoort in zijn geheel tot het 'appendiculair skelet' (de botten van de ledematen en de schouder/bekkengordel)?","options":[{"letter":"A","text":"Scapula (schouderblad) – Clavicula (sleutelbeen) – Fibula (kuitbeen)"},{"letter":"B","text":"Mandibula (onderkaak) – Femur (dijbeen) – Patella (knieschijf)"},{"letter":"C","text":"Sacrum (heiligbeen) – Coccyx (staartbeen) – Tibia (scheenbeen)"},{"letter":"D","text":"Sternum (borstbeen) – Humerus (opperarmbeen) – Radius (spaakbeen)"}],"answer":"A","answerText":"Scapula (schouderblad) – Clavicula (sleutelbeen) – Fibula (kuitbeen)"},{"id":"x99","ch":"X","num":99,"question":"Bloed dat door de haarvaten (capillairen) stroomt, moet zuurstof en voedingsstoffen kunnen uitwisselen met het weefsel. Hoe zijn de fysiologische waarden van de bloeddruk en de bloedstroomsnelheid op dit punt in de circulatie?","options":[{"letter":"A","text":"De bloeddruk is hoog en de stroomsnelheid is laag."},{"letter":"B","text":"De bloeddruk is hoog en de stroomsnelheid is hoog."},{"letter":"C","text":"De bloeddruk is laag en de stroomsnelheid is zeer laag."},{"letter":"D","text":"De bloeddruk is laag en de stroomsnelheid is hoog."}],"answer":"C","answerText":"De bloeddruk is laag en de stroomsnelheid is zeer laag."},{"id":"x100","ch":"X","num":100,"question":"Welke eigenschap past in de genetica NIET bij een gemuteerd tumor-suppressor-gen dat kanker veroorzaakt?","options":[{"letter":"A","text":"De mutatie leidt tot verminderde apoptose (geprogrammeerde celdood)."},{"letter":"B","text":"De mutatie verstoort de controle over de celcyclus (zoals het passeren van checkpoints)."},{"letter":"C","text":"De mutatie leidt tot een \"gain-of-function\" (verkrijgen van een nieuwe, activerende functie)."},{"letter":"D","text":"De mutatie resulteert in verminderde of ontbrekende DNA-reparatie."}],"answer":"C","answerText":"De mutatie leidt tot een \"gain-of-function\" (verkrijgen van een nieuwe, activerende functie)."},{"id":"x101","ch":"X","num":101,"question":"Wat gebeurt er fysiek met de borstkas en het diafragma (middenrif) tijdens een normale inspiratie (inademing)?","options":[{"letter":"A","text":"De ribbenkast beweegt omhoog en naar buiten; het diafragma ontspant."},{"letter":"B","text":"De ribbenkast beweegt omlaag en naar binnen; het diafragma ontspant (en bolt op omhoog)."},{"letter":"C","text":"De ribbenkast beweegt omlaag en naar binnen; het diafragma trekt samen."},{"letter":"D","text":"De ribbenkast beweegt omhoog en naar buiten; het diafragma trekt samen (en vlakt af naar beneden)."}],"answer":"D","answerText":"De ribbenkast beweegt omhoog en naar buiten; het diafragma trekt samen (en vlakt af naar beneden)."},{"id":"x102","ch":"X","num":102,"question":"In welk specifiek deel van het centrale zenuwstelsel bevindt zich het cardiovasculaire centrum dat onze hartslag en bloeddruk onwillekeurig reguleert?","options":[{"letter":"A","text":"Hypothalamus"},{"letter":"B","text":"Cerebellum (Kleine hersenen)"},{"letter":"C","text":"Medulla oblongata (Verlengde merg)"},{"letter":"D","text":"Cerebrum (Grote hersenen)"}],"answer":"C","answerText":"Medulla oblongata (Verlengde merg)"},{"id":"x103","ch":"X","num":103,"question":"Wat is fysiologisch het primaire kenmerk van de longziekte emfyseem?","options":[{"letter":"A","text":"Een overmatige productie van taai slijm in de hogere luchtwegen."},{"letter":"B","text":"De destructie van alveolaire wanden, wat leidt tot grote samengevoegde luchtzakken met een sterk verminderd oppervlakte voor gasuitwisseling."},{"letter":"C","text":"Een chronische bacteriële infectie in de longblaasjes."},{"letter":"D","text":"Vernauwing van de bronchiolen door gladde spierspasmen."}],"answer":"B","answerText":"De destructie van alveolaire wanden, wat leidt tot grote samengevoegde luchtzakken met een sterk verminderd oppervlakte voor gasuitwisseling."},{"id":"x104","ch":"X","num":104,"question":"Welke structuur houdt twee identieke zusterchromatiden (na DNA-replicatie) aan elkaar verbonden totdat ze tijdens de anafase uit elkaar worden getrokken?","options":[{"letter":"A","text":"Spindelvezel"},{"letter":"B","text":"Telomeer"},{"letter":"C","text":"Centromeer"},{"letter":"D","text":"Centriool"}],"answer":"C","answerText":"Centromeer"},{"id":"x105","ch":"X","num":105,"question":"Spermatogenese (bij mannen) en oögenese (bij vrouwen) verschillen sterk in kwantiteit en timing. Wat hebben deze beide processen van meiose echter wél fundamenteel gemeen?","options":[{"letter":"A","text":"Beide processen resulteren in vier functionele, levensvatbare dochtercellen uit één moedercel."},{"letter":"B","text":"Aan het einde van het proces resulteren ze in geslachtscellen met exact de helft van het oorspronkelijke aantal chromosomen (haploïd)."},{"letter":"C","text":"Beide processen vinden continu plaats gedurende het hele leven vanaf de puberteit."},{"letter":"D","text":"Beide processen stoppen in Profase 1 en wachten op een externe hormonale trigger om verder te gaan."}],"answer":"B","answerText":"Aan het einde van het proces resulteren ze in geslachtscellen met exact de helft van het oorspronkelijke aantal chromosomen (haploïd)."},{"id":"x106","ch":"X","num":106,"question":"Wat is een van de primaire fysiologische gebeurtenissen in het endocriene systeem tijdens de vrouwelijke menopauze?","options":[{"letter":"A","text":"Er is een sterke toename in de productie van oestrogeen."},{"letter":"B","text":"De ovaria (eierstokken) stoppen grotendeels met reageren op de hormonen FSH en LH uit de hypofyse."},{"letter":"C","text":"Een verminderde productie van androgene hormonen."},{"letter":"D","text":"De hypofyse stopt met de productie van LH."}],"answer":"B","answerText":"De ovaria (eierstokken) stoppen grotendeels met reageren op de hormonen FSH en LH uit de hypofyse."},{"id":"x107","ch":"X","num":107,"question":"Een normale somatische (lichaams)cel ondergaat mitose (reguliere celdeling). Als de begincel in totaal 8 chromosomen (4 paren) heeft, hoeveel chromosomen heeft elke resulterende dochtercel dan nadat de celdeling compleet is?","options":[{"letter":"A","text":"8 chromosomen"},{"letter":"B","text":"2 chromosomen"},{"letter":"C","text":"4 chromosomen"},{"letter":"D","text":"16 chromosomen"}],"answer":"A","answerText":"8 chromosomen"},{"id":"x108","ch":"X","num":108,"question":"Volgens de gaswet van Boyle (die een belangrijke rol speelt in onze ademhaling), wat gebeurt er met een gas bij een constante temperatuur?","options":[{"letter":"A","text":"Temperatuur en druk blijven altijd gelijk ongeacht het volume."},{"letter":"B","text":"Een afname van het volume leidt tot een afname van de druk."},{"letter":"C","text":"Een toename van het volume in een afgesloten ruimte zorgt direct voor een evenredige afname van de gasdruk."},{"letter":"D","text":"Een toename van de druk zorgt voor een verdere toename van het volume."}],"answer":"C","answerText":"Een toename van het volume in een afgesloten ruimte zorgt direct voor een evenredige afname van de gasdruk."},{"id":"x109","ch":"X","num":109,"question":"Tijdens de embryonale fase van de mens ontwikkelt het hart zich verrassend vroeg. Ongeveer hoeveel weken na de bevruchting begint het hart van de embryo primitief te kloppen?","options":[{"letter":"A","text":"Pas bij 3 maanden."},{"letter":"B","text":"Ongeveer 3 à 4 weken na de bevruchting."},{"letter":"C","text":"Ongeveer 1 week na de bevruchting."},{"letter":"D","text":"Na ongeveer 8 tot 10 weken."}],"answer":"B","answerText":"Ongeveer 3 à 4 weken na de bevruchting."},{"id":"x110","ch":"X","num":110,"question":"Tot wanneer (hoeveel weken na de bevruchting) spreekt men medisch gezien in principe van een 'embryo', waarna de term 'foetus' wordt gebruikt?","options":[{"letter":"A","text":"Tot het einde van de 8ste week."},{"letter":"B","text":"Tot het einde van de 16e week."},{"letter":"C","text":"Tot het einde van de 3e week."},{"letter":"D","text":"Tot de geboorte."}],"answer":"A","answerText":"Tot het einde van de 8ste week."},{"id":"x111","ch":"X","num":111,"question":"Wat zijn de fundamentele bouwstenen (monomeren) waaruit een keten van DNA is opgebouwd?","options":[{"letter":"A","text":"Koolhydraten (Monosachariden)"},{"letter":"B","text":"Nucleotiden"},{"letter":"C","text":"Aminozuren"},{"letter":"D","text":"Vetzuren"}],"answer":"B","answerText":"Nucleotiden"},{"id":"x112","ch":"X","num":112,"question":"Hoeveel afzonderlijke botten heeft het skelet van een typische volwassen mens?","options":[{"letter":"A","text":"Omstreeks 500 botten"},{"letter":"B","text":"206 botten"},{"letter":"C","text":"160 botten"},{"letter":"D","text":"Precies 100 botten"}],"answer":"B","answerText":"206 botten"},{"id":"x113","ch":"X","num":113,"question":"Wat wordt in de ademhalingsfysiologie bedoeld met het 'tidal volume' (ademvolume)?","options":[{"letter":"A","text":"Het volume lucht van één normale, rustige in- en uitademing."},{"letter":"B","text":"Het restvolume dat altijd in de longen achterblijft, zelfs na maximale uitademing."},{"letter":"C","text":"Het volume lucht dat per minuut wordt ingeademd."},{"letter":"D","text":"De maximale hoeveelheid lucht die je krachtig kunt uitademen na een maximale inademing."}],"answer":"A","answerText":"Het volume lucht van één normale, rustige in- en uitademing."},{"id":"x114","ch":"X","num":114,"question":"Wat is de primaire en unieke functie van geactiveerde B-lymfocyten in het immuunsysteem?","options":[{"letter":"A","text":"Ze fagocyteren (opeten) grote bacteriën."},{"letter":"B","text":"Ze produceren nieuwe lichaamsvreemde antigenen."},{"letter":"C","text":"Ze doden direct geïnfecteerde lichaamscellen via perforines."},{"letter":"D","text":"Ze produceren en scheiden antilichamen uit."}],"answer":"D","answerText":"Ze produceren en scheiden antilichamen uit."},{"id":"x115","ch":"X","num":115,"question":"Welk type lipoproteïne staat in de volksmond bekend als de 'slechte' cholesterol, omdat een teveel hiervan kan leiden tot plaquevorming in de slagaders?","options":[{"letter":"A","text":"Onverzadigde vetten"},{"letter":"B","text":"Triglyceriden"},{"letter":"C","text":"LDL (Low-Density Lipoprotein)"},{"letter":"D","text":"HDL (High-Density Lipoprotein)"}],"answer":"C","answerText":"LDL (Low-Density Lipoprotein)"},{"id":"x116","ch":"X","num":116,"question":"Welke van de volgende stellingen over coeliakie (glutenintolerantie) is NIET waar?","options":[{"letter":"A","text":"De aandoening en symptomen kunnen volledig worden verholpen door over te stappen op een vegetarisch dieet."},{"letter":"B","text":"Het heeft een duidelijke erfelijke (genetische) component."},{"letter":"C","text":"De darmvlokken (villi) worden afgeplat, wat leidt tot malabsorptie van voedingsstoffen."},{"letter":"D","text":"Het is een auto-immuunziekte."}],"answer":"A","answerText":"De aandoening en symptomen kunnen volledig worden verholpen door over te stappen op een vegetarisch dieet."},{"id":"x117","ch":"X","num":117,"question":"Welke van de onderstaande gedragingen is klinisch gezien GEEN psychologische eetstoornis, maar een alcoholgerelateerde aandoening?","options":[{"letter":"A","text":"Binge eating disorder"},{"letter":"B","text":"Anorexia nervosa"},{"letter":"C","text":"Boulimia nervosa"},{"letter":"D","text":"Binge drinking"}],"answer":"D","answerText":"Binge drinking"},{"id":"x118","ch":"X","num":118,"question":"De neusholte bekleedt een belangrijke functie bij het inademen. Wat zou een direct anatomisch en fysiologisch gevolg zijn als we geen neusholte zouden hebben?","options":[{"letter":"A","text":"We zouden 50% minder zuurstof opnemen in het bloed."},{"letter":"B","text":"We zouden niet meer in staat zijn om klanken te vormen of te spreken."},{"letter":"C","text":"Er zou aanzienlijk meer vuil, stof en pathogenen (debris) in onze lagere longen terechtkomen."},{"letter":"D","text":"Onze bloeddruk in de longen zou te ver oplopen."}],"answer":"C","answerText":"Er zou aanzienlijk meer vuil, stof en pathogenen (debris) in onze lagere longen terechtkomen."},{"id":"x119","ch":"X","num":119,"question":"Welk extra-embryonaal weefsel/vlies produceert in de eerste drie maanden van de zwangerschap het zwangerschapshormoon hCG (humaan choriongonadotrofine) om het corpus luteum in stand te houden?","options":[{"letter":"A","text":"Chorion"},{"letter":"B","text":"Navelstreng (Umbilical cord)"},{"letter":"C","text":"Amnion"},{"letter":"D","text":"Endometrium"}],"answer":"A","answerText":"Chorion"},{"id":"x120","ch":"X","num":120,"question":"Wat is een medisch en fysiologisch correcte uitspraak omtrent de normale biologische veroudering (aging)?","options":[{"letter":"A","text":"Naarmate men ouder wordt, raakt men vatbaarder voor (en sterft men vaker aan) ernstige en fatale ziektes zoals kanker en hart- en vaatziekten."},{"letter":"B","text":"Het dagelijks innemen van extra antioxidanten verlengt de levensverwachting gegarandeerd met minimaal vijf jaar."},{"letter":"C","text":"De totale botdichtheid stijgt gestaag naarmate men de 80 passeert."},{"letter":"D","text":"Op een specifiek moment stoppen letterlijk alle cellen in het lichaam met delen, wat resulteert in een acute hartstilstand."}],"answer":"A","answerText":"Naarmate men ouder wordt, raakt men vatbaarder voor (en sterft men vaker aan) ernstige en fatale ziektes zoals kanker en hart- en vaatziekten."},{"id":"x121","ch":"X","num":121,"question":"Wat is de voornaamste fysiologische functie van ADH (Antidiuretisch Hormoon) op de nieren?","options":[{"letter":"A","text":"Het bevordert de reabsorptie van water vanuit de verzamelbuis (collecting duct) terug de bloedbaan in."},{"letter":"B","text":"Het bevordert de uitscheiding van extra water, zodat de urine sterk verdund raakt."},{"letter":"C","text":"Het zorgt voor het extra uitplassen van glucose en zouten in de proximale tubulus."},{"letter":"D","text":"Het activeert het enzym renine in het juxtaglomerulaire apparaat."}],"answer":"A","answerText":"Het bevordert de reabsorptie van water vanuit de verzamelbuis (collecting duct) terug de bloedbaan in."},{"id":"x122","ch":"X","num":122,"question":"Tijdens een ontsteking (inflammatory response) reageren weefsels direct door het afgeven van de stof histamine. Onder welke categorie van ons immuunsysteem valt dit onmiddellijke proces?","options":[{"letter":"A","text":"De verworven, adaptieve afweer (Adaptive defense)"},{"letter":"B","text":"Cel-gemedieerde afweer"},{"letter":"C","text":"Kunstmatige passieve afweer"},{"letter":"D","text":"De aangeboren, aspecifieke afweer (Innate defense)"}],"answer":"D","answerText":"De aangeboren, aspecifieke afweer (Innate defense)"},{"id":"x123","ch":"X","num":123,"question":"Wat is het 'periosteum' in de skeletanatomie?","options":[{"letter":"A","text":"De compacte, harde botweefsellaag zelf (corticaal bot)."},{"letter":"B","text":"Een dun vlies dat alleen de gewrichtsoppervlakken bedekt om wrijving tegen te gaan."},{"letter":"C","text":"Het vloeibare beenmerg binnenin de mergholte."},{"letter":"D","text":"Een sterk bindweefselvlies dat de buitenkant van de botten bekleedt."}],"answer":"D","answerText":"Een sterk bindweefselvlies dat de buitenkant van de botten bekleedt."},{"id":"x124","ch":"X","num":124,"question":"Welk van de volgende eigenschappen omschrijft het best het concept van 'innate defense' (aangeboren afweer) in de immunologie?","options":[{"letter":"A","text":"Het is uiterst specifiek afgestemd op één virusstam en wordt beter na herhaalde infectie."},{"letter":"B","text":"Het is het systeem dat voornamelijk vertrouwt op de aanmaak van antilichamen door B-cellen."},{"letter":"C","text":"Het is niet-selectief (bestrijdt alle indringers op dezelfde manier) en reageert extreem snel."},{"letter":"D","text":"Het bestaat uitsluitend uit processen die diep binnenin het lichaam plaatsvinden, niet op de huid."}],"answer":"C","answerText":"Het is niet-selectief (bestrijdt alle indringers op dezelfde manier) en reageert extreem snel."},{"id":"x125","ch":"X","num":125,"question":"Wanneer je een verkeerde bloedtransfusie krijgt, ontstaat er 'agglutinatie'. Wat gebeurt er fysiologisch bij dit proces?","options":[{"letter":"A","text":"Het samenklonteren van bloedplaatjes (trombocyten) in een snijwond."},{"letter":"B","text":"De onmiddellijke vernietiging van witte bloedcellen door oververhitting."},{"letter":"C","text":"Het stijgen van de lichaamstemperatuur in reactie op een externe bacterie."},{"letter":"D","text":"Het sterk samenklonteren en aan elkaar plakken van rode bloedcellen door immuunreacties."}],"answer":"D","answerText":"Het sterk samenklonteren en aan elkaar plakken van rode bloedcellen door immuunreacties."},{"id":"x126","ch":"X","num":126,"question":"Welke van de onderstaande weefselstructuren is GEEN extra-embryonaal vlies/membraan, omdat het een orgaan van de moeder is in plaats van de foetus?","options":[{"letter":"A","text":"Amnion"},{"letter":"B","text":"Endometrium"},{"letter":"C","text":"Chorion"},{"letter":"D","text":"Dooierzak (Yolk sac)"}],"answer":"B","answerText":"Endometrium"},{"id":"x127","ch":"X","num":127,"question":"Wat is in theorie de structuur aan de uiteinden van chromosomen die steeds een klein stukje verkort na elke celdeling (mitose), waardoor deze een rol speelt in celveroudering?","options":[{"letter":"A","text":"Ribosomen"},{"letter":"B","text":"Telomeren"},{"letter":"C","text":"Mitochondriën"},{"letter":"D","text":"Centromeren"}],"answer":"B","answerText":"Telomeren"},{"id":"x128","ch":"X","num":128,"question":"Binnen het proces van cellulaire ademhaling vinden er meerdere reacties plaats. Welke stap produceert met ruime voorsprong de grootste netto hoeveelheid ATP (energie)?","options":[{"letter":"A","text":"Elektronentransportketen (oxidatieve fosforylering)"},{"letter":"B","text":"Krebs cyclus (Citroenzuurcyclus)"},{"letter":"C","text":"Fermentatie (Melkzuurvorming)"},{"letter":"D","text":"Glycolyse"}],"answer":"A","answerText":"Elektronentransportketen (oxidatieve fosforylering)"},{"id":"x129","ch":"X","num":129,"question":"Wanneer de calciumconcentratie in je bloed gevaarlijk HOOG is, zal de schildklier een hormoon afscheiden dat osteoblasten stimuleert om extra botweefsel te bouwen en zo het bloedcalcium te laten dalen. Welk hormoon is dit?","options":[{"letter":"A","text":"Parathyroïdhormoon (PTH)"},{"letter":"B","text":"Cortisol"},{"letter":"C","text":"Calcitonine"},{"letter":"D","text":"Antidiuretisch Hormoon (ADH)"}],"answer":"C","answerText":"Calcitonine"},{"id":"x130","ch":"X","num":130,"question":"Tijdens een paniekaanval kan hyperventilatie optreden. Maar soms zal het ademhalingscentrum mensen onbewust sneller én dieper laten ademhalen vanwege chemische signalen. Waarom doet het lichaam dit?","options":[{"letter":"A","text":"Omdat het suikergehalte (glucose) plots sterk gedaald is."},{"letter":"B","text":"Omdat de pH-waarde van het bloed te zuur is (acidose), waardoor extra CO2 moet worden uitgeademd."},{"letter":"C","text":"Omdat de pH-waarde van het bloed te basisch is (alkalose), waardoor zuurstof moet worden gecompenseerd."},{"letter":"D","text":"Omdat het hart ritmestoornissen heeft en probeert spierspasmen op te heffen."}],"answer":"B","answerText":"Omdat de pH-waarde van het bloed te zuur is (acidose), waardoor extra CO2 moet worden uitgeademd."},{"id":"x131","ch":"X","num":131,"question":"Welke stelling over het verschil of de gelijkenis tussen de mannelijke en vrouwelijke primaire voortplantingsorganen is FOUT?","options":[{"letter":"A","text":"Beide produceren belangrijke hoeveelheden geslachtshormonen (seks hormones)."},{"letter":"B","text":"Beide organen zijn de locaties waar in het lichaam de meiotische deling (meiose) van geslachtscellen plaatsvindt."},{"letter":"C","text":"Beide voortplantingsorganen (testes en eierstokken) bevinden zich in hun volwassen vorm veilig opgeborgen binnen de bekken- of buikholte (abdominale holte)."},{"letter":"D","text":"Tot ongeveer zes weken embryonale ontwikkeling zien de genitale structuren van jongens en meisjes er nog weefselkundig exact hetzelfde uit."}],"answer":"C","answerText":"Beide voortplantingsorganen (testes en eierstokken) bevinden zich in hun volwassen vorm veilig opgeborgen binnen de bekken- of buikholte (abdominale holte)."},{"id":"x132","ch":"X","num":132,"question":"Wat is in de celbiologie de definitie van 'contactinhibitie' (contact inhibition)?","options":[{"letter":"A","text":"Het verschijnsel waarbij normale cellen onmiddellijk stoppen met delen zodra ze fysiek in aanraking komen met hun buurcellen."},{"letter":"B","text":"Het uitscheiden van enzymen die het contact met naburige cellen proberen af te breken om ruimte te maken."},{"letter":"C","text":"Het proces waarbij weefsels afsterven als ze te strak tegen elkaar gedrukt worden (zoals bij doorligwonden)."},{"letter":"D","text":"Het blokkeren van synapsen in zenuwcellen waardoor pijnprikkels geblokkeerd worden."}],"answer":"A","answerText":"Het verschijnsel waarbij normale cellen onmiddellijk stoppen met delen zodra ze fysiek in aanraking komen met hun buurcellen."},{"id":"x133","ch":"X","num":133,"question":"Wanneer monocyten (een type witte bloedcel) zich vanuit de bloedbaan nestelen in lichaamsweefsel om indringers op te ruimen, transformeren ze. Hoe heten ze vanaf dat moment?","options":[{"letter":"A","text":"Macrofagen"},{"letter":"B","text":"Megakaryocyten"},{"letter":"C","text":"Neutrofielen"},{"letter":"D","text":"Basofielen"}],"answer":"A","answerText":"Macrofagen"},{"id":"x134","ch":"X","num":134,"question":"Welke chemische verbinding of eiwit functioneert als de belangrijkste buffer om de pH in het bloed constant (rond 7.4) te houden?","options":[{"letter":"A","text":"Bilirubine"},{"letter":"B","text":"Hemoglobine"},{"letter":"C","text":"Bicarbonaat (HCO3-)"},{"letter":"D","text":"Albumine"}],"answer":"C","answerText":"Bicarbonaat (HCO3-)"},{"id":"x135","ch":"X","num":135,"question":"Veruit de meeste hormonale systemen in ons lichaam werken op basis van negatieve feedback om een evenwicht te bewaren. Wat is echter een schoolvoorbeeld van POSITIEVE feedback, waarbij de stimulus zichzelf blijft versterken?","options":[{"letter":"A","text":"De afgifte van oxytocine tijdens de bevalling."},{"letter":"B","text":"De afgifte van insuline door een hoge bloedsuikerspiegel."},{"letter":"C","text":"De productie van Oestrogeen door de bijnieren."},{"letter":"D","text":"De regulatie van de lichaamstemperatuur bij zweetproductie."}],"answer":"A","answerText":"De afgifte van oxytocine tijdens de bevalling."},{"id":"x136","ch":"X","num":136,"question":"Volwassen botcellen (osteocyten) zitten vast en geïsoleerd in de kleine gaatjes (lacunae) van het uiterst harde botweefsel. Hoe kunnen zij onderling communiceren en overleven via zuurstof- en voedinguitwisseling?","options":[{"letter":"A","text":"Direct via diffusie dwars door de calciumfosfaatkristallen heen."},{"letter":"B","text":"Door fysiek rond te 'wandelen' (migreren) in het botweefsel."},{"letter":"C","text":"Louter via chemische signalen in grote, holle zenuwbanen."},{"letter":"D","text":"Via canaliculi (botkanaaltjes)"}],"answer":"D","answerText":"Via canaliculi (botkanaaltjes)"},{"id":"x137","ch":"X","num":137,"question":"Hoeveel wervels telt het cervicale (nek/hals) gedeelte van een normale menselijke wervelkolom?","options":[{"letter":"A","text":"7 wervels"},{"letter":"B","text":"4 wervels"},{"letter":"C","text":"12 wervels"},{"letter":"D","text":"5 wervels"}],"answer":"A","answerText":"7 wervels"},{"id":"x138","ch":"X","num":138,"question":"Welke twee lichaamsvloeistoffen horen respectievelijk bij een sterk zure pH van ongeveer 2 en een licht zure pH van rond de 6?","options":[{"letter":"A","text":"Bloed en Urine"},{"letter":"B","text":"Maagsap (pH ~2) en Urine (pH ~6)"},{"letter":"C","text":"Speeksel en Bloed"},{"letter":"D","text":"Bloed en Lymfe"}],"answer":"B","answerText":"Maagsap (pH ~2) en Urine (pH ~6)"},{"id":"x139","ch":"X","num":139,"question":"Welk van de volgende mineralen wordt geclassificeerd als een sporenelement (spoormineraal), wat betekent dat het lichaam er slechts zeer kleine hoeveelheden van nodig heeft?","options":[{"letter":"A","text":"Calcium"},{"letter":"B","text":"Natrium"},{"letter":"C","text":"Kalium"},{"letter":"D","text":"IJzer"}],"answer":"D","answerText":"IJzer"},{"id":"x140","ch":"X","num":140,"question":"Wat is statistisch gezien de gevaarlijkste en meest dodelijke vorm van huidkanker?","options":[{"letter":"A","text":"Sarcoom"},{"letter":"B","text":"Melanoom"},{"letter":"C","text":"Plaveiselcelcarcinoom"},{"letter":"D","text":"Basaalcelcarcinoom"}],"answer":"B","answerText":"Melanoom"},{"id":"x141","ch":"X","num":141,"question":"Welk proces in de aerobe celademhaling levert veruit de meeste ATP (energie) per afgebroken glucosemolecuul op?","options":[{"letter":"A","text":"Glycolyse"},{"letter":"B","text":"De elektronentransportketen (oxidatieve fosforylering)"},{"letter":"C","text":"De citroenzuurcyclus (Krebs cyclus)"},{"letter":"D","text":"Fermentatie"}],"answer":"B","answerText":"De elektronentransportketen (oxidatieve fosforylering)"},{"id":"x142","ch":"X","num":142,"question":"Welk celorganel is verantwoordelijk voor het ontvangen, modificeren, verpakken en verzenden van eiwitten en lipiden die in het endoplasmatisch reticulum zijn gemaakt?","options":[{"letter":"A","text":"Mitochondrion"},{"letter":"B","text":"Lysosoom"},{"letter":"C","text":"Golgi-apparaat"},{"letter":"D","text":"Ribosoom"}],"answer":"C","answerText":"Golgi-apparaat"},{"id":"x143","ch":"X","num":143,"question":"Hoe noemt men het gecoördineerde netwerk van membranen (waaronder de kern-envelop, het ER, het Golgi-apparaat en blaasjes) dat samenwerkt om lipiden en eiwitten te maken, te bewerken en te vervoeren?","options":[{"letter":"A","text":"Cytoskelet"},{"letter":"B","text":"Extracellulaire matrix"},{"letter":"C","text":"Endomembraansysteem"},{"letter":"D","text":"Fagocytaire systeem"}],"answer":"C","answerText":"Endomembraansysteem"},{"id":"x144","ch":"X","num":144,"question":"Welk celorganel, ontstaan als een blaasje afgesnoerd van het Golgi-apparaat, bevat een mix van krachtige spijsverteringsenzymen om oude celonderdelen of binnengedrongen bacteriën af te breken?","options":[{"letter":"A","text":"Ruw Endoplasmatisch Reticulum (RER)"},{"letter":"B","text":"Lysosoom"},{"letter":"C","text":"Peroxisoom"},{"letter":"D","text":"Glad Endoplasmatisch Reticulum (SER)"}],"answer":"B","answerText":"Lysosoom"},{"id":"x145","ch":"X","num":145,"question":"Welke van de onderstaande weefseltypen worden anatomisch geclassificeerd als 'ondersteunend bindweefsel' (supporting connective tissue)?","options":[{"letter":"A","text":"Hartspier en Gladde spier"},{"letter":"B","text":"Losmazig en Dicht bindweefsel (zoals pezen)"},{"letter":"C","text":"Vezelig kraakbeen en compact bot"},{"letter":"D","text":"Bloed en Lymfe"}],"answer":"C","answerText":"Vezelig kraakbeen en compact bot"},{"id":"x146","ch":"X","num":146,"question":"Welk type chemische reactie in onze cellen koppelt kleine bouwstenen (monomeren) aan elkaar om grote macromoleculen te vormen, waarbij telkens een watermolecuul vrijkomt?","options":[{"letter":"A","text":"Hydrolysereactie"},{"letter":"B","text":"Dehydratatiereactie (Condensatiereactie)"},{"letter":"C","text":"Oxidatiereactie"},{"letter":"D","text":"Fosforylering"}],"answer":"B","answerText":"Dehydratatiereactie (Condensatiereactie)"},{"id":"x147","ch":"X","num":147,"question":"Tot welke grote klasse van biologische macromoleculen behoren voedingsstoffen zoals suikers, zetmeel en glycogeen?","options":[{"letter":"A","text":"Lipiden"},{"letter":"B","text":"Eiwitten (Proteïnen)"},{"letter":"C","text":"Koolhydraten (Sachariden)"},{"letter":"D","text":"Nucleïnezuren"}],"answer":"C","answerText":"Koolhydraten (Sachariden)"},{"id":"x148","ch":"X","num":148,"question":"Uit welk specifiek type epitheelweefsel is onze opperhuid (epidermis) opgebouwd om optimale bescherming tegen wrijving en bacteriën te bieden?","options":[{"letter":"A","text":"Eenvoudig plaveiselepitheel"},{"letter":"B","text":"Gestratificeerd plaveiselepitheel (Meerlagig plattepitheel)"},{"letter":"C","text":"Eenlagig cilindrisch epitheel"},{"letter":"D","text":"Overgangsepitheel (Transitional)"}],"answer":"B","answerText":"Gestratificeerd plaveiselepitheel (Meerlagig plattepitheel)"},{"id":"x149","ch":"X","num":149,"question":"Genetica: Een vader heeft 'ffss' (geen sproeten, lange vingers). Een moeder heeft 'FfSs' (wel sproeten, korte vingers). Wat is de procentuele kans dat hun kind wél sproeten maar lange vingers (F_ss) zal hebben?","options":[{"letter":"A","text":"50%"},{"letter":"B","text":"100%"},{"letter":"C","text":"0%"},{"letter":"D","text":"25%"}],"answer":"D","answerText":"25%"},{"id":"x150","ch":"X","num":150,"question":"Welke van de onderstaande eigenschappen of aandoeningen wordt NIET polygeen bepaald (door de interactie van vele genen), maar door één enkel gen (monogeen)?","options":[{"letter":"A","text":"Huidskleur"},{"letter":"B","text":"Schizofrenie"},{"letter":"C","text":"De ziekte van Huntington"},{"letter":"D","text":"Diabetes"}],"answer":"C","answerText":"De ziekte van Huntington"},{"id":"x151","ch":"X","num":151,"question":"Hoe noemt men anatomisch het onderste, smalle en buisvormige deel van de baarmoeder dat een kleine opening vormt naar de vagina toe?","options":[{"letter":"A","text":"De fornix"},{"letter":"B","text":"Het myometrium"},{"letter":"C","text":"De cervix (baarmoederhals)"},{"letter":"D","text":"De eileider (Tuba uterina)"}],"answer":"C","answerText":"De cervix (baarmoederhals)"},{"id":"x152","ch":"X","num":152,"question":"Wat is het meest kenmerkende structurele onderdeel dat het open netwerk van sponsachtig bot (spongy bone) vormt?","options":[{"letter":"A","text":"Rood beenmerg"},{"letter":"B","text":"Osteonen (Systemen van Havers)"},{"letter":"C","text":"Periosteum"},{"letter":"D","text":"Trabeculae (Botbalkjes)"}],"answer":"D","answerText":"Trabeculae (Botbalkjes)"},{"id":"x153","ch":"X","num":153,"question":"Welke van de onderstaande cellen maakt GEEN deel uit van de 'gevormde elementen' van het bloed?","options":[{"letter":"A","text":"Trombocyten (Bloedplaatjes)"},{"letter":"B","text":"Leukocyten (Witte bloedcellen)"},{"letter":"C","text":"Erytrocyten (Rode bloedcellen)"},{"letter":"D","text":"Adipocyten (Vetcellen)"}],"answer":"D","answerText":"Adipocyten (Vetcellen)"},{"id":"x154","ch":"X","num":154,"question":"Rond de overgang van de blaas naar de urinebuis liggen zenuwen en sluitspieren. Wat is de functie van de buitenste sluitspier, die verbonden is met somatische motorische zenuwen?","options":[{"letter":"A","text":"Het activeert de blaaswandspier (detrusor) om samen te knijpen."},{"letter":"B","text":"Het geeft onbewust aan de hersenen door hoeveel urine er in de blaas zit."},{"letter":"C","text":"Het opent onvrijwillig wanneer de blaas haar maximale volume bereikt."},{"letter":"D","text":"Het zorgt voor de bewuste (vrijwillige) controle over het ophouden of starten van het plassen (mictie)."}],"answer":"D","answerText":"Het zorgt voor de bewuste (vrijwillige) controle over het ophouden of starten van het plassen (mictie)."},{"id":"x155","ch":"X","num":155,"question":"Wanneer weefsel beschadigd raakt, ontstaat er een ontstekingsreactie (inflammatie). Wat maakt echter GEEN deel uit van deze lokale, aangeboren immuunreactie?","options":[{"letter":"A","text":"Het uitscheiden van signaalstoffen (cytokinen) om meer immuuncellen te lokken."},{"letter":"B","text":"Het vrijkomen van histamine door mestcellen."},{"letter":"C","text":"Fagocyterende witte bloedcellen (neutrofielen en macrofagen) die bacteriën opeten."},{"letter":"D","text":"B-lymfocyten die massaal specifieke antilichamen produceren in de wond."}],"answer":"D","answerText":"B-lymfocyten die massaal specifieke antilichamen produceren in de wond."},{"id":"x156","ch":"X","num":156,"question":"Wat gebeurt er fysiek na de geboorte met bloedvaten zoals de navelstrengslagaders (umbilicale arteriën) en de ductus arteriosus, die tijdens het foetale leven cruciaal waren?","options":[{"letter":"A","text":"Ze blijven open maar krimpen aanzienlijk, zonder verdere functie."},{"letter":"B","text":"Ze worden via de navelstreng samen met de moederkoek in hun geheel afgestoten."},{"letter":"C","text":"Ze nemen de functie over van het lymfestelsel in de buikholte."},{"letter":"D","text":"Ze klappen dicht, degenereren en veranderen definitief in bindweefselstrengen (ligamenten)."}],"answer":"D","answerText":"Ze klappen dicht, degenereren en veranderen definitief in bindweefselstrengen (ligamenten)."},{"id":"x157","ch":"X","num":157,"question":"Welke belangrijke signaalstoffen (eiwitten) worden door Helper T-cellen uitgescheiden om de activiteit van andere immuuncellen te sturen en stimuleren?","options":[{"letter":"A","text":"Antilichamen"},{"letter":"B","text":"Perforinen"},{"letter":"C","text":"Histamine"},{"letter":"D","text":"Cytokinen"}],"answer":"D","answerText":"Cytokinen"},{"id":"x158","ch":"X","num":158,"question":"Hoe heet de groep van ongeveer 30 inactieve plasma-eiwitten in je bloed, die, eenmaal geactiveerd, een cascade vormen die de wand van bacteriën perforeert (het Membrane Attack Complex)?","options":[{"letter":"A","text":"Interferonen"},{"letter":"B","text":"Lysozymen"},{"letter":"C","text":"Complement eiwitten"},{"letter":"D","text":"Immunoglobulinen"}],"answer":"C","answerText":"Complement eiwitten"},{"id":"x159","ch":"X","num":159,"question":"Wat is de medische term voor een ontsteking of infectie aan de slijmvliezen van de urineblaas?","options":[{"letter":"A","text":"Cystitis"},{"letter":"B","text":"Pyelonefritis"},{"letter":"C","text":"Rhinitis"},{"letter":"D","text":"Urethritis"}],"answer":"A","answerText":"Cystitis"},{"id":"x160","ch":"X","num":160,"question":"In welk deel van het spijsverteringskanaal is het enzym pepsine actief voor de vertering van eiwitten?","options":[{"letter":"A","text":"De maag"},{"letter":"B","text":"De dunne darm"},{"letter":"C","text":"De mondholte"},{"letter":"D","text":"De dikke darm"}],"answer":"A","answerText":"De maag"},{"id":"x161","ch":"X","num":161,"question":"Hoe heet de koepelvormige spierlaag die de borstholte (met hart en longen) scheidt van de buikholte (spijsverteringsorganen) en die de belangrijkste rol speelt bij het inademen?","options":[{"letter":"A","text":"Pleura (Longvlies)"},{"letter":"B","text":"Diafragma (Middenrif)"},{"letter":"C","text":"Buikspieren (Abdominalen)"},{"letter":"D","text":"Tussenribspieren (Intercostalen)"}],"answer":"B","answerText":"Diafragma (Middenrif)"},{"id":"x162","ch":"X","num":162,"question":"Wanneer de grote luchtpijp (trachea) afdaalt in de borstkas, splitst deze zich. Hoe heten de twee grote buizen die respectievelijk de linker- en rechterlong binnenlopen?","options":[{"letter":"A","text":"Bronchiolen"},{"letter":"B","text":"Primaire bronchiën"},{"letter":"C","text":"Farynx (Keelholte)"},{"letter":"D","text":"Alveoli (Longblaasjes)"}],"answer":"B","answerText":"Primaire bronchiën"},{"id":"x163","ch":"X","num":163,"question":"Hoe noemt men in de immunologie het proces waarbij iemand (bijvoorbeeld via een vaccin of een doorgemaakte infectie) zelf antigenen krijgt, zodat het eigen lichaam antilichamen en geheugencellen gaat produceren?","options":[{"letter":"A","text":"Passieve immunisatie"},{"letter":"B","text":"Latente immunisatie"},{"letter":"C","text":"Secundaire immunisatie"},{"letter":"D","text":"Actieve immunisatie"}],"answer":"D","answerText":"Actieve immunisatie"},{"id":"x164","ch":"X","num":164,"question":"Welke kleine endocriene kliertjes liggen aan de achterzijde van de schildklier (de zogenaamde parathyroids) en scheiden een hormoon af om de calciumspiegel in het bloed te verhogen?","options":[{"letter":"A","text":"De bijnieren"},{"letter":"B","text":"De bijschildklieren"},{"letter":"C","text":"De Lymfeknopen"},{"letter":"D","text":"De thymus (zwezerik)"}],"answer":"B","answerText":"De bijschildklieren"},{"id":"x165","ch":"X","num":165,"question":"Wat is de primaire functie van de 'vernix caseosa' (het wittige huidsmeer) bij een foetus in de baarmoeder?","options":[{"letter":"A","text":"Het wordt door het immuunsysteem van de moeder aangemaakt om weefselafstoting te voorkomen."},{"letter":"B","text":"Het is een voedingsreserve die de baby in de laatste levensmaand via de huid kan opnemen."},{"letter":"C","text":"Het beschermt de baby in de baarmoeder tegen het binnendringen van virussen en bacteriën via de navelstreng."},{"letter":"D","text":"Het beschermt de tere foetale huid tegen het continu inweken en uitdrogen door het vruchtwater."}],"answer":"D","answerText":"Het beschermt de tere foetale huid tegen het continu inweken en uitdrogen door het vruchtwater."},{"id":"x166","ch":"X","num":166,"question":"Wat is een direct fysiologisch resultaat van een structureel teveel aan natrium (zout) in het bloed?","options":[{"letter":"A","text":"Een enorme daling in het antidiuretisch hormoon (ADH)."},{"letter":"B","text":"Een verhoogd bloedvolume (en vaak daarmee gepaard een verhoogde bloeddruk)."},{"letter":"C","text":"Een daling in de osmotische waarde van het plasma."},{"letter":"D","text":"Een sterk verhoogde aanmaak van aldosteron door de bijnieren."}],"answer":"B","answerText":"Een verhoogd bloedvolume (en vaak daarmee gepaard een verhoogde bloeddruk)."},{"id":"x167","ch":"X","num":167,"question":"Wat voor soort chemische binding houdt de waterstofatomen en het zuurstofatoom sterk bij elkaar BINNEN één enkel watermolecuul (H2O)?","options":[{"letter":"A","text":"Van der Waals-krachten"},{"letter":"B","text":"Polaire covalente binding"},{"letter":"C","text":"Waterstofbrug (Hydrogen bond)"},{"letter":"D","text":"Ionaire binding (Ionbinding)"}],"answer":"B","answerText":"Polaire covalente binding"},{"id":"x168","ch":"X","num":168,"question":"Vanuit een evolutionair standpunt: waarom blijven extreem gevaarlijke genetische ziektes zoals sikkelcelziekte en mucoviscidose (cystic fibrosis) in relatief hoge mate bestaan in bepaalde bevolkingsgroepen?","options":[{"letter":"A","text":"De symptomen van deze ziektes uiten zich steevast pas op zeer late leeftijd, ver nadat mensen al kinderen hebben gekregen."},{"letter":"B","text":"Mensen die drager zijn van één defect gen (heterozygoot), ondervinden vaak een overlevingsvoordeel bij andere, lokaal dodelijke ziektes (zoals malaria of cholera)."},{"letter":"C","text":"Het DNA in deze bevolkingsgroepen muteert massaal spontaan in elke nieuwe generatie."},{"letter":"D","text":"Omdat deze ziektes de vruchtbaarheid bij homozygoten juist sterk verhogen."}],"answer":"B","answerText":"Mensen die drager zijn van één defect gen (heterozygoot), ondervinden vaak een overlevingsvoordeel bij andere, lokaal dodelijke ziektes (zoals malaria of cholera)."},{"id":"x169","ch":"X","num":169,"question":"Welke fysiologische uitspraak over de regulatie van het urinesysteem is JUIST?","options":[{"letter":"A","text":"ADH (Antidiuretisch Hormoon) wordt geproduceerd in de hypothalamus en vrijgegeven door de hypofyse-achterkwab."},{"letter":"B","text":"ADH wordt afgescheiden door de bijnierschors."},{"letter":"C","text":"Renine wordt direct afgegeven door het hart als de bloeddruk te hoog wordt."},{"letter":"D","text":"Aldosteron wordt ontwikkeld en uitgescheiden door de hypofyse in de hersenen."}],"answer":"A","answerText":"ADH (Antidiuretisch Hormoon) wordt geproduceerd in de hypothalamus en vrijgegeven door de hypofyse-achterkwab."},{"id":"x170","ch":"X","num":170,"question":"Een goedaardige tumor op de hypofyse kan leiden tot een continue, massale overproductie van groeihormoon (GH). Welk medisch ziektebeeld ontstaat er wanneer dit optreedt bij een VOLWASSENE, waarvan de groeischijven in de botten al gesloten zijn?","options":[{"letter":"A","text":"Gigantisme (Reuzengroei)"},{"letter":"B","text":"Syndroom van Cushing"},{"letter":"C","text":"Ziekte van Addison"},{"letter":"D","text":"Acromegalie"}],"answer":"D","answerText":"Acromegalie"},{"id":"x171","ch":"X","num":171,"question":"Hormonen worden op basis van hun chemische structuur ruwweg opgesplitst in peptide-/eiwithormonen (wateroplosbaar) en steroïdhormonen (vetoplosbaar). Welk van de volgende hormonen is GEEN peptidehormoon, maar een steroïdhormoon?","options":[{"letter":"A","text":"Groeihormoon (GH)"},{"letter":"B","text":"Glucagon"},{"letter":"C","text":"Cortisol"},{"letter":"D","text":"Insuline"}],"answer":"C","answerText":"Cortisol"},{"id":"x172","ch":"X","num":172,"question":"Het lichaam regelt de bloedsuikerspiegel (glucose) streng met behulp van meerdere hormonen. Welke van de volgende stellingen hierover is pertinent ONJUIST?","options":[{"letter":"A","text":"Adrenaline verlaagt de bloedglucosespiegel direct door opslag te stimuleren."},{"letter":"B","text":"Glucagon verhoogt de bloedglucosespiegel."},{"letter":"C","text":"Cortisol verhoogt de bloedglucosespiegel."},{"letter":"D","text":"Insuline verlaagt de bloedglucosespiegel."}],"answer":"A","answerText":"Adrenaline verlaagt de bloedglucosespiegel direct door opslag te stimuleren."},{"id":"x173","ch":"X","num":173,"question":"Rachitis is een aandoening bij kinderen waarbij de botten onvoldoende mineraliseren en daardoor zacht bl
