."}],"answer":"B","answerText":"Slijmbekercellen (Goblet cells); ze scheiden mucus (slijm) af.","q_en":"In the epithelium of the airways there are special cells shaped like a wine glass or goblet. What are these cells called and what is their function?","a_en":"Goblet cells (Goblet cells); they secrete mucus (slime)."},{"id":"x94","ch":"X","num":94,"question":"John staat in een museum al lange tijd stil om naar een gids te luisteren. Hij voelt zich ineens verward, duizelig, en ziet sterretjes. Wat is er waarschijnlijk aan de hand en wat is fysiologisch de beste actie?","options":[{"letter":"A","text":"Hij krijgt een (pre)syncope (flauwte) doordat bloed in zijn benen zakt; hij moet gaan zitten/liggen.","text_en":"He is having a (pre)syncope (fainting spell) because blood is pooling in his legs; he should sit/lie down."},{"letter":"B","text":"Hij heeft een paniekaanval en hyperventileert; hij moet in een zakje ademen.","text_en":"He is having a panic attack and is hyperventilating; he should breathe into a bag."},{"letter":"C","text":"Hij heeft een acute daling van zuurstof in de museumzaal; hij moet naar buiten.","text_en":"He has an acute drop in oxygen in the museum hall; he should go outside."},{"letter":"D","text":"Hij heeft een te lage hartslag door ontspanning; hij moet intensief gaan rennen.","text_en":"He has too low a heart rate due to relaxation; he should go for an intensive run."}],"answer":"A","answerText":"Hij krijgt een (pre)syncope (flauwte) doordat bloed in zijn benen zakt; hij moet gaan zitten/liggen.","q_en":"John has been standing still in a museum for a long time to listen to a guide. He suddenly feels confused, dizzy, and sees stars. What is probably going on and what is physiologically the best action?","a_en":"He is having a (pre)syncope (fainting spell) because blood is pooling in his legs; he should sit/lie down."},{"id":"x95","ch":"X","num":95,"question":"Tijdens de embryonale ontwikkeling ontstaan weefsels uit drie kiembladen. Uit welk kiemblad ontstaan onder andere de spieren, botten, bloed en bindweefsel?","options":[{"letter":"A","text":"Endoderm (binnenste kiemblad)","text_en":"Endoderm (innermost germ layer)"},{"letter":"B","text":"Mesoderm (middelste kiemblad)","text_en":"Mesoderm (middle germ layer)"},{"letter":"C","text":"Ectoderm (buitenste kiemblad)","text_en":"Ectoderm (outermost germ layer)"},{"letter":"D","text":"Periderm","text_en":"Periderm"}],"answer":"B","answerText":"Mesoderm (middelste kiemblad)","q_en":"During embryonic development, tissues arise from three germ layers. From which germ layer do, among other things, the muscles, bones, blood, and connective tissue develop?","a_en":"Mesoderm (middle germ layer)"},{"id":"x96","ch":"X","num":96,"question":"Hartspiercellen (myocardium) moeten als één eenheid krachtig kunnen samentrekken zonder van elkaar te scheuren. Welke celverbinding in de intercalairschijven houdt de cellen mechanisch sterk bij elkaar tijdens contractie?","options":[{"letter":"A","text":"Desmosomen","text_en":"Desmosomes"},{"letter":"B","text":"Tight junctions","text_en":"Tight junctions"},{"letter":"C","text":"Myosinefilamenten","text_en":"Myosin filaments"},{"letter":"D","text":"Gap junctions","text_en":"Gap junctions"}],"answer":"A","answerText":"Desmosomen","q_en":"Cardiac muscle cells (myocardium) must be able to contract forcefully as a single unit without tearing apart from one another. Which cell junction in the intercalated discs holds the cells mechanically strongly together during contraction?","a_en":"Desmosomes"},{"id":"x97","ch":"X","num":97,"question":"Welk van de volgende hormonen heeft fysiologisch GEEN directe of indirecte werking in of op de nieren om de vocht- of elektrolytenbalans te regelen?","options":[{"letter":"A","text":"Aldosteron","text_en":"Aldosterone"},{"letter":"B","text":"Prolactine","text_en":"Prolactin"},{"letter":"C","text":"Parathyroïdhormoon (PTH)","text_en":"Parathyroid hormone (PTH)"},{"letter":"D","text":"ADH (Antidiuretisch Hormoon)","text_en":"ADH (Antidiuretic Hormone)"}],"answer":"B","answerText":"Prolactine","q_en":"Which of the following hormones physiologically has NO direct or indirect action in or on the kidneys to regulate fluid or electrolyte balance?","a_en":"Prolactin"},{"id":"x98","ch":"X","num":98,"question":"Welke van de volgende reeksen botten behoort in zijn geheel tot het 'appendiculair skelet' (de botten van de ledematen en de schouder/bekkengordel)?","options":[{"letter":"A","text":"Scapula (schouderblad) – Clavicula (sleutelbeen) – Fibula (kuitbeen)","text_en":"Scapula (shoulder blade) – Clavicle (collarbone) – Fibula (calf bone)"},{"letter":"B","text":"Mandibula (onderkaak) – Femur (dijbeen) – Patella (knieschijf)","text_en":"Mandible (lower jaw) – Femur (thigh bone) – Patella (kneecap)"},{"letter":"C","text":"Sacrum (heiligbeen) – Coccyx (staartbeen) – Tibia (scheenbeen)","text_en":"Sacrum – Coccyx (tailbone) – Tibia (shin bone)"},{"letter":"D","text":"Sternum (borstbeen) – Humerus (opperarmbeen) – Radius (spaakbeen)","text_en":"Sternum (breastbone) – Humerus (upper arm bone) – Radius"}],"answer":"A","answerText":"Scapula (schouderblad) – Clavicula (sleutelbeen) – Fibula (kuitbeen)","q_en":"Which of the following sets of bones belongs entirely to the 'appendicular skeleton' (the bones of the limbs and the shoulder/pelvic girdle)?","a_en":"Scapula (shoulder blade) – Clavicle (collarbone) – Fibula (calf bone)"},{"id":"x99","ch":"X","num":99,"question":"Bloed dat door de haarvaten (capillairen) stroomt, moet zuurstof en voedingsstoffen kunnen uitwisselen met het weefsel. Hoe zijn de fysiologische waarden van de bloeddruk en de bloedstroomsnelheid op dit punt in de circulatie?","options":[{"letter":"A","text":"De bloeddruk is hoog en de stroomsnelheid is laag.","text_en":"The blood pressure is high and the flow velocity is low."},{"letter":"B","text":"De bloeddruk is hoog en de stroomsnelheid is hoog.","text_en":"The blood pressure is high and the flow velocity is high."},{"letter":"C","text":"De bloeddruk is laag en de stroomsnelheid is zeer laag.","text_en":"The blood pressure is low and the flow velocity is very low."},{"letter":"D","text":"De bloeddruk is laag en de stroomsnelheid is hoog.","text_en":"The blood pressure is low and the flow velocity is high."}],"answer":"C","answerText":"De bloeddruk is laag en de stroomsnelheid is zeer laag.","q_en":"Blood flowing through the capillaries must be able to exchange oxygen and nutrients with the tissue. What are the physiological values of the blood pressure and blood flow velocity at this point in the circulation?","a_en":"The blood pressure is low and the flow velocity is very low."},{"id":"x100","ch":"X","num":100,"question":"Welke eigenschap past in de genetica NIET bij een gemuteerd tumor-suppressor-gen dat kanker veroorzaakt?","options":[{"letter":"A","text":"De mutatie leidt tot verminderde apoptose (geprogrammeerde celdood).","text_en":"The mutation leads to reduced apoptosis (programmed cell death)."},{"letter":"B","text":"De mutatie verstoort de controle over de celcyclus (zoals het passeren van checkpoints).","text_en":"The mutation disrupts the control over the cell cycle (such as passing checkpoints)."},{"letter":"C","text":"De mutatie leidt tot een \"gain-of-function\" (verkrijgen van een nieuwe, activerende functie).","text_en":"The mutation leads to a \"gain-of-function\" (acquiring a new, activating function)."},{"letter":"D","text":"De mutatie resulteert in verminderde of ontbrekende DNA-reparatie.","text_en":"The mutation results in reduced or absent DNA repair."}],"answer":"C","answerText":"De mutatie leidt tot een \"gain-of-function\" (verkrijgen van een nieuwe, activerende functie).","q_en":"In genetics, which property does NOT fit a mutated tumor-suppressor gene that causes cancer?","a_en":"The mutation leads to a \"gain-of-function\" (acquiring a new, activating function)."},{"id":"x101","ch":"X","num":101,"question":"Wat gebeurt er fysiek met de borstkas en het diafragma (middenrif) tijdens een normale inspiratie (inademing)?","options":[{"letter":"A","text":"De ribbenkast beweegt omhoog en naar buiten; het diafragma ontspant.","text_en":"The rib cage moves up and outward; the diaphragm relaxes."},{"letter":"B","text":"De ribbenkast beweegt omlaag en naar binnen; het diafragma ontspant (en bolt op omhoog).","text_en":"The rib cage moves down and inward; the diaphragm relaxes (and bulges upward)."},{"letter":"C","text":"De ribbenkast beweegt omlaag en naar binnen; het diafragma trekt samen.","text_en":"The rib cage moves down and inward; the diaphragm contracts."},{"letter":"D","text":"De ribbenkast beweegt omhoog en naar buiten; het diafragma trekt samen (en vlakt af naar beneden).","text_en":"The rib cage moves up and outward; the diaphragm contracts (and flattens downward)."}],"answer":"D","answerText":"De ribbenkast beweegt omhoog en naar buiten; het diafragma trekt samen (en vlakt af naar beneden).","q_en":"What physically happens to the rib cage and the diaphragm during a normal inspiration (inhalation)?","a_en":"The rib cage moves up and outward; the diaphragm contracts (and flattens downward)."},{"id":"x102","ch":"X","num":102,"question":"In welk specifiek deel van het centrale zenuwstelsel bevindt zich het cardiovasculaire centrum dat onze hartslag en bloeddruk onwillekeurig reguleert?","options":[{"letter":"A","text":"Hypothalamus","text_en":"Hypothalamus"},{"letter":"B","text":"Cerebellum (Kleine hersenen)","text_en":"Cerebellum"},{"letter":"C","text":"Medulla oblongata (Verlengde merg)","text_en":"Medulla oblongata"},{"letter":"D","text":"Cerebrum (Grote hersenen)","text_en":"Cerebrum"}],"answer":"C","answerText":"Medulla oblongata (Verlengde merg)","q_en":"In which specific part of the central nervous system is the cardiovascular center located that involuntarily regulates our heart rate and blood pressure?","a_en":"Medulla oblongata"},{"id":"x103","ch":"X","num":103,"question":"Wat is fysiologisch het primaire kenmerk van de longziekte emfyseem?","options":[{"letter":"A","text":"Een overmatige productie van taai slijm in de hogere luchtwegen.","text_en":"An excessive production of thick mucus in the upper airways."},{"letter":"B","text":"De destructie van alveolaire wanden, wat leidt tot grote samengevoegde luchtzakken met een sterk verminderd oppervlakte voor gasuitwisseling.","text_en":"The destruction of alveolar walls, leading to large merged air sacs with a greatly reduced surface area for gas exchange."},{"letter":"C","text":"Een chronische bacteriële infectie in de longblaasjes.","text_en":"A chronic bacterial infection in the alveoli."},{"letter":"D","text":"Vernauwing van de bronchiolen door gladde spierspasmen.","text_en":"Narrowing of the bronchioles due to smooth muscle spasms."}],"answer":"B","answerText":"De destructie van alveolaire wanden, wat leidt tot grote samengevoegde luchtzakken met een sterk verminderd oppervlakte voor gasuitwisseling.","q_en":"Physiologically, what is the primary characteristic of the lung disease emphysema?","a_en":"The destruction of alveolar walls, leading to large merged air sacs with a greatly reduced surface area for gas exchange."},{"id":"x104","ch":"X","num":104,"question":"Welke structuur houdt twee identieke zusterchromatiden (na DNA-replicatie) aan elkaar verbonden totdat ze tijdens de anafase uit elkaar worden getrokken?","options":[{"letter":"A","text":"Spindelvezel","text_en":"Spindle fiber"},{"letter":"B","text":"Telomeer","text_en":"Telomere"},{"letter":"C","text":"Centromeer","text_en":"Centromere"},{"letter":"D","text":"Centriool","text_en":"Centriole"}],"answer":"C","answerText":"Centromeer","q_en":"Which structure keeps two identical sister chromatids (after DNA replication) joined together until they are pulled apart during anaphase?","a_en":"Centromere"},{"id":"x105","ch":"X","num":105,"question":"Spermatogenese (bij mannen) en oögenese (bij vrouwen) verschillen sterk in kwantiteit en timing. Wat hebben deze beide processen van meiose echter wél fundamenteel gemeen?","options":[{"letter":"A","text":"Beide processen resulteren in vier functionele, levensvatbare dochtercellen uit één moedercel.","text_en":"Both processes result in four functional, viable daughter cells from one parent cell."},{"letter":"B","text":"Aan het einde van het proces resulteren ze in geslachtscellen met exact de helft van het oorspronkelijke aantal chromosomen (haploïd).","text_en":"At the end of the process they result in sex cells with exactly half the original number of chromosomes (haploid)."},{"letter":"C","text":"Beide processen vinden continu plaats gedurende het hele leven vanaf de puberteit.","text_en":"Both processes occur continuously throughout life from puberty onward."},{"letter":"D","text":"Beide processen stoppen in Profase 1 en wachten op een externe hormonale trigger om verder te gaan.","text_en":"Both processes stop in Prophase 1 and wait for an external hormonal trigger to continue."}],"answer":"B","answerText":"Aan het einde van het proces resulteren ze in geslachtscellen met exact de helft van het oorspronkelijke aantal chromosomen (haploïd).","q_en":"Spermatogenesis (in men) and oogenesis (in women) differ greatly in quantity and timing. However, what do both of these meiotic processes fundamentally have in common?","a_en":"At the end of the process they result in sex cells with exactly half the original number of chromosomes (haploid)."},{"id":"x106","ch":"X","num":106,"question":"Wat is een van de primaire fysiologische gebeurtenissen in het endocriene systeem tijdens de vrouwelijke menopauze?","options":[{"letter":"A","text":"Er is een sterke toename in de productie van oestrogeen.","text_en":"There is a strong increase in the production of estrogen."},{"letter":"B","text":"De ovaria (eierstokken) stoppen grotendeels met reageren op de hormonen FSH en LH uit de hypofyse.","text_en":"The ovaries largely stop responding to the hormones FSH and LH from the pituitary gland."},{"letter":"C","text":"Een verminderde productie van androgene hormonen.","text_en":"A reduced production of androgenic hormones."},{"letter":"D","text":"De hypofyse stopt met de productie van LH.","text_en":"The pituitary gland stops producing LH."}],"answer":"B","answerText":"De ovaria (eierstokken) stoppen grotendeels met reageren op de hormonen FSH en LH uit de hypofyse.","q_en":"What is one of the primary physiological events in the endocrine system during female menopause?","a_en":"The ovaries largely stop responding to the hormones FSH and LH from the pituitary gland."},{"id":"x107","ch":"X","num":107,"question":"Een normale somatische (lichaams)cel ondergaat mitose (reguliere celdeling). Als de begincel in totaal 8 chromosomen (4 paren) heeft, hoeveel chromosomen heeft elke resulterende dochtercel dan nadat de celdeling compleet is?","options":[{"letter":"A","text":"8 chromosomen","text_en":"8 chromosomes"},{"letter":"B","text":"2 chromosomen","text_en":"2 chromosomes"},{"letter":"C","text":"4 chromosomen","text_en":"4 chromosomes"},{"letter":"D","text":"16 chromosomen","text_en":"16 chromosomes"}],"answer":"A","answerText":"8 chromosomen","q_en":"A normal somatic (body) cell undergoes mitosis (regular cell division). If the starting cell has a total of 8 chromosomes (4 pairs), how many chromosomes does each resulting daughter cell have after cell division is complete?","a_en":"8 chromosomes"},{"id":"x108","ch":"X","num":108,"question":"Volgens de gaswet van Boyle (die een belangrijke rol speelt in onze ademhaling), wat gebeurt er met een gas bij een constante temperatuur?","options":[{"letter":"A","text":"Temperatuur en druk blijven altijd gelijk ongeacht het volume.","text_en":"Temperature and pressure always remain equal regardless of the volume."},{"letter":"B","text":"Een afname van het volume leidt tot een afname van de druk.","text_en":"A decrease in volume leads to a decrease in pressure."},{"letter":"C","text":"Een toename van het volume in een afgesloten ruimte zorgt direct voor een evenredige afname van de gasdruk.","text_en":"An increase in volume in a closed space directly causes a proportional decrease in gas pressure."},{"letter":"D","text":"Een toename van de druk zorgt voor een verdere toename van het volume.","text_en":"An increase in pressure causes a further increase in volume."}],"answer":"C","answerText":"Een toename van het volume in een afgesloten ruimte zorgt direct voor een evenredige afname van de gasdruk.","q_en":"According to Boyle's gas law (which plays an important role in our respiration), what happens to a gas at a constant temperature?","a_en":"An increase in volume in a closed space directly causes a proportional decrease in gas pressure."},{"id":"x109","ch":"X","num":109,"question":"Tijdens de embryonale fase van de mens ontwikkelt het hart zich verrassend vroeg. Ongeveer hoeveel weken na de bevruchting begint het hart van de embryo primitief te kloppen?","options":[{"letter":"A","text":"Pas bij 3 maanden.","text_en":"Only at 3 months."},{"letter":"B","text":"Ongeveer 3 à 4 weken na de bevruchting.","text_en":"About 3 to 4 weeks after fertilization."},{"letter":"C","text":"Ongeveer 1 week na de bevruchting.","text_en":"About 1 week after fertilization."},{"letter":"D","text":"Na ongeveer 8 tot 10 weken.","text_en":"After about 8 to 10 weeks."}],"answer":"B","answerText":"Ongeveer 3 à 4 weken na de bevruchting.","q_en":"During the embryonic phase of humans, the heart develops surprisingly early. Approximately how many weeks after fertilization does the embryo's heart begin to beat primitively?","a_en":"About 3 to 4 weeks after fertilization."},{"id":"x110","ch":"X","num":110,"question":"Tot wanneer (hoeveel weken na de bevruchting) spreekt men medisch gezien in principe van een 'embryo', waarna de term 'foetus' wordt gebruikt?","options":[{"letter":"A","text":"Tot het einde van de 8ste week.","text_en":"Until the end of the 8th week."},{"letter":"B","text":"Tot het einde van de 16e week.","text_en":"Until the end of the 16th week."},{"letter":"C","text":"Tot het einde van de 3e week.","text_en":"Until the end of the 3rd week."},{"letter":"D","text":"Tot de geboorte.","text_en":"Until birth."}],"answer":"A","answerText":"Tot het einde van de 8ste week.","q_en":"Up to when (how many weeks after fertilization) does one medically, in principle, speak of an 'embryo', after which the term 'fetus' is used?","a_en":"Until the end of the 8th week."},{"id":"x111","ch":"X","num":111,"question":"Wat zijn de fundamentele bouwstenen (monomeren) waaruit een keten van DNA is opgebouwd?","options":[{"letter":"A","text":"Koolhydraten (Monosachariden)","text_en":"Carbohydrates (monosaccharides)"},{"letter":"B","text":"Nucleotiden","text_en":"Nucleotides"},{"letter":"C","text":"Aminozuren","text_en":"Amino acids"},{"letter":"D","text":"Vetzuren","text_en":"Fatty acids"}],"answer":"B","answerText":"Nucleotiden","q_en":"What are the fundamental building blocks (monomers) from which a strand of DNA is built?","a_en":"Nucleotides"},{"id":"x112","ch":"X","num":112,"question":"Hoeveel afzonderlijke botten heeft het skelet van een typische volwassen mens?","options":[{"letter":"A","text":"Omstreeks 500 botten","text_en":"Around 500 bones"},{"letter":"B","text":"206 botten","text_en":"206 bones"},{"letter":"C","text":"160 botten","text_en":"160 bones"},{"letter":"D","text":"Precies 100 botten","text_en":"Exactly 100 bones"}],"answer":"B","answerText":"206 botten","q_en":"How many separate bones does the skeleton of a typical adult human have?","a_en":"206 bones"},{"id":"x113","ch":"X","num":113,"question":"Wat wordt in de ademhalingsfysiologie bedoeld met het 'tidal volume' (ademvolume)?","options":[{"letter":"A","text":"Het volume lucht van één normale, rustige in- en uitademing.","text_en":"The volume of air of one normal, calm inhalation and exhalation."},{"letter":"B","text":"Het restvolume dat altijd in de longen achterblijft, zelfs na maximale uitademing.","text_en":"The residual volume that always remains in the lungs, even after maximal exhalation."},{"letter":"C","text":"Het volume lucht dat per minuut wordt ingeademd.","text_en":"The volume of air inhaled per minute."},{"letter":"D","text":"De maximale hoeveelheid lucht die je krachtig kunt uitademen na een maximale inademing.","text_en":"The maximum amount of air you can forcefully exhale after a maximal inhalation."}],"answer":"A","answerText":"Het volume lucht van één normale, rustige in- en uitademing.","q_en":"In respiratory physiology, what is meant by the 'tidal volume'?","a_en":"The volume of air of one normal, calm inhalation and exhalation."},{"id":"x114","ch":"X","num":114,"question":"Wat is de primaire en unieke functie van geactiveerde B-lymfocyten in het immuunsysteem?","options":[{"letter":"A","text":"Ze fagocyteren (opeten) grote bacteriën.","text_en":"They phagocytose (engulf) large bacteria."},{"letter":"B","text":"Ze produceren nieuwe lichaamsvreemde antigenen.","text_en":"They produce new foreign antigens."},{"letter":"C","text":"Ze doden direct geïnfecteerde lichaamscellen via perforines.","text_en":"They directly kill infected body cells via perforins."},{"letter":"D","text":"Ze produceren en scheiden antilichamen uit.","text_en":"They produce and secrete antibodies."}],"answer":"D","answerText":"Ze produceren en scheiden antilichamen uit.","q_en":"What is the primary and unique function of activated B lymphocytes in the immune system?","a_en":"They produce and secrete antibodies."},{"id":"x115","ch":"X","num":115,"question":"Welk type lipoproteïne staat in de volksmond bekend als de 'slechte' cholesterol, omdat een teveel hiervan kan leiden tot plaquevorming in de slagaders?","options":[{"letter":"A","text":"Onverzadigde vetten","text_en":"Unsaturated fats"},{"letter":"B","text":"Triglyceriden","text_en":"Triglycerides"},{"letter":"C","text":"LDL (Low-Density Lipoprotein)","text_en":"LDL (Low-Density Lipoprotein)"},{"letter":"D","text":"HDL (High-Density Lipoprotein)","text_en":"HDL (High-Density Lipoprotein)"}],"answer":"C","answerText":"LDL (Low-Density Lipoprotein)","q_en":"Which type of lipoprotein is commonly known as the 'bad' cholesterol, because an excess of it can lead to plaque formation in the arteries?","a_en":"LDL (Low-Density Lipoprotein)"},{"id":"x116","ch":"X","num":116,"question":"Welke van de volgende stellingen over coeliakie (glutenintolerantie) is NIET waar?","options":[{"letter":"A","text":"De aandoening en symptomen kunnen volledig worden verholpen door over te stappen op een vegetarisch dieet.","text_en":"The condition and symptoms can be completely resolved by switching to a vegetarian diet."},{"letter":"B","text":"Het heeft een duidelijke erfelijke (genetische) component.","text_en":"It has a clear hereditary (genetic) component."},{"letter":"C","text":"De darmvlokken (villi) worden afgeplat, wat leidt tot malabsorptie van voedingsstoffen.","text_en":"The intestinal villi become flattened, leading to malabsorption of nutrients."},{"letter":"D","text":"Het is een auto-immuunziekte.","text_en":"It is an autoimmune disease."}],"answer":"A","answerText":"De aandoening en symptomen kunnen volledig worden verholpen door over te stappen op een vegetarisch dieet.","q_en":"Which of the following statements about celiac disease (gluten intolerance) is NOT true?","a_en":"The condition and symptoms can be completely resolved by switching to a vegetarian diet."},{"id":"x117","ch":"X","num":117,"question":"Welke van de onderstaande gedragingen is klinisch gezien GEEN psychologische eetstoornis, maar een alcoholgerelateerde aandoening?","options":[{"letter":"A","text":"Binge eating disorder","text_en":"Binge eating disorder"},{"letter":"B","text":"Anorexia nervosa","text_en":"Anorexia nervosa"},{"letter":"C","text":"Boulimia nervosa","text_en":"Bulimia nervosa"},{"letter":"D","text":"Binge drinking","text_en":"Binge drinking"}],"answer":"D","answerText":"Binge drinking","q_en":"Which of the behaviors below is clinically NOT a psychological eating disorder, but an alcohol-related condition?","a_en":"Binge drinking"},{"id":"x118","ch":"X","num":118,"question":"De neusholte bekleedt een belangrijke functie bij het inademen. Wat zou een direct anatomisch en fysiologisch gevolg zijn als we geen neusholte zouden hebben?","options":[{"letter":"A","text":"We zouden 50% minder zuurstof opnemen in het bloed.","text_en":"We would absorb 50% less oxygen into the blood."},{"letter":"B","text":"We zouden niet meer in staat zijn om klanken te vormen of te spreken.","text_en":"We would no longer be able to form sounds or speak."},{"letter":"C","text":"Er zou aanzienlijk meer vuil, stof en pathogenen (debris) in onze lagere longen terechtkomen.","text_en":"Considerably more dirt, dust, and pathogens (debris) would end up in our lower lungs."},{"letter":"D","text":"Onze bloeddruk in de longen zou te ver oplopen.","text_en":"Our blood pressure in the lungs would rise too far."}],"answer":"C","answerText":"Er zou aanzienlijk meer vuil, stof en pathogenen (debris) in onze lagere longen terechtkomen.","q_en":"The nasal cavity serves an important function during inhalation. What would be a direct anatomical and physiological consequence if we did not have a nasal cavity?","a_en":"Considerably more dirt, dust, and pathogens (debris) would end up in our lower lungs."},{"id":"x119","ch":"X","num":119,"question":"Welk extra-embryonaal weefsel/vlies produceert in de eerste drie maanden van de zwangerschap het zwangerschapshormoon hCG (humaan choriongonadotrofine) om het corpus luteum in stand te houden?","options":[{"letter":"A","text":"Chorion","text_en":"Chorion"},{"letter":"B","text":"Navelstreng (Umbilical cord)","text_en":"Umbilical cord"},{"letter":"C","text":"Amnion","text_en":"Amnion"},{"letter":"D","text":"Endometrium","text_en":"Endometrium"}],"answer":"A","answerText":"Chorion","q_en":"Which extra-embryonic tissue/membrane produces the pregnancy hormone hCG (human chorionic gonadotropin) during the first three months of pregnancy in order to maintain the corpus luteum?","a_en":"Chorion"},{"id":"x120","ch":"X","num":120,"question":"Wat is een medisch en fysiologisch correcte uitspraak omtrent de normale biologische veroudering (aging)?","options":[{"letter":"A","text":"Naarmate men ouder wordt, raakt men vatbaarder voor (en sterft men vaker aan) ernstige en fatale ziektes zoals kanker en hart- en vaatziekten.","text_en":"As one gets older, one becomes more susceptible to (and more often dies from) serious and fatal diseases such as cancer and cardiovascular disease."},{"letter":"B","text":"Het dagelijks innemen van extra antioxidanten verlengt de levensverwachting gegarandeerd met minimaal vijf jaar.","text_en":"Taking extra antioxidants daily guarantees an increase in life expectancy of at least five years."},{"letter":"C","text":"De totale botdichtheid stijgt gestaag naarmate men de 80 passeert.","text_en":"The total bone density steadily increases as one passes the age of 80."},{"letter":"D","text":"Op een specifiek moment stoppen letterlijk alle cellen in het lichaam met delen, wat resulteert in een acute hartstilstand.","text_en":"At a specific moment, literally all cells in the body stop dividing, resulting in an acute cardiac arrest."}],"answer":"A","answerText":"Naarmate men ouder wordt, raakt men vatbaarder voor (en sterft men vaker aan) ernstige en fatale ziektes zoals kanker en hart- en vaatziekten.","q_en":"What is a medically and physiologically correct statement regarding normal biological aging?","a_en":"As one gets older, one becomes more susceptible to (and more often dies from) serious and fatal diseases such as cancer and cardiovascular disease."},{"id":"x121","ch":"X","num":121,"question":"Wat is de voornaamste fysiologische functie van ADH (Antidiuretisch Hormoon) op de nieren?","options":[{"letter":"A","text":"Het bevordert de reabsorptie van water vanuit de verzamelbuis (collecting duct) terug de bloedbaan in.","text_en":"It promotes the reabsorption of water from the collecting duct back into the bloodstream."},{"letter":"B","text":"Het bevordert de uitscheiding van extra water, zodat de urine sterk verdund raakt.","text_en":"It promotes the excretion of extra water, so that the urine becomes strongly diluted."},{"letter":"C","text":"Het zorgt voor het extra uitplassen van glucose en zouten in de proximale tubulus.","text_en":"It causes the additional excretion of glucose and salts in the proximal tubule."},{"letter":"D","text":"Het activeert het enzym renine in het juxtaglomerulaire apparaat.","text_en":"It activates the enzyme renin in the juxtaglomerular apparatus."}],"answer":"A","answerText":"Het bevordert de reabsorptie van water vanuit de verzamelbuis (collecting duct) terug de bloedbaan in.","q_en":"What is the principal physiological function of ADH (Antidiuretic Hormone) on the kidneys?","a_en":"It promotes the reabsorption of water from the collecting duct back into the bloodstream."},{"id":"x122","ch":"X","num":122,"question":"Tijdens een ontsteking (inflammatory response) reageren weefsels direct door het afgeven van de stof histamine. Onder welke categorie van ons immuunsysteem valt dit onmiddellijke proces?","options":[{"letter":"A","text":"De verworven, adaptieve afweer (Adaptive defense)","text_en":"The acquired, adaptive defense"},{"letter":"B","text":"Cel-gemedieerde afweer","text_en":"Cell-mediated defense"},{"letter":"C","text":"Kunstmatige passieve afweer","text_en":"Artificial passive defense"},{"letter":"D","text":"De aangeboren, aspecifieke afweer (Innate defense)","text_en":"The innate, nonspecific defense"}],"answer":"D","answerText":"De aangeboren, aspecifieke afweer (Innate defense)","q_en":"During an inflammatory response, tissues react immediately by releasing the substance histamine. Under which category of our immune system does this immediate process fall?","a_en":"The innate, nonspecific defense"},{"id":"x123","ch":"X","num":123,"question":"Wat is het 'periosteum' in de skeletanatomie?","options":[{"letter":"A","text":"De compacte, harde botweefsellaag zelf (corticaal bot).","text_en":"The compact, hard bone tissue layer itself (cortical bone)."},{"letter":"B","text":"Een dun vlies dat alleen de gewrichtsoppervlakken bedekt om wrijving tegen te gaan.","text_en":"A thin membrane that covers only the joint surfaces to reduce friction."},{"letter":"C","text":"Het vloeibare beenmerg binnenin de mergholte.","text_en":"The liquid bone marrow inside the medullary cavity."},{"letter":"D","text":"Een sterk bindweefselvlies dat de buitenkant van de botten bekleedt.","text_en":"A strong connective tissue membrane that lines the outside of the bones."}],"answer":"D","answerText":"Een sterk bindweefselvlies dat de buitenkant van de botten bekleedt.","q_en":"What is the 'periosteum' in skeletal anatomy?","a_en":"A strong connective tissue membrane that lines the outside of the bones."},{"id":"x124","ch":"X","num":124,"question":"Welk van de volgende eigenschappen omschrijft het best het concept van 'innate defense' (aangeboren afweer) in de immunologie?","options":[{"letter":"A","text":"Het is uiterst specifiek afgestemd op één virusstam en wordt beter na herhaalde infectie.","text_en":"It is highly specifically tuned to one virus strain and improves after repeated infection."},{"letter":"B","text":"Het is het systeem dat voornamelijk vertrouwt op de aanmaak van antilichamen door B-cellen.","text_en":"It is the system that mainly relies on the production of antibodies by B cells."},{"letter":"C","text":"Het is niet-selectief (bestrijdt alle indringers op dezelfde manier) en reageert extreem snel.","text_en":"It is non-selective (combats all invaders in the same way) and reacts extremely quickly."},{"letter":"D","text":"Het bestaat uitsluitend uit processen die diep binnenin het lichaam plaatsvinden, niet op de huid.","text_en":"It consists exclusively of processes that take place deep inside the body, not on the skin."}],"answer":"C","answerText":"Het is niet-selectief (bestrijdt alle indringers op dezelfde manier) en reageert extreem snel.","q_en":"Which of the following properties best describes the concept of 'innate defense' in immunology?","a_en":"It is non-selective (combats all invaders in the same way) and reacts extremely quickly."},{"id":"x125","ch":"X","num":125,"question":"Wanneer je een verkeerde bloedtransfusie krijgt, ontstaat er 'agglutinatie'. Wat gebeurt er fysiologisch bij dit proces?","options":[{"letter":"A","text":"Het samenklonteren van bloedplaatjes (trombocyten) in een snijwond.","text_en":"The clumping together of platelets (thrombocytes) in a cut wound."},{"letter":"B","text":"De onmiddellijke vernietiging van witte bloedcellen door oververhitting.","text_en":"The immediate destruction of white blood cells due to overheating."},{"letter":"C","text":"Het stijgen van de lichaamstemperatuur in reactie op een externe bacterie.","text_en":"The rise in body temperature in response to an external bacterium."},{"letter":"D","text":"Het sterk samenklonteren en aan elkaar plakken van rode bloedcellen door immuunreacties.","text_en":"The strong clumping and sticking together of red blood cells due to immune reactions."}],"answer":"D","answerText":"Het sterk samenklonteren en aan elkaar plakken van rode bloedcellen door immuunreacties.","q_en":"When you receive an incompatible blood transfusion, 'agglutination' occurs. What happens physiologically during this process?","a_en":"The strong clumping and sticking together of red blood cells due to immune reactions."},{"id":"x126","ch":"X","num":126,"question":"Welke van de onderstaande weefselstructuren is GEEN extra-embryonaal vlies/membraan, omdat het een orgaan van de moeder is in plaats van de foetus?","options":[{"letter":"A","text":"Amnion","text_en":"Amnion"},{"letter":"B","text":"Endometrium","text_en":"Endometrium"},{"letter":"C","text":"Chorion","text_en":"Chorion"},{"letter":"D","text":"Dooierzak (Yolk sac)","text_en":"Yolk sac"}],"answer":"B","answerText":"Endometrium","q_en":"Which of the tissue structures below is NOT an extra-embryonic membrane, because it is an organ of the mother rather than of the fetus?","a_en":"Endometrium"},{"id":"x127","ch":"X","num":127,"question":"Wat is in theorie de structuur aan de uiteinden van chromosomen die steeds een klein stukje verkort na elke celdeling (mitose), waardoor deze een rol speelt in celveroudering?","options":[{"letter":"A","text":"Ribosomen","text_en":"Ribosomes"},{"letter":"B","text":"Telomeren","text_en":"Telomeres"},{"letter":"C","text":"Mitochondriën","text_en":"Mitochondria"},{"letter":"D","text":"Centromeren","text_en":"Centromeres"}],"answer":"B","answerText":"Telomeren","q_en":"In theory, what is the structure at the ends of chromosomes that shortens slightly after each cell division (mitosis), thereby playing a role in cellular aging?","a_en":"Telomeres"},{"id":"x128","ch":"X","num":128,"question":"Binnen het proces van cellulaire ademhaling vinden er meerdere reacties plaats. Welke stap produceert met ruime voorsprong de grootste netto hoeveelheid ATP (energie)?","options":[{"letter":"A","text":"Elektronentransportketen (oxidatieve fosforylering)","text_en":"Electron transport chain (oxidative phosphorylation)"},{"letter":"B","text":"Krebs cyclus (Citroenzuurcyclus)","text_en":"Krebs cycle (citric acid cycle)"},{"letter":"C","text":"Fermentatie (Melkzuurvorming)","text_en":"Fermentation (lactic acid formation)"},{"letter":"D","text":"Glycolyse","text_en":"Glycolysis"}],"answer":"A","answerText":"Elektronentransportketen (oxidatieve fosforylering)","q_en":"Within the process of cellular respiration, several reactions take place. Which step produces by far the largest net amount of ATP (energy)?","a_en":"Electron transport chain (oxidative phosphorylation)"},{"id":"x129","ch":"X","num":129,"question":"Wanneer de calciumconcentratie in je bloed gevaarlijk HOOG is, zal de schildklier een hormoon afscheiden dat osteoblasten stimuleert om extra botweefsel te bouwen en zo het bloedcalcium te laten dalen. Welk hormoon is dit?","options":[{"letter":"A","text":"Parathyroïdhormoon (PTH)","text_en":"Parathyroid hormone (PTH)"},{"letter":"B","text":"Cortisol","text_en":"Cortisol"},{"letter":"C","text":"Calcitonine","text_en":"Calcitonin"},{"letter":"D","text":"Antidiuretisch Hormoon (ADH)","text_en":"Antidiuretic hormone (ADH)"}],"answer":"C","answerText":"Calcitonine","q_en":"When the calcium concentration in your blood is dangerously HIGH, the thyroid gland secretes a hormone that stimulates osteoblasts to build extra bone tissue and thereby lower blood calcium. Which hormone is this?","a_en":"Calcitonin"},{"id":"x130","ch":"X","num":130,"question":"Tijdens een paniekaanval kan hyperventilatie optreden. Maar soms zal het ademhalingscentrum mensen onbewust sneller én dieper laten ademhalen vanwege chemische signalen. Waarom doet het lichaam dit?","options":[{"letter":"A","text":"Omdat het suikergehalte (glucose) plots sterk gedaald is.","text_en":"Because blood sugar (glucose) has suddenly dropped sharply."},{"letter":"B","text":"Omdat de pH-waarde van het bloed te zuur is (acidose), waardoor extra CO2 moet worden uitgeademd.","text_en":"Because the pH of the blood is too acidic (acidosis), so extra CO2 must be exhaled."},{"letter":"C","text":"Omdat de pH-waarde van het bloed te basisch is (alkalose), waardoor zuurstof moet worden gecompenseerd.","text_en":"Because the pH of the blood is too alkaline (alkalosis), so oxygen must be compensated for."},{"letter":"D","text":"Omdat het hart ritmestoornissen heeft en probeert spierspasmen op te heffen.","text_en":"Because the heart has arrhythmias and is trying to resolve muscle spasms."}],"answer":"B","answerText":"Omdat de pH-waarde van het bloed te zuur is (acidose), waardoor extra CO2 moet worden uitgeademd.","q_en":"During a panic attack, hyperventilation can occur. But sometimes the respiratory center unconsciously makes people breathe faster and deeper because of chemical signals. Why does the body do this?","a_en":"Because the pH of the blood is too acidic (acidosis), so extra CO2 must be exhaled."},{"id":"x131","ch":"X","num":131,"question":"Welke stelling over het verschil of de gelijkenis tussen de mannelijke en vrouwelijke primaire voortplantingsorganen is FOUT?","options":[{"letter":"A","text":"Beide produceren belangrijke hoeveelheden geslachtshormonen (seks hormones).","text_en":"Both produce significant amounts of sex hormones."},{"letter":"B","text":"Beide organen zijn de locaties waar in het lichaam de meiotische deling (meiose) van geslachtscellen plaatsvindt.","text_en":"Both organs are the sites where meiotic division (meiosis) of the germ cells takes place in the body."},{"letter":"C","text":"Beide voortplantingsorganen (testes en eierstokken) bevinden zich in hun volwassen vorm veilig opgeborgen binnen de bekken- of buikholte (abdominale holte).","text_en":"Both reproductive organs (testes and ovaries) are, in their adult form, safely housed within the pelvic or abdominal cavity."},{"letter":"D","text":"Tot ongeveer zes weken embryonale ontwikkeling zien de genitale structuren van jongens en meisjes er nog weefselkundig exact hetzelfde uit.","text_en":"Up to about six weeks of embryonic development, the genital structures of boys and girls still look histologically exactly the same."}],"answer":"C","answerText":"Beide voortplantingsorganen (testes en eierstokken) bevinden zich in hun volwassen vorm veilig opgeborgen binnen de bekken- of buikholte (abdominale holte).","q_en":"Which statement about the difference or similarity between the male and female primary reproductive organs is FALSE?","a_en":"Both reproductive organs (testes and ovaries) are, in their adult form, safely housed within the pelvic or abdominal cavity."},{"id":"x132","ch":"X","num":132,"question":"Wat is in de celbiologie de definitie van 'contactinhibitie' (contact inhibition)?","options":[{"letter":"A","text":"Het verschijnsel waarbij normale cellen onmiddellijk stoppen met delen zodra ze fysiek in aanraking komen met hun buurcellen.","text_en":"The phenomenon whereby normal cells immediately stop dividing as soon as they come into physical contact with their neighboring cells."},{"letter":"B","text":"Het uitscheiden van enzymen die het contact met naburige cellen proberen af te breken om ruimte te maken.","text_en":"The secretion of enzymes that try to break down contact with neighboring cells in order to make room."},{"letter":"C","text":"Het proces waarbij weefsels afsterven als ze te strak tegen elkaar gedrukt worden (zoals bij doorligwonden).","text_en":"The process whereby tissues die off when they are pressed too tightly against each other (as in pressure sores)."},{"letter":"D","text":"Het blokkeren van synapsen in zenuwcellen waardoor pijnprikkels geblokkeerd worden.","text_en":"The blocking of synapses in nerve cells, which blocks pain stimuli."}],"answer":"A","answerText":"Het verschijnsel waarbij normale cellen onmiddellijk stoppen met delen zodra ze fysiek in aanraking komen met hun buurcellen.","q_en":"In cell biology, what is the definition of 'contact inhibition'?","a_en":"The phenomenon whereby normal cells immediately stop dividing as soon as they come into physical contact with their neighboring cells."},{"id":"x133","ch":"X","num":133,"question":"Wanneer monocyten (een type witte bloedcel) zich vanuit de bloedbaan nestelen in lichaamsweefsel om indringers op te ruimen, transformeren ze. Hoe heten ze vanaf dat moment?","options":[{"letter":"A","text":"Macrofagen","text_en":"Macrophages"},{"letter":"B","text":"Megakaryocyten","text_en":"Megakaryocytes"},{"letter":"C","text":"Neutrofielen","text_en":"Neutrophils"},{"letter":"D","text":"Basofielen","text_en":"Basophils"}],"answer":"A","answerText":"Macrofagen","q_en":"When monocytes (a type of white blood cell) settle from the bloodstream into body tissue to clear out invaders, they transform. What are they called from that moment on?","a_en":"Macrophages"},{"id":"x134","ch":"X","num":134,"question":"Welke chemische verbinding of eiwit functioneert als de belangrijkste buffer om de pH in het bloed constant (rond 7.4) te houden?","options":[{"letter":"A","text":"Bilirubine","text_en":"Bilirubin"},{"letter":"B","text":"Hemoglobine","text_en":"Hemoglobin"},{"letter":"C","text":"Bicarbonaat (HCO3-)","text_en":"Bicarbonate (HCO3-)"},{"letter":"D","text":"Albumine","text_en":"Albumin"}],"answer":"C","answerText":"Bicarbonaat (HCO3-)","q_en":"Which chemical compound or protein functions as the most important buffer to keep the blood pH constant (around 7.4)?","a_en":"Bicarbonate (HCO3-)"},{"id":"x135","ch":"X","num":135,"question":"Veruit de meeste hormonale systemen in ons lichaam werken op basis van negatieve feedback om een evenwicht te bewaren. Wat is echter een schoolvoorbeeld van POSITIEVE feedback, waarbij de stimulus zichzelf blijft versterken?","options":[{"letter":"A","text":"De afgifte van oxytocine tijdens de bevalling.","text_en":"The release of oxytocin during childbirth."},{"letter":"B","text":"De afgifte van insuline door een hoge bloedsuikerspiegel.","text_en":"The release of insulin due to a high blood sugar level."},{"letter":"C","text":"De productie van Oestrogeen door de bijnieren.","text_en":"The production of estrogen by the adrenal glands."},{"letter":"D","text":"De regulatie van de lichaamstemperatuur bij zweetproductie.","text_en":"The regulation of body temperature through sweat production."}],"answer":"A","answerText":"De afgifte van oxytocine tijdens de bevalling.","q_en":"By far most hormonal systems in our body work on the basis of negative feedback to maintain balance. What, however, is a classic example of POSITIVE feedback, in which the stimulus keeps reinforcing itself?","a_en":"The release of oxytocin during childbirth."},{"id":"x136","ch":"X","num":136,"question":"Volwassen botcellen (osteocyten) zitten vast en geïsoleerd in de kleine gaatjes (lacunae) van het uiterst harde botweefsel. Hoe kunnen zij onderling communiceren en overleven via zuurstof- en voedinguitwisseling?","options":[{"letter":"A","text":"Direct via diffusie dwars door de calciumfosfaatkristallen heen.","text_en":"Directly via diffusion straight through the calcium phosphate crystals."},{"letter":"B","text":"Door fysiek rond te 'wandelen' (migreren) in het botweefsel.","text_en":"By physically 'walking' (migrating) around within the bone tissue."},{"letter":"C","text":"Louter via chemische signalen in grote, holle zenuwbanen.","text_en":"Solely via chemical signals in large, hollow nerve pathways."},{"letter":"D","text":"Via canaliculi (botkanaaltjes)","text_en":"Via canaliculi (bone canals)"}],"answer":"D","answerText":"Via canaliculi (botkanaaltjes)","q_en":"Mature bone cells (osteocytes) are fixed and isolated in the small spaces (lacunae) of the extremely hard bone tissue. How can they communicate with one another and survive through the exchange of oxygen and nutrients?","a_en":"Via canaliculi (bone canals)"},{"id":"x137","ch":"X","num":137,"question":"Hoeveel wervels telt het cervicale (nek/hals) gedeelte van een normale menselijke wervelkolom?","options":[{"letter":"A","text":"7 wervels","text_en":"7 vertebrae"},{"letter":"B","text":"4 wervels","text_en":"4 vertebrae"},{"letter":"C","text":"12 wervels","text_en":"12 vertebrae"},{"letter":"D","text":"5 wervels","text_en":"5 vertebrae"}],"answer":"A","answerText":"7 wervels","q_en":"How many vertebrae make up the cervical (neck) portion of a normal human spine?","a_en":"7 vertebrae"},{"id":"x138","ch":"X","num":138,"question":"Welke twee lichaamsvloeistoffen horen respectievelijk bij een sterk zure pH van ongeveer 2 en een licht zure pH van rond de 6?","options":[{"letter":"A","text":"Bloed en Urine","text_en":"Blood and urine"},{"letter":"B","text":"Maagsap (pH ~2) en Urine (pH ~6)","text_en":"Gastric juice (pH ~2) and urine (pH ~6)"},{"letter":"C","text":"Speeksel en Bloed","text_en":"Saliva and blood"},{"letter":"D","text":"Bloed en Lymfe","text_en":"Blood and lymph"}],"answer":"B","answerText":"Maagsap (pH ~2) en Urine (pH ~6)","q_en":"Which two body fluids correspond respectively to a strongly acidic pH of about 2 and a slightly acidic pH of around 6?","a_en":"Gastric juice (pH ~2) and urine (pH ~6)"},{"id":"x139","ch":"X","num":139,"question":"Welk van de volgende mineralen wordt geclassificeerd als een sporenelement (spoormineraal), wat betekent dat het lichaam er slechts zeer kleine hoeveelheden van nodig heeft?","options":[{"letter":"A","text":"Calcium","text_en":"Calcium"},{"letter":"B","text":"Natrium","text_en":"Sodium"},{"letter":"C","text":"Kalium","text_en":"Potassium"},{"letter":"D","text":"IJzer","text_en":"Iron"}],"answer":"D","answerText":"IJzer","q_en":"Which of the following minerals is classified as a trace element (trace mineral), meaning that the body needs only very small amounts of it?","a_en":"Iron"},{"id":"x140","ch":"X","num":140,"question":"Wat is statistisch gezien de gevaarlijkste en meest dodelijke vorm van huidkanker?","options":[{"letter":"A","text":"Sarcoom","text_en":"Sarcoma"},{"letter":"B","text":"Melanoom","text_en":"Melanoma"},{"letter":"C","text":"Plaveiselcelcarcinoom","text_en":"Squamous cell carcinoma"},{"letter":"D","text":"Basaalcelcarcinoom","text_en":"Basal cell carcinoma"}],"answer":"B","answerText":"Melanoom","q_en":"Statistically speaking, what is the most dangerous and most deadly form of skin cancer?","a_en":"Melanoma"},{"id":"x141","ch":"X","num":141,"question":"Welk proces in de aerobe celademhaling levert veruit de meeste ATP (energie) per afgebroken glucosemolecuul op?","options":[{"letter":"A","text":"Glycolyse","text_en":"Glycolysis"},{"letter":"B","text":"De elektronentransportketen (oxidatieve fosforylering)","text_en":"The electron transport chain (oxidative phosphorylation)"},{"letter":"C","text":"De citroenzuurcyclus (Krebs cyclus)","text_en":"The citric acid cycle (Krebs cycle)"},{"letter":"D","text":"Fermentatie","text_en":"Fermentation"}],"answer":"B","answerText":"De elektronentransportketen (oxidatieve fosforylering)","q_en":"Which process in aerobic cellular respiration yields by far the most ATP (energy) per glucose molecule broken down?","a_en":"The electron transport chain (oxidative phosphorylation)"},{"id":"x142","ch":"X","num":142,"question":"Welk celorganel is verantwoordelijk voor het ontvangen, modificeren, verpakken en verzenden van eiwitten en lipiden die in het endoplasmatisch reticulum zijn gemaakt?","options":[{"letter":"A","text":"Mitochondrion","text_en":"Mitochondrion"},{"letter":"B","text":"Lysosoom","text_en":"Lysosome"},{"letter":"C","text":"Golgi-apparaat","text_en":"Golgi apparatus"},{"letter":"D","text":"Ribosoom","text_en":"Ribosome"}],"answer":"C","answerText":"Golgi-apparaat","q_en":"Which cell organelle is responsible for receiving, modifying, packaging and shipping proteins and lipids made in the endoplasmic reticulum?","a_en":"Golgi apparatus"},{"id":"x143","ch":"X","num":143,"question":"Hoe noemt men het gecoördineerde netwerk van membranen (waaronder de kern-envelop, het ER, het Golgi-apparaat en blaasjes) dat samenwerkt om lipiden en eiwitten te maken, te bewerken en te vervoeren?","options":[{"letter":"A","text":"Cytoskelet","text_en":"Cytoskeleton"},{"letter":"B","text":"Extracellulaire matrix","text_en":"Extracellular matrix"},{"letter":"C","text":"Endomembraansysteem","text_en":"Endomembrane system"},{"letter":"D","text":"Fagocytaire systeem","text_en":"Phagocytic system"}],"answer":"C","answerText":"Endomembraansysteem","q_en":"What do we call the coordinated network of membranes (including the nuclear envelope, the ER, the Golgi apparatus and vesicles) that work together to make, process and transport lipids and proteins?","a_en":"Endomembrane system"},{"id":"x144","ch":"X","num":144,"question":"Welk celorganel, ontstaan als een blaasje afgesnoerd van het Golgi-apparaat, bevat een mix van krachtige spijsverteringsenzymen om oude celonderdelen of binnengedrongen bacteriën af te breken?","options":[{"letter":"A","text":"Ruw Endoplasmatisch Reticulum (RER)","text_en":"Rough endoplasmic reticulum (RER)"},{"letter":"B","text":"Lysosoom","text_en":"Lysosome"},{"letter":"C","text":"Peroxisoom","text_en":"Peroxisome"},{"letter":"D","text":"Glad Endoplasmatisch Reticulum (SER)","text_en":"Smooth endoplasmic reticulum (SER)"}],"answer":"B","answerText":"Lysosoom","q_en":"Which cell organelle, formed as a vesicle pinched off from the Golgi apparatus, contains a mixture of powerful digestive enzymes to break down old cell components or invading bacteria?","a_en":"Lysosome"},{"id":"x145","ch":"X","num":145,"question":"Welke van de onderstaande weefseltypen worden anatomisch geclassificeerd als 'ondersteunend bindweefsel' (supporting connective tissue)?","options":[{"letter":"A","text":"Hartspier en Gladde spier","text_en":"Cardiac muscle and smooth muscle"},{"letter":"B","text":"Losmazig en Dicht bindweefsel (zoals pezen)","text_en":"Loose and dense connective tissue (such as tendons)"},{"letter":"C","text":"Vezelig kraakbeen en compact bot","text_en":"Fibrocartilage and compact bone"},{"letter":"D","text":"Bloed en Lymfe","text_en":"Blood and lymph"}],"answer":"C","answerText":"Vezelig kraakbeen en compact bot","q_en":"Which of the tissue types below are anatomically classified as 'supporting connective tissue'?","a_en":"Fibrocartilage and compact bone"},{"id":"x146","ch":"X","num":146,"question":"Welk type chemische reactie in onze cellen koppelt kleine bouwstenen (monomeren) aan elkaar om grote macromoleculen te vormen, waarbij telkens een watermolecuul vrijkomt?","options":[{"letter":"A","text":"Hydrolysereactie","text_en":"Hydrolysis reaction"},{"letter":"B","text":"Dehydratatiereactie (Condensatiereactie)","text_en":"Dehydration reaction (condensation reaction)"},{"letter":"C","text":"Oxidatiereactie","text_en":"Oxidation reaction"},{"letter":"D","text":"Fosforylering","text_en":"Phosphorylation"}],"answer":"B","answerText":"Dehydratatiereactie (Condensatiereactie)","q_en":"Which type of chemical reaction in our cells links small building blocks (monomers) together to form large macromolecules, with a water molecule being released each time?","a_en":"Dehydration reaction (condensation reaction)"},{"id":"x147","ch":"X","num":147,"question":"Tot welke grote klasse van biologische macromoleculen behoren voedingsstoffen zoals suikers, zetmeel en glycogeen?","options":[{"letter":"A","text":"Lipiden","text_en":"Lipids"},{"letter":"B","text":"Eiwitten (Proteïnen)","text_en":"Proteins"},{"letter":"C","text":"Koolhydraten (Sachariden)","text_en":"Carbohydrates (saccharides)"},{"letter":"D","text":"Nucleïnezuren","text_en":"Nucleic acids"}],"answer":"C","answerText":"Koolhydraten (Sachariden)","q_en":"To which major class of biological macromolecules do nutrients such as sugars, starch and glycogen belong?","a_en":"Carbohydrates (saccharides)"},{"id":"x148","ch":"X","num":148,"question":"Uit welk specifiek type epitheelweefsel is onze opperhuid (epidermis) opgebouwd om optimale bescherming tegen wrijving en bacteriën te bieden?","options":[{"letter":"A","text":"Eenvoudig plaveiselepitheel","text_en":"Simple squamous epithelium"},{"letter":"B","text":"Gestratificeerd plaveiselepitheel (Meerlagig plattepitheel)","text_en":"Stratified squamous epithelium (multilayered flat epithelium)"},{"letter":"C","text":"Eenlagig cilindrisch epitheel","text_en":"Simple columnar epithelium"},{"letter":"D","text":"Overgangsepitheel (Transitional)","text_en":"Transitional epithelium"}],"answer":"B","answerText":"Gestratificeerd plaveiselepitheel (Meerlagig plattepitheel)","q_en":"Which specific type of epithelial tissue makes up our outer skin (epidermis) to provide optimal protection against friction and bacteria?","a_en":"Stratified squamous epithelium (multilayered flat epithelium)"},{"id":"x149","ch":"X","num":149,"question":"Genetica: Een vader heeft 'ffss' (geen sproeten, lange vingers). Een moeder heeft 'FfSs' (wel sproeten, korte vingers). Wat is de procentuele kans dat hun kind wél sproeten maar lange vingers (F_ss) zal hebben?","options":[{"letter":"A","text":"50%","text_en":"50%"},{"letter":"B","text":"100%","text_en":"100%"},{"letter":"C","text":"0%","text_en":"0%"},{"letter":"D","text":"25%","text_en":"25%"}],"answer":"D","answerText":"25%","q_en":"Genetics: A father has 'ffss' (no freckles, long fingers). A mother has 'FfSs' (freckles, short fingers). What is the percentage chance that their child will have freckles but long fingers (F_ss)?","a_en":"25%"},{"id":"x150","ch":"X","num":150,"question":"Welke van de onderstaande eigenschappen of aandoeningen wordt NIET polygeen bepaald (door de interactie van vele genen), maar door één enkel gen (monogeen)?","options":[{"letter":"A","text":"Huidskleur","text_en":"Skin color"},{"letter":"B","text":"Schizofrenie","text_en":"Schizophrenia"},{"letter":"C","text":"De ziekte van Huntington","text_en":"Huntington's disease"},{"letter":"D","text":"Diabetes","text_en":"Diabetes"}],"answer":"C","answerText":"De ziekte van Huntington","q_en":"Which of the following traits or conditions is NOT polygenically determined (by the interaction of many genes), but by a single gene (monogenic)?","a_en":"Huntington's disease"},{"id":"x151","ch":"X","num":151,"question":"Hoe noemt men anatomisch het onderste, smalle en buisvormige deel van de baarmoeder dat een kleine opening vormt naar de vagina toe?","options":[{"letter":"A","text":"De fornix","text_en":"The fornix"},{"letter":"B","text":"Het myometrium","text_en":"The myometrium"},{"letter":"C","text":"De cervix (baarmoederhals)","text_en":"The cervix"},{"letter":"D","text":"De eileider (Tuba uterina)","text_en":"The fallopian tube (uterine tube)"}],"answer":"C","answerText":"De cervix (baarmoederhals)","q_en":"What is the anatomical name for the lower, narrow, tubular part of the uterus that forms a small opening toward the vagina?","a_en":"The cervix"},{"id":"x152","ch":"X","num":152,"question":"Wat is het meest kenmerkende structurele onderdeel dat het open netwerk van sponsachtig bot (spongy bone) vormt?","options":[{"letter":"A","text":"Rood beenmerg","text_en":"Red bone marrow"},{"letter":"B","text":"Osteonen (Systemen van Havers)","text_en":"Osteons (Haversian systems)"},{"letter":"C","text":"Periosteum","text_en":"Periosteum"},{"letter":"D","text":"Trabeculae (Botbalkjes)","text_en":"Trabeculae (bone struts)"}],"answer":"D","answerText":"Trabeculae (Botbalkjes)","q_en":"What is the most characteristic structural component that forms the open network of spongy bone?","a_en":"Trabeculae (bone struts)"},{"id":"x153","ch":"X","num":153,"question":"Welke van de onderstaande cellen maakt GEEN deel uit van de 'gevormde elementen' van het bloed?","options":[{"letter":"A","text":"Trombocyten (Bloedplaatjes)","text_en":"Thrombocytes (platelets)"},{"letter":"B","text":"Leukocyten (Witte bloedcellen)","text_en":"Leukocytes (white blood cells)"},{"letter":"C","text":"Erytrocyten (Rode bloedcellen)","text_en":"Erythrocytes (red blood cells)"},{"letter":"D","text":"Adipocyten (Vetcellen)","text_en":"Adipocytes (fat cells)"}],"answer":"D","answerText":"Adipocyten (Vetcellen)","q_en":"Which of the cells below is NOT part of the 'formed elements' of the blood?","a_en":"Adipocytes (fat cells)"},{"id":"x154","ch":"X","num":154,"question":"Rond de overgang van de blaas naar de urinebuis liggen zenuwen en sluitspieren. Wat is de functie van de buitenste sluitspier, die verbonden is met somatische motorische zenuwen?","options":[{"letter":"A","text":"Het activeert de blaaswandspier (detrusor) om samen te knijpen.","text_en":"It activates the bladder wall muscle (detrusor) to contract."},{"letter":"B","text":"Het geeft onbewust aan de hersenen door hoeveel urine er in de blaas zit.","text_en":"It unconsciously signals to the brain how much urine is in the bladder."},{"letter":"C","text":"Het opent onvrijwillig wanneer de blaas haar maximale volume bereikt.","text_en":"It opens involuntarily when the bladder reaches its maximum volume."},{"letter":"D","text":"Het zorgt voor de bewuste (vrijwillige) controle over het ophouden of starten van het plassen (mictie).","text_en":"It provides conscious (voluntary) control over holding back or starting urination (micturition)."}],"answer":"D","answerText":"Het zorgt voor de bewuste (vrijwillige) controle over het ophouden of starten van het plassen (mictie).","q_en":"Around the transition from the bladder to the urethra lie nerves and sphincters. What is the function of the external sphincter, which is connected to somatic motor nerves?","a_en":"It provides conscious (voluntary) control over holding back or starting urination (micturition)."},{"id":"x155","ch":"X","num":155,"question":"Wanneer weefsel beschadigd raakt, ontstaat er een ontstekingsreactie (inflammatie). Wat maakt echter GEEN deel uit van deze lokale, aangeboren immuunreactie?","options":[{"letter":"A","text":"Het uitscheiden van signaalstoffen (cytokinen) om meer immuuncellen te lokken.","text_en":"The secretion of signaling molecules (cytokines) to recruit more immune cells."},{"letter":"B","text":"Het vrijkomen van histamine door mestcellen.","text_en":"The release of histamine by mast cells."},{"letter":"C","text":"Fagocyterende witte bloedcellen (neutrofielen en macrofagen) die bacteriën opeten.","text_en":"Phagocytic white blood cells (neutrophils and macrophages) that engulf bacteria."},{"letter":"D","text":"B-lymfocyten die massaal specifieke antilichamen produceren in de wond.","text_en":"B lymphocytes that massively produce specific antibodies in the wound."}],"answer":"D","answerText":"B-lymfocyten die massaal specifieke antilichamen produceren in de wond.","q_en":"When tissue is damaged, an inflammatory reaction (inflammation) occurs. However, which of the following is NOT part of this local, innate immune response?","a_en":"B lymphocytes that massively produce specific antibodies in the wound."},{"id":"x156","ch":"X","num":156,"question":"Wat gebeurt er fysiek na de geboorte met bloedvaten zoals de navelstrengslagaders (umbilicale arteriën) en de ductus arteriosus, die tijdens het foetale leven cruciaal waren?","options":[{"letter":"A","text":"Ze blijven open maar krimpen aanzienlijk, zonder verdere functie.","text_en":"They remain open but shrink considerably, without any further function."},{"letter":"B","text":"Ze worden via de navelstreng samen met de moederkoek in hun geheel afgestoten.","text_en":"They are expelled in their entirety along with the placenta via the umbilical cord."},{"letter":"C","text":"Ze nemen de functie over van het lymfestelsel in de buikholte.","text_en":"They take over the function of the lymphatic system in the abdominal cavity."},{"letter":"D","text":"Ze klappen dicht, degenereren en veranderen definitief in bindweefselstrengen (ligamenten).","text_en":"They close off, degenerate and permanently turn into connective tissue cords (ligaments)."}],"answer":"D","answerText":"Ze klappen dicht, degenereren en veranderen definitief in bindweefselstrengen (ligamenten).","q_en":"What physically happens after birth to blood vessels such as the umbilical arteries and the ductus arteriosus, which were crucial during fetal life?","a_en":"They close off, degenerate and permanently turn into connective tissue cords (ligaments)."},{"id":"x157","ch":"X","num":157,"question":"Welke belangrijke signaalstoffen (eiwitten) worden door Helper T-cellen uitgescheiden om de activiteit van andere immuuncellen te sturen en stimuleren?","options":[{"letter":"A","text":"Antilichamen","text_en":"Antibodies"},{"letter":"B","text":"Perforinen","text_en":"Perforins"},{"letter":"C","text":"Histamine","text_en":"Histamine"},{"letter":"D","text":"Cytokinen","text_en":"Cytokines"}],"answer":"D","answerText":"Cytokinen","q_en":"Which important signaling molecules (proteins) are secreted by helper T cells to direct and stimulate the activity of other immune cells?","a_en":"Cytokines"},{"id":"x158","ch":"X","num":158,"question":"Hoe heet de groep van ongeveer 30 inactieve plasma-eiwitten in je bloed, die, eenmaal geactiveerd, een cascade vormen die de wand van bacteriën perforeert (het Membrane Attack Complex)?","options":[{"letter":"A","text":"Interferonen","text_en":"Interferons"},{"letter":"B","text":"Lysozymen","text_en":"Lysozymes"},{"letter":"C","text":"Complement eiwitten","text_en":"Complement proteins"},{"letter":"D","text":"Immunoglobulinen","text_en":"Immunoglobulins"}],"answer":"C","answerText":"Complement eiwitten","q_en":"What is the name of the group of about 30 inactive plasma proteins in your blood that, once activated, form a cascade that perforates the wall of bacteria (the Membrane Attack Complex)?","a_en":"Complement proteins"},{"id":"x159","ch":"X","num":159,"question":"Wat is de medische term voor een ontsteking of infectie aan de slijmvliezen van de urineblaas?","options":[{"letter":"A","text":"Cystitis","text_en":"Cystitis"},{"letter":"B","text":"Pyelonefritis","text_en":"Pyelonephritis"},{"letter":"C","text":"Rhinitis","text_en":"Rhinitis"},{"letter":"D","text":"Urethritis","text_en":"Urethritis"}],"answer":"A","answerText":"Cystitis","q_en":"What is the medical term for an inflammation or infection of the mucous membranes of the urinary bladder?","a_en":"Cystitis"},{"id":"x160","ch":"X","num":160,"question":"In welk deel van het spijsverteringskanaal is het enzym pepsine actief voor de vertering van eiwitten?","options":[{"letter":"A","text":"De maag","text_en":"The stomach"},{"letter":"B","text":"De dunne darm","text_en":"The small intestine"},{"letter":"C","text":"De mondholte","text_en":"The oral cavity"},{"letter":"D","text":"De dikke darm","text_en":"The large intestine"}],"answer":"A","answerText":"De maag","q_en":"In which part of the digestive tract is the enzyme pepsin active in the digestion of proteins?","a_en":"The stomach"},{"id":"x161","ch":"X","num":161,"question":"Hoe heet de koepelvormige spierlaag die de borstholte (met hart en longen) scheidt van de buikholte (spijsverteringsorganen) en die de belangrijkste rol speelt bij het inademen?","options":[{"letter":"A","text":"Pleura (Longvlies)","text_en":"Pleura (lung membrane)"},{"letter":"B","text":"Diafragma (Middenrif)","text_en":"Diaphragm"},{"letter":"C","text":"Buikspieren (Abdominalen)","text_en":"Abdominal muscles (abdominals)"},{"letter":"D","text":"Tussenribspieren (Intercostalen)","text_en":"Intercostal muscles"}],"answer":"B","answerText":"Diafragma (Middenrif)","q_en":"What is the name of the dome-shaped muscle layer that separates the thoracic cavity (containing the heart and lungs) from the abdominal cavity (digestive organs) and that plays the main role in inhalation?","a_en":"Diaphragm"},{"id":"x162","ch":"X","num":162,"question":"Wanneer de grote luchtpijp (trachea) afdaalt in de borstkas, splitst deze zich. Hoe heten de twee grote buizen die respectievelijk de linker- en rechterlong binnenlopen?","options":[{"letter":"A","text":"Bronchiolen","text_en":"Bronchioles"},{"letter":"B","text":"Primaire bronchiën","text_en":"Primary bronchi"},{"letter":"C","text":"Farynx (Keelholte)","text_en":"Pharynx (throat)"},{"letter":"D","text":"Alveoli (Longblaasjes)","text_en":"Alveoli (air sacs)"}],"answer":"B","answerText":"Primaire bronchiën","q_en":"When the large windpipe (trachea) descends into the chest, it branches. What are the names of the two large tubes that enter the left and right lung respectively?","a_en":"Primary bronchi"},{"id":"x163","ch":"X","num":163,"question":"Hoe noemt men in de immunologie het proces waarbij iemand (bijvoorbeeld via een vaccin of een doorgemaakte infectie) zelf antigenen krijgt, zodat het eigen lichaam antilichamen en geheugencellen gaat produceren?","options":[{"letter":"A","text":"Passieve immunisatie","text_en":"Passive immunization"},{"letter":"B","text":"Latente immunisatie","text_en":"Latent immunization"},{"letter":"C","text":"Secundaire immunisatie","text_en":"Secondary immunization"},{"letter":"D","text":"Actieve immunisatie","text_en":"Active immunization"}],"answer":"D","answerText":"Actieve immunisatie","q_en":"In immunology, what is the name of the process in which a person (for example through a vaccine or a previous infection) receives antigens themselves, so that their own body starts to produce antibodies and memory cells?","a_en":"Active immunization"},{"id":"x164","ch":"X","num":164,"question":"Welke kleine endocriene kliertjes liggen aan de achterzijde van de schildklier (de zogenaamde parathyroids) en scheiden een hormoon af om de calciumspiegel in het bloed te verhogen?","options":[{"letter":"A","text":"De bijnieren","text_en":"The adrenal glands"},{"letter":"B","text":"De bijschildklieren","text_en":"The parathyroid glands"},{"letter":"C","text":"De Lymfeknopen","text_en":"The lymph nodes"},{"letter":"D","text":"De thymus (zwezerik)","text_en":"The thymus"}],"answer":"B","answerText":"De bijschildklieren","q_en":"Which small endocrine glands lie on the back of the thyroid gland (the so-called parathyroids) and secrete a hormone to raise the calcium level in the blood?","a_en":"The parathyroid glands"},{"id":"x165","ch":"X","num":165,"question":"Wat is de primaire functie van de 'vernix caseosa' (het wittige huidsmeer) bij een foetus in de baarmoeder?","options":[{"letter":"A","text":"Het wordt door het immuunsysteem van de moeder aangemaakt om weefselafstoting te voorkomen.","text_en":"It is produced by the mother's immune system to prevent tissue rejection."},{"letter":"B","text":"Het is een voedingsreserve die de baby in de laatste levensmaand via de huid kan opnemen.","text_en":"It is a nutritional reserve that the baby can absorb through the skin in the last month of life."},{"letter":"C","text":"Het beschermt de baby in de baarmoeder tegen het binnendringen van virussen en bacteriën via de navelstreng.","text_en":"It protects the baby in the womb against the invasion of viruses and bacteria via the umbilical cord."},{"letter":"D","text":"Het beschermt de tere foetale huid tegen het continu inweken en uitdrogen door het vruchtwater.","text_en":"It protects the delicate fetal skin against continuous soaking and drying out by the amniotic fluid."}],"answer":"D","answerText":"Het beschermt de tere foetale huid tegen het continu inweken en uitdrogen door het vruchtwater.","q_en":"What is the primary function of the 'vernix caseosa' (the whitish skin coating) on a fetus in the womb?","a_en":"It protects the delicate fetal skin against continuous soaking and drying out by the amniotic fluid."},{"id":"x166","ch":"X","num":166,"question":"Wat is een direct fysiologisch resultaat van een structureel teveel aan natrium (zout) in het bloed?","options":[{"letter":"A","text":"Een enorme daling in het antidiuretisch hormoon (ADH).","text_en":"An enormous drop in antidiuretic hormone (ADH)."},{"letter":"B","text":"Een verhoogd bloedvolume (en vaak daarmee gepaard een verhoogde bloeddruk).","text_en":"An increased blood volume (and often, associated with it, an increased blood pressure)."},{"letter":"C","text":"Een daling in de osmotische waarde van het plasma.","text_en":"A decrease in the osmotic value of the plasma."},{"letter":"D","text":"Een sterk verhoogde aanmaak van aldosteron door de bijnieren.","text_en":"A strongly increased production of aldosterone by the adrenal glands."}],"answer":"B","answerText":"Een verhoogd bloedvolume (en vaak daarmee gepaard een verhoogde bloeddruk).","q_en":"What is a direct physiological result of a structural excess of sodium (salt) in the blood?","a_en":"An increased blood volume (and often, associated with it, an increased blood pressure)."},{"id":"x167","ch":"X","num":167,"question":"Wat voor soort chemische binding houdt de waterstofatomen en het zuurstofatoom sterk bij elkaar BINNEN één enkel watermolecuul (H2O)?","options":[{"letter":"A","text":"Van der Waals-krachten","text_en":"Van der Waals forces"},{"letter":"B","text":"Polaire covalente binding","text_en":"Polar covalent bond"},{"letter":"C","text":"Waterstofbrug (Hydrogen bond)","text_en":"Hydrogen bond"},{"letter":"D","text":"Ionaire binding (Ionbinding)","text_en":"Ionic bond"}],"answer":"B","answerText":"Polaire covalente binding","q_en":"What kind of chemical bond holds the hydrogen atoms and the oxygen atom strongly together WITHIN a single water molecule (H2O)?","a_en":"Polar covalent bond"},{"id":"x168","ch":"X","num":168,"question":"Vanuit een evolutionair standpunt: waarom blijven extreem gevaarlijke genetische ziektes zoals sikkelcelziekte en mucoviscidose (cystic fibrosis) in relatief hoge mate bestaan in bepaalde bevolkingsgroepen?","options":[{"letter":"A","text":"De symptomen van deze ziektes uiten zich steevast pas op zeer late leeftijd, ver nadat mensen al kinderen hebben gekregen.","text_en":"The symptoms of these diseases invariably only appear at a very late age, long after people have already had children."},{"letter":"B","text":"Mensen die drager zijn van één defect gen (heterozygoot), ondervinden vaak een overlevingsvoordeel bij andere, lokaal dodelijke ziektes (zoals malaria of cholera).","text_en":"People who are carriers of one defective gene (heterozygous) often experience a survival advantage against other, locally lethal diseases (such as malaria or cholera)."},{"letter":"C","text":"Het DNA in deze bevolkingsgroepen muteert massaal spontaan in elke nieuwe generatie.","text_en":"The DNA in these populations mutates massively and spontaneously in every new generation."},{"letter":"D","text":"Omdat deze ziektes de vruchtbaarheid bij homozygoten juist sterk verhogen.","text_en":"Because these diseases actually strongly increase fertility in homozygotes."}],"answer":"B","answerText":"Mensen die drager zijn van één defect gen (heterozygoot), ondervinden vaak een overlevingsvoordeel bij andere, lokaal dodelijke ziektes (zoals malaria of cholera).","q_en":"From an evolutionary standpoint: why do extremely dangerous genetic diseases such as sickle cell disease and cystic fibrosis persist to a relatively high degree in certain populations?","a_en":"People who are carriers of one defective gene (heterozygous) often experience a survival advantage against other, locally lethal diseases (such as malaria or cholera)."},{"id":"x169","ch":"X","num":169,"question":"Welke fysiologische uitspraak over de regulatie van het urinesysteem is JUIST?","options":[{"letter":"A","text":"ADH (Antidiuretisch Hormoon) wordt geproduceerd in de hypothalamus en vrijgegeven door de hypofyse-achterkwab.","text_en":"ADH (Antidiuretic Hormone) is produced in the hypothalamus and released by the posterior lobe of the pituitary gland."},{"letter":"B","text":"ADH wordt afgescheiden door de bijnierschors.","text_en":"ADH is secreted by the adrenal cortex."},{"letter":"C","text":"Renine wordt direct afgegeven door het hart als de bloeddruk te hoog wordt.","text_en":"Renin is released directly by the heart when the blood pressure becomes too high."},{"letter":"D","text":"Aldosteron wordt ontwikkeld en uitgescheiden door de hypofyse in de hersenen.","text_en":"Aldosterone is developed and secreted by the pituitary gland in the brain."}],"answer":"A","answerText":"ADH (Antidiuretisch Hormoon) wordt geproduceerd in de hypothalamus en vrijgegeven door de hypofyse-achterkwab.","q_en":"Which physiological statement about the regulation of the urinary system is CORRECT?","a_en":"ADH (Antidiuretic Hormone) is produced in the hypothalamus and released by the posterior lobe of the pituitary gland."},{"id":"x170","ch":"X","num":170,"question":"Een goedaardige tumor op de hypofyse kan leiden tot een continue, massale overproductie van groeihormoon (GH). Welk medisch ziektebeeld ontstaat er wanneer dit optreedt bij een VOLWASSENE, waarvan de groeischijven in de botten al gesloten zijn?","options":[{"letter":"A","text":"Gigantisme (Reuzengroei)","text_en":"Gigantism"},{"letter":"B","text":"Syndroom van Cushing","text_en":"Cushing's syndrome"},{"letter":"C","text":"Ziekte van Addison","text_en":"Addison's disease"},{"letter":"D","text":"Acromegalie","text_en":"Acromegaly"}],"answer":"D","answerText":"Acromegalie","q_en":"A benign tumor on the pituitary gland can lead to a continuous, massive overproduction of growth hormone (GH). Which medical condition arises when this occurs in an ADULT, whose growth plates in the bones are already closed?","a_en":"Acromegaly"},{"id":"x171","ch":"X","num":171,"question":"Hormonen worden op basis van hun chemische structuur ruwweg opgesplitst in peptide-/eiwithormonen (wateroplosbaar) en steroïdhormonen (vetoplosbaar). Welk van de volgende hormonen is GEEN peptidehormoon, maar een steroïdhormoon?","options":[{"letter":"A","text":"Groeihormoon (GH)","text_en":"Growth hormone (GH)"},{"letter":"B","text":"Glucagon","text_en":"Glucagon"},{"letter":"C","text":"Cortisol","text_en":"Cortisol"},{"letter":"D","text":"Insuline","text_en":"Insulin"}],"answer":"C","answerText":"Cortisol","q_en":"Based on their chemical structure, hormones are roughly divided into peptide/protein hormones (water-soluble) and steroid hormones (fat-soluble). Which of the following hormones is NOT a peptide hormone, but a steroid hormone?","a_en":"Cortisol"},{"id":"x172","ch":"X","num":172,"question":"Het lichaam regelt de bloedsuikerspiegel (glucose) streng met behulp van meerdere hormonen. Welke van de volgende stellingen hierover is pertinent ONJUIST?","options":[{"letter":"A","text":"Adrenaline verlaagt de bloedglucosespiegel direct door opslag te stimuleren.","text_en":"Adrenaline directly lowers the blood glucose level by stimulating storage."},{"letter":"B","text":"Glucagon verhoogt de bloedglucosespiegel.","text_en":"Glucagon raises the blood glucose level."},{"letter":"C","text":"Cortisol verhoogt de bloedglucosespiegel.","text_en":"Cortisol raises the blood glucose level."},{"letter":"D","text":"Insuline verlaagt de bloedglucosespiegel.","text_en":"Insulin lowers the blood glucose level."}],"answer":"A","answerText":"Adrenaline verlaagt de bloedglucosespiegel direct door opslag te stimuleren.","q_en":"The body strictly regulates the blood sugar level (glucose) with the help of several hormones. Which of the following statements about this is definitely INCORRECT?","a_en":"Adrenaline directly lowers the blood glucose level by stimulating storage."},{"id":"x173","ch":"X","num":173,"question":"Rachitis is een aandoening bij kinderen waarbij de botten onvoldoende mineraliseren en daardoor zacht blijven, wat kan leiden tot ernstige krommingen zoals o-benen. Aan welk vitaal vitamine hebben deze patiëntjes een tekort?","options":[{"letter":"A","text":"Vitamine A","text_en":"Vitamin A"},{"letter":"B","text":"Vitamine D","text_en":"Vitamin D"},{"letter":"C","text":"Vitamine C","text_en":"Vitamin C"},{"letter":"D","text":"Vitamine B12","text_en":"Vitamin B12"}],"answer":"B","answerText":"Vitamine D","q_en":"Rickets is a condition in children in which the bones mineralize insufficiently and therefore remain soft, which can lead to severe curvatures such as bow legs. Which vital vitamin are these young patients deficient in?","a_en":"Vitamin D"},{"id":"x174","ch":"X","num":174,"question":"De menselijke voortplanting: Hoe noemt men de prilste fase (de eerste zeven dagen) vanaf het moment van bevruchting van de eicel door de zaadcel, nét voor en tijdens het begin van de innesteling in de baarmoederwand?","options":[{"letter":"A","text":"De pre-zygote ontwikkeling","text_en":"The pre-zygote development"},{"letter":"B","text":"De pre-embryonale ontwikkeling","text_en":"The pre-embryonic development"},{"letter":"C","text":"De foetale ontwikkeling","text_en":"The fetal development"},{"letter":"D","text":"Het ectodermale stadium","text_en":"The ectodermal stage"}],"answer":"B","answerText":"De pre-embryonale ontwikkeling","q_en":"Human reproduction: what is the name of the earliest phase (the first seven days) from the moment the egg cell is fertilized by the sperm cell, just before and during the beginning of implantation in the uterine wall?","a_en":"The pre-embryonic development"},{"id":"x175","ch":"X","num":175,"question":"In welk van de onderstaande specifieke bindweefsels bevindt het eiwit collageen zich het meest overvloedig in dichte, sterke vezelbundels om extreme trekkracht en schokken te weerstaan?","options":[{"letter":"A","text":"Bloed","text_en":"Blood"},{"letter":"B","text":"Vezelkraakbeen (Fibrocartilage)","text_en":"Fibrocartilage"},{"letter":"C","text":"Elastisch bindweefsel","text_en":"Elastic connective tissue"},{"letter":"D","text":"Hyalien kraakbeen","text_en":"Hyaline cartilage"}],"answer":"B","answerText":"Vezelkraakbeen (Fibrocartilage)","q_en":"In which of the following specific connective tissues is the protein collagen present most abundantly in dense, strong fiber bundles to withstand extreme tensile forces and shocks?","a_en":"Fibrocartilage"},{"id":"x176","ch":"X","num":176,"question":"De binnenkant van een cel bezit een 3D-netwerk van microscopische eiwitdraden dat vorm, sterkte en beweging verzorgt: het cytoskelet. Wat behoort absoluut NIET tot dit interne cytoskelet?","options":[{"letter":"A","text":"Actinefilamenten (Microfilamenten)","text_en":"Actin filaments (microfilaments)"},{"letter":"B","text":"Microtubuli","text_en":"Microtubules"},{"letter":"C","text":"Intermediaire filamenten","text_en":"Intermediate filaments"},{"letter":"D","text":"Collageen","text_en":"Collagen"}],"answer":"D","answerText":"Collageen","q_en":"The interior of a cell possesses a 3D network of microscopic protein filaments that provides shape, strength and movement: the cytoskeleton. What absolutely does NOT belong to this internal cytoskeleton?","a_en":"Collagen"},{"id":"x177","ch":"X","num":177,"question":"Een belangrijke wetmatigheid binnen de endocrinologie luidt: Peptidehormonen en steroïdhormonen hebben fundam
