ijven, wat kan leiden tot ernstige krommingen zoals o-benen. Aan welk vitaal vitamine hebben deze patiëntjes een tekort?","options":[{"letter":"A","text":"Vitamine A"},{"letter":"B","text":"Vitamine D"},{"letter":"C","text":"Vitamine C"},{"letter":"D","text":"Vitamine B12"}],"answer":"B","answerText":"Vitamine D"},{"id":"x174","ch":"X","num":174,"question":"De menselijke voortplanting: Hoe noemt men de prilste fase (de eerste zeven dagen) vanaf het moment van bevruchting van de eicel door de zaadcel, nét voor en tijdens het begin van de innesteling in de baarmoederwand?","options":[{"letter":"A","text":"De pre-zygote ontwikkeling"},{"letter":"B","text":"De pre-embryonale ontwikkeling"},{"letter":"C","text":"De foetale ontwikkeling"},{"letter":"D","text":"Het ectodermale stadium"}],"answer":"B","answerText":"De pre-embryonale ontwikkeling"},{"id":"x175","ch":"X","num":175,"question":"In welk van de onderstaande specifieke bindweefsels bevindt het eiwit collageen zich het meest overvloedig in dichte, sterke vezelbundels om extreme trekkracht en schokken te weerstaan?","options":[{"letter":"A","text":"Bloed"},{"letter":"B","text":"Vezelkraakbeen (Fibrocartilage)"},{"letter":"C","text":"Elastisch bindweefsel"},{"letter":"D","text":"Hyalien kraakbeen"}],"answer":"B","answerText":"Vezelkraakbeen (Fibrocartilage)"},{"id":"x176","ch":"X","num":176,"question":"De binnenkant van een cel bezit een 3D-netwerk van microscopische eiwitdraden dat vorm, sterkte en beweging verzorgt: het cytoskelet. Wat behoort absoluut NIET tot dit interne cytoskelet?","options":[{"letter":"A","text":"Actinefilamenten (Microfilamenten)"},{"letter":"B","text":"Microtubuli"},{"letter":"C","text":"Intermediaire filamenten"},{"letter":"D","text":"Collageen"}],"answer":"D","answerText":"Collageen"},{"id":"x177","ch":"X","num":177,"question":"Een belangrijke wetmatigheid binnen de endocrinologie luidt: Peptidehormonen en steroïdhormonen hebben fundamenteel verschillende mechanismen om cellen te beïnvloeden. Welke fysiologische stelling is CORRECT?","options":[{"letter":"A","text":"Peptidehormonen (eiwithormonen) werken doorgaans sneller dan steroïdhormonen."},{"letter":"B","text":"Steroïdhormonen kunnen onmogelijk de hydrofobe celmembraan passeren."},{"letter":"C","text":"Peptidehormonen werken doorgaans langzamer en hebben dagen nodig om effect te sorteren."},{"letter":"D","text":"Steroïdhormonen werken primair door het openzetten van ionkanalen aan de celoppervlakte."}],"answer":"A","answerText":"Peptidehormonen (eiwithormonen) werken doorgaans sneller dan steroïdhormonen."},{"id":"x178","ch":"X","num":178,"question":"Op het celmembraan bevinden zich integrale eiwitten die 'aquaporines' genoemd worden. Wat is de exclusieve functie van deze eiwitkanalen?","options":[{"letter":"A","text":"Ze produceren ATP (energie) uit de passieve stroming van waterstofionen (H+)."},{"letter":"B","text":"Ze herkennen virale antigenen en lokken macrofagen naar de cel."},{"letter":"C","text":"Ze pompen actief natrium de cel uit en kalium de cel in tegen de concentratiegradiënt."},{"letter":"D","text":"Ze faciliteren het supersnelle transport van watermoleculen door het celmembraan heen via osmose."}],"answer":"D","answerText":"Ze faciliteren het supersnelle transport van watermoleculen door het celmembraan heen via osmose."},{"id":"x179","ch":"X","num":179,"question":"Tijdens de genetische celdeling wordt het verloop gecontroleerd. Welk celorganel in de cel organiseert de spindelvezels (microtubuli) die uiteindelijk de chromosomen uit elkaar trekken?","options":[{"letter":"A","text":"Nucleolus (kernlichaampje)"},{"letter":"B","text":"Lysosoom"},{"letter":"C","text":"Centriool / Centrosoom"},{"letter":"D","text":"Glad Endoplasmatisch Reticulum"}],"answer":"C","answerText":"Centriool / Centrosoom"},{"id":"x180","ch":"X","num":180,"question":"Welke seksueel overdraagbare aandoening (SOA) vertoont een sterke relatie met de ontwikkeling van kanker?","options":[{"letter":"A","text":"Gonorroe"},{"letter":"B","text":"Chlamydia"},{"letter":"C","text":"Syfilis"},{"letter":"D","text":"Humaan papillomavirus (HPV)"}],"answer":"D","answerText":"Humaan papillomavirus (HPV)"},{"id":"x181","ch":"X","num":181,"question":"Wat is een primair pathologisch kenmerk of symptoom van longemfyseem?","options":[{"letter":"A","text":"Een toename van het totale gaswisselingsoppervlak in de longen."},{"letter":"B","text":"Een verhoogde zuurstoftransportcapaciteit via hemoglobine."},{"letter":"C","text":"Verlies van elasticiteit van de longblaasjes wat leidt tot ernstige kortademigheid."},{"letter":"D","text":"Sterke verkleining en vernauwing van de centrale luchtwegen."}],"answer":"C","answerText":"Verlies van elasticiteit van de longblaasjes wat leidt tot ernstige kortademigheid."},{"id":"x182","ch":"X","num":182,"question":"Tijdens de embryonale ontwikkeling rond week 4 worden uitstulpingen zichtbaar die later zullen uitgroeien tot armen en benen. Hoe worden deze structuren genoemd?","options":[{"letter":"A","text":"Kieuwbogen"},{"letter":"B","text":"Somieten"},{"letter":"C","text":"Neurale lijst"},{"letter":"D","text":"Ledemaatknoppen (Limb buds)"}],"answer":"D","answerText":"Ledemaatknoppen (Limb buds)"},{"id":"x183","ch":"X","num":183,"question":"Welk essentieel verdedigingsmechanisme verliest een patiënt met uitgebreide derdegraads brandwonden voornamelijk?","options":[{"letter":"A","text":"De productie van specifieke antilichamen door B-lymfocyten."},{"letter":"B","text":"De aanmaak van rode bloedcellen in het beschadigde weefsel."},{"letter":"C","text":"De fysieke en chemische barrière tegen binnendringende pathogenen."},{"letter":"D","text":"De mogelijkheid om zuurstof op te nemen via de huidporiën."}],"answer":"C","answerText":"De fysieke en chemische barrière tegen binnendringende pathogenen."},{"id":"x184","ch":"X","num":184,"question":"Wat is een belangrijke wetenschappelijke beperking van de Body Mass Index (BMI) als indicator voor individuele gezondheid?","options":[{"letter":"A","text":"Het houdt geen rekening met spiermassa, botdichtheid en de verdeling van lichaamsvet."},{"letter":"B","text":"Het is onmogelijk om de BMI te berekenen voor personen onder de 18 jaar."},{"letter":"C","text":"Het gebruikt alleen het gewicht en negeert de lengte van de patiënt volledig."},{"letter":"D","text":"Het is een verouderde maatstaf die in medisch onderzoek helemaal niet meer gebruikt mag worden."}],"answer":"A","answerText":"Het houdt geen rekening met spiermassa, botdichtheid en de verdeling van lichaamsvet."},{"id":"x185","ch":"X","num":185,"question":"Wat is de primaire functie van het hormoon calcitonine in de calciumregulatie?","options":[{"letter":"A","text":"Het vermindert de uitscheiding van calcium door de nieren."},{"letter":"B","text":"Het stimuleert osteoclasten om botweefsel af te breken en calcium vrij te geven."},{"letter":"C","text":"Het verhoogt de calciumabsorptie in de dunne darm."},{"letter":"D","text":"Het verlaagt de calciumconcentratie in het bloed door botopbouw te stimuleren."}],"answer":"D","answerText":"Het verlaagt de calciumconcentratie in het bloed door botopbouw te stimuleren."},{"id":"x186","ch":"X","num":186,"question":"Waar in het vrouwelijke voortplantingsstelsel vindt fysiologisch gezien normaal de bevruchting van een eicel plaats?","options":[{"letter":"A","text":"In de eierstok (Ovarium)"},{"letter":"B","text":"In de baarmoederhals (Cervix)"},{"letter":"C","text":"In de baarmoeder (Uterus)"},{"letter":"D","text":"In het bovenste deel van de eileider (Tuba uterina / Oviduct)"}],"answer":"D","answerText":"In het bovenste deel van de eileider (Tuba uterina / Oviduct)"},{"id":"x187","ch":"X","num":187,"question":"Welk onderdeel van het spijsverteringsstelsel is verantwoordelijk voor het leeuwendeel van zowel de chemische vertering als de absorptie van voedingsstoffen?","options":[{"letter":"A","text":"De dunne darm"},{"letter":"B","text":"De dikke darm"},{"letter":"C","text":"De lever"},{"letter":"D","text":"De maag"}],"answer":"A","answerText":"De dunne darm"},{"id":"x188","ch":"X","num":188,"question":"Waar zijn de centrale chemoreceptoren in het ademhalingscentrum voornamelijk gevoelig voor om de ademhalingsfrequentie en -diepte aan te passen?","options":[{"letter":"A","text":"De concentratie zuurstof (O2) in de longblaasjes."},{"letter":"B","text":"De stijging van het CO2-gehalte en de H+ concentratie (pH-daling) in het bloed en hersenvocht."},{"letter":"C","text":"De fysieke temperatuur van de ingeademde lucht."},{"letter":"D","text":"De bloeddrukveranderingen in de aorta en halsslagaders."}],"answer":"B","answerText":"De stijging van het CO2-gehalte en de H+ concentratie (pH-daling) in het bloed en hersenvocht."},{"id":"x189","ch":"X","num":189,"question":"Hoe noemt men in de spirometrie het totale volume lucht dat maximaal kan worden uitgeademd na een maximale, diepe inademing?","options":[{"letter":"A","text":"Totale longcapaciteit"},{"letter":"B","text":"Tidaal volume"},{"letter":"C","text":"Residueel volume"},{"letter":"D","text":"Vitale capaciteit"}],"answer":"D","answerText":"Vitale capaciteit"},{"id":"x190","ch":"X","num":190,"question":"Wat is de correcte fysiologische volgorde van de processen die optreden bij hemostase (bloedstolling) na vaatschade?","options":[{"letter":"A","text":"Coagulatie (fibrinenetwerk) -> Vasculaire spasme -> Vorming bloedplaatjesprop"},{"letter":"B","text":"Vorming bloedplaatjesprop -> Vasculaire spasme -> Coagulatie (fibrinenetwerk)"},{"letter":"C","text":"Vasculaire spasme -> Vorming bloedplaatjesprop -> Coagulatie (fibrinenetwerk)"},{"letter":"D","text":"Vasculaire spasme -> Coagulatie (fibrinenetwerk) -> Vorming bloedplaatjesprop"}],"answer":"C","answerText":"Vasculaire spasme -> Vorming bloedplaatjesprop -> Coagulatie (fibrinenetwerk)"},{"id":"x191","ch":"X","num":191,"question":"Waar bevindt zich bij een volwassene de grootste opslag van vetweefsel (lipiden) binnen het skeletsysteem?","options":[{"letter":"A","text":"In het gele beenmerg"},{"letter":"B","text":"In het periosteum"},{"letter":"C","text":"In het rode beenmerg"},{"letter":"D","text":"In het compacte botweefsel"}],"answer":"A","answerText":"In het gele beenmerg"},{"id":"x192","ch":"X","num":192,"question":"Onder welke genetische voorwaarden zal een kind daadwerkelijk ziek worden van een autosomaal recessieve aandoening?","options":[{"letter":"A","text":"Wanneer de aandoening gekoppeld is aan het X-chromosoom."},{"letter":"B","text":"Wanneer het kind van beide ouders een gemuteerd recessief allel erft."},{"letter":"C","text":"Enkel wanneer ten minste één ouder zelf klinisch ziek is door de aandoening."},{"letter":"D","text":"Wanneer het kind één gemuteerd allel krijgt van de vader, onafhankelijk van het allel van de moeder."}],"answer":"B","answerText":"Wanneer het kind van beide ouders een gemuteerd recessief allel erft."},{"id":"x193","ch":"X","num":193,"question":"Wat gebeurt er als je bloed van bloedgroep B transfuseert naar een patiënt met bloedgroep A?","options":[{"letter":"A","text":"Het immuunsysteem van de ontvanger breekt de B-antigenen rustig af in de loop van enkele weken zonder ernstige symptomen."},{"letter":"B","text":"De donorcellen zullen de rode bloedcellen van de ontvanger aanvallen."},{"letter":"C","text":"Er gebeurt niets, bloedgroep A is de universele acceptor."},{"letter":"D","text":"De antilichamen tegen B in het bloed van de ontvanger vallen de donorcellen acuut aan, wat leidt tot klontering en hemolyse."}],"answer":"D","answerText":"De antilichamen tegen B in het bloed van de ontvanger vallen de donorcellen acuut aan, wat leidt tot klontering en hemolyse."},{"id":"x194","ch":"X","num":194,"question":"Hoe is de cellulaire balans verstoord bij een patiënt die lijdt aan osteoporose?","options":[{"letter":"A","text":"De activiteit van chondrocyten is veel groter dan die van osteocyten."},{"letter":"B","text":"De functie en activiteit van botafbrekende osteoclasten overtreft die van botopbouwende osteoblasten."},{"letter":"C","text":"Het rode beenmerg vernietigt actief het omliggende compacte bot."},{"letter":"D","text":"Osteoblasten produceren te veel calcium, waardoor botten broos en glasachtig worden."}],"answer":"B","answerText":"De functie en activiteit van botafbrekende osteoclasten overtreft die van botopbouwende osteoblasten."},{"id":"x195","ch":"X","num":195,"question":"Wat is een typische bevinding in het bloed bij een patiënt met de ziekte van Addison (bijnierschorsinsufficiëntie), gekenmerkt door een lage productie van het hormoon aldosteron?","options":[{"letter":"A","text":"Hyponatriëmie (verlaagd natriumgehalte)"},{"letter":"B","text":"Hypokaliëmie (verlaagd kaliumgehalte)"},{"letter":"C","text":"Verhoogde calciumspiegels"},{"letter":"D","text":"Hypernatriëmie (verhoogd natriumgehalte)"}],"answer":"A","answerText":"Hyponatriëmie (verlaagd natriumgehalte)"},{"id":"x196","ch":"X","num":196,"question":"Welk celtype en epitheel vormt de binnenbekleding (mucosa) van de dunne darm, optimaal aangepast voor de absorptie van voedingsstoffen?","options":[{"letter":"A","text":"Eenlagig cilindrisch epitheel met microvilli"},{"letter":"B","text":"Overgangsepitheel"},{"letter":"C","text":"Meerlagig plaveiselepitheel"},{"letter":"D","text":"Pseudomeerlagig trilhaarepitheel"}],"answer":"A","answerText":"Eenlagig cilindrisch epitheel met microvilli"},{"id":"x197","ch":"X","num":197,"question":"Het HIV-virus leidt onbehandeld tot een zware immuundeficiëntie (AIDS). Welke cellen in het menselijk lichaam worden primair geïnfecteerd en vernietigd door dit virus?","options":[{"letter":"A","text":"Rode bloedcellen (Erytrocyten)"},{"letter":"B","text":"T-helpercellen (CD4+ cellen)"},{"letter":"C","text":"Cytotoxische T-cellen (CD8+)"},{"letter":"D","text":"B-lymfocyten"}],"answer":"B","answerText":"T-helpercellen (CD4+ cellen)"},{"id":"x198","ch":"X","num":198,"question":"Hoe komt het dat steroïdhormonen (zoals testosteron of oestrogeen) relatief langdurige en fundamentele veranderingen in de doelfunctie van een cel teweegbrengen?","options":[{"letter":"A","text":"Omdat ze niet door de lever kunnen worden afgebroken vanwege hun unieke ringstructuur."},{"letter":"B","text":"Omdat ze binden aan receptoren aan de buitenkant van het celmembraan en een razendsnelle waterval van fosforylering activeren."},{"letter":"C","text":"Omdat ze direct functioneren als katalytische enzymen in het cytoplasma."},{"letter":"D","text":"Omdat het lipofiele (vetoplosbare) moleculen zijn die door het celmembraan diffunderen, aan het DNA binden en direct nieuwe eiwitsynthese initiëren."}],"answer":"D","answerText":"Omdat het lipofiele (vetoplosbare) moleculen zijn die door het celmembraan diffunderen, aan het DNA binden en direct nieuwe eiwitsynthese initiëren."},{"id":"x199","ch":"X","num":199,"question":"Tijdens de excitatie-contractie koppeling in een spiercel reist een actiepotentiaal over het sarcolemma. Wat is het directe gevolg hiervan binnenin de cel?","options":[{"letter":"A","text":"De sacromeren verlengen zich onmiddellijk richting de Z-lijnen."},{"letter":"B","text":"ATP wordt direct door het sarcolemma in de bloedbaan gepompt voor energievoorziening."},{"letter":"C","text":"Het sarcoplasmatisch reticulum geeft calciumionen (Ca2+) vrij, die vervolgens binden aan troponine om myosinebindingsplaatsen vrij te maken."},{"letter":"D","text":"Actinefilamenten laten direct hun fosfaatgroepen los."}],"answer":"C","answerText":"Het sarcoplasmatisch reticulum geeft calciumionen (Ca2+) vrij, die vervolgens binden aan troponine om myosinebindingsplaatsen vrij te maken."},{"id":"x200","ch":"X","num":200,"question":"Wat is een bekende (medicamenteuze) oorzaak van het syndroom van Cushing?","options":[{"letter":"A","text":"Een chronisch tekort aan adrenocorticotroop hormoon (ACTH)."},{"letter":"B","text":"Een genetische mutatie in de aanmaak van groeihormoon."},{"letter":"C","text":"Een auto-immuunziekte die de bijnieren vernietigt."},{"letter":"D","text":"Overmatig of langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason of prednison)."}],"answer":"D","answerText":"Overmatig of langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason of prednison)."},{"id":"x201","ch":"X","num":201,"question":"Welke van de volgende beweringen over prostaglandinen is ONJUIST?","options":[{"letter":"A","text":"Ze reguleren uitsluitend de werking van de prostaatklier."},{"letter":"B","text":"Het zijn lokale hormoonachtige stoffen (paracriene signalering)."},{"letter":"C","text":"Ze spelen een grote rol bij ontstekingsreacties en pijn."},{"letter":"D","text":"Ze kunnen krampen van de baarmoeder (menstruatiepijn) veroorzaken."}],"answer":"A","answerText":"Ze reguleren uitsluitend de werking van de prostaatklier."},{"id":"x202","ch":"X","num":202,"question":"Welke stelling omtrent de functie van de thymusklier (zwezerik) is VERKEERD?","options":[{"letter":"A","text":"Het bevindt zich in de borstkas, achter het borstbeen en boven het hart."},{"letter":"B","text":"De verwijdering ervan bij een jong kind heeft vrijwel geen effect op het immuunsysteem."},{"letter":"C","text":"De klier krimpt en vervet naarmate men volwassen wordt."},{"letter":"D","text":"Het produceert hormonen zoals thymosine."}],"answer":"B","answerText":"De verwijdering ervan bij een jong kind heeft vrijwel geen effect op het immuunsysteem."},{"id":"x203","ch":"X","num":203,"question":"Door welke klier wordt melatonine aangemaakt, en waardoor wordt de secretie ervan voornamelijk gereguleerd?","options":[{"letter":"A","text":"Aangemaakt door de hypofyse; gereguleerd door stressniveaus in het bloed."},{"letter":"B","text":"Aangemaakt door de epifyse (pijnappelklier); de secretie is sterk gerelateerd aan de lichtintensiteit."},{"letter":"C","text":"Aangemaakt door de schildklier; gereguleerd door de lichaamstemperatuur."},{"letter":"D","text":"Aangemaakt door de hypothalamus; gereguleerd door de bloedsuikerspiegel."}],"answer":"B","answerText":"Aangemaakt door de epifyse (pijnappelklier); de secretie is sterk gerelateerd aan de lichtintensiteit."},{"id":"x204","ch":"X","num":204,"question":"In het nefron van de nieren worden vele stoffen uit de voorurine terug opgenomen in het bloed (tubulaire reabsorptie). Welk proces vormt fysiologisch de drijvende kracht waardoor vrijwel alle andere reabsorptieprocessen (zoals voor water, glucose en aminozuren) kunnen plaatsvinden?","options":[{"letter":"A","text":"Het actieve transport van natrium (Na+)."},{"letter":"B","text":"Het kloppen van trilharen in de proximale tubulus."},{"letter":"C","text":"De verplaatsing van ureum."},{"letter":"D","text":"Het passieve transport van kalium (K+)."}],"answer":"A","answerText":"Het actieve transport van natrium (Na+)."},{"id":"x205","ch":"X","num":205,"question":"Spermatogenese is het proces waarbij zaadcellen worden gevormd. Wat is het directe celtype dat ontstaat nadat de diploïde stamcellen (spermatogonia) delen?","options":[{"letter":"A","text":"Spermatiden"},{"letter":"B","text":"Spermatozoa"},{"letter":"C","text":"Sertoli-cellen"},{"letter":"D","text":"Spermatocyten"}],"answer":"D","answerText":"Spermatocyten"},{"id":"x206","ch":"X","num":206,"question":"Sperma is een mengsel van zaadcellen en vloeistoffen uit verschillende klieren. Welke accessorische klier voegt procentueel gezien het meeste volume toe aan een mannelijke ejaculatie?","options":[{"letter":"A","text":"De prostaat (Prostata)"},{"letter":"B","text":"De Cowperse klieren (Glandulae bulbourethrales)"},{"letter":"C","text":"De teelballen (Testes)"},{"letter":"D","text":"De zaadblaasjes (Vesiculae seminales)"}],"answer":"D","answerText":"De zaadblaasjes (Vesiculae seminales)"},{"id":"x207","ch":"X","num":207,"question":"Tijdens de zwangerschap bevindt de baby zich in vruchtwater (amnionvocht). Waar is dit vocht in de vroege fase van de zwangerschap voornamelijk uit afkomstig?","options":[{"letter":"A","text":"Het wordt afgescheiden door de navelstreng."},{"letter":"B","text":"Uit de interstitiële vloeistof (het bloedplasma) van de moeder."},{"letter":"C","text":"Het is pure urine geproduceerd door de dooierzak."},{"letter":"D","text":"Het wordt geproduceerd door de zweetklieren van de embryo."}],"answer":"B","answerText":"Uit de interstitiële vloeistof (het bloedplasma) van de moeder."},{"id":"x208","ch":"X","num":208,"question":"Rond de vijfde of zesde week van de embryonale ontwikkeling bevinden de geslachtsorganen zich in een ongedifferentieerd (bipotentieel) stadium. Welke structuur is in dit stadium dus zeker nog NIET specifiek aanwezig?","options":[{"letter":"A","text":"De testes (of ovaria)"},{"letter":"B","text":"De buizen van Wolff"},{"letter":"C","text":"De buizen van Müller"},{"letter":"D","text":"Een primitieve cloaca"}],"answer":"A","answerText":"De testes (of ovaria)"},{"id":"x209","ch":"X","num":209,"question":"Wanneer de ontwikkeling bij een foetus richting het mannelijk geslacht (XY) omslaat, scheiden de zich ontwikkelende testes testosteron uit. Welk ander cruciaal hormoon wordt ook door de foetale testes afgescheiden om de vorming van vrouwelijke inwendige organen te blokkeren?","options":[{"letter":"A","text":"Oestrogeen"},{"letter":"B","text":"Prolactine"},{"letter":"C","text":"Anti-Mülleriaans Hormoon (AMH)"},{"letter":"D","text":"Luteïniserend hormoon (LH)"}],"answer":"C","answerText":"Anti-Mülleriaans Hormoon (AMH)"},{"id":"x210","ch":"X","num":210,"question":"Wat is een medisch en statistisch JUISTE bewering aangaande de risicofactoren of het voorkomen van borstkanker?","options":[{"letter":"A","text":"Een fibroadenoom is een vergevorderd stadium van invasieve borstkanker."},{"letter":"B","text":"Op relatief jonge leeftijd (voor je 30ste) een eerste kind krijgen en borstvoeding geven, biedt een gedeeltelijke bescherming tegen het ontwikkelen van borstkanker."},{"letter":"C","text":"Op jonge leeftijd een kind krijgen, is juist een van de grootste veroorzakers van borstkanker."},{"letter":"D","text":"Borstkanker komt in de overgrote meerderheid van de gevallen voornamelijk voor bij vrouwen jonger dan 40 jaar."}],"answer":"B","answerText":"Op relatief jonge leeftijd (voor je 30ste) een eerste kind krijgen en borstvoeding geven, biedt een gedeeltelijke bescherming tegen het ontwikkelen van borstkanker."},{"id":"x211","ch":"X","num":211,"question":"Wat wordt in het maag-darmstelsel bedoeld met de term 'peristaltiek'?","options":[{"letter":"A","text":"Het heen en weer kneden en mengen van voedselbrij in de dunne darm."},{"letter":"B","text":"Het ritmisch en golfachtig samentrekken van gladde spieren om het voedsel door het maag-darmkanaal vooruit te duwen."},{"letter":"C","text":"De willekeurige sluitspierwerking rondom de anus."},{"letter":"D","text":"De chemische afbraak van vetten in de twaalfvingerige darm met behulp van galzouten."}],"answer":"B","answerText":"Het ritmisch en golfachtig samentrekken van gladde spieren om het voedsel door het maag-darmkanaal vooruit te duwen."},{"id":"x212","ch":"X","num":212,"question":"Een 18-jarige man met Diabetes Mellitus (type 1) loopt een halve marathon (20 km). Ondanks dat hij zijn ochtenddosis insuline iets had verlaagd, wordt hij plotseling extreem bleek, duizelig en verward. Wat is er aan de hand en wat moet je direct doen?","options":[{"letter":"A","text":"Hij heeft een hartaanval; begin direct met reanimeren."},{"letter":"B","text":"Hij heeft uitdroging; laat hem een uur rusten zonder iets te drinken."},{"letter":"C","text":"Hij heeft een hyper (te hoge bloedsuiker); dien hem onmiddellijk extra insuline toe."},{"letter":"D","text":"Hij heeft een hypo (te lage bloedsuiker) door de inspanning; geef hem onmiddellijk snelle suikers (zoals dextro, sportdrank of frisdrank)."}],"answer":"D","answerText":"Hij heeft een hypo (te lage bloedsuiker) door de inspanning; geef hem onmiddellijk snelle suikers (zoals dextro, sportdrank of frisdrank)."},{"id":"x213","ch":"X","num":213,"question":"Patiënten met Inflammatory Bowel Disease (IBD, zoals de ziekte van Crohn of Colitis Ulcerosa) kampen met ernstige darmontstekingen, maar IBD is een systemische ziekte die ook organen buiten de darm aantast (extra-intestinale manifestaties). Welk orgaan(systeem) wordt doorgaans NIET rechtstreeks door de ziekte IBD aangetast?","options":[{"letter":"A","text":"De huid"},{"letter":"B","text":"De gewrichten (artritis)"},{"letter":"C","text":"De ogen (zoals uveïtis)"},{"letter":"D","text":"De hersenen"}],"answer":"D","answerText":"De hersenen"},{"id":"x214","ch":"X","num":214,"question":"Mensen met de genetische aandoening Tubereuze Sclerose Complex (TSC) hebben veel last van epileptische aanvallen. Wat is binnen deze ziekte de primaire fysieke/neurologische veroorzaker van deze epilepsie in het brein?","options":[{"letter":"A","text":"Het dichtslibben van de grote halsslagaders naar de hersenen."},{"letter":"B","text":"Een chronische bacteriële ontsteking (meningitis) van de hersenvliezen."},{"letter":"C","text":"Een massaal en acuut tekort aan de neurotransmitter dopamine."},{"letter":"D","text":"De vorming van structurele, goedaardige tumoren of afwijkingen in de hersenschors (zogeheten tubers en dysplasieën)."}],"answer":"D","answerText":"De vorming van structurele, goedaardige tumoren of afwijkingen in de hersenschors (zogeheten tubers en dysplasieën)."},{"id":"x215","ch":"X","num":215,"question":"De zware aandoening Tubereuze Sclerose Complex (TSC) kan in sommige gevallen al prenataal (voor de geboorte van de baby) ontdekt of vermoed worden via een zwangerschapsecho. Hoe is dit mogelijk?","options":[{"letter":"A","text":"Door de zichtbare aanwezigheid van een cardiaal rhabdomyoom (een goedaardige tumor in het hartje van de foetus)."},{"letter":"B","text":"Doordat de foetus meer dan vijf tenen aan één voet heeft."},{"letter":"C","text":"Door het meten van overmatige haargroei op de foetushuid."},{"letter":"D","text":"Doordat het hartritme stelselmatig te traag is door ontbrekende kleppen."}],"answer":"A","answerText":"Door de zichtbare aanwezigheid van een cardiaal rhabdomyoom (een goedaardige tumor in het hartje van de foetus)."},{"id":"x216","ch":"X","num":216,"question":"Binnen de cardiologie spreekt men bij patiënten op de spoedeisende hulp vaak over een 'STEMI' (ST-Elevatie Myocardinfarct). Wat houdt dit ischemische hartprobleem concreet in?","options":[{"letter":"A","text":"Een volledige en acute afsluiting van een kransslagader, wat snel leidt tot onomkeerbare necrose (afsterven) van het hartspierweefsel."},{"letter":"B","text":"Een tijdelijke kramp in de kransslagader die enkel wat pijn geeft in rust, zonder schade (onstabiele angina)."},{"letter":"C","text":"Het scheuren van de hartspier zelf door een te hoge bloeddruk."},{"letter":"D","text":"Het langzaam dichtslibben van de aorta buiten het hart."}],"answer":"A","answerText":"Een volledige en acute afsluiting van een kransslagader, wat snel leidt tot onomkeerbare necrose (afsterven) van het hartspierweefsel."},{"id":"x217","ch":"X","num":217,"question":"Een MDL-arts (maag-darm-lever) ziet een patiënt met bloederige diarree, pijn, en tevens gewrichtsontstekingen (artritis). Een coloscopie toont ontstekingen die diep doordringen in alle lagen van de darmwand (transmuraal) en die in delen over het hele colon verspreid liggen, afgewisseld met gezonde stukken weefsel. Het rectum zelf blijkt opvallend genoeg gezond. Wat is de meest waarschijnlijke diagnose?","options":[{"letter":"A","text":"De ziekte van Crohn"},{"letter":"B","text":"Colitis Ulcerosa"},{"letter":"C","text":"Diverticulitis"},{"letter":"D","text":"Prikkelbaredarmsyndroom (IBS)"}],"answer":"A","answerText":"De ziekte van Crohn"},{"id":"x218","ch":"X","num":218,"question":"Welke van de volgende wetenschappelijke verklaringen over het proces van veroudering in onze genetica is correct?","options":[{"letter":"A","text":"Centromeren slijten sneller naarmate je veel vet eet in je leven, waardoor chromosomen loslaten."},{"letter":"B","text":"Een ongezonde leefstijl versnelt weliswaar hartklachten, maar is wetenschappelijk niet gerelateerd aan vroegtijdige schade in je DNA of weefsels."},{"letter":"C","text":"Cellen kunnen zich een oneindig aantal keer blijven delen, maar veroudering treedt op door roken."},{"letter":"D","text":"Telomeren bevinden zich aan de uiteinden van onze chromosomen en fungeren als beschermende dopjes die essentiële genen behoeden voor aftakeling bij elke celdeling."}],"answer":"D","answerText":"Telomeren bevinden zich aan de uiteinden van onze chromosomen en fungeren als beschermende dopjes die essentiële genen behoeden voor aftakeling bij elke celdeling."},{"id":"x219","ch":"X","num":219,"question":"Wat is een medisch feit omtrent een 'fibroadenoom' in het borstweefsel?","options":[{"letter":"A","text":"Het moet per definitie altijd direct operatief worden weggehaald met zware chemotherapie."},{"letter":"B","text":"Het is een kleine uitzaaiing (metastase) afkomstig van een tumor in de longen."},{"letter":"C","text":"Het is een zeer veelvoorkomende goedaardige bindweefselknobbel en is géén directe voorloper van invasieve borstkanker."},{"letter":"D","text":"Het is de meest dodelijke en agressieve variant van kwaadaardige borsttumoren."}],"answer":"C","answerText":"Het is een zeer veelvoorkomende goedaardige bindweefselknobbel en is géén directe voorloper van invasieve borstkanker."},{"id":"x220","ch":"X","num":220,"question":"Als iemand de diagnose leukemie (bloedkanker) krijgt, waarom is een chirurgische verwijdering (operatie) dan praktisch zinloos, en grijpt men als behandeling standaard naar chemotherapie?","options":[{"letter":"A","text":"Omdat bestraling (radiotherapie) op het bloed direct dodelijk is voor het hart."},{"letter":"B","text":"Omdat leukemie ontstaat in de hersenen en een hersenoperatie te risicovol is."},{"letter":"C","text":"Omdat leukemie een 'vloeibare' kanker is die systemisch overal in de bloedbaan zit; chemotherapie reist ook door het hele lichaam."},{"letter":"D","text":"Omdat chemotherapie de witte bloedcellen direct weer kan samenlijmen tot normale cellen."}],"answer":"C","answerText":"Omdat leukemie een 'vloeibare' kanker is die systemisch overal in de bloedbaan zit; chemotherapie reist ook door het hele lichaam."},{"id":"x221","ch":"X","num":221,"question":"Bij de ziekte mucoviscidose (taaislijmziekte) ontstaat er door een genetisch defect veel te dik, taai slijm. Waar in de cellen ligt het kernprobleem dat medici met de nieuwste medicatie proberen te repareren?","options":[{"letter":"A","text":"In het defect van de chloridekanaaltjes (CFTR-eiwit), die zout en water niet meer goed over het celmembraan pompen."},{"letter":"B","text":"In het kapotgaan van de alveoli in de longen (emfyseem)."},{"letter":"C","text":"In de defecte natriumkanaaltjes in de lever die bloed verdunnen."},{"letter":"D","text":"In het endocriene systeem van de alvleesklier dat plots is gestopt met werken."}],"answer":"A","answerText":"In het defect van de chloridekanaaltjes (CFTR-eiwit), die zout en water niet meer goed over het celmembraan pompen."},{"id":"x222","ch":"X","num":222,"question":"Als we onder de microscoop een weefsel bekijken en we zien een mix van vetcellen (adipocyten), elastische en collageenvezels, bloedvaten, actieve fibroblasten en mastcellen, naar welk type basaalweefsel kijken we dan?","options":[{"letter":"A","text":"Spierweefsel"},{"letter":"B","text":"Epitheelweefsel"},{"letter":"C","text":"Bindweefsel"},{"letter":"D","text":"Zenuwweefsel"}],"answer":"C","answerText":"Bindweefsel"},{"id":"x223","ch":"X","num":223,"question":"De huid behoort tot de 'aangeboren (innate) immuniteit' als eerste, uiterst efficiënte verdedigingslinie tegen pathogenen. Welk van de volgende eigenschappen hoort echter NIET bij de wapens van deze huidbarrière?","options":[{"letter":"A","text":"Het voortdurend afschilferen en vervellen van dode hoorncellen (desquamatie)."},{"letter":"B","text":"Een sterke, droge keratine eiwitlaag die doordringen fysiek bemoeilijkt."},{"letter":"C","text":"Zweetklieren die een licht zuur en antimicrobieel milieu (lage pH) creëren."},{"letter":"D","text":"Het uitscheiden van circulerende antilichamen."}],"answer":"D","answerText":"Het uitscheiden van circulerende antilichamen."},{"id":"x224","ch":"X","num":224,"question":"Welk celtype is bij de mens verantwoordelijk voor de productie van het pigment melanine, wat vervolgens wordt uitgesmeerd als een paraplu over de huidkernen om ze te beschermen tegen UV-straling?","options":[{"letter":"A","text":"Erytrocyten"},{"letter":"B","text":"Melanocyten"},{"letter":"C","text":"Keratinocyten"},{"letter":"D","text":"Fibroblasten"}],"answer":"B","answerText":"Melanocyten"},{"id":"x225","ch":"X","num":225,"question":"Wanneer je hersenen beslissen om een spier aan te spannen, moet er op het kleinste moleculaire niveau iets verschuiven om dat mogelijk te maken. Aan welk specifiek eiwit binnenin de spiervezel bindt het vrijgekomen calcium (Ca2+) zich vast om de spiercontractie te starten?","options":[{"letter":"A","text":"Actine"},{"letter":"B","text":"Keratine"},{"letter":"C","text":"Myosine"},{"letter":"D","text":"Troponine"}],"answer":"D","answerText":"Troponine"},{"id":"x226","ch":"X","num":226,"question":"Welk seksueel overdraagbare aandoening (SOA) staat erom bekend een direct oorzakelijk verband te hebben met de ontwikkeling van bepaalde vormen van kanker?","options":[{"letter":"A","text":"Humaan Papillomavirus (HPV)"},{"letter":"B","text":"Gonorroe"},{"letter":"C","text":"Syfilis"},{"letter":"D","text":"Chlamydia"}],"answer":"A","answerText":"Humaan Papillomavirus (HPV)"},{"id":"x227","ch":"X","num":227,"question":"Wat is een kenmerkend pathofysiologisch gevolg van emfyseem voor de ademhaling?","options":[{"letter":"A","text":"Een verbeterde diffusie van gassen door dunner wordende membranen."},{"letter":"B","text":"Het verkleinen van de luchtwegen door overmatige slijmproductie."},{"letter":"C","text":"Een verhoging van de zuurstoftransportcapaciteit via hemoglobine."},{"letter":"D","text":"Ernstige kortademigheid door destructie van de alveolaire wanden."}],"answer":"D","answerText":"Ernstige kortademigheid door destructie van de alveolaire wanden."},{"id":"x228","ch":"X","num":228,"question":"Op welk moment in de embryonale ontwikkeling spreken we officieel van een foetus?","options":[{"letter":"A","text":"Vanaf de 9e week na de bevruchting."},{"letter":"B","text":"Zodra de innesteling in de uterus voltooid is."},{"letter":"C","text":"Vanaf de 4e week na de bevruchting."},{"letter":"D","text":"Vanaf de 12e week na de bevruchting."}],"answer":"A","answerText":"Vanaf de 9e week na de bevruchting."},{"id":"x229","ch":"X","num":229,"question":"Wat is een vaak aangehaald nadeel van het gebruik van de Body Mass Index (BMI) in gezondheidsonderzoek?","options":[{"letter":"A","text":"BMI maakt geen onderscheid tussen vetmassa en spiermassa of vetverdeling."},{"letter":"B","text":"De berekening is te complex voor routinematig gebruik."},{"letter":"C","text":"BMI houdt geen rekening met de genetische achtergrond van een individu."},{"letter":"D","text":"BMI is volledig irrelevant voor het voorspellen van ziekten."}],"answer":"A","answerText":"BMI maakt geen onderscheid tussen vetmassa en spiermassa of vetverdeling."},{"id":"x230","ch":"X","num":230,"question":"Welk orgaan vervult de belangrijkste rol bij zowel de mechanische/chemische vertering als de absorptie van de meeste voedingsstoffen?","options":[{"letter":"A","text":"Lever"},{"letter":"B","text":"Dikke darm"},{"letter":"C","text":"Maag"},{"letter":"D","text":"Dunne darm"}],"answer":"D","answerText":"Dunne darm"},{"id":"x231","ch":"X","num":231,"question":"Op welke chemische veranderingen in het bloed reageert het ademhalingscentrum in de hersenstam primair om de ademhalingsfrequentie aan te passen?","options":[{"letter":"A","text":"Een stijging van de concentratie CO"},{"letter":"B","text":"Een daling van de stikstofconcentratie in het ohn"},{"id":"x474","ch":"X","num":474,"question":"Hoe noemt men in de biologische hiërarchie een groep cellen met dezelfde vorm en structuur die samenwerken om een specifieke functie uit te voeren?","options":[{"letter":"A","text":"Een orgaanstelsel"},{"letter":"B","text":"Een orgaan"},{"letter":"C","text":"Een weefsel"},{"letter":"D","text":"Een klier"}],"answer":"C","answerText":"Een weefsel"},{"id":"x475","ch":"X","num":475,"question":"Welke kamer in het menselijk hart heeft de dikste en meest gespierde wand (myocard)?","options":[{"letter":"A","text":"Rechter atrium"},{"letter":"B","text":"Rechter ventrikel"},{"letter":"C","text":"Linker ventrikel"},{"letter":"D","text":"Linker atrium"}],"answer":"C","answerText":"Linker ventrikel"},{"id":"x476","ch":"X","num":476,"question":"Waarom wordt er bicarbonaat aan het voedsel toegevoegd zodra het de dunne darm bereikt?","options":[{"letter":"A","text":"Om vitamine B12 op te nemen"},{"letter":"B","text":"Om eiwitten direct te verteren"},{"letter":"C","text":"Om vetten te emulgeren"},{"letter":"D","text":"Om het zure maagsap te neutraliseren"}],"answer":"D","answerText":"Om het zure maagsap te neutraliseren"},{"id":"x477","ch":"X","num":477,"question":"Welke weefselstructuur wordt primair aangevallen en beschadigd bij reumatoïde artritis (rheumatoid arthritis)?","options":[{"letter":"A","text":"De pezen en ligamenten"},{"letter":"B","text":"De botepifyse"},{"letter":"C","text":"Het hyalien kraakbeen"},{"letter":"D","text":"Het synoviaal membraan"}],"answer":"D","answerText":"Het synoviaal membraan"},{"id":"x478","ch":"X","num":478,"question":"Wat is typisch GEEN symptoom van mucoviscidose (taaislijmziekte) bij volwassenen?","options":[{"letter":"A","text":"Sinusitis"},{"letter":"B","text":"Meconium ileus"},{"letter":"C","text":"Onvruchtbaarheid"},{"letter":"D","text":"Terugkerende luchtweginfecties"}],"answer":"B","answerText":"Meconium ileus"},{"id":"x479","ch":"X","num":479,"question":"Wat is het directe gevolg als de gische rollen van maagzuur (zoutzuur / HCl)?","options":[{"letter":"A","text":"Vertering van koolhydraten"},{"letter":"B","text":"Volledige vertering van eiwitten tot losse aminozuren"},{"letter":"C","text":"Vertering van vetten"},{"letter":"D","text":"Pepsinogeen activeren tot pepsine en het lichaam beschermen tegen pathogenen"}],"answer":"D","answerText":"Pepsinogeen activeren tot pepsine en het lichaam beschermen tegen pathogenen"},{"id":"x484","ch":"X","num":484,"question":"Welk overkoepelend hormoon, geproduceerd door de hypothalamus, stimuleert rechtstreeks de afgifte van LH en FSH?","options":[{"letter":"A","text":"Testosteron"},{"letter":"B","text":"Corticotropine"},{"letter":"C","text":"Oestrogeen"},{"letter":"D","text":"Gonadotropine-releasing hormone (GnRH)"}],"answer":"D","answerText":"Gonadotropine-releasing hormone (GnRH)"},{"id":"x485","ch":"X","num":485,"question":"Welke genetische factor zorgt er tijdens de embryonale ontwikkeling voor dat de ongedifferentieerde geslachtsklieren zich ontwikkelen tot testikels?","options":[{"letter":"A","text":"Androsteron"},{"letter":"B","text":"Testis Determining Factor (TDF)"},{"letter":"C","text":"Testosteron"},{"letter":"D","text":"Anti-Mülleriaans hormoon"}],"answer":"B","answerText":"Testis Determining Factor (TDF)"},{"id":"x486","ch":"X","num":486,"question":"Welk celtype vormt veruit de meerderheid (zo'n 90%) van de epidermis (opperhuid)?","options":[{"letter":"A","text":"Adipocyten"},{"letter":"B","text":"Langerhanscellen"},{"letter":"C","text":"Melanocyten"},{"letter":"D","text":"Keratinocyten"}],"answer":"D","answerText":"Keratinocyten"},{"id":"x487","ch":"X","num":487,"question":"Welke fysiologische structuren zorgen voor de enorme vergroting van het absorptieoppervlak in de dunne darm?","options":[{"letter":"A","text":"Epitheel"},{"letter":"B","text":"Villi en microvilli"},{"letter":"C","text":"Trilharen (cilia)"},{"letter":"D","text":"Rugae"}],"answer":"B","answerText":"Villi en microvilli"},{"id":"x488","ch":"X","num":488,"question":"Welke van de volgende beweringen over atherosclerose (slagaderverkalking) is FOUT?","options":[{"letter":"A","text":"Het zorgt voor een verminderde elasticiteit en vernauwing van het bloedvat."},{"letter":"B","text":"Cholesterol en andere vetten zetten zich vast in en onder de endotheellaag van het bloedvat."},{"letter":"C","text":"De eerste aanzetten van het proces (fatty streaks) starten vaak al in de jongvolwassenheid."},{"letter":"D","text":"Bestaande plaques in de coronairen kunnen met standaardbehandelingen volledig worden weggenomen."}],"answer":"D","answerText":"Bestaande plaques in de coronairen kunnen met standaardbehandelingen volledig worden weggenomen."},{"id":"x489","ch":"X","num":489,"question":"Wat is de functie van het acrosoom (het 'kapje' op de kop) van een zaadcel?","options":[{"letter":"A","text":"Het bevat lytische enzymen om door de beschermende laag van de eicel te dringen."},{"letter":"B","text":"Het bevat het mannelijke DNA dat overgedragen moet worden."},{"letter":"C","text":"Het fungeert als voedingsopslag (fructose) tijdens de reis."},{"letter":"D","text":"Het bevat mitochondriën voor voortbeweging."}],"answer":"A","answerText":"Het bevat lytische enzymen om door de beschermende laag van de eicel te dringen."},{"id":"x490","ch":"X","num":490,"question":"Als het middenrif (diafragma) van een patiënt verlamd is en niet meer kan samentrekken, wat is dan het directe en grootste probleem?","options":[{"letter":"A","text":"Uitademen (expiratie) wordt vrijwel onmogelijk."},{"letter":"B","text":"Inademen (inspiratie) wordt zeer moeilijk of onmogelijk."},{"letter":"C","text":"Er vindt geen gasuitwisseling meer plaats in de alveoli, zelfs als er zuurstof aanwezig is."},{"letter":"D","text":"De ademhaling zal onmiddellijk sterk versnellen."}],"answer":"B","answerText":"Inademen (inspiratie) wordt zeer moeilijk of onmogelijk."},{"id":"x491","ch":"X","num":491,"question":"Welke uitspraak over de productie van energie (ATP) in de cel is biologisch FOUT?","options":[{"letter":"A","text":"Triglyceriden (vetten) kunnen worden gesplitst en leveren uiteindelijk bouwstenen voor de ATP-productie."},{"letter":"B","text":"De citroenzuurcyclus (Krebs-cyclus) produceert de allergrootste hoeveelheid ATP in de cel."},{"letter":"C","text":"Eiwitten kunnen in tijden van uithongering worden gebruikt als energiebron."},{"letter":"D","text":"Volledig katabolisme van glucose zonder zuurstof (anaeroob) is mogelijk, maar levert veel minder ATP op."}],"answer":"B","answerText":"De citroenzuurcyclus (Krebs-cyclus) produceert de allergrootste hoeveelheid ATP in de cel."},{"id":"x492","ch":"X","num":492,"question":"Een mutatie in een 'proto-oncogen' verandert dit gen in een 'oncogen'. Wat is hiervan het primaire gevolg voor de cel?","options":[{"letter":"A","text":"Onmiddellijke celdood (apoptose)"},{"letter":"B","text":"Vertraagde celdeling"},{"letter":"C","text":"Het uitschakelen van het immuunsysteem"},{"letter":"D","text":"Verhoogde en ongecontroleerde (versnelde) celdeling"}],"answer":"D","answerText":"Verhoogde en ongecontroleerde (versnelde) celdeling"},{"id":"x493","ch":"X","num":493,"question":"Welk bloedvat is anatomisch uniek omdat het, als 'slagader', zuurstofarm bloed vanuit het hart richting de longen vervoert?","options":[{"letter":"A","text":"De longader (Vena pulmonalis)"},{"letter":"B","text":"De aorta"},{"letter":"C","text":"De longslagader (Arteria pulmonalis)"},{"letter":"D","text":"De kransslagader"}],"answer":"C","answerText":"De longslagader (Arteria pulmonalis)"},{"id":"x494","ch":"X","num":494,"question":"Waarom is de wand van bloedcapillairen (haarvaten) extreem dun en bestaat deze slechts uit één endotheelcellaag?","options":[{"letter":"A","text":"Om de bloeddruk plaatselijk te verhogen"},{"letter":"B","text":"Om de diffusie van zuurstof, voedingsstoffen en afvalstoffen te maximaliseren"},{"letter":"C","text":"Om voedingsstoffen langdurig op te slaan in de vaatwand"},{"letter":"D","text":"Om uitdroging te voorkomen doordat water in het vat blijft"}],"answer":"B","answerText":"Om de diffusie van zuurstof, voedingsstoffen en afvalstoffen te maximaliseren"},{"id":"x495","ch":"X","num":495,"question":"Hoe noemt men de kleinste zich herhalende functionele en contractiele eenheid binnen een spiervezel?","options":[{"letter":"A","text":"Fascia"},{"letter":"B","text":"Myofibril"},{"letter":"C","text":"Sarcomeer"},{"letter":"D","text":"Fascikel"}],"answer":"C","answerText":"Sarcomeer"},{"id":"x496","ch":"X","num":496,"question":"Wat is een bekende, vaak voorkomende oorzaak van het syndroom van Cushing?","options":[{"letter":"A","text":"Een chronisch tekort aan schildklierhormoon."},{"letter":"B","text":"Overmatig en langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason)."},{"letter":"C","text":"Een overmatige productie van melatonine door de epifyse."},{"letter":"D","text":"Een auto-immuunreactie die de alvleesklier aantast."}],"answer":"B","answerText":"Overmatig en langdurig gebruik van cortisol-achtige medicijnen (zoals dexamethason)."},{"id":"x497","ch":"X","num":497,"question":"Welke bewering over de thymusklier (zwezerik) is VERKEERD?","options":[{"letter":"A","text":"Het is de locatie waar T-cellen rijpen en leren differentiëren."},{"letter":"B","text":"Het is een belangrijk onderdeel van het lymfatische systeem."},{"letter":"C","text":"De verwijdering ervan bij een jong kind heeft weinig tot geen effect op het immuunsysteem."},{"letter":"D","text":"De thymus krimpt en wordt grotendeels vervangen door vetweefsel na de puberteit."}],"answer":"C","answerText":"De verwijdering ervan bij een jong kind heeft weinig tot geen effect op het immuunsysteem."},{"id":"x498","ch":"X","num":498,"question":"Welke uitspraak over het hormoon melatonine is juist?","options":[{"letter":"A","text":"De afscheiding is het hoogst tijdens periodes met veel zonlicht."},{"letter":"B","text":"De afscheiding ervan is gerelateerd aan de lichtintensiteit en het wordt aangemaakt door de epifyse."},{"letter":"C","text":"Het wordt afgescheiden door de schildklier en verhoogt de lichaamstemperatuur."},{"letter":"D","text":"Het reguleert de bloedsuikerspiegel samen met insuline."}],"answer":"B","answerText":"De afscheiding ervan is gerelateerd aan de lichtintensiteit en het wordt aangemaakt door de epifyse."},{"id":"x499","ch":"X","num":499,"question":"Welk proces drijft bij tubulaire reabsorptie (in de nieren) alle andere processen aan?","options":[{"letter":"A","text":"De hoge bloeddruk in de glomerulus."},{"letter":"B","text":"Actief natriumtransport."},{"letter":"C","text":"Actieve secretie van kalium."},{"letter":"D","text":"Passieve osmose van water."}],"answer":"B","answerText":"Actief natriumtransport."},{"id":"x500","ch":"X","num":500,"question":"Welke cellen worden door de spermatogonia (stamcellen in de teelballen) direct aangemaakt door middel van mitose?","options":[{"letter":"A","text":"Spermatiden."},{"letter":"B","text":"Spermatocyten."},{"letter":"C","text":"Sertolicellen."},{"letter":"D","text":"Spermatozoa (zaadcellen)."}],"answer":"B","answerText":"Spermatocyten."},{"id":"x501","ch":"X","num":501,"question":"Welke accessorische klier voegt het meeste volume vloeistof toe aan het mannelijke ejaculaat?","options":[{"letter":"A","text":"De prostaatklier."},{"letter":"B","text":"De zaadblaasjes (vesiculae seminales)."},{"letter":"C","text":"De klieren van Cowper (bulbo-urethrale klieren)."},{"letter":"D","text":"De bijballen (epididymis)."}],"answer":"B","answerText":"De zaadblaasjes (vesiculae seminales)."},{"id":"x502","ch":"X","num":502,"question":"Waar is het amnionvocht (vruchtwater) in het vroege stadium van de zwangerschap voornamelijk van afkomstig?","options":[{"letter":"A","text":"Uit de interstitiële vloeistof van de moeder."},{"letter":"B","text":"Uit de secretie van de baarmoederspieren."},{"letter":"C","text":"Uit het vruchtwater van de voorgaande menstruatiecyclus."},{"letter":"D","text":"Uit de foetale urine."}],"answer":"A","answerText":"Uit de interstitiële vloeistof van de moeder."},{"id":"x503","ch":"X","num":503,"question":"Welke structuur is in het beginstadium NIET aanwezig in de ongedifferentieerde foetale geslachtsorganen?","options":[{"letter":"A","text":"De gangen van Müller."},{"letter":"B","text":"De gangen van Wolff."},{"letter":"C","text":"De testes (teelballen)."},{"letter":"D","text":"De genitale richel (gonadale richel)."}],"answer":"C","answerText":"De testes (teelballen)."},{"id":"x504","ch":"X","num":504,"question":"Welk specifiek hormoon wordt uitgescheiden door de foetale testes om de ontwikkeling van vrouwelijke geslachtsorganen tegen te gaan?","options":[{"letter":"A","text":"Luteïniserend hormoon (LH)."},{"letter":"B","text":"Oestrogeen."},{"letter":"C","text":"Anti-Mülleriaans hormoon (AMH)."},{"letter":"D","text":"Prolactine."}],"answer":"C","answerText":"Anti-Mülleriaans hormoon (AMH)."},{"id":"x505","ch":"X","num":505,"question":"Wat is peristaltiek?","options":[{"letter":"A","text":"De chemische afbraak van eiwitten door maagzuur."},{"letter":"B","text":"De opname van voedingsstoffen in het bloed via de dunne darm."},{"letter":"C","text":"Het filteren van afvalstoffen uit het bloed door de nieren."},{"letter":"D","text":"Het vooruit duwen van voedsel door gecoördineerde spiersamentrekkingen in het maag-darmkanaal."}],"answer":"D","answerText":"Het vooruit duwen van voedsel door gecoördineerde spiersamentrekkingen in het maag-darmkanaal."},{"id":"x506","ch":"X","num":506,"question":"Een 18-jarige man met diabetes mellitus doet mee aan een loopwedstrijd van 20 km. Vlak voor of tijdens het lopen voelt hij zich bleek en duizelig, hoewel hij minder insuline had gespoten. Wat moet er direct gebeuren?","options":[{"letter":"A","text":"Hem direct iets te eten of drinken geven met snelle suikers."},{"letter":"B","text":"Hem laten rusten en uitsluitend water geven."},{"letter":"C","text":"Zijn hartslag meten en wachten tot deze daalt voordat hij verder loopt."},{"letter":"D","text":"Hem een extra dosis insuline geven."}],"answer":"A","answerText":"Hem direct iets te eten of drinken geven met snelle suikers."},{"id":"x507","ch":"X","num":507,"question":"Inflammatory Bowel Disease (IBD) is een aandoening van het spijsverteringskanaal. Welk van de volgende organen of systemen wordt volgens de examenvragen normaliter NIET aangetast door de ziekte zelf?","options":[{"letter":"A","text":"De dunne darm."},{"letter":"B","text":"De dikke darm (colon)."},{"letter":"C","text":"De hersenen (en/of de longen)."},{"letter":"D","text":"De endeldarm (rectum)."}],"answer":"C","answerText":"De hersenen (en/of de longen)."},{"id":"x508","ch":"X","num":508,"question":"Wat is een bekende oorzaak van epilepsieaanvallen bij patiënten met het Tubereuze Sclerose Complex (TSC)?","options":[{"letter":"A","text":"Een bacteriële infectie van het ruggenmerg."},{"letter":"B","text":"Het afbreken van de myelineschede rond zenuwen."},{"letter":"C","text":"De aanwezigheid van tubers (goedaardige tumoren) in de hersenen, veroorzaakt door een mutatie in de TSC-genen."},{"letter":"D","text":"Een tekort aan natrium in het bloed door nierfalen."}],"answer":"C","answerText":"De aanwezigheid van tubers (goedaardige tumoren) in de hersenen, veroorzaakt door een mutatie in de TSC-genen."},{"id":"x509","ch":"X","num":509,"question":"Hoe kan Tubereuze Sclerose Complex (TSC) vaak al prenataal (voor de geboorte) worden vastgesteld via een echografie?","options":[{"letter":"A","text":"Door de zichtbaarheid van niertumoren bij de moeder."},{"letter":"B","text":"Door het ontbreken van de ledematen op de echo."},{"letter":"C","text":"Door het meten van het vruchtwaterpeil, wat altijd verlaagd is."},{"letter":"D","text":"Door de ontdekking van een cardiaal rhabdomyoom (goedaardige harttumor) bij de foetus."}],"answer":"D","answerText":"Door de ontdekking van een cardiaal rhabdomyoom (goedaardige harttumor) bij de foetus."},{"id":"x510","ch":"X","num":510,"question":"Welke bewering over ischemische hartproblemen is juist?","options":[{"letter":"A","text":"Ischemie betekent dat de hartspier overactief is en te veel zuurstof verbruikt."},{"letter":"B","text":"Bij angina is er altijd sprake van permanente necrose van de spiercellen."},{"letter":"C","text":"Stabiele angina pectoris treedt voornamelijk op in volledige rust."},{"letter":"D","text":"Een 'STEMI' (ST-Elevatie Myocardinfarct) veroorzaakt necrose (afsterven) van hartspiervezels."}],"answer":"D","answerText":"Een 'STEMI' (ST-Elevatie Myocardinfarct) veroorzaakt necrose (afsterven) van hartspiervezels."},{"id":"x511","ch":"X","num":511,"question":"Een patiënt presenteert zich met diarree, soms bloed in de ontlasting, en een transmurale ontsteking van het dalende deel van de dikke darm afgewisseld met gezonde delen ('skip lesions'). Het rectum is gezond. Wat is de diagnose?","options":[{"letter":"A","text":"Colitis ulcerosa."},{"letter":"B","text":"Maagzweer (ulcus pepticum)."},{"letter":"C","text":"De ziekte van Crohn."},{"letter":"D","text":"Prikkelbaredarmsyndroom."}],"answer":"C","answerText":"De ziekte van Crohn."},{"id":"x512","ch":"X","num":512,"question":"Welke uitspraak over veroudering (ouderdom) op cellulair niveau is wetenschappelijk correct?","options":[{"letter":"A","text":"Ouderdom wordt uitsluitend veroorzaakt door externe factoren en niet door genetica."},{"letter":"B","text":"Telomeren bevinden zich aan de uiteinden van chromosomen en beschermen genen tegen aantasting tijdens celdeling."},{"letter":"C","text":"Telomeren worden bij elke celdeling langer, wat uiteindelijk leidt tot verouderingsziekten."},{"letter":"D","text":"Bij het ouder worden vermenigvuldigen hersencellen zich exponentieel snel."}],"answer":"B","answerText":"Telomeren bevinden zich aan de uiteinden van chromosomen en beschermen genen tegen aantasting tijdens celdeling."},{"id":"x513","ch":"X","num":513,"question":"Wat is een fibroadenoom?","options":[{"letter":"A","text":"Een veelvoorkomende goedaardige borsttumor die niet wordt beschouwd als een directe voorloper van invasieve borstkanker."},{"letter":"B","text":"Een infectie van de melkklieren tijdens het geven van borstvoeding."},{"letter":"C","text":"Een uiterst agressieve vorm van borstkanker die chemotherapie vereist."},{"letter":"D","text":"Een kwaadaardige tumor van het lymfatisch systeem in de borst."}],"answer":"A","answerText":"Een veelvoorkomende goedaardige borsttumor die niet wordt beschouwd als een directe voorloper van invasieve borstkanker."},{"id":"x514","ch":"X","num":514,"question":"Hoe wordt leukemie, een vorm van kanker waarbij witte bloedcellen ongecontroleerd delen, meestal systemisch behandeld?","options":[{"letter":"A","text":"Antibiotica-kuren."},{"letter":"B","text":"Plaatselijke chirurgische verwijdering van de tumor."},{"letter":"C","text":"Chemotherapie."},{"letter":"D","text":"Het lokaal bestralen van de lymfeklieren in de hals."}],"answer":"C","answerText":"Chemotherapie."},{"id":"x515","ch":"X","num":515,"question":"Welke van de onderstaande beweringen over mucoviscidose (taaislijmziekte) is FOUT?","options":[{"letter":"A","text":"Het veroorzaakt chronische luchtweginfecties door ophoping van taai slijm."},{"letter":"B","text":"De wetenschap is momenteel bezig met het ontwikkelen van medicatie om natrium- of calciumkanalen terug in orde te brengen."},{"letter":"C","text":"Een veelvoorkomende complicatie bij pasgeborenen is een meconium ileus (darmverstopping)."},{"letter":"D","text":"Het exocriene systeem van de pancreas raakt verstopt, waardoor er geen spijsverteringsenzymen vrijkomen."}],"answer":"B","answerText":"De wetenschap is momenteel bezig met het ontwikkelen van medicatie om natrium- of calciumkanalen terug in orde te brengen."},{"id":"x516","ch":"X","num":516,"question":"Adipocyten (vetcellen), collageenvezels, bloedvaten en mastcellen zijn typische elementen van welk type weefsel?","options":[{"letter":"A","text":"Epitheelweefsel."},{"letter":"B","text":"Spierweefsel."},{"letter":"C","text":"Bindweefsel."},{"letter":"D","text":"Zenuwweefsel."}],"answer":"C","answerText":"Bindweefsel."},{"id":"x517","ch":"X","num":517,"question":"Wat is een van de belangrijkste onderdelen van onze aangeboren (innate) immuniteit en fungeert als eerste barrière?","options":[{"letter":"A","text":"Antistoffen (immunoglobulinen) in het bloed."},{"letter":"B","text":"De huid, met componenten zoals keratine, een zure pH en continue vervelling."},{"letter":"C","text":"T-lymfocyten die antigenen herkennen."},{"letter":"D","text":"De milt, die oude rode bloedcellen afbreekt."}],"answer":"B","answerText":"De huid, met componenten zoals keratine, een zure pH en continue vervelling."},{"id":"x518","ch":"X","num":518,"question":"Welke cellen in het lichaam zijn primair verantwoordelijk voor het produceren van pigment en bepalen zo de huidskleur?","options":[{"letter":"A","text":"Erytrocyten."},{"letter":"B","text":"Keratinocyten."},{"letter":"C","text":"Leukocyten."},{"letter":"D","text":"Melanocyten."}],"answer":"D","answerText":"Melanocyten."},{"id":"x519","ch":"X","num":519,"question":"Aan welk eiwit binden calciumionen (Ca²⁺) zich tijdens het proces van spiercontractie in een myofibril?","options":[{"letter":"A","text":"Myosine."},{"letter":"B","text":"Troponine."},{"letter":"C","text":"Collageen."},{"letter":"D","text":"Keratine."}],"answer":"B","answerText":"Troponine."},{"id":"x520","ch":"X","num":520,"question":"Borstkanker is de meest frequente kanker bij vrouwen. Wat wordt in de examenvragen beschouwd als een ONJUISTE of verwarrende opvatting die vaak getoetst wordt?","options":[{"letter":"A","text":"Dat genetica een rol kan spelen in het ontwikkelen van borstkanker."},{"letter":"B","text":"Dat op jonge leeftijd kinderen krijgen een vrouw helemaal niet beschermt tegen borstkanker."},{"letter":"C","text":"Dat borstkanker meestal voorkomt bij vrouwen tussen de 40 en 60 jaar."},{"letter":"D","text":"Dat een fibroadenoom geen directe oorzaak of voorloper is."}],"answer":"B","answerText":"Dat op jonge leeftijd kinderen krijgen een vrouw helemaal niet beschermt tegen borstkanker."},{"id":"x521","ch":"X","num":521,"question":"Welke structuur is NIET aanwezig in de ongedifferentieerde (zeer vroege) foetale geslachtsorganen?","options":[{"letter":"A","text":"De labioscrotale zwelling."},{"letter":"B","text":"De testis (teelbal)."},{"letter":"C","text":"De urogenitale groeve."},{"letter":"D","text":"De genitale knop."}],"answer":"B","answerText":"De testis (teelbal)."},{"id":"x522","ch":"X","num":522,"question":"Welk specifiek hormoon wordt uitgescheiden door de foetale testes om vrouwelijke ontwikkeling af te remmen?","options":[{"letter":"A","text":"Choriongonadotrofine (hCG)."},{"letter":"B","text":"Progesteron."},{"letter":"C","text":"Oxytocine."},{"letter":"D","text":"Anti-Mülleriaans hormoon (AMH)."}],"answer":"D","answerText":"Anti-Mülleriaans hormoon (AMH)."},{"id":"x523","ch":"X","num":523,"question":"Wat is de juiste wetenschappelijke term voor de progressieve achteruitgang van meerdere orgaansystemen naarmate we ouder worden?","options":[{"letter":"A","text":"Organische achteruitgang."},{"letter":"B","text":"Senescentie."},{"letter":"C","text":"Seniliteit."},{"letter":"D","text":"Organische veroudering."}],"answer":"B","answerText":"Senescentie."},{"id":"x524","ch":"X","num":524,"question":"Welke uitspraak over veroudering op cellulair niveau is wetenschappelijk correct?","options":[{"letter":"A","text":"Antioxidanten vertragen gegarandeerd en significant het verouderingsproces in het hele lichaam."},{"letter":"B","text":"Geneesmiddelen die telomerase blokkeren, voorkomen alle soorten kanker."},{"letter":"C","text":"Telomeren beschermen genen tegen aantasting tijdens celdeling."},{"letter":"D","text":"Auto-immuunziekten nemen af naarmate de leeftijd vordert."}],"answer":"C","answerText":"Telomeren beschermen genen tegen aantasting tijdens celdeling."},{"id":"x525","ch":"X","num":525,"question":"Welke bewering over dieetgewoonten en het risico op een myocardinfarct (hartaanval) is over het algemeen correct?","options":[{"letter":"A","text":"Onverzadigde vetten in de voeding hebben een relatief beschermend effect en kunnen helpen HDL-cholesterol te verhogen."},{"letter":"B","text":"Statines verhogen de kans op een myocardinfarct."},{"letter":"C","text":"Hoge serum concentraties van LDL-cholesterol beschermen tegen een hartinfarct."},{"letter":"D","text":"Alle soorten vetten, zonder uitzondering, veroorzaken atherosclerose."}],"answer":"A","answerText":"Onverzadigde vetten in de voeding hebben een relatief beschermend effect en kunnen helpen HDL-cholesterol te verhogen."},{"id":"x526","ch":"X","num":526,"question":"Er bestaan verschillende ischemische hartproblemen. Welke bewering hierover klopt?","options":[{"letter":"A","text":"Stabiele angina pectoris treedt meestal op bij rust."},{"letter":"B","text":"Onstabiele angina wordt meestal gekenmerkt door een korte hevige pijn uitsluitend na inspanning."},{"letter":"C","text":"Een 'STEMI' (ernstig hartinfarct) veroorzaakt necrose van hartspiervezels."},{"letter":"D","text":"Bij angina pectoris is er altijd sprake van kortstondige necrose (afsterving) van hartcellen."}],"answer":"C","answerText":"Een 'STEMI' (ernstig hartinfarct) veroorzaakt necrose van hartspiervezels."},{"id":"x527","ch":"X","num":527,"question":"Kanker kent vele oorzaken. Welke van de volgende beweringen klopt NIET?","options":[{"letter":"A","text":"Het apoptose-mechanisme (geprogrammeerde celdood) is vaak verstoord bij kankercellen."},{"letter":"B","text":"De meest frequente oorzaak van borstkanker is een erfelijke mutatie in het BRCA1 of BRCA2 gen."},{"letter":"C","text":"Een mutatie in een tumor-suppressor gen kan kanker veroorzaken."},{"letter":"D","text":"Sommige kankers (zoals leverkanker) worden mede veroorzaakt door een infectie met het Hepatitis B-virus."}],"answer":"B","answerText":"De meest frequente oorzaak van borstkanker is een erfelijke mutatie in het BRCA1 of BRCA2 gen."},{"id":"x528","ch":"X","num":528,"question":"Over borstkanker (de meest frequente kanker bij vrouwen) circuleren diverse feiten. Welke van de volgende beweringen klopt NIET volgens de statistieken in de cursus?","options":[{"letter":"A","text":"De meeste borstkankers treden op tussen de leeftijd van 45 en 60 jaar."},{"letter":"B","text":"Op jonge leeftijd kinderen krijgen biedt een gedeeltelijk beschermend effect tegen borstkanker."},{"letter":"C","text":"Een fibroadenoma is geen voorloper van invasieve borstkanker."},{"letter":"D","text":"Een mutatie in het BRCA2 gen kan ook bij mannen leiden tot borst- of prostaatkanker."}],"answer":"A","answerText":"De meeste borstkankers treden op tussen de leeftijd van 45 en 60 jaar."},{"id":"x529","ch":"X","num":529,"question":"Wat is de allerbelangrijkste functie van de luchtwegen (het ademhalingsstelsel)?","options":[{"letter":"A","text":"Het circuleren van het bloed door het gehele lichaam."},{"letter":"B","text":"Het chemisch verteren van voedsel."},{"letter":"C","text":"Het uitwisselen van gassen (zuurstof en koolstofdioxide) tussen het bloed in het lichaam en de omgeving."},{"letter":"D","text":"Het produceren van hormonen voor de groei."}],"answer":"C","answerText":"Het uitwisselen van gassen (zuurstof en koolstofdioxide) tussen het bloed in het lichaam en de omgeving."},{"id":"x530","ch":"X","num":530,"question":"Welke van de volgende opties is een standaard (systemische) medische behandeling voor de ziekte kanker?","options":[{"letter":"A","text":"Antihistamines."},{"letter":"B","text":"Vaccinatie na het uitbreken van de ziekte."},{"letter":"C","text":"Antibiotica."},{"letter":"D","text":"Chemotherapie."}],"answer":"D","answerText":"Chemotherapie."},{"id":"x531","ch":"X","num":531,"question":"Wat is een tumor (in de medische betekenis)?","options":[{"letter":"A","text":"Een virus dat cellen binnendringt en hen dwingt te delen."},{"letter":"B","text":"Een gezwel of massa van abnormaal en ongecontroleerd delende cellen."},{"letter":"C","text":"Een specifiek type overactieve witte bloedcel."},{"letter":"D","text":"Een bepaald type kankerbehandeling."}],"answer":"B","answerText":"Een gezwel of massa van abnormaal en ongecontroleerd delende cellen."},{"id":"x532","ch":"X","num":532,"question":"Welk mechanisme ligt fundamenteel ten grondslag aan het ontstaan van vrijwel alle soorten kanker?","options":[{"letter":"A","text":"Het overmatig eten van pittig voedsel."},{"letter":"B","text":"Een chronisch tekort aan vitaminen."},{"letter":"C","text":"Fouten of mutaties in het DNA van een cel."},{"letter":"D","text":"Een eenmalig tekort aan lichaamsbeweging."}],"answer":"C","answerText":"Fouten of mutaties in het DNA van een cel."},{"id":"x533","ch":"X","num":533,"question":"Welk orgaan produceert de vloeistof gal, die belangrijk is voor de spijsvertering van vetten?","options":[{"letter":"A","text":"De maag."},{"letter":"B","text":"De galblaas."},{"letter":"C","text":"De lever."},{"letter":"D","text":"De alvleesklier (pancreas)."}],"answer":"C","answerText":"De lever."},{"id":"x534","ch":"X","num":534,"question":"Wat is de definitie van 'peristaltiek' in de context van het spijsverteringsstelsel?","options":[{"letter":"A","text":"Het opnemen (absorberen) van de kleinste voedingsdeeltjes in de bloedbaan."},{"letter":"B","text":"De chemische afbraak van vetten door galvloeistof."},{"letter":"C","text":"Het samenknijpen van de maagklep om maagzuur tegen te houden."},{"letter":"D","text":"Het vooruit duwen van voedsel door ritmische samentrekkingen van glad spierweefsel in de darmwand."}],"answer":"D","answerText":"Het vooruit duwen van voedsel door ritmische samentrekkingen van glad spierweefsel in de darmwand."},{"id":"x535","ch":"X","num":535,"question":"Wat is de juiste anatomische volgorde die de luchtstroom aflegt wanneer je inademt?","options":[{"letter":"A","text":"Longblaasjes -> bronchiën -> luchtpijp -> neus."},{"letter":"B","text":"Neus -> longblaasjes -> bronchiën -> luchtpijp."},{"letter":"C","text":"Luchtpijp -> neus -> bronchiën -> longblaasjes."},{"letter":"D","text":"Neus -> luchtpijp (trachea) -> bronchiën -> longblaasjes (alveoli)."}],"answer":"D","answerText":"Neus -> luchtpijp (trachea) -> bronchiën -> longblaasjes (alveoli)."},{"id":"x536","ch":"X","num":536,"question":"Wat gebeurt er fysiek in het lichaam op het moment dat je middenrif (diafragma) samentrekt?","options":[{"letter":"A","text":"De borstkas wordt kleiner en lucht wordt actief naar buiten geperst."},{"letter":"B","text":"De borstholte zet uit, waardoor de druk daalt en er lucht in de longen wordt gezogen (inademing)."},{"letter":"C","text":"De longblaasjes klappen onmiddellijk dicht door de hoge druk."},{"letter":"D","text":"De maag krimpt samen om ruimte te maken."}],"answer":"B","answerText":"De borstholte zet uit, waardoor de druk daalt en er lucht in de longen wordt gezogen (inademing)."},{"id":"x537","ch":"X","num":537,"question":"Welke van de onderstaande beweringen over de genetische ziekte mucoviscidose (taaislijmziekte) is absoluut NIET WAAR?","options":[{"letter":"A","text":"De wetenschap is bezig met een vaccin dat defecte calciumkanaaltjes in de cellen moet herstellen."},{"letter":"B","text":"Het beïnvloedt de pancreas, wat de afgifte van spijsverteringsenzymen hindert."},{"letter":"C","text":"Patiënten kunnen in de latere fases een zuurstoftoestel (of ademhalingstoestel) nodig hebben voor de nacht."},{"letter":"D","text":"Veel mannelijke patiënten en sommige vrouwelijke patiënten ervaren ernstige vruchtbaarheidsproblemen (infertiliteit)."}],"answer":"A","answerText":"De wetenschap is bezig met een vaccin dat defecte calciumkanaaltjes in de cellen moet herstellen."},{"id":"x538","ch":"X","num":538,"question":"Welk bloedvat is verantwoordelijk voor het transport van zuurstofarm bloed vanuit de rechterhelft van het hart naar de longen?","options":[{"letter":"A","text":"De longslagader (arteria pulmonalis)."},{"letter":"B","text":"De Vena cava superior (bovenste holle ader)."},{"letter":"C","text":"De Aorta."},{"letter":"D","text":"De longader (vena pulmonalis)."}],"answer":"A","answerText":"De longslagader (arteria pulmonalis)."},{"id":"x539","ch":"X","num":539,"question":"Wat is de allereerste stap in de hemostase (het proces van bloedstolling) wanneer een bloedvat beschadigd raakt?","options":[{"letter":"A","text":"Vasculaire spasmen (vaatkramp)."},{"letter":"B","text":"Fibrinogynese (aanmaak van fibrinogeen)."},{"letter":"C","text":"De vorming van een prop van bloedplaatjes (trombocytenplug)."},{"letter":"D","text":"Klonter formatie (coagulatie met fibrine)."}],"answer":"A","answerText":"Vasculaire spasmen (vaatkramp)."},{"id":"x540","ch":"X","num":540,"question":"Een patiënt meldt zich met langdurige diarree, bloed in de ontlasting, en bij endoscopie ziet de arts een diepe, transmurale ontsteking (door alle wandlagen heen) in het colon descendens (dalende dikke darm). Het rectum blijkt echter niet aangetast. Er is ook sprake van een oogontsteking. Wat is de meest waarschijnlijke diagnose?","options":[{"letter":"A","text":"Colitis ulcerosa (CU)."},{"letter":"B","text":"Sweet syndroom."},{"letter":"C","text":"Een simpele voedselvergiftiging."},{"letter":"D","text":"De ziekte van Crohn."}],"answer":"D","answerText":"De ziekte van Crohn."},{"id":"x541","ch":"X","num":541,"question":"Een man met diabetes is gaan hardlopen zonder ontbijt. Hij voelt zich zwak, gaat zweten en voelt zich onwel worden (hypoglykemie). Wat moet je onmiddellijk doen?","options":[{"letter":"A","text":"Zowel insuline geven als hem laten eten."},{"letter":"B","text":"Hem direct iets te eten of te drinken geven met snelle suikers (bijv. dextro of frisdrank)."},{"letter":"C","text":"Hem enkel laten rusten totdat het vanzelf overgaat."},{"letter":"D","text":"Hem een extra dosis insuline laten spuiten."}],"answer":"B","answerText":"Hem direct iets te eten of te drinken geven met snelle suikers (bijv. dextro of frisdrank)."},{"id":"x542","ch":"X","num":542,"question":"Welk specifiek celbestanddeel in het bloed is verantwoordelijk voor het initiëren van de stolling bij een bloeding?","options":[{"letter":"A","text":"De rode bloedcellen (erytrocyten)."},{"letter":"B","text":"De witte bloedcellen (leukocyten)."},{"letter":"C","text":"Hemoglobine."},{"letter":"D","text":"De bloedplaatjes (trombocyten)."}],"answer":"D","answerText":"De bloedplaatjes (trombocyten)."},{"id":"x543","ch":"X","num":543,"question":"Op welke manier dragen vaccinatieprogramma's over de hele wereld bij aan de strijd tégen antibioticaresistentie?","options":[{"letter":"A","text":"Vaccins voorkomen dat mensen ziek worden door infecties, waardoor artsen simpelweg minder antibiotica hoeven voor te schrijven."},{"letter":"B","text":"Het vaccin doodt de resistente bacteriën onmiddellijk in het bloed."},{"letter":"C","text":"Vaccins maken bacteriën kwetsbaarder, zodat antibiotica dubbel zo goed werken."},{"letter":"D","text":"Een vaccin is een directe, permanente chemische vervanger voor antibiotica in apotheken."}],"answer":"A","answerText":"Vaccins voorkomen dat mensen ziek worden door infecties, waardoor artsen simpelweg minder antibiotica hoeven voor te schrijven."},{"id":"x544","ch":"X","num":544,"question":"Wat is bij de genetische aandoening Tubereuze Sclerose Complex (TSC) in de hersenen de directe mechanische oorzaak die vaak leidt tot epileptische aanvallen?","options":[{"letter":"A","text":"Het binnendringen van het Mtor-virus in de hersenvloeistof."},{"letter":"B","text":"Het afbreken van spierweefsel in het hoofd."},{"letter":"C","text":"Een chronisch tekort aan de neurotransmitter dopamine."},{"letter":"D","text":"De aanwezigheid van zogenaamde 'tubers' (goedaardige tumoren) in de hersenschors."}],"answer":"D","answerText":"De aanwezigheid van zogenaamde 'tubers' (goedaardige tumoren) in de hersenschors."},{"id":"x545","ch":"X","num":545,"question":"Soms kan men het Tubereuze Sclerose Complex (TSC) al prenataal (voor de geboorte van de baby) ontdekken. Waar ziet de arts dan vaak opvallende tekenen op de echografie?","options":[{"letter":"A","text":"Door een postnatale genetica test (hielprik)."},{"letter":"B","text":"Door de ontdekking van rhabdomyomen (goedaardige tumoren) in het hart."},{"letter":"C","text":"Door afwezigheid van hersenweefsel."},{"letter":"D","text":"Door duidelijk zichtbare huidafwijkingen (zoals witte vlekken) bij de foetus op de echo."}],"answer":"B","answerText":"Door de ontdekking van rhabdomyomen (goedaardige tumoren) in het hart."},{"id":"x546","ch":"X","num":546,"question":"Wanneer water door een semipermeabel membraan stroomt van een plek met een lage concentratie opgeloste stoffen (bijv. zout) naar een plek met een hoge concentratie zout, om de verhouding gelijk te trekken, hoe heet dat proces?","options":[{"letter":"A","text":"Actief transport."},{"letter":"B","text":"Permease werking."},{"letter":"C","text":"Osmose."},{"letter":"D","text":"Endocytose."}],"answer":"C","answerText":"Osmose."},{"id":"x547","ch":"X","num":547,"question":"Wat is het belangrijkste biologische doel van de gewone celdeling, mitose?","options":[{"letter":"A","text":"Het halveren van het genetische materiaal in de dochtercellen."},{"letter":"B","text":"De groei van het organisme en het herstellen of vervangen van beschadigde weefsels."},{"letter":"C","text":"De productie van geslachtscellen (gameten) zoals zaad- en eicellen."},{"letter":"D","text":"Het creëren van variatie in het genetische materiaal."}],"answer":"B","answerText":"De groei van het organisme en het herstellen of vervangen van beschadigde weefsels."},{"id":"x548","ch":"X","num":548,"question":"Inflammatory Bowel Disease (IBD, zoals Crohn of colitis ulcerosa) is een auto-immuun aandoening. Welk van de volgende weefsels wordt normaliter NIET primair aangetast door deze ziekte?","options":[{"letter":"A","text":"De beenderen en gewrichten."},{"letter":"B","text":"De hersenen."},{"letter":"C","text":"De ogen."},{"letter":"D","text":"De huid."}],"answer":"B","answerText":"De hersenen."},{"id":"x549","ch":"X","num":549,"question":"Wat gebeurt er specifiek in de anafase van de mitotische celdeling?","options":[{"letter":"A","text":"De chromosomen gaan netjes geordend in het midden (equatoriaalvlak) van de cel op één lijn liggen."},{"letter":"B","text":"De zusterchromatiden (de twee helften van een chromosoom) worden uit elkaar getrokken richting de tegenovergestelde polen van de cel."},{"letter":"C","text":"De chromosomen condenseren (rollen zich op) en worden voor het eerst zichtbaar onder de microscoop."},{"letter":"D","text":"Er vormen zich nieuwe nucleaire membranen (kern-enveloppen) rondom de gescheiden chromosomen."}],"answer":"B","answerText":"De zusterchromatiden (de twee helften van een chromosoom) worden uit elkaar getrokken richting de tegenovergestelde polen van de cel."},{"id":"x550","ch":"X","num":550,"question":"Wat is de grootste ader van ons lichaam?","options":[{"letter":"A","text":"Femoralisader (vena femoralis)."},{"letter":"B","text":"Longader (vena pulmonalis)."},{"letter":"C","text":"Halsader (vena jugularis)."},{"letter":"D","text":"Vena cava inferior (onderste holle ader)."}],"answer":"D","answerText":"Vena cava inferior (onderste holle ader)."},{"id":"x551","ch":"X","num":551,"question":"Wat is de belangrijkste functie van het immuunsysteem?","options":[{"letter":"A","text":"Het lichaam beschermen tegen ziekteverwekkers."},{"letter":"B","text":"Hormonen aanmaken en reguleren."},{"letter":"C","text":"Bloed en zuurstof vervoeren naar de weefsels."},{"letter":"D","text":"Voedingsstoffen opnemen uit ons voedsel."}],"answer":"A","answerText":"Het lichaam beschermen tegen ziekteverwekkers."},{"id":"x552","ch":"X","num":552,"question":"Wat is de primaire taak van het maag-darmkanaal?","options":[{"letter":"A","text":"Het absorberen en verteren van voedingsstoffen."},{"letter":"B","text":"Het uitscheiden van vloeibare cellulaire afvalstoffen."},{"letter":"C","text":"Het transporteren van bloed door het lichaam."},{"letter":"D","text":"Het reguleren van de lichaamstemperatuur."}],"answer":"A","answerText":"Het absorberen en verteren van voedingsstoffen."},{"id":"x553","ch":"X","num":553,"question":"Welk type witte bloedcel komt het meeste voor in ons bloed?","options":[{"letter":"A","text":"Lymfocyten."},{"letter":"B","text":"Neutrofielen."},{"letter":"C","text":"Monocyten."},{"letter":"D","text":"Eosinofielen."}],"answer":"B","answerText":"Neutrofielen."},{"id":"x554","ch":"X","num":554,"question":"Waarvoor dient een vaccinatie primair?","options":[{"letter":"A","text":"Om onmiddellijk bacteriën te doden die al in het bloed zitten."},{"letter":"B","text":"Zodat het lichaam wordt voorbereid en zelf antistoffen (en geheugencellen) aanmaakt tegen een pathogeen."},{"letter":"C","text":"Om het lichaam directe voedingsstoffen en energie te geven tijdens een infectie."},{"letter":"D","text":"Om het bestaande immuunsysteem volledig te vervangen door een sterker systeem."}],"answer":"B","answerText":"Zodat het lichaam wordt voorbereid en zelf antistoffen (en geheugencellen) aanmaakt tegen een pathogeen."},{"id":"x555","ch":"X","num":555,"question":"Wat is het doel van een booster-vaccin?","options":[{"letter":"A","text":"Het tegengaan van de bijwerkingen van het eerste vaccin."},{"letter":"B","text":"Het is alleen nodig als het eerste vaccin helemaal niet heeft gewerkt."},{"letter":"C","text":"Het versterken en zorgen voor lange termijn immuniteit (extra immuniteit)."},{"letter":"D","text":"Het direct genezen van de ziekte als je al besmet bent geraakt."}],"answer":"C","answerText":"Het versterken en zorgen voor lange termijn immuniteit (extra immuniteit)."},{"id":"x556","ch":"X","num":556,"question":"Bij een spiercontractie komt er een specifiek ion vrij in de cel dat zich bindt aan troponine. Welk ion is dit?","options":[{"letter":"A","text":"Chloor (Cl⁻)."},{"letter":"B","text":"Calcium (Ca²⁺)."},{"letter":"C","text":"Kalium (K⁺)."},{"letter":"D","text":"Natrium (Na⁺)."}],"answer":"B","answerText":"Calcium (Ca²⁺)."},{"id":"x557","ch":"X","num":557,"question":"Wat is de functie van de T-tubuli (transversale tubuli) in een spiervezel?","options":[{"letter":"A","text":"Ze produceren ATP voor de spiercontractie."},{"letter":"B","text":"Ze vormen de pezen die de spier aan het bot hechten."},{"letter":"C","text":"Ze geleiden de actiepotentialen (het elektrische signaal) vanaf het celoppervlak diep de spiervezel in."},{"letter":"D","text":"Ze slaan zuurstof op voor langdurige spierarbeid."}],"answer":"C","answerText":"Ze geleiden de actiepotentialen (het elektrische signaal) vanaf het celoppervlak diep de spiervezel in."},{"id":"x558","ch":"X","num":558,"question":"Waar bevindt de schildklier (thyroid gland) zich in het menselijk lichaam?","options":[{"letter":"A","text":"In de hersenen, onder de thalamus."},{"letter":"B","text":"Ter hoogte van de hals/keel, net onder het strottenhoofd."},{"letter":"C","text":"Bovenop de nieren."},{"letter":"D","text":"In de borstkas, achter het borstbeen."}],"answer":"B","answerText":"Ter hoogte van de hals/keel, net onder het strottenhoofd."},{"id":"x559","ch":"X","num":559,"question":"Hoe heet het proces waarbij twee moleculen worden samengevoegd tot één groter molecuul, waarbij een watermolecuul (H₂O) wordt afgesplitst?","options":[{"letter":"A","text":"Hydrogenase."},{"letter":"B","text":"Denaturatie."},{"letter":"C","text":"Hydrolyse."},{"letter":"D","text":"Dehydratatiesynthese (condensatiereactie)."}],"answer":"D","answerText":"Dehydratatiesynthese (condensatiereactie)."},{"id":"x560","ch":"X","num":560,"question":"Wat is de universele energiedrager van de cellen in ons lichaam?","options":[{"letter":"A","text":"Adenosinetrifosfaat (ATP)."},{"letter":"B","text":"Cholesterol."},{"letter":"C","text":"Glycogeen."},{"letter":"D","text":"DNA."}],"answer":"A","answerText":"Adenosinetrifosfaat (ATP)."},{"id":"x
